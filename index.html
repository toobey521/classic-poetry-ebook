>zhǔ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>客<rt>kè</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>他<rt>tā</rt></ruby><ruby>乡<rt>xiāng</rt></ruby>。","notes":"①都金香：香草名。这里是说兰陵酒是用郁金香草泡制的美酒。<br>②琥珀：树脂化石，呈金黄色或赤褐色。<br>③但使：假使。<br>④他乡：异乡。","translation":"兰陵美酒散发着浓郁的香味，盛在白玉酒碗中放射着琥珀色的光芒。假若主人能够摆上这令人沉醉的美酒让客人开怀畅饮，客人会浑然不觉哪里是异地他乡。","number":64,"title_py":"kè zhōng háng","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"绝句","dynasty":"明","author":"文徵明","text":"<ruby>公<rt>gōng</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>衣<rt>yī</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>埋<rt>mái</rt></ruby>，<br><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>茅<rt>máo</rt></ruby><ruby>斋<rt>zhāi</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>必<rt>bì</rt></ruby><ruby>论<rt>lùn</rt></ruby><ruby>贫<rt>pín</rt></ruby><ruby>富<rt>fù</rt></ruby>，<br><ruby>才<rt>cái</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>读<rt>dú</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>便<rt>biàn</rt></ruby><ruby>佳<rt>jiā</rt></ruby>。","notes":"①茅斋：草屋。","translation":"我办完事情从官府回来，天已经很晚了，雪下得很大，衣服上盖了厚厚的一层雪花，而孩子们住的小屋还亮着灯光。一户人家不管是穷还是富，只要有读书的声音，那就是好人家了。","number":65,"title_py":"jué jù","author_py":"wén zhēng míng","dynasty_py":"Míng"},{"title":"减字木兰花·竞渡","dynasty":"宋","author":"黄裳","text":"<ruby>红<rt>hóng</rt></ruby><ruby>旗<rt>qí</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>举<rt>jǔ</rt></ruby>，<ruby>飞<rt>fēi</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>渚<rt>zhǔ</rt></ruby>①。<br><ruby>鼓<rt>gǔ</rt></ruby><ruby>击<rt>jī</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>雷<rt>léi</rt></ruby>，<ruby>直<rt>zhí</rt></ruby><ruby>破<rt>pò</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>波<rt>bō</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>回<rt>huí</rt></ruby>。<br><ruby>欢<rt>huān</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>震<rt>zhèn</rt></ruby><ruby>地<rt>dì</rt></ruby>,<ruby>惊<rt>jīng</rt></ruby><ruby>退<rt>tuì</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>争<rt>zhēng</rt></ruby><ruby>战<rt>zhàn</rt></ruby><ruby>气<rt>qì</rt></ruby>②。<br><ruby>金<rt>jīn</rt></ruby><ruby>碧<rt>bì</rt></ruby>③<ruby>楼<rt>lóu</rt></ruby><ruby>西<rt>xī</rt></ruby>，<ruby>衔<rt>xián</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>锦<rt>jǐn</rt></ruby><ruby>标<rt>biāo</rt></ruby><ruby>第<rt>dì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>归<rt>guī</rt></ruby>。","notes":"①渚：水中的小块陆地。<br>②争战气：竞争夺标的气概。<br>③金碧：形容建筑物的华丽、光彩夺目。","translation":"龙舟竞渡比赛刚一开始，多艘高举着红旗的龙舟从柳阴深处的小洲旁飞驶而出。各条小船上鼓声如春雷一般，龙舟冲破浩渺的烟波，再从远处返回来。一条龙舟最先到达了终点，顿时欢呼声震天动地，龙舟的速度之快简直要惊退万•人。龙舟上挂着第一名的锦标，从金碧辉煌的楼西面凯旋而回。","number":66,"title_py":"jiǎn zì mù lán huā · jìng dù","author_py":"huáng cháng","dynasty_py":"Sòng"},{"title":"新年作","dynasty":"唐","author":"刘长卿","text":"<ruby>乡<rt>xiāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>切<rt>qiè</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>畔<rt>pàn</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>潸<rt>shān</rt></ruby><ruby>然<rt>rán</rt></ruby>。<br><ruby>老<rt>lǎo</rt></ruby><ruby>至<rt>zhì</rt></ruby><ruby>居<rt>jū</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>下<rt>xià</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>先<rt>xiān</rt></ruby>。<br><ruby>岭<rt>lǐng</rt></ruby><ruby>猿<rt>yuán</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>旦<rt>dàn</rt></ruby><ruby>暮<rt>mù</rt></ruby>，<br><ruby>江<rt>jiāng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>已<rt>yǐ</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>长<rt>zhǎng</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>傅<rt>fù</rt></ruby>，<br><ruby>从<rt>cóng</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>年<rt>nián</rt></ruby>?","notes":"①春归在客先：春已归而自己尚未回去。<br>②长沙傅：指贾谊。曾受谗被贬为长沙王太傅，这里借以自喻。","translation":"中思念家乡的心情更为急切，独在天涯海角怎不叫我潸然落泪？纪已经老大了却依旧寄人篱下，春天脚步多么轻快比我更早回归。在岭南早晚只能与猿猴相依作伴，或与江边杨柳共同领受风烟侵吹。我像西汉的贾谊被贬为长沙太傅，不知今后还要几年才有还乡机会？","number":67,"title_py":"xīn nián zuò","author_py":"liú zhǎng qīng","dynasty_py":"Táng"},{"title":"子夜吴歌•春歌","dynasty":"唐","author":"李白","text":"<ruby>秦<rt>qín</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>敷<rt>fū</rt></ruby><ruby>女<rt>nǚ</rt></ruby>，<br><ruby>采<rt>cǎi</rt></ruby><ruby>桑<rt>sāng</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>边<rt>biān</rt></ruby>。<br><ruby>素<rt>sù</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>条<rt>tiáo</rt></ruby><ruby>上<rt>shàng</rt></ruby>，<br><ruby>红<rt>hóng</rt></ruby><ruby>妆<rt>zhuāng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>鲜<rt>xiān</rt></ruby>。<br><ruby>蚕<rt>cán</rt></ruby><ruby>饥<rt>jī</rt></ruby><ruby>妾<rt>qiè</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>五<rt>wǔ</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>连<rt>lián</rt></ruby>。","notes":"①子夜吴歌：《子夜歌》属乐府的吴声曲辞，又名《子夜四时歌》，分为“春歌”、“夏歌”、“秋歌”、“冬歌”。《唐书•乐志》<br>说：“《子夜歌》者，晋曲也。晋有女子名子夜，造此声，声过哀苦。”因起于吴地，所以又名《子夜吴歌》。②“秦地”<br>句：秦地，指今陕西省关中地区。罗敷女，乐府诗《陌上桑》有“日出东南隅，归我秦氏楼。秦氏有好女，自名为罗敷。罗敷善蚕桑，采桑城南隅”的诗句。<br>子③素：白色。④“红妆”<br>句：指女子盛妆后非常艳丽。<br>⑤妾：古代女子自称的谦词。⑥“五马”<br>句：意思是，贵人莫要在此留连。五马，《汉歌官仪》<br>记载：“四马载车，此常礼也，惟太守出，则增一马。”故称五马。这里指达官贵人。","translation":"秦地有位罗敷女，曾在绿水边采桑。素手在青条上采来采去，在阳光下其红妆显得特别鲜艳。她宛转地拒绝了太守的纠缠，说：蚕儿已饥，我该赶快回去了，太守大人，且莫在此耽搁您宝贵的时间了。","number":68,"title_py":"zǐ yè wú gē • chūn gē","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"子夜吴歌•夏歌","dynasty":"唐","author":"李白","text":"<ruby>镜<rt>jìng</rt></ruby><ruby>湖<rt>hú</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>菡<rt>hàn</rt></ruby><ruby>萏<rt>dàn</rt></ruby><ruby>发<rt>fā</rt></ruby><ruby>荷<rt>hé</rt></ruby><ruby>花<rt>huā</rt></ruby>。<br><ruby>五<rt>wǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>施<rt>shī</rt></ruby><ruby>采<rt>cǎi</rt></ruby>，<br><ruby>人<rt>rén</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>隘<rt>ài</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>耶<rt>yé</rt></ruby>。<br><ruby>回<rt>huí</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>归<rt>guī</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>越<rt>yuè</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>家<rt>jiā</rt></ruby>。","notes":"①镜湖：一名鉴湖，在今浙江绍兴县东南。②菡（hàn）萏（dàn）：荷花的别称。古人称未开的荷花为“菡萏”，即花苞。<br>③若耶：若耶溪，在今浙江绍兴境内。溪旁旧有浣纱石古迹，相传西施浣纱于此，故又名“浣纱溪”。<br>④回舟不待月：指西施离去之速，就在回舟的时候，月亮尚未出来，就被带邀而去了。这是夸饰的修辞手法。","translation":"镜湖之大有三百余里，到处都开满了欲放的苛花。西施五月曾在此采莲，引得来观看的人挤满了若耶溪。西施回家不到一个月，便被选进了宫中。","number":69,"title_py":"zǐ yè wú gē • xià gē","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"子夜吴歌•秋歌","dynasty":"唐","author":"李白","text":"<ruby>长<rt>cháng</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>户<rt>hù</rt></ruby><ruby>捣<rt>dǎo</rt></ruby><ruby>衣<rt>yī</rt></ruby><ruby>声<rt>shēng</rt></ruby>。<br><ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>总<rt>zǒng</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>关<rt>guān</rt></ruby><ruby>情<rt>qíng</rt></ruby>。<br><ruby>何<rt>hé</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>胡<rt>hú</rt></ruby><ruby>虏<rt>lǔ</rt></ruby>，<br><ruby>良<rt>liáng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>罢<rt>bà</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>征<rt>zhēng</rt></ruby>？","notes":"①一片月：一片皎洁的月光。<br>②万户：千家万户。<br>捣衣：把衣料放在石砧上用棒槌捶击，使衣料绵软以便裁缝；将洗过头次的脏衣放在石板上捶击，去浑水，再清洗。<br>③吹不尽：吹不散。<br>④玉关：玉门关，故址在今甘肃省敦煌县西北，此处代指良人戍边之地。<br>⑤平胡虏：平定侵扰边境的敌人。<br>子⑥良人：古时妇女对丈夫的称呼。《诗•唐风•绸缪》：“今夕何夕，见此良人。”","translation":"长安城内一片月光，千户万户都在捣衣。风吹送捣衣声声，家家怀念戍边之人。何时才能平息边境战争，让我丈夫结束远征。歌","number":70,"title_py":"zǐ yè wú gē • qiū gē","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"子夜吴歌•冬歌","dynasty":"唐","author":"李白","text":"<ruby>明<rt>míng</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>驿<rt>yì</rt></ruby><ruby>使<rt>shǐ</rt></ruby><ruby>发<rt>fā</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>絮<rt>xù</rt></ruby><ruby>征<rt>zhēng</rt></ruby><ruby>袍<rt>páo</rt></ruby>。<br><ruby>素<rt>sù</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>抽<rt>chōu</rt></ruby><ruby>针<rt>zhēn</rt></ruby><ruby>冷<rt>lěng</rt></ruby>，<br><ruby>那<rt>nà</rt></ruby><ruby>堪<rt>kān</rt></ruby><ruby>把<rt>bǎ</rt></ruby><ruby>剪<rt>jiǎn</rt></ruby><ruby>刀<rt>dāo</rt></ruby>。<br><ruby>裁<rt>cái</rt></ruby><ruby>缝<rt>fèng</rt></ruby><ruby>寄<rt>jì</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>几<rt>jǐ</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>临<rt>lín</rt></ruby><ruby>洮<rt>táo</rt></ruby>。","notes":"①驿：<br>驿馆②临洮：在今甘肃临潭县西南，此泛指边地。","translation":"明晨驿使就要出发，思妇们连夜为远征的丈夫赶制棉衣。纤纤素手连抽针都冷得不行，更不说用那冰冷的剪刀来裁衣服了。妾将裁制好的衣物寄向远方，几时才能到达边关临洮？","number":71,"title_py":"zǐ yè wú gē • dōng gē","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"孝经","dynasty":"春秋","author":"曾子","text":"<ruby>仲<rt>zhòng</rt></ruby><ruby>尼<rt>ní</rt></ruby><ruby>居<rt>jū</rt></ruby>，<ruby>曾<rt>zēng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>侍<rt>shì</rt></ruby>。<ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>先<rt>xiān</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>至<rt>zhì</rt></ruby><ruby>德<rt>dé</rt></ruby><ruby>要<rt>yào</rt></ruby><ruby>道<rt>dào</rt></ruby>，<ruby>以<rt>yǐ</rt></ruby><ruby>顺<rt>shùn</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>下<rt>xià</rt></ruby>，<ruby>民<rt>mín</rt></ruby><ruby>用<rt>yòng</rt></ruby><ruby>和<rt>hé</rt></ruby><ruby>睦<rt>mù</rt></ruby>，<ruby>上<rt>shàng</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>怨<rt>yuàn</rt></ruby>。<ruby>汝<rt>rǔ</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>乎<rt>hū</rt></ruby>？\"<ruby>曾<rt>zēng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>避<rt>bì</rt></ruby><ruby>席<rt>xí</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>参<rt>cān</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>敏<rt>mǐn</rt></ruby>，<ruby>何<rt>hé</rt></ruby><ruby>足<rt>zú</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>之<rt>zhī</rt></ruby>？\"<ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>夫<rt>fū</rt></ruby><ruby>孝<rt>xiào</rt></ruby>，<ruby>德<rt>dé</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>本<rt>běn</rt></ruby><ruby>也<rt>yě</rt></ruby>，<ruby>教<rt>jiāo</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>由<rt>yóu</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>也<rt>yě</rt></ruby>。<ruby>复<rt>fù</rt></ruby><ruby>坐<rt>zuò</rt></ruby>，<ruby>吾<rt>wú</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>汝<rt>rǔ</rt></ruby>。<ruby>身<rt>shēn</rt></ruby><ruby>体<rt>tǐ</rt></ruby><ruby>发<rt>fà</rt></ruby><ruby>肤<rt>fū</rt></ruby>，<ruby>受<rt>shòu</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>父<rt>fù</rt></ruby><ruby>母<rt>mǔ</rt></ruby>，<ruby>不<rt>bù</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>毁<rt>huǐ</rt></ruby><ruby>伤<rt>shāng</rt></ruby>，<ruby>孝<rt>xiào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>也<rt>yě</rt></ruby>。<ruby>立<rt>lì</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>道<rt>dào</rt></ruby>，<ruby>扬<rt>yáng</rt></ruby><ruby>名<rt>míng</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>后<rt>hòu</rt></ruby><ruby>世<rt>shì</rt></ruby>，<ruby>以<rt>yǐ</rt></ruby><ruby>显<rt>xiǎn</rt></ruby><ruby>父<rt>fù</rt></ruby><ruby>母<rt>mǔ</rt></ruby>，<ruby>孝<rt>xiào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>终<rt>zhōng</rt></ruby><ruby>也<rt>yě</rt></ruby>。<ruby>夫<rt>fū</rt></ruby><ruby>孝<rt>xiào</rt></ruby>，<ruby>始<rt>shǐ</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>亲<rt>qīn</rt></ruby>，<ruby>中<rt>zhōng</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>君<rt>jūn</rt></ruby>，<ruby>终<rt>zhōng</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>立<rt>lì</rt></ruby><ruby>身<rt>shēn</rt></ruby>。《<ruby>大<rt>dà</rt></ruby><ruby>雅<rt>yǎ</rt></ruby>》<ruby>云<rt>yún</rt></ruby>：'<ruby>无<rt>wú</rt></ruby><ruby>念<rt>niàn</rt></ruby><ruby>尔<rt>ěr</rt></ruby><ruby>祖<rt>zǔ</rt></ruby>，<ruby>聿<rt>yù</rt></ruby><ruby>修<rt>xiū</rt></ruby><ruby>厥<rt>jué</rt></ruby><ruby>德<rt>dé</rt></ruby>。'\"<br><ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>爱<rt>ài</rt></ruby><ruby>亲<rt>qīn</rt></ruby><ruby>者<rt>zhě</rt></ruby>，<ruby>不<rt>bù</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>恶<rt>è</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>人<rt>rén</rt></ruby>；<ruby>敬<rt>jìng</rt></ruby><ruby>亲<rt>qīn</rt></ruby><ruby>者<rt>zhě</rt></ruby>，<ruby>不<rt>bù</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>慢<rt>màn</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>人<rt>rén</rt></ruby>。<ruby>爱<rt>ài</rt></ruby><ruby>敬<rt>jìng</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>亲<rt>qīn</rt></ruby>，<ruby>而<rt>ér</rt></ruby><ruby>德<rt>dé</rt></ruby><ruby>教<rt>jiāo</rt></ruby><ruby>加<rt>jiā</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>姓<rt>xìng</rt></ruby>，<ruby>刑<rt>xíng</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>海<rt>hǎi</rt></ruby>。<ruby>盖<rt>gài</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>孝<rt>xiào</rt></ruby><ruby>也<rt>yě</rt></ruby>。《<ruby>甫<rt>fǔ</rt></ruby><ruby>刑<rt>xíng</rt></ruby>》<ruby>云<rt>yún</rt></ruby>：'<ruby>一<rt>yì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>庆<rt>qìng</rt></ruby>，<ruby>兆<rt>zhào</rt></ruby><ruby>民<rt>mín</rt></ruby><ruby>赖<rt>lài</rt></ruby><ruby>之<rt>zhī</rt></ruby>。'\"<br>\"<ruby>在<rt>zài</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>骄<rt>jiāo</rt></ruby>，<ruby>高<rt>gāo</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>危<rt>wēi</rt></ruby>；<ruby>制<rt>zhì</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>谨<rt>jǐn</rt></ruby><ruby>度<rt>dù</rt></ruby>，<ruby>满<rt>mǎn</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>溢<rt>yì</rt></ruby>。<ruby>高<rt>gāo</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>危<rt>wēi</rt></ruby>，<ruby>所<rt>suǒ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>守<rt>shǒu</rt></ruby><ruby>贵<rt>guì</rt></ruby><ruby>也<rt>yě</rt></ruby>；<ruby>满<rt>mǎn</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>溢<rt>yì</rt></ruby>，<ruby>所<rt>suǒ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>守<rt>shǒu</rt></ruby><ruby>富<rt>fù</rt></ruby><ruby>也<rt>yě</rt></ruby>。<ruby>富<rt>fù</rt></ruby><ruby>贵<rt>guì</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>身<rt>shēn</rt></ruby>，<ruby>然<rt>rán</rt></ruby><ruby>后<rt>hòu</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>保<rt>bǎo</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>社<rt>shè</rt></ruby><ruby>稷<rt>jì</rt></ruby>，<ruby>而<rt>ér</rt></ruby><ruby>和<rt>hé</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>民<rt>mín</rt></ruby><ruby>人<rt>rén</rt></ruby>。<ruby>盖<rt>gài</rt></ruby><ruby>诸<rt>zhū</rt></ruby><ruby>侯<rt>hóu</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>孝<rt>xiào</rt></ruby><ruby>也<rt>yě</rt></ruby>。《<ruby>诗<rt>shī</rt></ruby>》<ruby>云<rt>yún</rt></ruby>：'<ruby>战<rt>zhàn</rt></ruby><ruby>战<rt>zhàn</rt></ruby><ruby>兢<rt>jīng</rt></ruby><ruby>兢<rt>jīng</rt></ruby>，<ruby>如<rt>rú</rt></ruby><ruby>临<rt>lín</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>渊<rt>yuān</rt></ruby>，<ruby>如<rt>rú</rt></ruby><ruby>履<rt>lǚ</rt></ruby><ruby>薄<rt>bó</rt></ruby><ruby>冰<rt>bīng</rt></ruby>。'\"<br>\"<ruby>非<rt>fēi</rt></ruby><ruby>先<rt>xiān</rt> ruby>盖<rt>gài</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>孝<rt>xiào</rt></ruby><ruby>也<rt>yě</rt></ruby>。《<ruby>诗<rt>shī</rt></ruby>》<ruby>云<rt>yún</rt></ruby>：'<ruby>夙<rt>sù</rt></ruby><ruby>兴<rt>xīng</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>寐<rt>mèi</rt></ruby>，<ruby>无<rt>wú</rt></ruby><ruby>忝<rt>tiǎn</rt></ruby><ruby>尔<rt>ěr</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>生<rt>shēng</rt></ruby>。'\"<br>\"<ruby>用<rt>yòng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>道<rt>dào</rt></ruby>，<ruby>分<rt>fēn</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>利<rt>lì</rt></ruby>，<ruby>谨<rt>jǐn</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>用<rt>yòng</rt></ruby>，<ruby>以<rt>yǐ</rt></ruby><ruby>养<rt>yǎng</rt></ruby><ruby>父<rt>fù</rt></ruby><ruby>母<rt>mǔ</rt></ruby>，<ruby>此<rt>cǐ</rt></ruby><ruby>庶<rt>shù</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>孝<rt>xiào</rt></ruby><ruby>也<rt>yě</rt></ruby>。<ruby>故<rt>gù</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>至<rt>zhì</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>庶<rt>shù</rt></ruby><ruby>人<rt>rén</rt></ruby>，<ruby>孝<rt>xiào</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>终<rt>zhōng</rt></ruby><ruby>始<rt>shǐ</rt></ruby>，<ruby>而<rt>ér</rt></ruby><ruby>患<rt>huàn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>及<rt>jí</rt></ruby><ruby>者<rt>zhě</rt></ruby>，<ruby>未<rt>wèi</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>也<rt>yě</rt></ruby>。\"<br><ruby>曾<rt>zēng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>甚<rt>shèn</rt></ruby><ruby>哉<rt>zāi</rt></ruby>，<ruby>孝<rt>xiào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>也<rt>yě</rt></ruby>！\"<ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>夫<rt>fū</rt></ruby><ruby>孝<rt>xiào</rt></ruby>，<ruby>天<rt>tiān</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>经<rt>jīng</rt></ruby><ruby>也<rt>yě rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>放<rt>fàng</rt></ruby><ruby>松<rt>sōng</rt></ruby>，<br><ruby>立<rt>lì</rt></ruby><ruby>根<rt>gēn</rt></ruby><ruby>原<rt>yuán</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>破<rt>pò</rt></ruby><ruby>岩<rt>yán</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。<br><ruby>千<rt>qiān</rt></ruby><ruby>磨<rt>mó</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>击<rt>jī</rt></ruby><ruby>还<rt>hái</rt></ruby><ruby>坚<rt>jiān</rt></ruby><ruby>劲<rt>jìng</rt></ruby>，<br><ruby>任<rt>rèn</rt></ruby><ruby>尔<rt>ěr</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>风<rt>fēng</rt></ruby>。","notes":"竹石：扎根在石缝中的竹子。诗人是著名画家，他画的竹子特别有名，这是他题写在竹石画上的一首诗。<br>咬定：比喻根扎得结实，像咬着青山不松口一样。<br>立根：扎根，生根。<br>原：本来,原本，原来。<br>破岩：裂开的山岩，即岩石的缝隙。<br>磨：折磨，挫折，磨炼。<br>击：打击。<br>坚劲：坚强有力。<br>任：任凭，无论，不管。<br>尔：你。","translation":"子抓住青山一点也不放松，它的根牢牢地扎在岩石缝中。经历成千上万次的折磨和打击，它依然那么坚强，不管是酷暑的东南风，还是严冬的西北风，它都能经受得住，还会依然坚韧挺拔。","number":1,"title_py":"zhú shí","author_py":"zhèng xiè","dynasty_py":"Qīng"},{"title":"逢入京使","dynasty":"唐","author":"岑参","text":"<ruby>故<rt>gù</rt></ruby><ruby>园<rt>yuán</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>望<rt>wàng</rt></ruby><ruby>路<rt>lù</rt></ruby><ruby>漫<rt>màn</rt></ruby><ruby>漫<rt>màn</rt></ruby>，<br><ruby>双<rt>shuāng</rt></ruby><ruby>袖<rt>xiù</rt></ruby><ruby>龙<rt>lóng</rt></ruby><ruby>钟<rt>zhōng</rt></ruby><ruby>泪<rt>lèi</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>干<rt>gān</rt></ruby>。<br><ruby>马<rt>mǎ</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>逢<rt>féng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>纸<rt>zhǐ</rt></ruby><ruby>笔<rt>bǐ</rt></ruby>，<br><ruby>凭<rt>píng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>传<rt>chuán</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>安<rt>ān</rt></ruby>。","notes":"入京使：进京的使者。<br>故园：指长安和自己在长安的家。<br>漫漫：形容路途十分遥远。<br>龙钟：涕泪淋漓的样子。卞和《退怨之歌》：“空山歔欷泪龙钟。”这里是沾湿的意思。<br>凭：托，烦，请。<br>传语：捎口信。","translation":"东望家乡路程又远又长，热泪湿双袖还不断流淌。在马上与你相遇无纸笔，请告家人说我平安无恙。","number":2,"title_py":"féng rù jīng shǐ","author_py":"cén cān","dynasty_py":"Táng"},{"title":"秋夕","dynasty":"唐","author":"杜牧","text":"<ruby>银<rt>yín</rt></ruby><ruby>烛<rt>zhú</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>冷<rt>lěng</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>屏<rt>píng</rt></ruby>，<br><ruby>轻<rt>qīng</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>扇<rt>shàn</rt></ruby><ruby>扑<rt>pū</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>萤<rt>yíng</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>阶<rt>jiē</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>凉<rt>liáng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>坐<rt>zuò</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>牵<rt>qiān</rt></ruby><ruby>牛<rt>niú</rt></ruby><ruby>织<rt>zhī</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>星<rt>xīng</rt></ruby>。","notes":"秋夕：秋天的夜晚。<br>银烛：银色而精美的蜡烛。银，一作“红”。<br>画屏：画有图案的屏风。<br>轻罗小扇：轻巧的丝质团扇。<br>流萤：飞动的萤火虫。<br>天阶：露天的石阶。<br>坐看：坐着朝天看。<br>牵牛织女星：两个星座的名字，指牵牛星、织女星。亦指古代神话中的人物牵牛和织女。","translation":"在秋夜里烛光映照着画屏，手拿着小罗扇扑打萤火虫。夜色里的石阶清凉如冷水，静坐寝宫凝视牛郎织女星。","number":3,"title_py":"qiū xī","author_py":"dù mù","dynasty_py":"Táng"},{"title":"宿新市徐公店","dynasty":"宋","author":"杨万里","text":"<ruby>篱<rt>lí</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>疏<rt>shū</rt></ruby><ruby>疏<rt>shū</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>径<rt>jìng</rt></ruby><ruby>深<rt>shēn</rt></ruby>，<br><ruby>树<rt>shù</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>阴<rt>yīn</rt></ruby>。<br><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>急<rt>jí</rt></ruby><ruby>走<rt>zǒu</rt></ruby><ruby>追<rt>zhuī</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>蝶<rt>dié</rt></ruby>，<br><ruby>飞<rt>fēi</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>菜<rt>cài</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>寻<rt>xún</rt></ruby>。","notes":"篱：篱笆。<br>疏疏：稀疏。<br>径：小路。<br>阴：树叶茂盛浓密而形成的树荫。<br>急走：奔跑。","translation":"篱笆稀稀落落，一条小路通向远方，树上的花瓣纷纷飘落，却还尚未形成树阴。小孩子飞快地奔跑着追赶黄色的蝴蝶，可是蝴蝶突然飞入菜花丛中，再也找不到了。","number":4,"title_py":"sù xīn shì xú gōng diàn","author_py":"yáng wàn lǐ","dynasty_py":"Sòng"},{"title":"暮江吟","dynasty":"唐","author":"白居易","text":"<ruby>一<rt>yí</rt></ruby><ruby>道<rt>dào</rt></ruby><ruby>残<rt>cán</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>铺<rt>pù</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby>，<br><ruby>半<rt>bàn</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>瑟<rt>sè</rt></ruby><ruby>瑟<rt>sè</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>红<rt>hóng</rt></ruby>。<br><ruby>可<rt>kě</rt></ruby><ruby>怜<rt>lián</rt></ruby><ruby>九<rt>jiǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>夜<rt>yè</rt></ruby>，<br><ruby>露<rt>lù</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>真<rt>zhēn</rt></ruby><ruby>珠<rt>zhū</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>弓<rt>gōng</rt></ruby>。","notes":"暮江吟：黄昏时分在江边所作的诗。吟，古代诗歌的一种形式。<br>残阳：快落山的太阳的光，也指晚霞。<br>瑟瑟：原意为碧色珍宝，此处指碧绿色。<br>可怜：可爱。<br>九月初三：农历九月初三的时候。<br>真珠：即珍珠。<br>月似弓：农历九月初三，上弦月，其弯如弓。","translation":"一道残阳渐沉江中，半江碧绿半江艳红。最可爱的是那九月初三之夜，月似珍珠，朗朗新月，形如弯弓。","number":5,"title_py":"mù jiāng yín","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"塞下曲·其二","dynasty":"唐","author":"卢纶","text":"<ruby>林<rt>lín</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>将<rt>jiāng</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>引<rt>yǐn</rt></ruby><ruby>弓<rt>gōng</rt></ruby>。<br><ruby>平<rt>píng</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>羽<rt>yǔ</rt></ruby>，<br><ruby>没<rt>mò</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>棱<rt>léng</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。","notes":"塞下曲：古代歌曲名。这类作品多是描写边境风光和战6争生活的。<br>惊风：突然被风吹动。<br>引弓：拉弓，开弓，这里包含下一步的射箭。<br>平明：天刚亮的时候。<br>白羽：箭杆后部的白色羽毛，这里指箭。<br>没：陷入，这里是钻进的意思。·<br>曲石棱：石头的边角。<br>将军：指的是西汉的飞将军李广。","translation":"昏暗的树林中，草突然被风吹得摇摆不定，飒飒作响，将军以为野兽来了，连忙开弓射箭。天亮去寻找那只箭，已经深深地陷入石棱中。","number":6,"title_py":"sài xià qū · qí èr","author_py":"lú lún","dynasty_py":"Táng"},{"title":"塞下曲·其三","dynasty":"唐","author":"卢纶","text":"<ruby>月<rt>yuè</rt></ruby><ruby>黑<rt>hēi</rt></ruby><ruby>雁<rt>yàn</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>高<rt>gāo</rt></ruby>，<br><ruby>单<rt>dān</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>遁<rt>dùn</rt></ruby><ruby>逃<rt>táo</rt></ruby>。<br><ruby>欲<rt>yù</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>轻<rt>qīng</rt></ruby><ruby>骑<rt>qí</rt></ruby><ruby>逐<rt>zhú</rt></ruby>，<br><ruby>大<rt>dà</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>弓<rt>gōng</rt></ruby><ruby>刀<rt>dāo</rt></ruby>。","notes":"塞下曲：古时边塞的一种军歌。<br>月黑：没有月光。单于（chán yú ）：匈奴的首领。这里指入侵者的最高统帅。<br>遁：逃走。<br>将：率领。<br>轻骑：轻装快速的骑兵。·<br>曲逐：追赶。<br>满：沾满。","translation":"夜静月黑雁群飞得很高，单于趁黑夜悄悄地逃窜。正要带领轻骑兵去追赶，大雪纷飞落满了身上的弓刀。","number":7,"title_py":"sài xià qū · qí sān","author_py":"lú lún","dynasty_py":"Táng"},{"title":"春日","dynasty":"宋","author":"朱熹","text":"<ruby>胜<rt>shèng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>泗<rt>sì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>滨<rt>bīn</rt></ruby>，<br><ruby>无<rt>wú</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>新<rt>xīn</rt></ruby>。<br><ruby>等<rt>děng</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>面<rt>miàn</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>紫<rt>zǐ</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>总<rt>zǒng</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>春<rt>chūn</rt></ruby>。","notes":"春日：春天。<br>胜日：天气晴朗的好日子，也可看出人的好心情。<br>寻芳：游春，踏青。<br>泗水：河名，在山东省。<br>滨：水边，河边。<br>光景：风光风景。<br>等闲：平常、轻易。“等闲识得”是容易识别的意思。<br>东风：春风。","translation":"风和日丽游春在泗水之滨，无边无际的风光焕然一新。谁都可以看出春天的面貌，春风吹得百花开放、万紫千红，到处都是春天的景致。","number":8,"title_py":"chūn rì","author_py":"zhū xī","dynasty_py":"Sòng"},{"title":"元日","dynasty":"宋","author":"王安石","text":"<ruby>爆<rt>bào</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>除<rt>chú</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>屠<rt>tú</rt></ruby><ruby>苏<rt>sū</rt></ruby>。<br><ruby>千<rt>qiān</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>户<rt>hù</rt></ruby><ruby>曈<rt>tóng</rt></ruby><ruby>曈<rt>tóng</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>总<rt>zǒng</rt></ruby><ruby>把<rt>bǎ</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>桃<rt>táo</rt></ruby><ruby>换<rt>huàn</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>符<rt>fú</rt></ruby>。","notes":"元日：农历正月初一，即春节。<br>爆竹：古人烧竹子时使竹子爆裂发出的响声。用来驱鬼避邪，后来演变成放鞭炮。<br>一岁除：一年已尽。除，逝去。<br>屠苏：“指屠苏酒，饮屠苏酒也是古代过年时的一种习俗，大年初一全家合饮这种用屠苏草浸泡的酒，以驱邪避瘟疫，求得长寿。<br>千门万户：形容门户众多，人口稠密。<br>曈曈：日出时光亮而温暖的样子。<br>桃：桃符，古代一种风俗，农历正月初一时人们用桃木板写上神荼、郁垒两位神灵的名字，悬挂在门旁，用来压邪。也作春联。","translation":"阵阵轰鸣的爆竹声中，旧的一年已经过去；和暖的春风吹来了新年，人们欢乐地畅饮着新酿的屠苏酒。初升的太阳照耀着千家万户，他们都忙着把旧的桃符取下，换上新的桃符。","number":9,"title_py":"yuán rì","author_py":"wáng ān shí","dynasty_py":"Sòng"},{"title":"四时田园杂兴·其一","dynasty":"宋","author":"范成大","text":"<ruby>昼<rt>zhòu</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>耘<rt>yún</rt></ruby><ruby>田<rt>tián</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>绩<rt>jì</rt></ruby><ruby>麻<rt>má</rt></ruby>，<br><ruby>村<rt>cūn</rt></ruby><ruby>庄<rt>zhuāng</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>各<rt>gè</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>童<rt>tóng</rt></ruby><ruby>孙<rt>sūn</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>解<rt>jiě</rt></ruby><ruby>供<rt>gōng</rt></ruby><ruby>耕<rt>gēng</rt></ruby><ruby>织<rt>zhī</rt></ruby>，<br><ruby>也<rt>yě</rt></ruby><ruby>傍<rt>bàng</rt></ruby><ruby>桑<rt>sāng</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>种<rt>zhòng</rt></ruby><ruby>瓜<rt>guā</rt></ruby>。","notes":"耘田：除草。<br>绩麻：把麻搓成线。<br>各当家：每人担任一定的工作。<br>未解：不懂。<br>供：从事，参加。<br>傍：靠近。","translation":"白天在田里锄草，夜晚在家中搓麻线，村中男男女女各•有各的家务劳动。小孩子虽然不会耕田织布，也在那桑树阴下学着种瓜。","number":10,"title_py":"sì shí tián yuán zá xìng · qí yī","author_py":"fàn chéng dà","dynasty_py":"Sòng"},{"title":"四时田园杂兴·其二","dynasty":"宋","author":"范成大","text":"<ruby>梅<rt>méi</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>杏<rt>xìng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>肥<rt>féi</rt></ruby>，<br><ruby>麦<rt>mài</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>菜<rt>cài</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>稀<rt>xī</rt></ruby>。<br><ruby>日<rt>rì</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>篱<rt>lí</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>过<rt>guò</rt></ruby>，<br><ruby>惟<rt>wéi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>蜻<rt>qīng</rt></ruby><ruby>蜓<rt>tíng</rt></ruby><ruby>蛱<rt>jiá</rt></ruby><ruby>蝶<rt>dié</rt></ruby><ruby>飞<rt>fēi</rt></ruby>。","notes":"","translation":"一树树梅子变得金黄，杏子也越长越大了；荞麦花一片雪白，油菜花倒显得稀稀落落。白天长了，篱笆的影子随着太阳的升高变得越来越短，没有人经过；只有蜻蜓和蝴蝶绕着篱笆飞来飞去。•","number":11,"title_py":"sì shí tián yuán zá xìng · qí èr","author_py":"fàn chéng dà","dynasty_py":"Sòng"},{"title":"乡村四月","dynasty":"宋","author":"翁卷","text":"<ruby>绿<rt>lǜ</rt></ruby><ruby>遍<rt>biàn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>原<rt>yuán</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>川<rt>chuān</rt></ruby>，<br><ruby>子<rt>zǐ</rt></ruby><ruby>规<rt>guī</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>乡<rt>xiāng</rt></ruby><ruby>村<rt>cūn</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>少<rt>shǎo</rt></ruby>，<br><ruby>才<rt>cái</rt></ruby><ruby>了<rt>le</rt></ruby><ruby>蚕<rt>cán</rt></ruby><ruby>桑<rt>sāng</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>插<rt>chā</rt></ruby><ruby>田<rt>tián</rt></ruby>。","notes":"山原：山陵和原野。<br>白满川：指稻田里的水色映着天光。<br>川：平地。<br>子规：鸟名，杜鹃鸟。<br>才了：刚刚结束。<br>蚕桑：种桑养蚕。<br>插田：插秧。","translation":"山坡田野间草木茂盛，稻田里的水色与天光相辉映。天空中烟雨蒙蒙，杜鹃声声啼叫，大地一片欣欣向荣的景象。到了，没有人闲着，刚刚结束了蚕桑的事又要插秧了。","number":12,"title_py":"xiāng cūn sì yuè","author_py":"wēng juǎn","dynasty_py":"Sòng"},{"title":"送杜少府之任蜀州","dynasty":"唐","author":"王勃","text":"<ruby>城<rt>chéng</rt></ruby><ruby>阙<rt>quē</rt></ruby><ruby>辅<rt>fǔ</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>秦<rt>qín</rt></ruby>，<br><ruby>风<rt>fēng</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>望<rt>wàng</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>津<rt>jīn</rt></ruby>。<br><ruby>与<rt>yǔ</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>意<rt>yì</rt></ruby>，<br><ruby>同<rt>tóng</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>宦<rt>huàn</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>人<rt>rén</rt></ruby>。<br><ruby>海<rt>hǎi</rt></ruby><ruby>内<rt>nèi</rt></ruby><ruby>存<rt>cún</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>己<rt>jǐ</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>比<rt>bǐ</rt></ruby><ruby>邻<rt>lín</rt></ruby>。<br><ruby>无<rt>wú</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>歧<rt>qí</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>儿<rt>ér</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>沾<rt>zhān</rt></ruby><ruby>巾<rt>jīn</rt></ruby>。","notes":"","translation":"巍巍长安，雄踞三秦之地；渺渺四川，却在迢迢远方。你我命运何等相仿，奔波仕途，远离家乡。只要有知心朋友，四海之内不觉遥远。即便在天涯海角，感觉就像近邻一样。岔道分手，实在不用儿女情长，泪洒衣裳。","number":13,"title_py":"sòng dù shào fǔ zhī rèn shǔ zhōu","author_py":"wáng bó","dynasty_py":"Táng"},{"title":"过零丁洋","dynasty":"宋","author":"文天祥","text":"<ruby>辛<rt>xīn</rt></ruby><ruby>苦<rt>kǔ</rt></ruby><ruby>遭<rt>zāo</rt></ruby><ruby>逢<rt>féng</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>经<rt>jīng</rt></ruby>，<br><ruby>干<rt>gān</rt></ruby><ruby>戈<rt>gē</rt></ruby><ruby>寥<rt>liáo</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>周<rt>zhōu</rt></ruby><ruby>星<rt>xīng</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>破<rt>pò</rt></ruby><ruby>碎<rt>suì</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>飘<rt>piāo</rt></ruby><ruby>絮<rt>xù</rt></ruby>，<br><ruby>身<rt>shēn</rt></ruby><ruby>世<rt>shì</rt></ruby><ruby>浮<rt>fú</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>打<rt>dǎ</rt></ruby><ruby>萍<rt>píng</rt></ruby>。<br><ruby>惶<rt>huáng</rt></ruby><ruby>恐<rt>kǒng</rt></ruby><ruby>滩<rt>tān</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>说<rt>shuō</rt></ruby><ruby>惶<rt>huáng</rt></ruby><ruby>恐<rt>kǒng</rt></ruby>，<br><ruby>零<rt>líng</rt></ruby><ruby>丁<rt>dīng</rt></ruby><ruby>洋<rt>yáng</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>叹<rt>tàn</rt></ruby><ruby>零<rt>líng</rt></ruby><ruby>丁<rt>dīng</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>死<rt>sǐ</rt></ruby>？<br><ruby>留<rt>liú</rt></ruby><ruby>取<rt>qǔ</rt></ruby><ruby>丹<rt>dān</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>汗<rt>hàn</rt></ruby><ruby>青<rt>qīng</rt></ruby>。","notes":"","translation":"回想我早年由科举入仕历尽辛苦，如今战火消歇已熬过了四个年头。国家危在旦夕恰如狂风中的柳絮，个人又哪堪言说似骤雨里的浮萍。惶恐滩的惨败让我至今依然惶恐，零身陷元虏可叹我孤苦零丁。人生自古以来有谁能够长生不死？我要留一片爱国的丹心映照史册。","number":14,"title_py":"guò líng dīng yáng","author_py":"wén tiān xiáng","dynasty_py":"Sòng"},{"title":"浪淘沙","dynasty":"唐","author":"刘禹锡","text":"<ruby>九<rt>jiǔ</rt></ruby><ruby>曲<rt>qū</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>沙<rt>shā</rt></ruby>，<br><ruby>浪<rt>làng</rt></ruby><ruby>淘<rt>táo</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>簸<rt>bǒ</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby>。<br><ruby>如<rt>rú</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>直<rt>zhí</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>银<rt>yín</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>同<rt>tóng</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>牵<rt>qiān</rt></ruby><ruby>牛<rt>niú</rt></ruby><ruby>织<rt>zhī</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>家<rt>jiā</rt></ruby>。","notes":"浪淘沙：唐教坊曲名。创自刘禹锡、白居易，其形式为七言绝句。后又用为词牌名。<br>九曲：自古相传黄河有九道弯。形容弯弯曲曲的地方很多。<br>万里沙：黄河在流经各地时挟带大量泥沙。<br>浪淘风簸：黄河卷着泥沙，风浪滚动的样子。<br>浪淘：波浪淘洗。<br>簸：掀翻，上下簸动。<br>自天涯：来自天边。<br>李白有一首诗中说：“黄河之水天上来”。古人认为黄河的源头和天上的银河相通。<br>牵牛织女：银河系的两个星座名。","translation":"九曲黄河从遥远的地方蜿蜒奔腾而来，一路裹挟着万里的黄沙。既然你从天边而来，如今好像要直飞上高空的银河，请你带上我扶摇直上，汇集到银河中去，一同到牛郎和织女的家里做客吧。","number":15,"title_py":"làng táo shā","author_py":"liú yǔ xī","dynasty_py":"Táng"},{"title":"相见欢①·林花谢了春红","dynasty":"南唐","author":"李煜","text":"<ruby>林<rt>lín</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>谢<rt>xiè</rt></ruby>②<ruby>了<rt>le</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>红<rt>hóng</rt></ruby>，<ruby>太<rt>tài</rt></ruby><ruby>匆<rt>cōng</rt></ruby><ruby>匆<rt>cōng</rt></ruby>。<br><ruby>无<rt>wú</rt></ruby><ruby>奈<rt>nài</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>③<ruby>晚<rt>wǎn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>风<rt>fēng</rt></ruby>。<br><ruby>胭<rt>yān</rt></ruby><ruby>脂<rt>zhī</rt></ruby><ruby>泪<rt>lèi</rt></ruby>④，<ruby>相<rt>xiāng</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>醉<rt>zuì</rt></ruby>⑤，<ruby>几<rt>jǐ</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>重<rt>chóng</rt></ruby>⑥。<br><ruby>自<rt>zì</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>恨<rt>hèn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>东<rt>dōng</rt></ruby>。","notes":"①相见欢：原为唐教坊曲名，后用为词牌名。<br>②谢：凋谢。<br>③无奈朝来寒雨：一作“常恨朝来寒重”。<br>④胭脂泪：原指女子的眼泪，女子脸上搽有胭脂，泪水流经脸颊时沾上胭脂的红色，故云。在这里，胭脂是指林花着雨的鲜艳颜色，指代美好的花。·<br>欢⑤相留醉：一本作“留人醉”。<br>⑥几时重：何时再度相会。","translation":"树林间的红花已经凋谢，花开花落，才有几时，实在是去得太匆忙了。也是无可奈何啊，花儿怎么能经得起那凄风寒雨昼夜摧残呢？飘落遍地的红花，被雨水淋过，像是美人双颊上的胭脂在和着泪水流淌。花儿和怜花人相互留恋，如醉如痴，什么时候才能再重逢呢？人生从来就是令人怨恨的事情太多，就像那东逝的江水，不休不止，永无尽头。","number":16,"title_py":"xiāng jiàn huān ① · lín huā xiè le chūn hóng","author_py":"lǐ yù","dynasty_py":"nán táng"},{"title":"浪淘沙·把酒祝东风","dynasty":"宋","author":"欧阳修","text":"<ruby>把<rt>bǎ</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>①<ruby>祝<rt>zhù</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>且<rt>qiě</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>容<rt>róng</rt></ruby>②。<br><ruby>垂<rt>chuí</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>紫<rt>zǐ</rt></ruby><ruby>陌<rt>mò</rt></ruby>③<ruby>洛<rt>luò</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>东<rt>dōng</rt></ruby>。<br><ruby>总<rt>zǒng</rt></ruby><ruby>是<rt>shì</rt></ruby>④<ruby>当<rt>dāng</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>携<rt>xié</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>游<rt>yóu</rt></ruby><ruby>遍<rt>biàn</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>丛<rt>cóng</rt></ruby>。<br><ruby>聚<rt>jù</rt></ruby><ruby>散<rt>sàn</rt></ruby><ruby>苦<rt>kǔ</rt></ruby><ruby>匆<rt>cōng</rt></ruby><ruby>匆<rt>cōng</rt></ruby>⑤，<br><ruby>此<rt>cǐ</rt></ruby><ruby>恨<rt>hèn</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>穷<rt>qióng</rt></ruby>。<br><ruby>今<rt>jīn</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>红<rt>hóng</rt></ruby>。<br><ruby>可<rt>kě</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>好<rt>hǎo</rt></ruby>，<br><ruby>知<rt>zhī</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>同<rt>tóng</rt></ruby>？","notes":"①把酒：端着酒杯。<br>②从容：留恋，不舍。<br>③紫陌：紫路。洛阳曾是东周、东汉的都城，据说当时·沙曾用紫色土铺路，故名。此指洛阳的道路。<br>洛城：指洛阳。<br>④总是：大多是，都是。<br>把⑤匆匆：形容时间匆促。酒⑥“可惜”<br>两句：杜甫《九日蓝田崔氏庄》<br>诗：“明年祝此会知谁健，醉把茱萸仔细看。”","translation":"端起酒杯向东方祈祷，请你再留些时日不要一去匆匆。洛阳城东垂柳婆娑的郊野小道，就是我们去年携手同游的地方，我们游遍了姹紫嫣红的花丛。欢聚和离散都是这样匆促，心中的遗恨却无尽无穷。今年的花红胜过去年，明年的花儿将更美好，可惜不知那时将和谁相从？","number":17,"title_py":"làng táo shā · bǎ jiǔ zhù dōng fēng","author_py":"ōu yáng xiū","dynasty_py":"Sòng"},{"title":"长相思·山一程","dynasty":"清","author":"纳兰性德","text":"<ruby>山<rt>shān</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>程<rt>chéng</rt></ruby>，<br><ruby>水<rt>shuǐ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>程<rt>chéng</rt></ruby>①，<br><ruby>身<rt>shēn</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>榆<rt>yú</rt></ruby>②<ruby>关<rt>guān</rt></ruby><ruby>那<rt>nà</rt></ruby><ruby>畔<rt>pàn</rt></ruby>③<ruby>行<rt>xíng</rt></ruby>，<br><ruby>夜<rt>yè</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>帐<rt>zhàng</rt></ruby><ruby>灯<rt>dēng</rt></ruby>④。<br><ruby>风<rt>fēng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>更<rt>gèng</rt></ruby>，<br><ruby>雪<rt>xuě</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>更<rt>gèng</rt></ruby>⑤，<br><ruby>聒<rt>guā</rt></ruby>⑥<ruby>碎<rt>suì</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>成<rt>chéng</rt></ruby>，<br><ruby>故<rt>gù</rt></ruby><ruby>园<rt>yuán</rt></ruby>⑦<ruby>无<rt>wú</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>声<rt>shēng</rt></ruby>⑧。","notes":"长相思。唐教坊曲，双翅小令。又名《双红豆》。18①程：道路、路程，山一程、水一程，即山长水远。<br>②榆关：即今山海关，在今河北秦皇岛东北。<br>③那畔：即山海关的另一边，指身处关外。<br>④千帐灯：皇帝出巡临时住宿的行帐的灯火。千帐言军营之多。<br>⑤更：旧时一夜分五更，每更大约两小时。风一更、雪一更，即言整夜风雪交加也。·思⑥聒（guō）：声音嘈杂，这里指风雪声。<br>⑦故园：故乡，这里指北京。<br>程⑧此声：指风雪交加的声音。","translation":"将士们不辞辛苦地跋山涉水，马不停蹄地向着山海关进发。夜已经深了，千万个帐篷里都点起了灯。外面正刮着风、下着雪，惊醒了睡梦中的将士们，勾起了他们对故乡的思念，故乡是多么的温暖宁静呀，哪有这般狂风呼啸、雪花乱舞的聒噪之声。","number":18,"title_py":"cháng xiāng sī · shān yī chéng","author_py":"nà lán xìng dé","dynasty_py":"Qīng"},{"title":"清江引①·秋怀","dynasty":"元","author":"张可久","text":"<ruby>西<rt>xī</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>信<rt>xìn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>问<rt>wèn</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>期<rt>qī</rt></ruby><ruby>未<rt>wèi</rt></ruby>②？<br><ruby>雁<rt>yàn</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>天<rt>tiān</rt></ruby>③，<br><ruby>人<rt>rén</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>地<rt>dì</rt></ruby>④，<br><ruby>芭<rt>bā</rt></ruby><ruby>蕉<rt>jiāo</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>里<rt>lǐ</rt></ruby>。","notes":"①清江引：曲牌名。<br>②未：什么时候。<br>③红叶天：秋天。红叶，枫叶。<br>④黄花地：菊花满地。","translation":"西风送来万里之外的家书，问我何时归家？清鸿雁在红叶满山的季节呼唤着同伴南迁，而离人却对着江黄花遍地的景色沉醉其中，听着雨打芭蕉的声音，却只能籍·引着秋夜的清凉，但愿做个好梦，能梦回家乡探望亲人。","number":19,"title_py":"qīng jiāng yǐn ① · qiū huái","author_py":"zhāng kě jiǔ","dynasty_py":"Yuán"},{"title":"望梅止渴","number":20,"dynasty":"南北朝","author":"刘义庆","text":"<ruby>魏<rt>wèi</rt></ruby><ruby>武<rt>wǔ</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>役<rt>yì</rt></ruby>，<ruby>失<rt>shī</rt></ruby><ruby>汲<rt>jí</rt></ruby><ruby>道<rt>dào</rt></ruby>，<ruby>军<rt>jūn</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>渴<rt>kě</rt></ruby>，<ruby>乃<rt>nǎi</rt></ruby><ruby>令<rt>lìng</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>前<rt>qián</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>林<rt>lín</rt></ruby>，<ruby>饶<rt>ráo</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<ruby>甘<rt>gān</rt></ruby><ruby>酸<rt>suān</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>解<rt>jiě</rt></ruby><ruby>渴<rt>kě</rt></ruby>。<br>\"<ruby>士<rt>shì</rt></ruby><ruby>卒<rt>zú</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<ruby>口<rt>kǒu</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<ruby>乘<rt>chéng</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>及<rt>jí</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>源<rt>yuán</rt></ruby>。","notes":"","translation":"","title_py":"wàng méi zhǐ kě","author_py":"liú yì qìng","dynasty_py":"Nán Běi Cháo"},{"title":"春夜喜雨","dynasty":"唐","author":"杜甫","text":"<ruby>好<rt>hǎo</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>节<rt>jié</rt></ruby>，<br><ruby>当<rt>dāng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>乃<rt>nǎi</rt></ruby><ruby>发<rt>fā</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>随<rt>suí</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>潜<rt>qián</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>夜<rt>yè</rt></ruby>，<br><ruby>润<rt>rùn</rt></ruby><ruby>物<rt>wù</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>声<rt>shēng</rt></ruby>。<br><ruby>野<rt>yě</rt></ruby><ruby>径<rt>jìng</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>俱<rt>jù</rt></ruby><ruby>黑<rt>hēi</rt></ruby>，<br><ruby>江<rt>jiāng</rt></ruby><ruby>船<rt>chuán</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>晓<rt>xiǎo</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>湿<rt>shī</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>花<rt>huā</rt></ruby><ruby>重<rt>zhòng</rt></ruby><ruby>锦<rt>jǐn</rt></ruby><ruby>官<rt>guān</rt></ruby><ruby>城<rt>chéng</rt></ruby>。","notes":"知：明白，知道。说雨知时节，是一种拟人化的写法。<br>乃：就。<br>发生：萌发生长。<br>发生：萌发生长。潜（qián）：暗暗地，悄悄地。这里指春雨在夜里悄悄地随风而至。<br>润物：使植物受到雨水的滋养。<br>野径：田野间的小路。<br>晓：天刚亮的时候。<br>红湿处：雨水湿润的花丛。<br>红湿处：指有带雨水的红花的地方。<br>花重：花沾上雨水而变得沉重。<br>重：读作zhòng（<br>重在这里的意思是：沉重。所以读作第四声。）","translation":"好雨似乎会挑选时辰，降临在万物萌生之春。伴随和风，悄悄进入夜幕。细细密密，滋润大地万物。浓浓乌云，笼罩田野小路，点点灯火，闪烁江上渔船。明早再看带露的鲜花，成都满城必将繁花盛开。","number":21,"title_py":"chūn yè xǐ yǔ","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"江畔独步寻花·其六","dynasty":"唐","author":"杜甫","text":"<ruby>黄<rt>huáng</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>娘<rt>niáng</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>蹊<rt>qī</rt></ruby>，<br><ruby>千<rt>qiān</rt></ruby><ruby>朵<rt>duǒ</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>朵<rt>duǒ</rt></ruby><ruby>压<rt>yā</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>低<rt>dī</rt></ruby>。<br><ruby>留<rt>liú</rt></ruby><ruby>连<rt>lián</rt></ruby><ruby>戏<rt>xì</rt></ruby><ruby>蝶<rt>dié</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>舞<rt>wǔ</rt></ruby>，<br><ruby>自<rt>zì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>娇<rt>jiāo</rt></ruby><ruby>莺<rt>yīng</rt></ruby><ruby>恰<rt>qià</rt></ruby><ruby>恰<rt>qià</rt></ruby><ruby>啼<rt>tí</rt></ruby>。","notes":"黄四娘：杜甫住成都草堂时的邻居。蹊（xī）：小路。<br>留连：即留恋，舍不得离去。<br>娇：可爱的样子。<br>恰恰：象声词，形容鸟叫声音和谐动听。一说“恰恰”为唐时方言，恰好之意。","translation":"黄四娘家花儿茂盛把小路遮蔽，万千花朵压弯枝条离地低又低。眷恋芬芳花间彩蝶时时在飞舞，自由自在娇软黄莺恰恰欢声啼。","number":22,"title_py":"jiāng pàn dú bù xún huā · qí liù","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"题临安邸","dynasty":"宋","author":"林升","text":"<ruby>山<rt>shān</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>楼<rt>lóu</rt></ruby>，<br><ruby>西<rt>xī</rt></ruby><ruby>湖<rt>hú</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>舞<rt>wǔ</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>休<rt>xiū</rt></ruby>？<br><ruby>暖<rt>nuǎn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>熏<rt>xūn</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>醉<rt>zuì</rt></ruby>，<br><ruby>直<rt>zhí</rt></ruby><ruby>把<rt>bǎ</rt></ruby><ruby>杭<rt>háng</rt></ruby><ruby>州<rt>zhōu</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>汴<rt>biàn</rt></ruby><ruby>州<rt>zhōu</rt></ruby>。","notes":"临安：现在浙江杭州市，金人攻陷北宋首都汴京后，南宋统治者逃亡到南方，建都于临安。邸（dǐ）：旅店。<br>西湖：杭州的著名风景区。<br>几时休：什么时候休止。熏（xūn）：吹，用于温暖馥郁的风。<br>直：简直。<br>汴州：即汴京，今河南开封市。","translation":"青山无尽楼阁连绵望不见头，西湖上的歌舞几时才能停休？暖洋洋的香风吹得贵人如醉，简直是把杭州当成了那汴州。","number":23,"title_py":"tí lín ān dǐ","author_py":"lín shēng","dynasty_py":"Sòng"},{"title":"泊秦淮","dynasty":"唐","author":"杜牧","text":"<ruby>烟<rt>yān</rt></ruby><ruby>笼<rt>lǒng</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>笼<rt>lǒng</rt></ruby><ruby>沙<rt>shā</rt></ruby>，<br><ruby>夜<rt>yè</rt></ruby><ruby>泊<rt>bó</rt></ruby><ruby>秦<rt>qín</rt></ruby><ruby>淮<rt>huái</rt></ruby><ruby>近<rt>jìn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>商<rt>shāng</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>亡<rt>wáng</rt></ruby><ruby>国<rt>guó</rt></ruby><ruby>恨<rt>hèn</rt></ruby>，<br><ruby>隔<rt>gé</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>唱<rt>chàng</rt></ruby>《<ruby>后<rt>hòu</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>花<rt>huā</rt></ruby>》。","notes":"选自冯集梧《樊川文集》卷四。（上海古籍出版社197824年版）。秦淮，即秦淮河，发源于江苏句容大茅山与溧（lì）水东庐山两山间，经南京流入长江。相传为秦始皇南巡会稽时开凿的，用来疏通淮水，故称秦淮河。泊：停泊。<br>商女：以卖唱为生的歌女。<br>后庭花：歌曲《玉树后庭花》的简称。南朝陈皇帝陈叔宝（即陈后主）溺于声色，作此曲与后宫美女寻欢作乐，终致亡国，所以后世称此曲为“亡国之音”。","translation":"浩渺寒江之上弥漫着迷蒙的烟雾，皓月的清辉洒在白色沙渚之上。入夜，我将小舟泊在秦淮河畔，临近酒家。金陵歌女似乎不知何为亡国之恨黍离之悲，竟依然在对岸吟唱着淫靡之曲《玉树后庭花》。","number":24,"title_py":"pō qín huái","author_py":"dù mù","dynasty_py":"Táng"},{"title":"春日客怀","dynasty":"明","author":"于谦","text":"<ruby>年<rt>nián</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>花<rt>huā</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。<br><ruby>短<rt>duǎn</rt></ruby><ruby>发<rt>fà</rt></ruby><ruby>经<rt>jīng</rt></ruby><ruby>梳<rt>shū</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>缕<rt>lǚ</rt></ruby><ruby>白<rt>bái</rt></ruby>，<br><ruby>衰<rt>shuāi</rt></ruby><ruby>颜<rt>yán</rt></ruby><ruby>借<rt>jiè</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>红<rt>hóng</rt></ruby>。<br><ruby>离<rt>lí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>常<rt>cháng</rt></ruby><ruby>事<rt>shì</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>国<rt>guó</rt></ruby><ruby>惭<rt>cán</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>尺<rt>chǐ</rt></ruby><ruby>寸<rt>cùn</rt></ruby><ruby>功<rt>gōng</rt></ruby>。<br><ruby>萧<rt>xiāo</rt></ruby><ruby>涩<rt>sè</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>囊<rt>náng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>笑<rt>xiào</rt></ruby>，<br><ruby>独<rt>dú</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>长<rt>zhǎng</rt></ruby><ruby>剑<rt>jiàn</rt></ruby><ruby>倚<rt>yǐ</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>空<rt>kōng</rt></ruby>。","notes":"客怀：<br>客居外地的情怀衰颜：<br>衰老的容颜萧瑟：钱物稀少、欠缺。<br>行囊：远行时携带的布袋。<br>长剑：古代长刃武器，象征才干、胆略、志向。<br>倚青空：顶天立地的站立着。<br>青空：天空。","translation":"","number":25,"title_py":"chūn rì kè huái","author_py":"yú qiān","dynasty_py":"Míng"},{"title":"村居","dynasty":"清","author":"高鼎","text":"<ruby>草<rt>cǎo</rt></ruby><ruby>长<rt>zhǎng</rt></ruby><ruby>莺<rt>yīng</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>天<rt>tiān</rt></ruby>，<br><ruby>拂<rt>fú</rt></ruby><ruby>堤<rt>dī</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>散<rt>sàn</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>早<rt>zǎo</rt></ruby>，<br><ruby>忙<rt>máng</rt></ruby><ruby>趁<rt>chèn</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>放<rt>fàng</rt></ruby><ruby>纸<rt>zhǐ</rt></ruby><ruby>鸢<rt>yuān</rt></ruby>。","notes":"村居：在乡村里居住时见到的景象。<br>杨柳拂堤：像杨柳一样抚摸堤岸。<br>醉：迷醉，陶醉。<br>春烟：春天水泽、草木间蒸发形成的烟雾般的水汽。<br>散学：放学。<br>纸鸢：泛指风筝，它是一种纸做的形状像老鹰的风筝。<br>鸢：老鹰。","translation":"农历二月，村子前后的青草已经渐渐发芽生长，黄莺飞来飞去。杨柳披着长长的绿枝条，随风摆动，好像在轻轻地抚摸着堤岸。在水泽和草木间蒸发的水汽，如同烟雾般凝集着。杨柳似乎都陶醉在这浓丽的景色中。里的孩子们放了学急忙跑回家，趁着东风把风筝放上蓝天。","number":26,"title_py":"cūn jū","author_py":"gāo dǐng","dynasty_py":"Qīng"},{"title":"游山西村","dynasty":"宋","author":"陆游","text":"<ruby>莫<rt>mò</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>农<rt>nóng</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>腊<rt>là</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>浑<rt>hún</rt></ruby>，<br><ruby>丰<rt>fēng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>足<rt>zú</rt></ruby><ruby>鸡<rt>jī</rt></ruby><ruby>豚<rt>tún</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>疑<rt>yí</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>柳<rt>liǔ</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>村<rt>cūn</rt></ruby>。<br><ruby>箫<rt>xiāo</rt></ruby><ruby>鼓<rt>gǔ</rt></ruby><ruby>追<rt>zhuī</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>社<rt>shè</rt></ruby><ruby>近<rt>jìn</rt></ruby>，<br><ruby>衣<rt>yī</rt></ruby><ruby>冠<rt>guān</rt></ruby><ruby>简<rt>jiǎn</rt></ruby><ruby>朴<rt>pǔ</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>存<rt>cún</rt></ruby>。<br><ruby>从<rt>cóng</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>许<rt>xǔ</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>乘<rt>chéng</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>拄<rt>zhǔ</rt></ruby><ruby>杖<rt>zhàng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>叩<rt>kòu</rt></ruby><ruby>门<rt>mén</rt></ruby>。","notes":"","translation":"不要笑农家腊月里酿的酒浊而又浑，在丰收屿年景里待客菜肴非常丰繁。山峦重叠水流曲折正担心无路可走，柳绿花艳忽然眼前又出现一个山村。吹着箫打起鼓春社的日子已经接近，村民们衣冠简朴古代风气仍然保存。今后如果还能乘大好月色出外闲游，我一定拄着拐杖随时来敲你的家门。","number":27,"title_py":"yóu shān xī cūn","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"夜雨寄北","dynasty":"唐","author":"李商隐","text":"<ruby>君<rt>jūn</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>期<rt>qī</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>期<rt>qī</rt></ruby>，<br><ruby>巴<rt>bā</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>涨<rt>zhǎng</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>池<rt>chí</rt></ruby>。<br><ruby>何<rt>hé</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>剪<rt>jiǎn</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>烛<rt>zhú</rt></ruby>，<br><ruby>却<rt>què</rt></ruby><ruby>话<rt>huà</rt></ruby><ruby>巴<rt>bā</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>时<rt>shí</rt></ruby>。","notes":"寄北：写诗寄给北方的人。诗人当时在巴蜀（现在四川28省），他的亲友在长安，所以说“寄北”。这首诗表达了诗人对亲友的深刻怀念。<br>归期：指回家的日期。<br>何当：什么时候。<br>剪西窗烛：剪烛，剪去燃焦的烛芯，使灯光明亮。这里形容深夜秉烛长谈。“西窗话雨”“西窗剪烛”用作成语，所指也不限于夫妇，有时也用以写朋友间的思念之情。","translation":"您问归期，归期实难说准，巴山连夜暴雨，涨满秋池。何时归去，共剪西窗烛花，当面诉说，巴山夜雨况味。","number":28,"title_py":"yè yǔ jì běi","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"饮酒·其五","dynasty":"魏晋","author":"陶渊明","text":"<ruby>结<rt>jié</rt></ruby><ruby>庐<rt>lú</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>境<rt>jìng</rt></ruby>，<br><ruby>而<rt>ér</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>车<rt>chē</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>喧<rt>xuān</rt></ruby>。<br><ruby>问<rt>wèn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>尔<rt>ěr</rt></ruby>？<br><ruby>心<rt>xīn</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>偏<rt>piān</rt></ruby>。<br><ruby>采<rt>cǎi</rt></ruby><ruby>菊<rt>jú</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>篱<rt>lí</rt></ruby><ruby>下<rt>xià</rt></ruby>，<br><ruby>悠<rt>yōu</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>山<rt>shān</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>气<rt>qì</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>夕<rt>xī</rt></ruby><ruby>佳<rt>jiā</rt></ruby>，<br><ruby>飞<rt>fēi</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>还<rt>huán</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>真<rt>zhēn</rt></ruby><ruby>意<rt>yì</rt></ruby>，<br><ruby>欲<rt>yù</rt></ruby><ruby>辨<rt>biàn</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>忘<rt>wàng</rt></ruby><ruby>言<rt>yán</rt></ruby>。","notes":"结庐：建造住宅，这里指居住的意思。<br>车马喧：指世俗交往的喧扰。<br>君：指作者自己。<br>何能尔：为什么能这样。·<br>酒尔：如此、这样。<br>悠然：自得的样子。<br>日夕：傍晚。<br>相与：相交，结伴。","translation":"居住在人世间，却没有车马的喧嚣。问我为何能如此，只要心志高远，自然就会觉得所处地方僻静了。在东篱之下采摘菊花，悠然间，那远处的南山映入眼帘。山中的气息与傍晚的景色十分好，有飞鸟，结着伴儿归来。这里面蕴含着人生的真正意义，想要辨识，却不知怎样表达。","number":29,"title_py":"yǐn jiǔ · qí wǔ","author_py":"táo yuān míng","dynasty_py":"Wèi Jìn"},{"title":"题金陵渡","dynasty":"唐","author":"张祜","text":"<ruby>金<rt>jīn</rt></ruby><ruby>陵<rt>líng</rt></ruby><ruby>津<rt>jīn</rt></ruby><ruby>渡<rt>dù</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>楼<rt>lóu</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>宿<rt>sù</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>愁<rt>chóu</rt></ruby>。<br><ruby>潮<rt>cháo</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>两<rt>liǎng</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>星<rt>xīng</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>瓜<rt>guā</rt></ruby><ruby>州<rt>zhōu</rt></ruby>。","notes":"金陵渡：渡口名，在今江苏省镇江市附近。<br>津：渡口。<br>小山楼：渡口附近小楼，作者住宿之处。<br>宿：过夜。<br>行人：旅客，指作者自己。<br>题可：当。<br>斜月：下半夜偏西的月亮。<br>星火：形容远处三三两两像星星一样闪烁的火光。<br>瓜州：在长江北岸，今江苏省邗江县南部，与镇江市隔江相对，向来是长江南北水运的交通要冲。","translation":"夜宿金陵渡口的小山楼，辗转难眠心中满怀旅愁。斜月朦胧江潮正在下落，对岸星火闪闪便是瓜洲。","number":30,"title_py":"tí jīn líng dù","author_py":"zhāng hù","dynasty_py":"Táng"},{"title":"月夜","dynasty":"唐","author":"刘方平","text":"<ruby>更<rt>gèng</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>家<rt>jiā</rt></ruby>，<br><ruby>北<rt>běi</rt></ruby><ruby>斗<rt>dǒu</rt></ruby><ruby>阑<rt>lán</rt></ruby><ruby>干<rt>gān</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>斗<rt>dǒu</rt></ruby><ruby>斜<rt>xié</rt></ruby>。<br><ruby>今<rt>jīn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>偏<rt>piān</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>气<rt>qì</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby>，<br><ruby>虫<rt>chóng</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>透<rt>tòu</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>纱<rt>shā</rt></ruby>。","notes":"更深：古时计算时间，一夜分成五更。更深，夜深了。<br>北斗：在北方天空排列成斗形的七颗亮星。<br>偏知：才知，表示出乎意料。<br>新透：第一次透过。","translation":"色深沉，月光斜照半边庭院。北斗南斗，不知不觉已经横斜。今夜十分意外，感觉初春暖意，一声清脆的虫鸣透入绿色窗纱。","number":31,"title_py":"yuè yè","author_py":"liú fāng píng","dynasty_py":"Táng"},{"title":"为有","dynasty":"唐","author":"李商隐","text":"<ruby>为<rt>wèi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>屏<rt>píng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>限<rt>xiàn</rt></ruby><ruby>娇<rt>jiāo</rt></ruby>，<br><ruby>凤<rt>fèng</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>怕<rt>pà</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>宵<rt>xiāo</rt></ruby>。<br><ruby>无<rt>wú</rt></ruby><ruby>端<rt>duān</rt></ruby><ruby>嫁<rt>jià</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>龟<rt>guī</rt></ruby><ruby>婿<rt>xù</rt></ruby>，<br><ruby>辜<rt>gū</rt></ruby><ruby>负<rt>fù</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>衾<rt>qīn</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>早<rt>zǎo</rt></ruby><ruby>朝<rt>cháo</rt></ruby>。","notes":"云屏：雕饰着云母图案的屏风，古代皇家或富贵人家所用。<br>凤城：此指京城。<br>无端：没来由。<br>金龟婿：佩带金龟（即作官）的丈夫。","translation":"云母屏风后面的美人格外娇，京城寒冬已过却怕短暂春宵。无端地嫁了个做高官的丈夫，不恋温暖香衾只想去上早朝。","number":32,"title_py":"wèi yǒu","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"瑶池","dynasty":"唐","author":"李商隐","text":"<ruby>瑶<rt>yáo</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>阿<rt>ā</rt></ruby><ruby>母<rt>mǔ</rt></ruby><ruby>绮<rt>qǐ</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>开<rt>kāi</rt></ruby>，<br><ruby>黄<rt>huáng</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>动<rt>dòng</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>哀<rt>āi</rt></ruby>。<br><ruby>八<rt>bā</rt></ruby><ruby>骏<rt>jùn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>穆<rt>mù</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"瑶池阿母：《穆天子传》<br>卷三：“天子宾于西王母，天子觞西王母于瑶池之上。<br>西王母为天子谣曰：‘白云在天，山陵自出。道里悠远，山川间之。将子无死，尚能复来。’<br>天子答之曰：‘予归东土，和治诸夏。万民平均，吾顾见汝。比及三年，将复而野。’”《武帝内传》称王母为“玄都阿母”。<br>黄竹歌声：《穆天子传》<br>卷五：“日中大寒，北风雨雪，有冻人。天子作诗三章以哀民。”<br>八骏：传说周穆王有八匹骏马，可日行三万里。《列子》、《穆天子传》等记载不一。<br>穆王：西周人，姓姬名满，传说他曾周游天下。","translation":"西王母在瑶池上把绮窗打开；只听得黄竹歌声音动地悲哀。八骏神马的车子日行三万里；周穆王为了何事违约不再来？","number":33,"title_py":"yáo chí","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"金陵图","dynasty":"唐","author":"韦庄","text":"<ruby>谁<rt>shuí</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>伤<rt>shāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>成<rt>chéng</rt></ruby>，<br><ruby>画<rt>huà</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>逐<rt>zhú</rt></ruby><ruby>世<rt>shì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>情<rt>qíng</rt></ruby>。<br><ruby>君<rt>jūn</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>幅<rt>fú</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>朝<rt>cháo</rt></ruby><ruby>事<rt>shì</rt></ruby>，<br><ruby>老<rt>lǎo</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>城<rt>chéng</rt></ruby>。","notes":"金陵：古地名，即今江苏南京及江宁等地，为六朝故都。<br>逐：随，跟随。《玉篇》：“逐，从也。”这里可作迎合解。<br>老木：枯老的树木。","translation":"谁说画不出六朝古都的伤心事，只不过是那些画家为了迎合当权者的心态而不画伤心图而已。你看这六幅描摹南朝往事的画中，枯老的树木和寒凉的云朵充满了整个金陵城。","number":34,"title_py":"jīn líng tú","author_py":"wéi zhuāng","dynasty_py":"Táng"},{"title":"大林寺桃花","dynasty":"唐","author":"白居易","text":"<ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>菲<rt>fēi</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>山<rt>shān</rt></ruby><ruby>寺<rt>sì</rt></ruby><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>盛<rt>shèng</rt></ruby><ruby>开<rt>kāi</rt></ruby>。<br><ruby>长<rt>cháng</rt></ruby><ruby>恨<rt>hèn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>觅<rt>mì</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"大林寺：在庐山大林峰，相传为晋代僧人昙诜所建，为中国佛教胜地之一。<br>人间：指庐山下的平地村落。<br>芳菲：盛开的花，亦可泛指花，花草艳盛的阳春景色。<br>尽：指花凋谢了。<br>山寺：指大林寺。<br>始：才；刚刚。<br>长恨：常常惋惜。<br>春归：春天回去了。<br>觅：寻找。<br>不知：岂料，想不到。<br>转：反。<br>此中：这深山的寺庙里。","translation":"在人间四月里百花凋零已尽，高山古寺中的桃花才刚刚盛开。我常为春光逝去无处寻觅而怅恨，却不知它已经转到这里来。","number":35,"title_py":"dà lín sì táo huā","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"小桃红·江岸水灯","dynasty":"元","author":"盍西村","text":"<ruby>万<rt>wàn</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>火<rt>huǒ</rt></ruby>①<ruby>闹<rt>nào</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>桥<rt>qiáo</rt></ruby>，<br><ruby>十<rt>shí</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>照<rt>zhào</rt></ruby>，<br><ruby>舞<rt>wǔ</rt></ruby><ruby>凤<rt>fèng</rt></ruby><ruby>翔<rt>xiáng</rt></ruby><ruby>鸾<rt>luán</rt></ruby>②<ruby>势<rt>shì</rt></ruby><ruby>绝<rt>jué</rt></ruby><ruby>妙<rt>miào</rt></ruby>。<br><ruby>可<rt>kě</rt></ruby><ruby>怜<rt>lián</rt></ruby>③<ruby>宵<rt>xiāo</rt></ruby>，<br><ruby>波<rt>bō</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>涌<rt>yǒng</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>蓬<rt>péng</rt></ruby><ruby>莱<rt>lái</rt></ruby><ruby>岛<rt>dǎo</rt></ruby>。<br><ruby>香<rt>xiāng</rt></ruby><ruby>烟<rt>yān</rt></ruby>④<ruby>乱<rt>luàn</rt></ruby><ruby>飘<rt>piāo</rt></ruby>，<br><ruby>笙<rt>shēng</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>喧<rt>xuān</rt></ruby><ruby>闹<rt>nào</rt></ruby>，<br><ruby>飞<rt>fēi</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>楼<rt>lóu</rt></ruby>⑤<ruby>腰<rt>yāo</rt></ruby>。","notes":"①万家灯火：家家户户都亮着灯。形容夜晚的城市繁华灿烂。<br>②舞凤翔鸾：指凤形和鸾形的花灯在飞舞盘旋。<br>③可怜：可爱。<br>④香烟：指灯火的光辉及焰火。<br>⑤玉楼：华丽的高楼。","translation":"万家灯火使春桥分外热闹，十里江岸璀璨的灯光相互映照，凤形的灯笼飞舞，鸾形的灯笼腾跃，气势非凡绝妙。多么可爱的元宵夜，波涛间奔涌出蓬莱仙岛。灯火的光辉和焰火纷乱飘飞，笙歌喧哗吵闹，一起飘向云空，飞上华丽的高楼。","number":36,"title_py":"xiǎo táo hóng · jiāng àn shuǐ dēng","author_py":"hé xī cūn","dynasty_py":"Yuán"},{"title":"迎仙客①·括山②道中","dynasty":"元","author":"张可久","text":"<ruby>云<rt>yún</rt></ruby><ruby>冉<rt>rǎn</rt></ruby><ruby>冉<rt>rǎn</rt></ruby>，<ruby>草<rt>cǎo</rt></ruby><ruby>纤<rt>xiān</rt></ruby><ruby>纤<rt>xiān</rt></ruby>③，<ruby>谁<rt>shuí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>隐<rt>yǐn</rt></ruby><ruby>居<rt>jū</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>崦<rt>yān</rt></ruby>④。<br><ruby>水<rt>shuǐ</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>寒<rt>hán</rt></ruby>，<ruby>溪<rt>xī</rt></ruby><ruby>路<rt>lù</rt></ruby><ruby>险<rt>xiǎn</rt></ruby>。<br><ruby>半<rt>bàn</rt></ruby><ruby>幅<rt>fú</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>帘<rt>lián</rt></ruby>，<ruby>五<rt>wǔ</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>店<rt>diàn</rt></ruby>。","notes":"①迎仙客：中吕宫曲牌。<br>句式：三三七、三三、四五。<br>②括山：指括苍山，在浙江省东南部。<br>③纤纤：草林木茂盛的样子。<br>④崦：山坳。","translation":"云彩缓缓地飘飞；纤纤的细草碧绿一片，是谁家的房舍在半山崦里若隐若现？水上弥漫寒烟，溪水旁边山路陡峭而且艰险，远处半幅青帘招展，是五里外桃花路边的酒店。","number":37,"title_py":"yíng xiān kè ① · kuò shān ② dào zhōng","author_py":"zhāng kě jiǔ","dynasty_py":"Yuán"},{"title":"大德歌·春","dynasty":"元","author":"关汉卿","text":"<ruby>谁<rt>shuí</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>伤<rt>shāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>成<rt>chéng</rt></ruby>，<br><ruby>画<rt>huà</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>逐<rt>zhú</rt></ruby><ruby>世<rt>shì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>情<rt>qíng</rt></ruby>。<br><ruby>君<rt>jūn</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>幅<rt>fú</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>朝<rt>cháo</rt></ruby><ruby>事<rt>shì</rt></ruby>，<br><ruby>老<rt>lǎo</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>城<rt>chéng</rt></ruby>。","notes":"①双调：宫调名。<br>大德歌：曲牌名。②子规啼，<br>不如归：子规啼声很像人说“不如归”，容易引起离人的乡愁。<br>③憔悴：疲惫没有精神。<br>④鱼雁：书信的代称。<br>⑤则见双燕斗衔泥：只见一对对燕子争相衔泥筑巢。<br>斗：竞相，争着。","translation":"春天的杜鹃叫了，好像在说“不如归去”。你走的时候说是春天就回来，而今春已到，却不见你的踪影。近日才几天面色已显得枯槁瘦弱，憔悴多了。等了整整一个春天，九十个日夜啊，却一点消息也没等到；而旧时檐前燕子早已归来，忙忙碌碌地营巢筑窝干得多欢！","number":38,"title_py":"dà dé gē · chūn","author_py":"guān hàn qīng","dynasty_py":"Yuán"},{"title":"落梅风·江楼晚眺","dynasty":"元","author":"赵善庆","text":"<ruby>枫<rt>fēng</rt></ruby><ruby>枯<rt>kū</rt></ruby><ruby>叶<rt>yè</rt></ruby>，<ruby>柳<rt>liǔ</rt></ruby><ruby>瘦<rt>shòu</rt></ruby><ruby>丝<rt>sī</rt></ruby>①，<ruby>夕<rt>xī</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>阑<rt>lán</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>二<rt>èr</rt></ruby>②。<br><ruby>望<rt>wàng</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>莹<rt>yíng</rt></ruby><ruby>然<rt>rán</rt></ruby>③<ruby>如<rt>rú</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>纸<rt>zhǐ</rt></ruby>，<ruby>一<rt>yì</rt></ruby><ruby>行<rt>háng</rt></ruby><ruby>雁<rt>yàn</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>行<rt>háng</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>字<rt>zì</rt></ruby>。","notes":"①柳瘦丝：柳条细瘦如丝。<br>②画阑十二：曲折精美的栏杆。<br>十二：形容曲折多。<br>③莹然：光洁，光亮。·风","translation":"","number":39,"title_py":"luò méi fēng · jiāng lóu wǎn tiào","author_py":"zhào shàn qìng","dynasty_py":"Yuán"},{"title":"小重山①·昨夜寒蛩不住鸣","dynasty":"宋","author":"岳飞","text":"<ruby>昨<rt>zuó</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>蛩<rt>qióng</rt></ruby>②<ruby>不<rt>bú</rt></ruby><ruby>住<rt>zhù</rt></ruby><ruby>鸣<rt>míng</rt></ruby>。<br><ruby>惊<rt>jīng</rt></ruby><ruby>回<rt>huí</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>梦<rt>mèng</rt></ruby>③，<br><ruby>已<rt>yǐ</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>更<rt>gēng</rt></ruby>④。<br><ruby>起<rt>qǐ</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>绕<rt>rào</rt></ruby><ruby>阶<rt>jiē</rt></ruby><ruby>行<rt>xíng</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>悄<rt>qiāo</rt></ruby><ruby>悄<rt>qiāo</rt></ruby>，<br><ruby>帘<rt>lián</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>胧<rt>lóng</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>白<rt>bái</rt></ruby><ruby>首<rt>shǒu</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>功<rt>gōng</rt></ruby><ruby>名<rt>míng</rt></ruby>⑤。<br><ruby>旧<rt>jiù</rt></ruby><ruby>山<rt>shān</rt></ruby>⑥<ruby>松<rt>sōng</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>老<rt>lǎo</rt></ruby>，<br><ruby>阻<rt>zǔ</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>程<rt>chéng</rt></ruby>。<br><ruby>欲<rt>yù</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>付<rt>fù</rt></ruby>⑦<ruby>瑶<rt>yáo</rt></ruby>⑧<ruby>琴<rt>qín</rt></ruby>。<br><ruby>知<rt>zhī</rt></ruby><ruby>音<rt>yīn</rt></ruby><ruby>少<rt>shǎo</rt></ruby>，<br><ruby>弦<rt>xián</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>听<rt>tīng</rt></ruby>。","notes":"①小重山：词牌名。②寒蛩（qióng）：秋天的蟋蟀。<br>重③千里梦：指赴千里外杀敌报国的梦。·<br>山④三更：指半夜十一时至翌晨一时。<br>昨⑤功名：此指为驱逐金兵的入侵，收复失地而建功立业。<br>夜⑥旧山：家乡的山。<br>寒⑦付：付与。⑧瑶（yáo）<br>琴：饰以美玉的琴。","translation":"，寒秋蟋蟀不住哀鸣，梦回故乡，千里燃战火，被惊醒，已三更。站起身，独绕台阶踽踽行。四周静悄悄，帘外，一轮淡月正朦胧。为国建功留青史，未老满头霜星星。家山松竹苍然老，无奈议和声起、阻断了归程。想把满腹心事，付与瑶琴弹一曲。可可高山流水知音稀，纵然弦弹断，又有谁来听？","number":40,"title_py":"xiǎo chóng shān ① · zuó yè hán qióng bú zhù míng","author_py":"yuè fēi","dynasty_py":"Sòng"},{"title":"寄人","dynasty":"唐","author":"张泌","text":"<ruby>别<rt>bié</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>谢<rt>xiè</rt></ruby><ruby>家<rt>jiā</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>廊<rt>láng</rt></ruby><ruby>回<rt>huí</rt></ruby><ruby>合<rt>hé</rt></ruby><ruby>曲<rt>qū</rt></ruby><ruby>阑<rt>lán</rt></ruby><ruby>斜<rt>xié</rt></ruby>。<br><ruby>多<rt>duō</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>犹<rt>yóu</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"谢家：泛指闺中女子。晋谢奕之女谢道韫、唐李德裕之妾谢秋娘等皆有盛名，故后人多以“谢家”代闺中女子。“小廊”<br>句：指梦中所见景物。<br>回合：回环、回绕。<br>阑：栏杆。“多情”<br>句：指梦后所见。<br>离人：这里指寻梦人。","translation":"别梦中隐约来到了谢家，徘徊在小回廊栏杆底下。只有天上春月最是多情，还为离人照着庭院落花。","number":41,"title_py":"jì rén","author_py":"zhāng mì","dynasty_py":"Táng"},{"title":"杂诗·其二","dynasty":"唐","author":"王维","text":"<ruby>君<rt>jūn</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>来<rt>lái</rt></ruby>，<br><ruby>应<rt>yīng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>事<rt>shì</rt></ruby>。<br><ruby>来<rt>lái</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>绮<rt>qǐ</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>前<rt>qián</rt></ruby>，<br><ruby>寒<rt>hán</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>著<rt>zhù</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>未<rt>wèi</rt></ruby>？","notes":"来日：来的时候。绮(qǐ)<br>窗：雕画花纹的窗户。<br>著花未：开花没有?","translation":"诗您是刚从我们家乡来的，一定了解家乡的人情世态。请问您来的时候我家雕画花纹的窗户前，那一株腊梅花开了没有？","number":42,"title_py":"zá shī · qí èr","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"落花","dynasty":"唐","author":"李商隐","text":"<ruby>高<rt>gāo</rt></ruby><ruby>阁<rt>gé</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>竟<rt>jìng</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>园<rt>yuán</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>乱<rt>luàn</rt></ruby><ruby>飞<rt>fēi</rt></ruby>。<br><ruby>参<rt>cān</rt></ruby><ruby>差<rt>chà</rt></ruby><ruby>连<rt>lián</rt></ruby><ruby>曲<rt>qū</rt></ruby><ruby>陌<rt>mò</rt></ruby>，<br><ruby>迢<rt>tiáo</rt></ruby><ruby>递<rt>dì</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>晖<rt>huī</rt></ruby>。<br><ruby>肠<rt>cháng</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>忍<rt>rěn</rt></ruby><ruby>扫<rt>sǎo</rt></ruby>，<br><ruby>眼<rt>yǎn</rt></ruby><ruby>穿<rt>chuān</rt></ruby><ruby>仍<rt>réng</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>归<rt>guī</rt></ruby>。<br><ruby>芳<rt>fāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>所<rt>suǒ</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>沾<rt>zhān</rt></ruby><ruby>衣<rt>yī</rt></ruby>。","notes":"参差：指花影的迷离，承上句乱飞意。<br>芳心：指花，也指自己看花的心意。<br>沾衣：指流泪。","translation":"高阁上的游客们已经竞相离去；小园的春花随风凋零纷花纷乱飞。花影参差迷离接连着弯弯小径；远望落花回舞映着斜阳的余晖。我的肝肠欲断不忍把落红扫去；望眼欲穿盼来春天却匆匆回归。爱花惜花自然要怨春去得太早；春尽花谢所得的只是落泪沾衣。","number":43,"title_py":"luò huā","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"草","number":44,"dynasty":"唐","author":"白居易","text":"<ruby>离<rt>lí</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>原<rt>yuán</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>草<rt>cǎo</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>枯<rt>kū</rt></ruby><ruby>荣<rt>róng</rt></ruby>。<br><ruby>野<rt>yě</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>烧<rt>shāo</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>远<rt>yuǎn</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>侵<rt>qīn</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>晴<rt>qíng</rt></ruby><ruby>翠<rt>cuì</rt></ruby><ruby>接<rt>jiē</rt></ruby><ruby>荒<rt>huāng</rt></ruby><ruby>城<rt>chéng</rt></ruby>。<br><ruby>又<rt>yòu</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>孙<rt>sūn</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>萋<rt>qī</rt></ruby><ruby>萋<rt>qī</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>情<rt>qíng</rt></ruby>。","notes":"离离：茂盛，繁盛纷杂的样子。<br>原：宽广的野地。<br>岁：年。<br>枯荣：指草的枯荣和茂盛。","translation":"古原上的野草充满生机，每年一次枯荣一次茂盛，野火烧都烧不光它，春风一吹它又长得遍地。","title_py":"cǎo","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"旅夜书怀","dynasty":"唐","author":"杜甫","text":"<ruby>细<rt>xì</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>微<rt>wēi</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>岸<rt>àn</rt></ruby>，<br><ruby>危<rt>wēi</rt></ruby><ruby>樯<rt>qiáng</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>。<br><ruby>星<rt>xīng</rt></ruby><ruby>垂<rt>chuí</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>野<rt>yě</rt></ruby><ruby>阔<rt>kuò</rt></ruby>，<br><ruby>月<rt>yuè</rt></ruby><ruby>涌<rt>yǒng</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>名<rt>míng</rt></ruby><ruby>岂<rt>qǐ</rt></ruby><ruby>文<rt>wén</rt></ruby><ruby>章<rt>zhāng</rt></ruby><ruby>著<rt>zhù</rt></ruby>，<br><ruby>官<rt>guān</rt></ruby><ruby>应<rt>yīng</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>病<rt>bìng</rt></ruby><ruby>休<rt>xiū</rt></ruby>。<br><ruby>飘<rt>piāo</rt></ruby><ruby>飘<rt>piāo</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>似<rt>sì</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>鸥<rt>ōu</rt></ruby>。","notes":"岸：指江岸边。危樯（qiáng）：高竖的桅杆。危，高。樯，船上挂风帆的桅杆。<br>独夜舟：是说自己孤零零的一个人夜泊江边。<br>星垂平野阔：星空低垂，原野显得格外广阔。<br>月涌：月亮倒映，随水流涌。<br>夜大江：指长江。<br>书飘飘：飞翔的样子。怀","translation":"微风吹拂着江岸的细草，那立着高高桅杆的小船在夜里孤零地停泊着。星星垂在天边，平野显得宽阔；月光随波涌动，大江滚滚东流。我难道是因为文章而著名吗？年老病多也应该休官了。自己到处漂泊像什么呢？就像天地间的一只孤零零的沙鸥。","number":45,"title_py":"lǚ yè shū huái","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"渡荆门送别","dynasty":"唐","author":"李白","text":"<ruby>渡<rt>dù</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>荆<rt>jīng</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>外<rt>wài</rt></ruby>，<br><ruby>来<rt>lái</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>楚<rt>chǔ</rt></ruby><ruby>国<rt>guó</rt></ruby><ruby>游<rt>yóu</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>野<rt>yě</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>江<rt>jiāng</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>荒<rt>huāng</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>月<rt>yuè</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>镜<rt>jìng</rt></ruby>，<br><ruby>云<rt>yún</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>结<rt>jié</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>楼<rt>lóu</rt></ruby>。<br><ruby>仍<rt>réng</rt></ruby><ruby>怜<rt>lián</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>。","notes":"远：远自。<br>平野：平坦广阔的原野。<br>江：长江。<br>大荒：广阔无际的田野。<br>月下飞天镜：明月映入江水，如同飞下的天镜。<br>下：移下。","translation":"乘船远行，路过荆门一带，来到楚国故地。青山渐渐消失，平野一望无边。长江滔滔奔涌，流入广袤荒原。月映江面，犹如明天飞镜；云变蓝天，生成海市蜃楼。故乡之水恋恋不舍，不远万里送我行舟。","number":46,"title_py":"dù jīng mén sòng bié","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"送韦城李少府","dynasty":"唐","author":"张九龄","text":"<ruby>送<rt>sòng</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>昌<rt>chāng</rt></ruby><ruby>尉<rt>wèi</rt></ruby>，<br><ruby>离<rt>lí</rt></ruby><ruby>亭<rt>tíng</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>候<rt>hòu</rt></ruby><ruby>春<rt>chūn</rt></ruby>。<br><ruby>野<rt>yě</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>林<rt>lín</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>新<rt>xīn</rt></ruby>。<br><ruby>别<rt>bié</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>归<rt>guī</rt></ruby><ruby>轩<rt>xuān</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>津<rt>jīn</rt></ruby>。<br><ruby>相<rt>xiāng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>近<rt>jìn</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>尚<rt>shàng</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>邻<rt>lín</rt></ruby>。","notes":"少府：县尉的别称。县令称明府，县尉职位低于县令，故称少府。<br>南昌：今江西南昌市，古曾设南昌县。<br>南昌尉：即南昌县尉。<br>离亭：路旁驿亭。<br>西：古代宾主相见，以西为尊。主东而宾西。<br>青门：泛指城门。<br>轩：车的通称。<br>白马津：今河南滑县北。","translation":"别客人南昌县尉，路旁驿亭拜别贵宾时，正是春天。美丽野花尽收眼底，林中鸟鸣犹感清新。告别县城踏上回乡路，归车走向白马津。知己挚友不分远近，相隔万里如同邻居。","number":47,"title_py":"sòng wéi chéng lǐ shào fǔ","author_py":"zhāng jiǔ líng","dynasty_py":"Táng"},{"title":"赠刘景文","dynasty":"宋","author":"苏轼","text":"<ruby>荷<rt>hé</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>擎<rt>qíng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>盖<rt>gài</rt></ruby>，<br><ruby>菊<rt>jú</rt></ruby><ruby>残<rt>cán</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>傲<rt>ào</rt></ruby><ruby>霜<rt>shuāng</rt></ruby><ruby>枝<rt>zhī</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>记<rt>jì</rt></ruby>，<br><ruby>最<rt>zuì</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>橙<rt>chéng</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>橘<rt>jú</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>时<rt>shí</rt></ruby>。","notes":"擎雨盖：喻指荷叶。<br>擎：举，向上托。<br>傲霜：不怕霜冻，坚强不屈。<br>君：你，指刘景文。","translation":"荷叶败尽，像一把遮雨的伞似的叶子和根茎上再也不像夏天那样亭亭玉立，菊花也已枯萎，但那傲霜挺拔的菊枝在寒风中依然显得生机勃勃。别以为一年的好景将尽，你必须记住，最美的景是在秋末冬初橙黄橘绿的时节啊！","number":48,"title_py":"zèng liú jǐng wén","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"终南别业","dynasty":"唐","author":"王维","text":"<ruby>中<rt>zhōng</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>颇<rt>pǒ</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>晚<rt>wǎn</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>陲<rt>chuí</rt></ruby>。<br><ruby>兴<rt>xìng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>每<rt>měi</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>往<rt>wǎng</rt></ruby>，<br><ruby>胜<rt>shèng</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>知<rt>zhī</rt></ruby>。<br><ruby>行<rt>xíng</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>穷<rt>qióng</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>坐<rt>zuò</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>时<rt>shí</rt></ruby>。<br><ruby>偶<rt>ǒu</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>值<rt>zhí</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>叟<rt>sǒu</rt></ruby>，<br><ruby>谈<rt>tán</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>还<rt>huán</rt></ruby><ruby>期<rt>qī</rt></ruby>。","notes":"中岁：中年。好（hào）：喜好。<br>道：这里指佛教。<br>家：安家。<br>南山：即终南山。陲（chuí）：边缘，旁边，边境；南山陲，指辋川别墅所在地，意思是终南山脚下。<br>胜事：美好的事。<br>值：遇到。叟（sǒu）：老翁。<br>无还期：没有回还的准确时间。","translation":"中年以后存有较浓的好道之心，直到晚年才安家于终南山边陲。兴趣浓时常常独来独往去游玩，有快乐的事自我欣赏自我陶醉。间或走到水的尽头去寻求源流，间或坐看上升的云雾千变万化。偶然在林间遇见个把乡村父老，偶与他谈笑聊天每每忘了还家。","number":49,"title_py":"zhōng nán bié yè","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"客至","dynasty":"唐","author":"杜甫","text":"<ruby>舍<rt>shě</rt></
