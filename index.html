rt></ruby><ruby>踪<rt>zōng</rt></ruby><ruby>迹<rt>jì</rt></ruby>，<br><ruby>浮<rt>fú</rt></ruby><ruby>萍<rt>píng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>道<rt>dào</rt></ruby><ruby>开<rt>kāi</rt></ruby>。","notes":"解：知道。<br>浮萍：池塘里的水草。<br>一道开：指浮萍被小艇分开后一时难以合拢而留下的一条踪迹。","translation":"一个小孩撑着小船，偷偷地采了白莲回来。他不知道怎么掩藏踪迹，水面的浮萍上留下了一条船儿划过的痕迹。","number":3,"title_py":"chí shàng","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"幼女词","dynasty":"唐","author":"施肩吾","text":"<ruby>幼<rt>yòu</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>岁<rt>suì</rt></ruby>，<br><ruby>未<rt>wèi</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>巧<rt>qiǎo</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>拙<rt>zhuō</rt></ruby>。<br><ruby>向<rt>xiàng</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>堂<rt>táng</rt></ruby><ruby>前<rt>qián</rt></ruby>，<br><ruby>学<rt>xué</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>拜<rt>bài</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>月<rt>yuè</rt></ruby>。","notes":"向夜：天将黑。向，将近。<br>拜新月：旧时风俗。","translation":"一个刚刚六岁的小女孩，因为年幼尚且分不清什么是“巧”、什是“拙”这类较为抽象的概念，常常做出弄“巧”成“拙”的事，在七夕节的晚上，却来到庙堂的前面，郑重其事地学着大人“拜新月”。","number":4,"title_py":"yòu nǚ cí","author_py":"shī jiān wú","dynasty_py":"Táng"},{"title":"山雨","dynasty":"元","author":"偰逊","text":"<ruby>一<rt>yí</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>，<br><ruby>林<rt>lín</rt></ruby><ruby>端<rt>duān</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>怒<rt>nù</rt></ruby><ruby>号<rt>hào</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>长<rt>zhǎng</rt></ruby>，<br><ruby>只<rt>zhǐ</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>钓<rt>diào</rt></ruby><ruby>船<rt>chuán</rt></ruby><ruby>高<rt>gāo</rt></ruby>。","notes":"林端：树林高处。<br>长：同“涨”，水位高。","translation":"","number":5,"title_py":"shān yǔ","author_py":"xiè xùn","dynasty_py":"Yuán"},{"title":"十二月十五夜","dynasty":"清","author":"袁枚","text":"<ruby>沉<rt>chén</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>更<rt>gēng</rt></ruby><ruby>鼓<rt>gǔ</rt></ruby><ruby>急<rt>jí</rt></ruby>,<ruby>渐<rt>jiàn</rt></ruby><ruby>渐<rt>jiàn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>绝<rt>jué</rt></ruby>。<br><ruby>吹<rt>chuī</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>明<rt>míng</rt></ruby>，<ruby>月<rt>yuè</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>雪<rt>xuě</rt></ruby>。","notes":"更：旧时一夜分成五更，每更大约两个小时。<br>更鼓：旧时报更用的鼓。","translation":"更鼓的声音低沉而急促，外面行人的声音渐渐没有了。诗人也吹灯准备休息，灯火一熄，屋内一下子暗下来，只有窗户反倒是显得格外亮。原来，今天是农历十二月十五，地上是厚厚的积雪。天上是朗朗的月亮，明月映着白雪，天地间一片透亮。","number":6,"title_py":"shí èr yuè shí wǔ yè","author_py":"yuán méi","dynasty_py":"Qīng"},{"title":"溪边","dynasty":"唐","author":"吴融","text":"<ruby>溪<rt>xī</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>枝<rt>zhī</rt></ruby>，<br><ruby>百<rt>bǎi</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>带<rt>dài</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>飞<rt>fēi</rt></ruby>。<br><ruby>下<rt>xià</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>鹭<rt>lù</rt></ruby>，<br><ruby>日<rt>rì</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>翘<rt>qiào</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>矶<rt>jī</rt></ruby>。","notes":"本诗选自《唐英集》。吴融，字子华。矶：水边突出的岩石。","translation":"河边树上开满了鲜花，百鸟带着香味飞翔。只有一只白色的鹭鸶，站在石上翘望着夕阳。","number":7,"title_py":"xī biān","author_py":"wú róng","dynasty_py":"Táng"},{"title":"题画诗","dynasty":"明","author":"吴伟","text":"<ruby>白<rt>bái</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<br><ruby>骑<rt>qí</rt></ruby><ruby>驴<rt>lǘ</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>。<br><ruby>岸<rt>àn</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>蹄<rt>tí</rt></ruby><ruby>踏<rt>tà</rt></ruby><ruby>蹄<rt>tí</rt></ruby>，<br><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>嘴<rt>zuǐ</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>嘴<rt>zuǐ</rt></ruby>。","notes":"选自《雪涛诗评》。白头：白发，老大爷。","translation":"白头发，老爷子，骑毛驴，去饮水；岸边倒影-----蹄踏蹄，清清水中-----嘴对嘴。","number":8,"title_py":"tí huà shī","author_py":"wú wěi","dynasty_py":"Míng"},{"title":"木瓜","dynasty":"先秦","author":"《诗经》","text":"<ruby>投<rt>tóu</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>瓜<rt>guā</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>琼<rt>qióng</rt></ruby><ruby>琚<rt>jū</rt></ruby>。<br><ruby>匪<rt>fěi</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>也<rt>yě</rt></ruby>，<br><ruby>永<rt>yǒng</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>也<rt>yě</rt></ruby>。<br><ruby>投<rt>tóu</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>桃<rt>táo</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>琼<rt>qióng</rt></ruby><ruby>瑶<rt>yáo</rt></ruby>。<br><ruby>匪<rt>fěi</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>也<rt>yě</rt></ruby>，<br><ruby>永<rt>yǒng</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>也<rt>yě</rt></ruby>！<br><ruby>投<rt>tóu</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>李<rt>lǐ</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>琼<rt>qióng</rt></ruby><ruby>玖<rt>jiǔ</rt></ruby>。<br><ruby>匪<rt>fěi</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>也<rt>yě</rt></ruby>，<br><ruby>永<rt>yǒng</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>也<rt>yě</rt></ruby>！","notes":"投：投送。<br>琼：美玉。琚佩玉。<br>瑶：美玉。<br>玖：浅黑色的玉。","translation":"你用木瓜送给我，我用美玉回报你。美玉不单是回报，也是为求永相好。你用木桃送给我，我用琼瑶作回报。琼瑶不单是回报，也是为求永相好。你用木李送给我，我用琼玖作回报。琼玖不单是回报，也是为求永相好。","number":9,"title_py":"mù guā","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"采葛","dynasty":"先秦","author":"《诗经》","text":"<ruby>彼<rt>bǐ</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>葛<rt>gé</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>如<rt>rú</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>兮<rt>xī</rt></ruby>。<br><ruby>彼<rt>bǐ</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>如<rt>rú</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>兮<rt>xī</rt></ruby>！<br><ruby>彼<rt>bǐ</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>艾<rt>ài</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>如<rt>rú</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>兮<rt>xī</rt></ruby>！","notes":"萧：芦荻，用火烧有香气，古时用来祭祀。<br>三秋：这里指三季。","translation":"心上人啊去采葛。一天不见她的影，好像隔了三月久。心上人啊采芦荻，一天不见她的影。好像隔了三秋久。心上人啊采香艾，一天不见她的影，好像隔了三年久。","number":10,"title_py":"cǎi gé","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"相思","dynasty":"唐","author":"王维","text":"<ruby>红<rt>hóng</rt></ruby><ruby>豆<rt>dòu</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>国<rt>guó</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>发<rt>fā</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>枝<rt>zhī</rt></ruby>。<br><ruby>愿<rt>yuàn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>多<rt>duō</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>撷<rt>xié</rt></ruby>，<br><ruby>此<rt>cǐ</rt></ruby><ruby>物<rt>wù</rt></ruby><ruby>最<rt>zuì</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>思<rt>sī</rt></ruby>。","notes":"红豆：红豆树的果实，又称相思豆。<br>南国：南方。<br>采撷：采摘。","translation":"红豆树生长在南方，春天到了生出了多少枝红豆？希望你多采一些红豆，因为它最能引人相思。","number":11,"title_py":"xiāng sī","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"咏萤","dynasty":"唐","author":"虞世南","text":"<ruby>的<rt>dì</rt></ruby><ruby>历<rt>lì</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>小<rt>xiǎo</rt></ruby>，<br><ruby>飘<rt>piāo</rt></ruby><ruby>摇<rt>yáo</rt></ruby><ruby>弱<rt>ruò</rt></ruby><ruby>翅<rt>chì</rt></ruby><ruby>轻<rt>qīng</rt></ruby>。<br><ruby>恐<rt>kǒng</rt></ruby><ruby>畏<rt>wèi</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>识<rt>shí</rt></ruby>，<br><ruby>独<rt>dú</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>明<rt>míng</rt></ruby>。","notes":"的历：小粒明珠的光点。","translation":"火虫摇动着软弱而轻盈的翅膀飞舞着，显出一道明亮而微小的光。它是害怕无人赏识，独自在黑夜里发出光亮。咏","number":12,"title_py":"yǒng yíng","author_py":"yú shì nán","dynasty_py":"Táng"},{"title":"绝句","dynasty":"唐","author":"杜甫","text":"<ruby>迟<rt>chí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>丽<rt>lì</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>香<rt>xiāng</rt></ruby>。<br><ruby>泥<rt>ní</rt></ruby><ruby>融<rt>róng</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>燕<rt>yàn</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<br><ruby>沙<rt>shā</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby><ruby>睡<rt>shuì</rt></ruby><ruby>鸳<rt>yuān</rt></ruby><ruby>鸯<rt>yāng</rt></ruby>。","notes":"迟日：春天的太阳。<br>泥融：泥土又湿又软。","translation":"春日融融映照着美丽的山河，轻风阵阵吹送花草的芳香。燕子衔着酥润的泥在筑巢，温暖的沙滩上依偎着鸳鸯。","number":13,"title_py":"jué jù","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"游子吟","dynasty":"唐","author":"孟郊","text":"<ruby>慈<rt>cí</rt></ruby><ruby>母<rt>mǔ</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>线<rt>xiàn</rt></ruby>，<br><ruby>游<rt>yóu</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>衣<rt>yī</rt></ruby>。<br><ruby>临<rt>lín</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>密<rt>mì</rt></ruby><ruby>密<rt>mì</rt></ruby><ruby>缝<rt>fèng</rt></ruby>，<br><ruby>意<rt>yì</rt></ruby><ruby>恐<rt>kǒng</rt></ruby><ruby>迟<rt>chí</rt></ruby><ruby>迟<rt>chí</rt></ruby><ruby>归<rt>guī</rt></ruby>。<br><ruby>谁<rt>shuí</rt></ruby><ruby>言<rt>yán</rt></ruby><ruby>寸<rt>cùn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>心<rt>xīn</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>晖<rt>huī</rt></ruby>。","notes":"春晖：春天的阳光。<br>言：说。","translation":"慈祥的母亲手里把着针线。为将远游的孩子赶制新衣。临行她忙着缝得严严实实，是担心孩子此去难得回归。谁能说像小草的那点孝心，可报答春晖般的慈母恩惠？","number":14,"title_py":"yóu zǐ yín","author_py":"mèng jiāo","dynasty_py":"Táng"},{"title":"回乡偶书","dynasty":"唐","author":"贺知章","text":"<ruby>少<rt>shào</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>回<rt>huí</rt></ruby>，<br><ruby>乡<rt>xiāng</rt></ruby><ruby>音<rt>yīn</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>改<rt>gǎi</rt></ruby><ruby>鬓<rt>bìn</rt></ruby><ruby>毛<rt>máo</rt></ruby><ruby>衰<rt>shuāi</rt></ruby>。<br><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>识<rt>shí</rt></ruby>，<br><ruby>笑<rt>xiào</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"偶书：随意写下来。<br>衰：诗中指鬓毛斑白，疏落。<br>老大：老年。","translation":"少年时离乡，到老了才回家来；口音没改变，双鬓却已经斑白。儿童们看见了，没有认识我的；他们笑问：这客人是从哪里来？","number":15,"title_py":"huí xiāng ǒu shū","author_py":"hè zhī zhāng","dynasty_py":"Táng"},{"title":"敕勒歌","dynasty":"北朝","author":"北朝民歌","text":"<ruby>敕<rt>chì</rt></ruby><ruby>勒<rt>lēi</rt></ruby><ruby>川<rt>chuān</rt></ruby>，<ruby>阴<rt>yīn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>下<rt>xià</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>穹<rt>qióng</rt></ruby><ruby>庐<rt>lú</rt></ruby>，<ruby>笼<rt>lǒng</rt></ruby><ruby>盖<rt>gài</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>野<rt>yě</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>苍<rt>cāng</rt></ruby>，<ruby>野<rt>yě</rt></ruby><ruby>茫<rt>máng</rt></ruby><ruby>茫<rt>máng</rt></ruby>，<ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>低<rt>dī</rt></ruby><ruby>见<rt>xiàn</rt></ruby><ruby>牛<rt>niú</rt></ruby><ruby>羊<rt>yáng</rt></ruby>。","notes":"穹庐：蒙古包。<br>见：通“显”，显露。<br>川：平阔的原野。","translation":"在敕勒平原上，在千里阴山下，天空仿佛圆顶帐篷，广阔无边，笼盖着四野。天空色青青，原野无边际。阵风吹过，牧草低伏，显现出原来隐没于草丛中的众多牛羊。","number":16,"title_py":"chì lēi gē","author_py":"běi cháo mín gē","dynasty_py":"Běi Cháo"},{"title":"新安滩","dynasty":"清","author":"黄景仁","text":"<ruby>一<rt>yì</rt></ruby><ruby>滩<rt>tān</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>滩<rt>tān</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>滩<rt>tān</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>丈<rt>zhàng</rt></ruby>。<br><ruby>三<rt>sān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>滩<rt>tān</rt></ruby>，<br><ruby>新<rt>xīn</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>上<rt>shàng</rt></ruby>。","notes":"滩：河道中水浅流急多沙石的地方。<br>复：又。","translation":"过了一滩又一滩，一滩都有十丈高。过去三百六十滩，天上挂着新安江。","number":17,"title_py":"xīn ān tān","author_py":"huáng jǐng rén","dynasty_py":"Qīng"},{"title":"夜宿山寺","dynasty":"唐","author":"李白","text":"<ruby>危<rt>wēi</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>尺<rt>chǐ</rt></ruby>，<br><ruby>手<rt>shǒu</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>摘<rt>zhāi</rt></ruby><ruby>星<rt>xīng</rt></ruby><ruby>辰<rt>chén</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>语<rt>yǔ</rt></ruby>，<br><ruby>恐<rt>kǒng</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"危楼：高楼。<br>恐：担心。<br>天上人：天上的神仙。","translation":"上寺庙的楼实在高呀，站在上面一伸手，就可以摘下天上的星星。此刻，我真不敢大声说话，担心会惊动天上的人。","number":18,"title_py":"yè sù shān sì","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"悯农","dynasty":"唐","author":"李绅","text":"<ruby>春<rt>chūn</rt></ruby><ruby>种<rt>zhòng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>粒<rt>lì</rt></ruby><ruby>粟<rt>sù</rt></ruby>，<br><ruby>秋<rt>qiū</rt></ruby><ruby>收<rt>shōu</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>颗<rt>kē</rt></ruby><ruby>子<rt>zǐ</rt></ruby>。<br><ruby>四<rt>sì</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>田<rt>tián</rt></ruby>，<br><ruby>农<rt>nóng</rt></ruby><ruby>夫<rt>fū</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>饿<rt>è</rt></ruby><ruby>死<rt>sǐ</rt></ruby>。","notes":"万颗子：这里指很多粮食。<br>犹：还是。","translation":"春天种下一粒种子，到秋天就可以收获很多粮食。天下已经没有一块田不种粮食，可是还是有不少农民被饿死。","number":19,"title_py":"mǐn nóng","author_py":"lǐ shēn","dynasty_py":"Táng"},{"title":"登鹳雀楼","dynasty":"唐","author":"王之涣","text":"<ruby>白<rt>bái</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>黄<rt>huáng</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>欲<rt>yù</rt></ruby><ruby>穷<rt>qióng</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>目<rt>mù</rt></ruby>，<br><ruby>更<rt>gèng</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>层<rt>céng</rt></ruby><ruby>楼<rt>lóu</rt></ruby>。","notes":"依：傍着。<br>尽：下沉。<br>穷：尽。<br>更：再。","translation":"太阳挨着西山慢慢下沉，黄河向着大海波涛滚滚。想看到远处更美的景色，必须继续登楼再上一层。","number":20,"title_py":"dēng guàn què lóu","author_py":"wáng zhī huàn","dynasty_py":"Táng"},{"title":"大风歌","dynasty":"汉","author":"刘邦","text":"<ruby>大<rt>dà</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>扬<rt>yáng</rt></ruby>，<br><ruby>威<rt>wēi</rt></ruby><ruby>加<rt>jiā</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>内<rt>nèi</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby>，<br><ruby>安<rt>ān</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>猛<rt>měng</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>守<rt>shǒu</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>方<rt>fāng</rt></ruby>！","notes":"安得：怎么得到。<br>守四方：守卫边防。","translation":"狂风卷地起啊，满天云飞扬。威风震四海啊，衣锦回故乡。怎能得猛士啊，坚守我边防！","number":21,"title_py":"dà fēng gē","author_py":"liú bāng","dynasty_py":"Hàn"},{"title":"天净沙秋思","dynasty":"元","author":"马致远","text":"<ruby>枯<rt>kū</rt></ruby><ruby>藤<rt>téng</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>昏<rt>hūn</rt></ruby><ruby>鸦<rt>yā</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>家<rt>jiā</rt></ruby>，<br><ruby>古<rt>gǔ</rt></ruby><ruby>道<rt>dào</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>瘦<rt>shòu</rt></ruby><ruby>马<rt>mǎ</rt></ruby>。<br><ruby>夕<rt>xī</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>下<rt>xià</rt></ruby>，<br><ruby>断<rt>duàn</rt></ruby><ruby>肠<rt>cháng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby>。","notes":"作者：马致远，号东篱，少年时追求功名，未能得志。曾参加元贞书会，与李时中、红字李二、花李郎等合写《黄粱梦》杂剧。","translation":"西风萧瑟的深秋季节，地下没有红花，树上不见绿叶，也没有芳草，有的只是干枯的藤，苍老的树，和归巢的晚鸦，以及一曲溪水，溪上有小桥，桥畔有人家。顶着凛冽的西风，一匹瘦马正在荒郊古道上行走。这时，夕阳西下，沦落天涯的这个旅人想到自己漂泊不定的境遇，怎能不愁肠寸断啊！","number":22,"title_py":"tiān jìng shā qiū sī","author_py":"mǎ zhì yuǎn","dynasty_py":"Yuán"},{"title":"渡易水歌","dynasty":"先秦","author":"佚名","text":"<ruby>风<rt>fēng</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>寒<rt>hán</rt></ruby>，<br><ruby>壮<rt>zhuàng</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>还<rt>huán</rt></ruby>。<br><ruby>探<rt>tàn</rt></ruby><ruby>虎<rt>hǔ</rt></ruby><ruby>穴<rt>xué</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>蛟<rt>jiāo</rt></ruby><ruby>宫<rt>gōng</rt></ruby>，<br><ruby>仰<rt>yǎng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>呼<rt>hū</rt></ruby><ruby>气<rt>qì</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>虹<rt>hóng</rt></ruby>。","notes":"萧萧：风声。<br>易水：<br>水名寒：冷。<br>不复还：不再回来。","translation":"西风萧瑟啊，这易水真寒冷，我离开您啊不成功便成仁。","number":23,"title_py":"dù yì shuǐ gē","author_py":"yì míng","dynasty_py":"Xiān Qín"},{"title":"童谣","dynasty":"汉","author":"汉乐府","text":"<ruby>举<rt>jǔ</rt></ruby><ruby>秀<rt>xiù</rt></ruby><ruby>才<rt>cái</rt></ruby>，<ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>书<rt>shū</rt></ruby>。<br><ruby>举<rt>jǔ</rt></ruby><ruby>孝<rt>xiào</rt></ruby><ruby>廉<rt>lián</rt></ruby>，<ruby>父<rt>fù</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>居<rt>jū</rt></ruby>。<br><ruby>寒<rt>hán</rt></ruby><ruby>素<rt>sù</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>浊<rt>zhuó</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>泥<rt>ní</rt></ruby>，<br><ruby>高<rt>gāo</rt></ruby><ruby>第<rt>dì</rt></ruby><ruby>良<rt>liáng</rt></ruby><ruby>将<rt>jiàng</rt></ruby><ruby>怯<rt>qiè</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>鸡<rt>jī</rt></ruby>。","notes":"不知书：指没有学问。<br>父别居：父亲和自己不住在一起。","translation":"被选举的“秀才”却没有学问，被选举的“孝廉”却将老父赶出去住。号称出身贫寒清白的人却像泥一样的污浊，出身于豪门大族的“良将”却怯懦的像只鸡。","number":24,"title_py":"tóng yáo","author_py":"hàn yuè fǔ","dynasty_py":"Hàn"},{"title":"伤田家","dynasty":"唐","author":"聂夷中","text":"<ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>卖<rt>mài</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>丝<rt>sī</rt></ruby>，<br><ruby>五<rt>wǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>粜<rt>tiào</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>谷<rt>gǔ</rt></ruby> by><ruby>田<rt>tián</rt></ruby>。","notes":"畲：一种耕种的方法。<br>偏：不公正，偏私，偏心。<br>岂：哪里。","translation":"我们在北山种了庄稼，又到了南山种，大家互相帮助，努力耕种，哪有什么偏心呢？愿所有的人都能像我们一样，那么四海之内就很少有荒芜的土地了。","number":27,"title_py":"shē tián diào","author_py":"wáng yǔ chēng","dynasty_py":"Sòng"},{"title":"明日歌","dynasty":"明","author":"钱福","text":"<ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>多<rt>duō</rt></ruby>？<br><ruby>我<rt>wǒ</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>蹉<rt>cuō</rt></ruby><ruby>跎<rt>tuó</rt></ruby>。<br><ruby>世<rt>shì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>被<rt>bèi</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>累<rt>lèi</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>至<rt>zhì</rt></ruby>。<br><ruby>朝<rt>zhāo</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>流<rt>liú</rt></ruby>，<br><ruby>暮<rt>mù</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>坠<rt>zhuì</rt></ruby>。<br><ruby>百<rt>bǎi</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>何<rt>hé</rt></ruby>？<br><ruby>请<rt>qǐng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>歌<rt>gē</rt></ruby>。","notes":"","translation":"的后面还是明日，明天的日子可真不少，我一生都在等待明天，结果很多事情给耽误了，世人若是被“明日”牵着走，老大徒伤悲的日子就不远了，早看东流水，晚看日西沉，人生一世“明日”又能有多少？请你将我这首《明日歌》记牢。","number":28,"title_py":"míng rì gē","author_py":"qián fú","dynasty_py":"Míng"},{"title":"乐游原","dynasty":"唐","author":"李商隐","text":"<ruby>向<rt>xiàng</rt></ruby><ruby>晚<rt>wǎn</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>适<rt>shì</rt></ruby>，<br><ruby>驱<rt>qū</rt></ruby><ruby>车<rt>chē</rt></ruby><ruby>登<rt>dēng</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>原<rt>yuán</rt></ruby>。<br><ruby>夕<rt>xī</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>限<rt>xiàn</rt></ruby><ruby>好<rt>hǎo</rt></ruby>，<br><ruby>只<rt>zhǐ</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>近<rt>jìn</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>昏<rt>hūn</rt></ruby>。","notes":"乐游原：在长安城南。登上它可望长安城。<br>不适：不悦，不快。<br>只是：就是，正是。","translation":"傍晚时分我心情悒郁，驾着车登上古老的郊原。夕阳下的景色无限美好，就是已接近了黄昏。","number":29,"title_py":"lè yóu yuán","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"答人","dynasty":"唐","author":"太上隐者","text":"<ruby>偶<rt>ǒu</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>松<rt>sōng</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>下<rt>xià</rt></ruby>，<br><ruby>高<rt>gāo</rt></ruby><ruby>枕<rt>zhěn</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>眠<rt>mián</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>历<rt>lì</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>寒<rt>hán</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>年<rt>nián</rt></ruby>。","notes":"历日：节令年历，日历。","translation":"别问我姓什名谁，我有时会来到如荫的松树下，头枕石头休息睡觉，不用去过问时间的早晚和节令年历，一年周复一年，无拘无束。","number":30,"title_py":"dá rén","author_py":"tài shàng yǐn zhě","dynasty_py":"Táng"},{"title":"棉花","dynasty":"清","author":"马苏臣","text":"<ruby>五<rt>wǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>棉<rt>mián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>秀<rt>xiù</rt></ruby>，<br><ruby>八<rt>bā</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>棉<rt>mián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>干<rt>gān</rt></ruby>。<br><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby>，<br><ruby>花<rt>huā</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>寒<rt>hán</rt></ruby>。","notes":"选自《偶景斋诗钞》。32秀：草木开花。","translation":"五月棉花开，八月棉花已结实。花开天下暖和，花落天下冷起来。","number":31,"title_py":"mián huā","author_py":"mǎ sū chén","dynasty_py":"Qīng"},{"title":"春水","dynasty":"","author":"无名氏","text":"<ruby>春<rt>chūn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>满<rt>mǎn</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>生<rt>shēng</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>弄<rt>nòng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>声<rt>shēng</rt></ruby>。","notes":"弄：作，发出。","translation":"这是一首无名氏所作的《咏春》复字诗：“春水春池满，时春草生。春人饮春酒，春鸟弄春色。”该诗前两句在第一个字和第三个字的位置，后两句在第一个字和第四个字的位置重复嵌用“春”字，重复中亦有变通，晓畅中不乏意境，有动有静，有人有景，可谓咏春复字诗中的佳作。水古人用如此简短的四句话，就在我们眼前呈现了一派生机盎然的春的景象。","number":32,"title_py":"chūn shuǐ","author_py":"wú míng shì","dynasty_py":""},{"title":"锄禾","dynasty":"唐","author":"李绅","text":"<ruby>锄<rt>chú</rt></ruby><ruby>禾<rt>hé</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>午<rt>wǔ</rt></ruby>，<br><ruby>汗<rt>hàn</rt></ruby><ruby>滴<rt>dī</rt></ruby><ruby>禾<rt>hé</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>土<rt>tǔ</rt></ruby>。<br><ruby>谁<rt>shuí</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>盘<rt>pán</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>餐<rt>cān</rt></ruby>，<br><ruby>粒<rt>lì</rt></ruby><ruby>粒<rt>lì</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>辛<rt>xīn</rt></ruby><ruby>苦<rt>kǔ</rt></ruby>。","notes":"锄禾，给禾苗松土锄草，助苗生长。当午：正当中午。<br>皆：都，都是。","translation":"正午时分，头顶着炎炎烈日的农民正在为禾苗除草, 颗颗汗珠洒落入禾苗下种的泥土。又有谁知道那盘中美味的米饭，每一粒都包含着农民们的辛苦。","number":33,"title_py":"chú hé","author_py":"lǐ shēn","dynasty_py":"Táng"},{"title":"古朗月行","dynasty":"唐","author":"李白","text":"<ruby>小<rt>xiǎo</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>呼<rt>hū</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>盘<rt>pán</rt></ruby>。<br><ruby>又<rt>yòu</rt></ruby><ruby>疑<rt>yí</rt></ruby><ruby>瑶<rt>yáo</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>镜<rt>jìng</rt></ruby>，<br><ruby>飞<rt>fēi</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>端<rt>duān</rt></ruby>。","notes":"疑：怀疑、疑心。<br>瑶台：神话中神仙居住的地方。","translation":"小时候不知道是月亮高挂在天边，只是把它当作一只白玉做成的盘子，有时又疑心，是不是瑶台上神仙们的梳妆圆镜，飞上了蓝天，悬挂在蓝天云端。","number":34,"title_py":"gǔ lǎng yuè xíng","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"长歌行","dynasty":"汉","author":"汉乐府","text":"<ruby>青<rt>qīng</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>园<rt>yuán</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>葵<rt>kuí</rt></ruby>，<br><ruby>朝<rt>zhāo</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>晞<rt>xī</rt></ruby>。<br><ruby>阳<rt>yáng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>布<rt>bù</rt></ruby><ruby>德<rt>dé</rt></ruby><ruby>泽<rt>zé</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>物<rt>wù</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>辉<rt>huī</rt></ruby>。<br><ruby>常<rt>cháng</rt></ruby><ruby>恐<rt>kǒng</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>至<rt>zhì</rt></ruby>，<br><ruby>焜<rt>kūn</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>华<rt>huā</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>衰<rt>shuāi</rt></ruby>。<br><ruby>百<rt>bǎi</rt></ruby><ruby>川<rt>chuān</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>海<rt>hǎi</rt></ruby>，<br><ruby>何<rt>hé</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>归<rt>guī</rt></ruby>？<br><ruby>少<rt>shào</rt></ruby><ruby>壮<rt>zhuàng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>努<rt>nǔ</rt></ruby><ruby>力<rt>lì</rt></ruby>，<br><ruby>老<rt>lǎo</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>徒<rt>tú</rt></ruby><ruby>伤<rt>shāng</rt></ruby><ruby>悲<rt>bēi</rt></ruby>！","notes":"待：等待。<br>晞：晒干，晒。<br>阳春：温暖的春天。<br>布：施。<br>德泽：恩惠。<br>恐：担心，忧虑。<br>昆黄：枯黄，干枯了。<br>徒：白白的，徒然的。","translation":"园子里绿绿的蒲葵树，早晨沾上了露水，等到太阳出来时就晒干了。温暖的阳光为大地送来恩泽，花草树木全都打起了精神。就怕秋天快要到来，密密的树叶会变得枯黄，花儿会凋谢。众多河流向东流入大海，它们什么时候才能回到西边去呢？年轻时不抓紧时间努力学习，等到老了只能白白地伤心后悔。","number":35,"title_py":"cháng gē xíng","author_py":"hàn yuè fǔ","dynasty_py":"Hàn"},{"title":"梅花","dynasty":"宋","author":"王安石","text":"<ruby>墙<rt>qiáng</rt></ruby><ruby>角<rt>jiǎo</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>梅<rt>méi</rt></ruby>，<br><ruby>凌<rt>líng</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>开<rt>kāi</rt></ruby>。<br><ruby>遥<rt>yáo</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>雪<rt>xuě</rt></ruby>，<br><ruby>为<rt>wèi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"凌寒：冒着严寒。<br>遥：远远的。<br>为：因为。","translation":"颇有寒意的早春时节，万物皆未萌芽，唯独墙角数枝，梅迎寒绽开。因为有梅花的香气从远处袭来，似雪般纯净洁白的梅花并不是雪。","number":36,"title_py":"méi huā","author_py":"wáng ān shí","dynasty_py":"Sòng"},{"title":"七步诗","dynasty":"魏","author":"曹植","text":"<ruby>煮<rt>zhǔ</rt></ruby><ruby>豆<rt>dòu</rt></ruby><ruby>燃<rt>rán</rt></ruby><ruby>豆<rt>dòu</rt></ruby><ruby>萁<rt>qí</rt></ruby>，<br><ruby>豆<rt>dòu</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>釜<rt>fǔ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>泣<rt>qì</rt></ruby>。<br><ruby>本<rt>běn</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>根<rt>gēn</rt></ruby><ruby>生<rt>shēng</rt></ruby>，<br><ruby>相<rt>xiāng</rt></ruby><ruby>煎<rt>jiān</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>太<rt>tài</rt></ruby><ruby>急<rt>jí</rt></ruby>？","notes":"豆萁：豆秸。<br>釜：锅。","translation":"煮豆子用来作羹，而豆秸却在锅底下燃烧。豆子在锅中哭泣：“豆子和豆秸本来生在同一条根上。你为什么烧起猛火来煎熬我？这么急迫地残害我是为什么呀？”","number":37,"title_py":"qī bù shī","author_py":"cáo zhí","dynasty_py":"wèi"},{"title":"园果","dynasty":"唐","author":"王建","text":"<ruby>雨<rt>yǔ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>梨<rt>lí</rt></ruby><ruby>果<rt>guǒ</rt></ruby><ruby>病<rt>bìng</rt></ruby>，<br><ruby>每<rt>měi</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>个<rt>gè</rt></ruby>。<br><ruby>小<rt>xiǎo</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>看<rt>kàn</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>啄<rt>zhuó</rt></ruby><ruby>破<rt>pò</rt></ruby>。","notes":"选自《王司马集》，这首诗一写雨中烂梨，一写小儿馋梨，很有情趣。无数个：没几个。","translation":"园子里的梨果生病了，每棵树上都有很多个烂的梨，小儿进园子里去看了，原来有一半是被鸟啄烂的。","number":38,"title_py":"yuán guǒ","author_py":"wáng jiàn","dynasty_py":"Táng"},{"title":"草","number":39,"dynasty":"唐","author":"白居易","text":"<ruby>离<rt>lí</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>原<rt>yuán</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>草<rt>cǎo</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>枯<rt>kū</rt></ruby><ruby>荣<rt>róng</rt></ruby>。<br><ruby>野<rt>yě</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>烧<rt>shāo</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>远<rt>yuǎn</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>侵<rt>qīn</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>晴<rt>qíng</rt></ruby><ruby>翠<rt>cuì</rt></ruby><ruby>接<rt>jiē</rt></ruby><ruby>荒<rt>huāng</rt></ruby><ruby>城<rt>chéng</rt></ruby>。<br><ruby>又<rt>yòu</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>孙<rt>sūn</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>萋<rt>qī</rt></ruby><ruby>萋<rt>qī</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>情<rt>qíng</rt></ruby>。","notes":"离离：茂盛，繁盛纷杂的样子。<br>原：宽广的野地。<br>岁：年。<br>枯荣：指草的枯荣和茂盛。","translation":"古原上的野草充满生机，每年一次枯荣一次茂盛，野火烧都烧不光它，春风一吹它又长得遍地。","title_py":"cǎo","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"万田道中","dynasty":"宋","author":"刘安上","text":"<ruby>水<rt>shuǐ</rt></ruby><ruby>阔<rt>kuò</rt></ruby><ruby>疑<rt>yí</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>云<rt>yún</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>仅<rt>jǐn</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>山<rt>shān</rt></ruby>。<br><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>划<rt>huá</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>艇<rt>tǐng</rt></ruby>，<br><ruby>出<rt>chū</rt></ruby><ruby>没<rt>mò</rt></ruby><ruby>稻<rt>dào</rt></ruby><ruby>塍<rt>chéng</rt></ruby><ruby>间<rt>jiān</rt></ruby>。","notes":"本诗选自《宋人绝句选》，描写了江南水乡景色。稻塍：稻田里的畦埂。","translation":"水面宽阔的好像无路可走，白云深处只见远远的青山，村里的孩子正轻快的划着小船，时隐时现在稻浪翻滚的田间。","number":40,"title_py":"wàn tián dào zhōng","author_py":"liú ān shàng","dynasty_py":"Sòng"},{"title":"秋歌","dynasty":"南朝","author":"南朝民歌","text":"<ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>罗<rt>luó</rt></ruby><ruby>帐<rt>zhàng</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>飘<rt>piāo</rt></ruby><ruby>扬<rt>yáng</rt></ruby>。<br><ruby>仰<rt>yǎng</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>寄<rt>jì</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>光<rt>guāng</rt></ruby>。","notes":"选自《子夜四时歌》。寄：寄寓，托付。<br>千里光：月光。","translation":"秋风吹进窗里，轻轻的蚊帐飘飘荡荡，抬头看天上的明月，托月光把我的情意带给对方。","number":41,"title_py":"qiū gē","author_py":"nán cháo mín gē","dynasty_py":"Nán Cháo"},{"title":"山行","dynasty":"宋","author":"叶茵","text":"<ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>姓<rt>xìng</rt></ruby><ruby>字<rt>zì</rt></ruby>，<br><ruby>我<rt>wǒ</rt></ruby><ruby>亦<rt>yì</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>名<rt>míng</rt></ruby>。<br><ruby>飞<rt>fēi</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>识<rt>shí</rt></ruby>，<br><ruby>对<rt>duì</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>两<rt>liǎng</rt></ruby><ruby>声<rt>shēng</rt></ruby>。","notes":"选自《中国古代山水诗鉴赏词典》，叶茵，字景文。这首诗抒发作者登山时的独特感受。识：知道。","translation":"青山不知我的姓和字，我也不知道它叫啥名。白鸟飞来倒像老相识，对我对山都叫了几声。","number":42,"title_py":"shān xíng","author_py":"yè yīn","dynasty_py":"Sòng"},{"title":"桑茶坑道中","dynasty":"宋","author":"杨万里","text":"<ruby>晴<rt>qíng</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>干<rt>gān</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>草<rt>cǎo</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>堤<rt>dī</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>溪<rt>xī</rt></ruby>。<br><ruby>童<rt>tóng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>眠<rt>mián</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>着<rt>zhe</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>牛<rt>niú</rt></ruby><ruby>吃<rt>chī</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>西<rt>xī</rt></ruby>。","notes":"雨干时：雨后地皮露干。<br>眠正着：熟睡。<br>童子：<br>指牧牛的少年吃过：吃到。<br>柳阴西：已经移动到柳阴的西边去了。","translation":"雨后初晴，风和日丽,地皮已经微干，长满花草的堤岸，溪水高涨，牧牛的少年在柳阴下睡的正熟，早有一牛儿移到柳阴的西边去吃了.","number":43,"title_py":"sāng chá kēng dào zhōng","author_py":"yáng wàn lǐ","dynasty_py":"Sòng"},{"title":"书斋漫兴","dynasty":"唐","author":"翁承赞","text":"<ruby>官<rt>guān</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>归< r_py":"yán zhēn qīng","dynasty_py":"Táng"},{"title":"三峡谣","dynasty":"晋","author":"佚名","text":"<ruby>朝<rt>zhāo</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>牛<rt>niú</rt></ruby>，<br><ruby>暮<rt>mù</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>牛<rt>niú</rt></ruby>。<br><ruby>三<rt>sān</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>暮<rt>mù</rt></ruby>，<br><ruby>黄<rt>huáng</rt></ruby><ruby>牛<rt>niú</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>故<rt>gù</rt></ruby>。","notes":"选自《水经注•江水》。这是一首魏晋时代的歌谣。反映了古代三峡行船的艰难、缓慢。黄牛：指黄牛峡。<br>故：原样。","translation":"迎朝阳呦看见黄牛峡，送落日呦还见黄牛峡。日出日落走了整三天，抬头一望依然还是它！","number":53,"title_py":"sān xiá yáo","author_py":"yì míng","dynasty_py":"jìn"},{"title":"惜时","dynasty":"唐","author":"佚名","text":"<ruby>三<rt>sān</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>好<rt>hǎo</rt></ruby>，<br><ruby>为<rt>wéi</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>及<rt>jí</rt></ruby><ruby>早<rt>zǎo</rt></ruby>。<br><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>人<rt>rén</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>容<rt>róng</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>老<rt>lǎo</rt></ruby>。","notes":"三春：古时阴历正月为孟春，二月为仲春，三月为季春，合称为三春。<br>为学：学习，求学。","translation":"三春的花开的最好，求学必须趁着年轻的好时光。要知道，人的青春时期也是很容易过去的转眼就进入了老年。","number":54,"title_py":"xī shí","author_py":"yì míng","dynasty_py":"Táng"},{"title":"弹歌","dynasty":"先秦","author":"先秦民歌","text":"<ruby>断<rt>duàn</rt></ruby><ruby>竹<rt>zhú</rt></ruby>，<ruby>续<rt>xù</rt></ruby><ruby>竹<rt>zhú</rt></ruby>。<br><ruby>飞<rt>fēi</rt></ruby><ruby>土<rt>tǔ</rt></ruby>，<ruby>逐<rt>zhú</rt></ruby><ruby>宍<rt>ròu</rt></ruby>。","notes":"断竹：砍伐竹子。<br>续竹：制作弹弓。<br>飞土：把泥土块弹出去。<br>逐宍：追赶鸟兽。<br>宍：肉的古字。","translation":"砍下竹子做弓背，系紧两端作弓弦，用力射出弹丸，猎取野兽做美餐。","number":55,"title_py":"dàn gē","author_py":"xiān qín mín gē","dynasty_py":"Xiān Qín"},{"title":"蛩","number":56,"dynasty":"宋","author":"朱继芳","text":"<ruby>一<rt>yì</rt></ruby><ruby>蛩<rt>qióng</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>唧<rt>jī</rt></ruby><ruby>唧<rt>jī</rt></ruby>，<br><ruby>吟<rt>yín</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>心<rt>xīn</rt></ruby>。<br><ruby>只<rt>zhǐ</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>外<rt>wài</rt></ruby>，<br><ruby>篝<rt>gōu</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>寻<rt>xún</rt></ruby>。","notes":"选自《静佳龙寻稿》。这首诗描写儿童捕捉蟋蟀的心理和举动。蛩：蟋蟀。<br>何：多么。<br>唧唧：蟋蟀的鸣叫声。","translation":"一只蟋蟀叫得多么好听，一声声唱进了儿童的心。听去明明就在竹篱外面，提着灯笼也找不见踪影。","title_py":"qióng","author_py":"zhū jì fāng","dynasty_py":"Sòng"},{"title":"咏白鹭","dynasty":"宋","author":"陈普","text":"<ruby>我<rt>wǒ</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>这<rt>zhè</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>坐<rt>zuò</rt></ruby>，<br><ruby>你<rt>nǐ</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>那<rt>nà</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>歇<rt>xiē</rt></ruby>。<br><ruby>青<rt>qīng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>云<rt>yún</rt></ruby>，<br><ruby>飞<rt>fēi</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>雪<rt>xuě</rt></ruby>。","notes":"白鹭：又称\"鹭鸶\"。<br>尔：你。<br>飞下数点雪：形容几只白鹭飞下，好象几点雪花飘下来一样。","translation":"我在这边坐着，你在那边歇脚。蓝蓝的天空没有一片云彩。几只白鹭从天空飞下，好象几点雪花悠悠飘落。","number":57,"title_py":"yǒng bái lù","author_py":"chén pǔ","dynasty_py":"Sòng"},{"title":"江上渔者","dynasty":"宋","author":"范仲淹","text":"<ruby>江<rt>jiāng</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>往<rt>wǎng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>但<rt>dàn</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>鲈<rt>lú</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>美<rt>měi</rt></ruby>。<br><ruby>君<rt>jūn</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>，<br><ruby>出<rt>chū</rt></ruby><ruby>没<rt>mò</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>波<rt>bō</rt></ruby><ruby>里<rt>lǐ</rt></ruby>。","notes":"本诗选自《范文正公集》，这首诗描写了渔民生活的艰苦。渔者：打鱼人。<br>但：只。","translation":"大江上来来往往的公子王孙，只知道喜爱这鲈鱼肥美细嫩。你看那像树叶儿一样的小船，在风浪里出没，历尽了艰辛。","number":58,"title_py":"jiāng shàng yú zhě","author_py":"fàn zhòng yān","dynasty_py":"Sòng"},{"title":"春雨","dynasty":"宋","author":"陆游","text":"<ruby>片<rt>piàn</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>落<rt>luò</rt></ruby>，<br><ruby>纤<rt>xiān</rt></ruby><ruby>纤<rt>xiān</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>无<rt>wú</rt></ruby><ruby>端<rt>duān</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>，<br><ruby>又<rt>yòu</rt></ruby><ruby>碍<rt>ài</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>行<rt>xíng</rt></ruby>。","notes":"纤纤：柔弱、纤细。<br>无端：无缘无故。<br>又碍：又要妨碍。","translation":"红梅凋谢，纤细的青草生长出来，夜里无缘无故地下起了雨来，恐怕要妨碍明日的行程了。","number":59,"title_py":"chūn yǔ","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"采莲童曲","dynasty":"南朝","author":"萧纲","text":"<ruby>泛<rt>fàn</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>菱<rt>líng</rt></ruby><ruby>叶<rt>yè</rt></ruby>，<br><ruby>过<rt>guò</rt></ruby><ruby>摘<rt>zhāi</rt></ruby><ruby>芙<rt>fú</rt></ruby><ruby>蓉<rt>róng</rt></ruby><ruby>花<rt>huā</rt></ruby>。<br><ruby>扣<rt>kòu</rt></ruby><ruby>楫<rt>jí</rt></ruby><ruby>命<rt>mìng</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>侣<rt>lǚ</rt></ruby>，<br><ruby>齐<rt>qí</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>莲<rt>lián</rt></ruby><ruby>歌<rt>gē</rt></ruby>。","notes":"泛舟：摇着小船。<br>芙蓉花：荷花。<br>扣：敲。<br>楫：船桨。<br>童侣：小伙伴。<br>声：唱。","translation":"摇着小船去把菱叶采，采过菱叶又把荷花摘，敲响船桨呼唤小伙伴，同把采莲歌儿唱起来了。","number":60,"title_py":"cǎi lián tóng qū","author_py":"xiāo gāng","dynasty_py":"Nán Cháo"},{"title":"咏柳","dynasty":"唐","author":"贺知章","text":"<ruby>碧<rt>bì</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>妆<rt>zhuāng</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>高<rt>gāo</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>条<rt>tiáo</rt></ruby><ruby>垂<rt>chuí</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>丝<rt>sī</rt></ruby><ruby>绦<rt>tāo</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>裁<rt>cái</rt></ruby><ruby>出<rt>chū</rt></ruby>，<br><ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>剪<rt>jiǎn</rt></ruby><ruby>刀<rt>dāo</rt></ruby>。","notes":"碧玉：碧绿色的玉。<br>妆：装饰，打扮。","translation":"高高的柳树，长满了翠绿的新叶子，看上去好像用碧玉装饰成的一样，从树上垂下无数好像绿色丝带一样的柳条来。这细细的嫩叶是谁的巧手剪裁出来的？原来是“二月春风”这把“剪刀”剪出来的啊！","number":61,"title_py":"yǒng liǔ","author_py":"hè zhī zhāng","dynasty_py":"Táng"},{"title":"如梦令","dynasty":"宋","author":"李清照","text":"<ruby>常<rt>cháng</rt></ruby><ruby>记<rt>jì</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>亭<rt>tíng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>暮<rt>mù</rt></ruby>，<ruby>沉<rt>chén</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>路<rt>lù</rt></ruby>。<br><ruby>兴<rt>xìng</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>晚<rt>wǎn</rt></ruby><ruby>回<rt>huí</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>，<ruby>误<rt>wù</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>藕<rt>ǒu</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>处<rt>chù</rt></ruby>。<br><ruby>争<rt>zhēng</rt></ruby><ruby>渡<rt>dù</rt></ruby>，<ruby>争<rt>zhēng</rt></ruby><ruby>渡<rt>dù</rt></ruby>，<ruby>惊<rt>jīng</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>滩<rt>tān</rt></ruby><ruby>鸥<rt>ōu</rt></ruby><ruby>鹭<rt>lù</rt></ruby>。","notes":"","translation":"曾记得一次溪亭饮酒到日暮，喝得大醉回家找不着了道路。兴尽之后很晚才往回划船，却不小心进入了荷花深处。怎么渡，怎么渡？（最终）惊起水边满
