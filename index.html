</rt></ruby><ruby>踪<rt>zōng</rt></ruby><ruby>灭<rt>miè</rt></ruby>。<br><ruby>孤<rt>gū</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>蓑<rt>suō</rt></ruby><ruby>笠<rt>lì</rt></ruby><ruby>翁<rt>wēng</rt></ruby>，<br><ruby>独<rt>dú</rt></ruby><ruby>钓<rt>diào</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>雪<rt>xuě</rt></ruby>。","notes":"雪绝：绝灭，消失。<br>径：小路。<br>踪：指脚印。","translation":"千山寂静鸟儿都飞走不见了，万条小路上已经人迹杳渺。小船上渔翁穿戴蓑衣斗笠，独自一人冒寒在江上垂钓。","number":2,"title_py":"jiāng xuě","author_py":"liǔ zōng yuán","dynasty_py":"Táng"},{"title":"秋浦歌","dynasty":"唐","author":"李白","text":"<ruby>白<rt>bái</rt></ruby><ruby>发<rt>fà</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>丈<rt>zhàng</rt></ruby>，<br><ruby>缘<rt>yuán</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>个<rt>gè</rt></ruby><ruby>长<rt>cháng</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>镜<rt>jìng</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>霜<rt>shuāng</rt></ruby>。","notes":"秋浦：在今安徽贵池西南，那里有秋浦河。<br>缘：因为。<br>歌个：这样的意思。","translation":"白头发已经长到了三千丈长，因为忧愁才有这样长。不3知镜子中的我啊，从哪里来的满头秋霜。","number":3,"title_py":"qiū pǔ gē","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"鸟鸣涧","dynasty":"唐","author":"王维","text":"<ruby>人<rt>rén</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>桂<rt>guì</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>落<rt>luò</rt></ruby>，<br><ruby>夜<rt>yè</rt></ruby><ruby>静<rt>jìng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>空<rt>kōng</rt></ruby>。<br><ruby>月<rt>yuè</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby>，<br><ruby>时<rt>shí</rt></ruby><ruby>鸣<rt>míng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>涧<rt>jiàn</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。","notes":"涧涧：两山之间的溪流。<br>人闲：人迹稀少。<br>桂花：这里是指三、四月开黄花的春桂。","translation":"在这个寂无人声的地方，芬芳的桂花轻轻飘落在静静的传响。夜晚，使这春天的山林更加空寂。月亮升起，惊动了正在树丛栖息的山鸟，它们清脆的叫声在空旷的山涧中。","number":4,"title_py":"niǎo míng jiàn","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"杂诗","dynasty":"唐","author":"王维","text":"<ruby>君<rt>jūn</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>来<rt>lái</rt></ruby>，<br><ruby>应<rt>yīng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>事<rt>shì</rt></ruby>。<br><ruby>来<rt>lái</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>绮<rt>qǐ</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>前<rt>qián</rt></ruby>，<br><ruby>寒<rt>hán</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>著<rt>zhù</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>未<rt>wèi</rt></ruby>？","notes":"来日：指动身前来的那天。绮（qǐ）<br>窗：雕饰精美的窗子。著（zhuó）<br>花：开花。“著” 同“着”。","translation":"你从故乡来，应该知道故乡发生的事。告诉我吧，你来5的那一天，我家窗前的寒梅开花了吗？","number":5,"title_py":"zá shī","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"逢雪宿芙蓉山主人","dynasty":"唐","author":"刘长卿","text":"<ruby>日<rt>rì</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>远<rt>yuǎn</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>屋<rt>wū</rt></ruby><ruby>贫<rt>pín</rt></ruby>。<br><ruby>柴<rt>chái</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>犬<rt>quǎn</rt></ruby><ruby>吠<rt>fèi</rt></ruby>，<br><ruby>风<rt>fēng</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"芙蓉山：地名。<br>芙苍山：青山。<br>蓉白屋：贫家的住所。<br>犬吠：狗叫。","translation":"日薄西山，苍山隐隐，半山腰上闪出茅草的房屋，一片萧疏凄凉的景色。天色漆黑，风雪交加，犬吠声打破了山村的寂静，诗人被主人迎入柴门。","number":6,"title_py":"féng xuě sù fú róng shān zhǔ rén","author_py":"liú zhǎng qīng","dynasty_py":"Táng"},{"title":"渡汉江","dynasty":"唐","author":"宋之问","text":"<ruby>岭<rt>lǐng</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>音<rt>yīn</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>断<rt>duàn</rt></ruby>，<br><ruby>经<rt>jīng</rt></ruby><ruby>冬<rt>dōng</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>历<rt>lì</rt></ruby><ruby>春<rt>chūn</rt></ruby>。<br><ruby>近<rt>jìn</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>怯<rt>qiè</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"汉江：即汉水。五岭以南的地区，即今广东、广西一带。<br>怯：胆怯不安。","translation":"诗人被贬到偏远的岭南，长久没有家人的音讯，现在总7算有机会回故乡了。过了汉水，离家越来越近，诗人的心情反而越来越复杂：这么久没有家人的音信了，害怕有什么不好的消息，反而不敢向从故乡来的人打听。渡","number":7,"title_py":"dù hàn jiāng","author_py":"sòng zhī wèn","dynasty_py":"Táng"},{"title":"塞下曲","dynasty":"唐","author":"卢纶","text":"<ruby>林<rt>lín</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>将<rt>jiāng</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>引<rt>yǐn</rt></ruby><ruby>弓<rt>gōng</rt></ruby>。<br><ruby>平<rt>píng</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>羽<rt>yǔ</rt></ruby>，<br><ruby>没<rt>mò</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>棱<rt>léng</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。","notes":"卢纶：著名的边塞诗人。<br>曲平明：天明亮的时候。<br>石棱：石头的边角。","translation":"夜晚，将军忽然听到昏暗的树林里有风吹草动，急忙拉弓射箭。天亮的时候去寻找箭时，发现箭已射进石棱里了。","number":8,"title_py":"sài xià qū","author_py":"lú lún","dynasty_py":"Táng"},{"title":"忆梅","dynasty":"唐","author":"李商隐","text":"<ruby>定<rt>dìng</rt></ruby><ruby>定<rt>dìng</rt></ruby><ruby>住<rt>zhù</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby>，<br><ruby>依<rt>yī</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>物<rt>wù</rt></ruby><ruby>华<rt>huá</rt></ruby>。<br><ruby>寒<rt>hán</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>最<rt>zuì</rt></ruby><ruby>堪<rt>kān</rt></ruby><ruby>恨<rt>hèn</rt></ruby>，<br><ruby>长<rt>cháng</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"定定：死死的、牢牢的。<br>物华：眼前美好的春天景物","translation":"永远的钉在异乡的土地上，眼前美好的春天景物令人无9限依恋。梅花先春天而开放，到百花盛开时，却早花凋香尽，最让人怨恨。","number":9,"title_py":"yì méi","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"关山月","dynasty":"唐","author":"李白","text":"<ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>山<rt>shān</rt></ruby>，<br><ruby>苍<rt>cāng</rt></ruby><ruby>茫<rt>máng</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>间<rt>jiān</rt></ruby>。<br><ruby>长<rt>cháng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>吹<rt>chuī</rt></ruby><ruby>度<rt>dù</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>关<rt>guān</rt></ruby>。","notes":"关山月：乐府旧题。<br>度：过。","translation":"守卫大西北边疆的士兵，回首东望，看到明月从天上背后升起，穿行在苍茫似海的云气中。士兵们在月光下思念家乡，只觉得长风猎猎，好像是掠过万里国土，刮过玉门关来的。","number":10,"title_py":"guān shān yuè","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"劳劳亭","dynasty":"唐","author":"李白","text":"<ruby>天<rt>tiān</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>伤<rt>shāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>劳<rt>láo</rt></ruby><ruby>劳<rt>láo</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>亭<rt>tíng</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>苦<rt>kǔ</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>遣<rt>qiǎn</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>条<rt>tiáo</rt></ruby><ruby>青<rt>qīng</rt></ruby>。","notes":"不遣：不让。亭","translation":"天下伤心处是劳劳亭，这是离别之地。春风故意不吹到柳条，不让它发青，是因为深知离别之苦，不忍看到人间折柳送别的场面。","number":11,"title_py":"láo láo tíng","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"红白莲","dynasty":"宋","author":"杨万里","text":"<ruby>红<rt>hóng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>莲<rt>lián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>塘<rt>táng</rt></ruby>，<br><ruby>两<rt>liǎng</rt></ruby><ruby>般<rt>bān</rt></ruby><ruby>颜<rt>yán</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>船<rt>chuán</rt></ruby><ruby>香<rt>xiāng</rt></ruby>。<br><ruby>恰<rt>qià</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>汉<rt>hàn</rt></ruby><ruby>殿<rt>diàn</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>女<rt>nǚ</rt></ruby>，<br><ruby>半<rt>bàn</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>浓<rt>nóng</rt></ruby><ruby>妆<rt>zhuāng</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>淡<rt>dàn</rt></ruby><ruby>妆<rt>zhuāng</rt></ruby>。","notes":"","translation":"红色和白色的莲花开满了池塘，两种颜色散发着一种清香。好像汉朝宫殿上的三千女子，一半是浓妆一半是艳丽的妆容。","number":12,"title_py":"hóng bái lián","author_py":"yáng wàn lǐ","dynasty_py":"Sòng"},{"title":"增广贤文","dynasty":"明","author":"佚名","text":"<ruby>一<rt>yì</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>计<rt>jì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>春<rt>chūn</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>计<rt>jì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>寅<rt>yín</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>计<rt>jì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>和<rt>hé</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>计<rt>jì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>勤<rt>qín</rt></ruby>。","notes":"","translation":"一年最好的时光在春天，一天最好的时光在早晨；一家最好的东西是和睦，保护身体最好的办法在于勤劳。","number":13,"title_py":"zēng guǎng xián wén","author_py":"yì míng","dynasty_py":"Míng"},{"title":"增广贤文","dynasty":"明","author":"佚名","text":"<ruby>知<rt>zhī</rt></ruby><ruby>足<rt>zú</rt></ruby><ruby>常<rt>cháng</rt></ruby><ruby>足<rt>zú</rt></ruby>，<br><ruby>终<rt>zhōng</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>辱<rt>rǔ</rt></ruby>；<br><ruby>知<rt>zhī</rt></ruby><ruby>止<rt>zhǐ</rt></ruby><ruby>常<rt>cháng</rt></ruby><ruby>止<rt>zhǐ</rt></ruby>，<br><ruby>终<rt>zhōng</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>耻<rt>chǐ</rt></ruby>。","notes":"","translation":"明白知足常乐的道理就会经常感到满足，懂得任何事物都有止境就应适可而止，能做到这样一生都不会遭受耻辱。","number":14,"title_py":"zēng guǎng xián wén","author_py":"yì míng","dynasty_py":"Míng"},{"title":"李延年歌","dynasty":"西汉","author":"李延年","text":"<ruby>北<rt>běi</rt></ruby><ruby>方<rt>fāng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>佳<rt>jiā</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>绝<rt>jué</rt></ruby><ruby>世<rt>shì</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>立<rt>lì</rt></ruby>。<br><ruby>一<rt>yí</rt></ruby><ruby>顾<rt>gù</rt></ruby><ruby>倾<rt>qīng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>城<rt>chéng</rt></ruby>，<br><ruby>再<rt>zài</rt></ruby><ruby>顾<rt>gù</rt></ruby><ruby>倾<rt>qīng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>国<rt>guó</rt></ruby>。<br><ruby>宁<rt>níng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>倾<rt>qīng</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>倾<rt>qīng</rt></ruby><ruby>国<rt>guó</rt></ruby>？<br><ruby>佳<rt>jiā</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>再<rt>zài</rt></ruby><ruby>得<rt>dé</rt></ruby>。","notes":"倾城、倾国：原指因女色而亡国，后多形容妇女容貌极美。陶渊明《闲情赋》：“表倾城之艳色，年期有德于传闻。”<br>宁不知：怎么不知道。","translation":"北方有位美丽姑娘，独立世俗之外，她对守城的将士瞧一眼，将士弃械，墙垣失守；她对君临天下的皇帝瞧一眼，皇帝倾心，国家败亡！美丽的姑娘呀，常常带来“倾城、倾国”的灾难。纵然如此，也不能失去获得佳人的好机会。美好姑娘世所难遇、不可再得！","number":15,"title_py":"lǐ yán nián gē","author_py":"lǐ yán nián","dynasty_py":"Xī Hàn"},{"title":"秋夜寄丘员外","dynasty":"唐","author":"韦应物","text":"<ruby>怀<rt>huái</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>属<rt>shǔ</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>夜<rt>yè</rt></ruby>，<br><ruby>散<rt>sàn</rt></ruby><ruby>步<rt>bù</rt></ruby><ruby>咏<rt>yǒng</rt></ruby><ruby>凉<rt>liáng</rt></ruby><ruby>天<rt>tiān</rt></ruby>。<br><ruby>空<rt>kōng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>松<rt>sōng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>落<rt>luò</rt></ruby>，<br><ruby>幽<rt>yōu</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>应<rt>yīng</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>眠<rt>mián</rt></ruby>。","notes":"16丘二十二员外：名丹，苏州人，曾拜尚书郎，后隐居平山上。丘，一作“邱”。<br>销：销蚀。<br>属：正值，适逢，恰好。<br>夜幽人：幽居隐逸的人，悠闲的人。此处指丘员外。","translation":"我在这深秋的夜晚怀念你，散步咏叹多么寒凉的霜天。想此刻空山中松子纷纷飘落下来，想必幽居的友人一定还未安眠。","number":16,"title_py":"qiū yè jì qiū yuán wài","author_py":"wéi yīng wù","dynasty_py":"Táng"},{"title":"秋风引","dynasty":"唐","author":"刘禹锡","text":"<ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>至<rt>zhì</rt></ruby>，<br><ruby>萧<rt>xiāo</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>雁<rt>yàn</rt></ruby><ruby>群<rt>qún</rt></ruby>。<br><ruby>朝<rt>zhāo</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>树<rt>shù</rt></ruby>，<br><ruby>孤<rt>gū</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>最<rt>zuì</rt></ruby><ruby>先<rt>xiān</rt></ruby><ruby>闻<rt>wén</rt></ruby>。","notes":"引：一种文学或乐曲体裁之一，有序奏之意，即引子，开头。<br>至：到。开头。<br>至：到。<br>萧萧：形容风吹树木的声音。晋陶潜《咏荆轲》：“萧萧哀风逝，淡淡寒波生。”<br>雁群：大雁的群体。<br>朝：凌晨。<br>庭树：庭园的树木。<br>孤客：单身旅居外地的人。","translation":"不知从哪里吹来，在你呼呼吹起的时候，一群群大雁就朝南方飞去了。天刚刚亮，你把院子里的树摇得哗哗响，我这个孤独的旅人最先听到秋风的声音。","number":17,"title_py":"qiū fēng yǐn","author_py":"liú yǔ xī","dynasty_py":"Táng"},{"title":"八阵图","dynasty":"唐","author":"杜甫","text":"<ruby>功<rt>gōng</rt></ruby><ruby>盖<rt>gài</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>分<rt>fēn</rt></ruby><ruby>国<rt>guó</rt></ruby>，<ruby>名<rt>míng</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>八<rt>bā</rt></ruby><ruby>阵<rt>zhèn</rt></ruby><ruby>图<rt>tú</rt></ruby>。<br><ruby>江<rt>jiāng</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby>,<ruby>遗<rt>yí</rt></ruby><ruby>恨<rt>hèn</rt></ruby><ruby>失<rt>shī</rt></ruby><ruby>吞<rt>tūn</rt></ruby><ruby>吴<rt>wú</rt></ruby>。","notes":"18八阵图：由八种阵势组成的图形，用来操练军队或作战。<br>盖：超过。<br>三分国：指三国时魏、蜀、吴三国。<br>石不转：指涨水时，八阵图的石块仍然不动。<br>八失吞吴：是吞吴失策的意思。","translation":"三国鼎立你建立了盖世功绩，创八阵图你成就了永久声名。江水流逝但此功名永存，千古遗恨你灭吴失策功未就。","number":18,"title_py":"bā zhèn tú","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"绝句","dynasty":"唐","author":"杜甫","text":"<ruby>江<rt>jiāng</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>逾<rt>yú</rt></ruby><ruby>白<rt>bái</rt></ruby>，<br><ruby>山<rt>shān</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>燃<rt>rán</rt></ruby>。<br><ruby>今<rt>jīn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>过<rt>guò</rt></ruby>，<br><ruby>何<rt>hé</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>年<rt>nián</rt></ruby>。","notes":"逾：更多。<br>欲：好象。<br>燃：燃烧。<br>过：过去。<br>何：什么。","translation":"江水碧绿使水鸟的白翎显得更加洁白，山峰青翠映衬得花儿像燃烧的火一样红。今年的春天眼看又过去了，不知什么时候才是我回家的日子。","number":19,"title_py":"jué jù","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"劝学","dynasty":"唐","author":"孟郊","text":"<ruby>击<rt>jī</rt></ruby><ruby>石<rt>shí</rt></ruby><ruby>乃<rt>nǎi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>火<rt>huǒ</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>击<rt>jī</rt></ruby><ruby>元<rt>yuán</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>非<rt>fēi</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>然<rt>rán</rt></ruby>。<br><ruby>万<rt>wàn</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>己<rt>jǐ</rt></ruby><ruby>运<rt>yùn</rt></ruby>，<br><ruby>他<rt>tā</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>非<rt>fēi</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>贤<rt>xián</rt></ruby>。<br><ruby>青<rt>qīng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>早<rt>zǎo</rt></ruby><ruby>为<rt>wéi</rt></ruby>，<br><ruby>岂<rt>qǐ</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>少<rt>shǎo</rt></ruby><ruby>年<rt>nián</rt></ruby>。","notes":"20乃：才。<br>元：原本、本来。<br>始：方才。<br>劝道：事物的法则、规律。这里指各种知识。<br>非：不是。<br>自然：天然。<br>运：运用。<br>贤：才能。","translation":"只有击打石头，才会有火花；如果不击打，连一点儿烟也不冒出。人也是这样，只有通过学习，才能掌握知识；如果不学习，知识不会从天上掉下来。任何事情必须自己去实践，别人得到的知识不能代替自己的才能。青春年少时期就应趁早努力，一个人难道能够永远都是“少年”吗？","number":20,"title_py":"quàn xué","author_py":"mèng jiāo","dynasty_py":"Táng"},{"title":"子衿","dynasty":"先秦","author":"《诗经》","text":"<ruby>青<rt>qīng</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>衿<rt>jīn</rt></ruby>，<br><ruby>悠<rt>yōu</rt></ruby><ruby>悠<rt>yōu</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>心<rt>xīn</rt></ruby>。<br><ruby>纵<rt>zòng</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>往<rt>wǎng</rt></ruby>，<br><ruby>子<rt>zǐ</rt></ruby><ruby>宁<rt>níng</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>嗣<rt>sì</rt></ruby><ruby>音<rt>yīn</rt></ruby>？<br><ruby>青<rt>qīng</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>佩<rt>pèi</rt></ruby>，<br><ruby>悠<rt>yōu</rt></ruby><ruby>悠<rt>yōu</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>思<rt>sī</rt></ruby>。<br><ruby>纵<rt>zòng</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>往<rt>wǎng</rt></ruby>，<br><ruby>子<rt>zǐ</rt></ruby><ruby>宁<rt>níng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>来<rt>lái</rt></ruby>？<br><ruby>挑<rt>tiāo</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>达<rt>dá</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>在<rt>zài</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>阙<rt>quē</rt></ruby><ruby>兮<rt>xī</rt></ruby>。<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>如<rt>rú</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>兮<rt>xī</rt></ruby>。","notes":"子：男子的美称，这里即指\"你\"。<br>衿：即襟，衣领。<br>悠悠：忧思不断的样子。<br>宁：难道。<br>嗣：寄，留下。<br>佩：指佩玉的绶带。<br>挑兮达兮：独自走来走去的样子。<br>城阙：城门两边的观楼。","translation":"青青的是你的衣领，悠悠的是我的思念。纵然我不曾去会你，难道你不把音信传？青青的是你的佩带，悠悠的是我的情怀。纵然我不曾去找你，难道你不能主动来？来来往往张眼望啊，在这高高的城楼上。一天不见你的面啊，好像有三月那样长！","number":21,"title_py":"zǐ jīn","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"十亩之间","dynasty":"先秦","author":"《诗经》","text":"<ruby>十<rt>shí</rt></ruby><ruby>亩<rt>mǔ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>桑<rt>sāng</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>兮<rt>xī</rt></ruby>。<br><ruby>行<rt>xíng</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>还<rt>huán</rt></ruby><ruby>兮<rt>xī</rt></ruby>。<br><ruby>十<rt>shí</rt></ruby><ruby>亩<rt>mǔ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>桑<rt>sāng</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>泄<rt>yì</rt></ruby><ruby>泄<rt>yì</rt></ruby><ruby>兮<rt>xī</rt></ruby>，<br><ruby>行<rt>xíng</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>逝<rt>shì</rt></ruby><ruby>兮<rt>xī</rt></ruby>。","notes":"者：采桑的人。<br>闲闲：<br>从容悠闲的样子行：<br>走泄：同闲闲","translation":"十亩田间是桑园，采桑人儿真悠闲。走吧，与你把家还！十亩田外是桑林，采桑人儿笑盈盈。走啊，与你携手行！","number":22,"title_py":"shí mǔ zhī jiān","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"论诗","dynasty":"清","author":"赵翼","text":"<ruby>李<rt>lǐ</rt></ruby><ruby>杜<rt>dù</rt></ruby><ruby>诗<rt>shī</rt></ruby><ruby>篇<rt>piān</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>口<rt>kǒu</rt></ruby><ruby>传<rt>chuán</rt></ruby>，<br><ruby>至<rt>zhì</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>鲜<rt>xiān</rt></ruby>。<br><ruby>江<rt>jiāng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>代<rt>dài</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>出<rt>chū</rt></ruby>，<br><ruby>各<rt>gè</rt></ruby><ruby>领<rt>lǐng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>骚<rt>sāo</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>年<rt>nián</rt></ruby>。","notes":"李杜：指李白和杜甫。<br>才人：有才情的人。<br>风骚：指《诗经》中的“国风”和屈原的《离骚》。后来把关于诗文写作的事叫“风骚”。这里指在文学上有成就的“才人”的崇高地位和深远影响。","translation":"李白和杜甫的诗篇经成千上万的人传颂，现在读起来感觉已经没有什么新意了我们的大好河山每代都有才华横溢的人出现，他们的诗篇文章以及人气都会流传数百年。","number":23,"title_py":"lùn shī","author_py":"zhào yì","dynasty_py":"Qīng"},{"title":"增广贤文","dynasty":"明","author":"佚名","text":"<ruby>求<rt>qiú</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>求<rt>qiú</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>丈<rt>zhàng</rt></ruby><ruby>夫<rt>fū</rt></ruby>，<br><ruby>济<rt>jì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>济<rt>jì</rt></ruby><ruby>急<rt>jí</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>无<rt>wú</rt></ruby>。<br><ruby>渴<rt>kě</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>滴<rt>dī</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>甘<rt>gān</rt></ruby><ruby>露<rt>lù</rt></ruby>，<br><ruby>醉<rt>zuì</rt></ruby><ruby>后<rt>hòu</rt></ruby><ruby>添<rt>tiān</rt></ruby><ruby>杯<rt>bēi</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>无<rt>wú</rt></ruby>。","notes":"","translation":"请求人帮助就去求真正的男子汉，救济别人就救济那些急需救济的人。口渴的时候一滴水也如同甘露一般甜美，喝醉酒后再添杯还不如不添。","number":24,"title_py":"zēng guǎng xián wén","author_py":"yì míng","dynasty_py":"Míng"},{"title":"马上作","dynasty":"明","author":"戚继光","text":"<ruby>南<rt>nán</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>驱<rt>qū</rt></ruby><ruby>驰<rt>chí</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>主<rt>zhǔ</rt></ruby><ruby>情<rt>qíng</rt></ruby>，<br><ruby>江<rt>jiāng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>多<rt>duō</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>横<rt>héng</rt></ruby><ruby>戈<rt>gē</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>行<rt>xíng</rt></ruby>。","notes":"南北驱驰：戚继光曾在东南沿海一带抗击倭宼的侵扰，又曾镇守北方边关。<br>主：指明朝皇帝。<br>边月：边塞的月亮。这里的边塞指山东沿海登州卫等地。<br>江花边草：南方江边和北方边塞的花草树木。<br>横戈：手里握着兵器。","translation":"驰聘疆场、转战南北是为了报答皇上对我的信任，南北江畔和北方边关的花草都笑我一生忙忙碌碌。一年三百六十日，我都是带着兵器骑着战马在疆场上度过的。","number":25,"title_py":"mǎ shàng zuò","author_py":"qī jì guāng","dynasty_py":"Míng"},{"title":"己亥杂诗","dynasty":"清","author":"龚自珍","text":"<ruby>浩<rt>hào</rt></ruby><ruby>荡<rt>dàng</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>斜<rt>xié</rt></ruby>，<br><ruby>吟<rt>yín</rt></ruby><ruby>鞭<rt>biān</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>指<rt>zhǐ</rt></ruby><ruby>即<rt>jí</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby>。<br><ruby>落<rt>luò</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>物<rt>wù</rt></ruby>，<br><ruby>化<rt>huà</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>泥<rt>ní</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>护<rt>hù</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"浩荡离愁：离别京都的愁思浩如水波，也指作者心潮不平。<br>吟鞭：诗人的马鞭。<br>东指：东方故里。<br>天涯：指离京都遥远。<br>落红：落花。花朵以红色者为尊贵，因此落花又称为落红。<br>己花：比喻国家。<br>亥即：到。","translation":"浩浩荡荡的离别愁绪向着日落西斜的远处延伸, 离开北京，马鞭向东一挥，感觉就是人在天涯一般。我辞官归乡，有如从枝头上掉下来的落花，但它却不是无情之物，化成了春天的泥土，还能起着培育下一代的作用。","number":26,"title_py":"jǐ hài zá shī","author_py":"gōng zì zhēn","dynasty_py":"Qīng"},{"title":"韵律（一）","dynasty":"清","author":"李渔","text":"<ruby>春<rt>chūn</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>秋<rt>qiū</rt></ruby>，<br><ruby>夏<rt>xià</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>冬<rt>dōng</rt></ruby>，<br><ruby>暮<rt>mù</rt></ruby><ruby>鼓<rt>gǔ</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>晨<rt>chén</rt></ruby><ruby>钟<rt>zhōng</rt></ruby>。<br><ruby>云<rt>yún</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>，<br><ruby>雪<rt>xuě</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>晚<rt>wǎn</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>空<rt>kōng</rt></ruby>。<br><ruby>明<rt>míng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>暗<rt>àn</rt></ruby>，<br><ruby>淡<rt>dàn</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>浓<rt>nóng</rt></ruby>，<br><ruby>上<rt>shàng</rt></ruby><ruby>智<rt>zhì</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>庸<rt>yōng</rt></ruby>。<br><ruby>深<rt>shēn</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>浅<rt>qiǎn</rt></ruby>，<br><ruby>重<rt>zhòng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>轻<rt>qīng</rt></ruby>，<br><ruby>有<rt>yǒu</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>声<rt>shēng</rt></ruby>。<br><ruby>观<rt>guān</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>玩<rt>wán</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>绿<rt>lǜ</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>松<rt>sōng</rt></ruby>。<br><ruby>来<rt>lái</rt></ruby><ruby>鸿<rt>hóng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>雁<rt>yàn</rt></ruby>，<br><ruby>宿<rt>sù</rt></ruby><ruby>鸟<rt>niǎo</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>鸣<rt>míng</rt></ruby><ruby>虫<rt>chóng</rt></ruby>。<br><ruby>蜂<rt>fēng</rt></ruby><ruby>腰<rt>yāo</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>蝶<rt>dié</rt></ruby><ruby>翅<rt>chì</rt></ruby>，<br><ruby>紫<rt>zǐ</rt></ruby><ruby>燕<rt>yàn</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>莺<rt>yīng</rt></ruby>。","notes":"","translation":"","number":27,"title_py":"yùn lǜ （ yī ）","author_py":"lǐ yú","dynasty_py":"Qīng"},{"title":"韵律（二）","dynasty":"清","author":"李渔","text":"<ruby>三<rt>sān</rt></ruby><ruby>尺<rt>chǐ</rt></ruby><ruby>剑<rt>jiàn</rt></ruby>，<br><ruby>六<rt>liù</rt></ruby><ruby>钧<rt>jūn</rt></ruby><ruby>弓<rt>gōng</rt></ruby>，<br><ruby>岭<rt>lǐng</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>东<rt>dōng</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>暑<rt>shǔ</rt></ruby><ruby>殿<rt>diàn</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>广<rt>guǎng</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>宫<rt>gōng</rt></ruby>。<br><ruby>两<rt>liǎng</rt></ruby><ruby>岸<rt>àn</rt></ruby><ruby>晓<rt>xiǎo</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>绿<rt>lǜ</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>园<rt>yuán</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>杏<rt>xìng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>红<rt>hóng</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>缺<rt>quē</rt></ruby>，<br><ruby>日<rt>rì</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>升<rt>shēng</rt></ruby>。<br><ruby>独<rt>dú</rt></ruby><ruby>卧<rt>wò</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>行<rt>xíng</rt></ruby>。<br><ruby>寒<rt>hán</rt></ruby><ruby>冰<rt>bīng</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>尺<rt>chǐ</rt></ruby><ruby>厚<rt>hòu</rt></ruby>，<br><ruby>秋<rt>qiū</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>分<rt>fēn</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>万<rt>wàn</rt></ruby><ruby>卷<rt>juǎn</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>容<rt>róng</rt></ruby><ruby>闲<rt>xián</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>览<rt>lǎn</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>樽<rt>zūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>倾<rt>qīng</rt></ruby>。","notes":"选自《笠翁对韵》苍穹：天空。藏，青色。<br>隐隐：隐约，听起来不很清楚。<br>蒙蒙：模糊不清的样子。韵律（二）","translation":"","number":28,"title_py":"yùn lǜ （ èr ）","author_py":"lǐ yú","dynasty_py":"Qīng"},{"title":"送别","dynasty":"唐","author":"王维","text":"<ruby>下<rt>xià</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<br><ruby>问<rt>wèn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>君<rt>jūn</rt></ruby><ruby>言<rt>yán</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>意<rt>yì</rt></ruby>，<br><ruby>归<rt>guī</rt></ruby><ruby>卧<rt>wò</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>陲<rt>chuí</rt></ruby>。<br><ruby>但<rt>dàn</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>问<rt>wèn</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>时<rt>shí</rt></ruby>。","notes":"君酒：劝君饮酒。饮，请别人喝。<br>别所之：往什么地方去。<br>卧：隐居。<br>南山：终南山，即秦岭，在今陕西省西安市西南。<br>陲：边。","translation":"请你下马来喝一杯酒，敢问朋友你要去何方？你说因为生活不得意，回乡隐居在终南山旁。只管去吧我何须再问，看那白云正无边飘荡。","number":29,"title_py":"sòng bié","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"易水送别","dynasty":"唐","author":"骆宾王","text":"<ruby>此<rt>cǐ</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>别<rt>bié</rt></ruby><ruby>燕<rt>yàn</rt></ruby><ruby>丹<rt>dān</rt></ruby>，<br><ruby>壮<rt>zhuàng</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>发<rt>fà</rt></ruby><ruby>冲<rt>chōng</rt></ruby><ruby>冠<rt>guàn</rt></ruby>。<br><ruby>昔<rt>xī</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>没<rt>mò</rt></ruby>，<br><ruby>今<rt>jīn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>寒<rt>hán</rt></ruby>。","notes":"易水：也称易河，河流名，为战国时燕国的南界。燕太子丹送别荆轲的地点。<br>此地：原意为这里，这个地方。这里指易水岸边。<br>别燕丹：指的是荆轲作别燕太子丹。<br>壮士：意气豪壮而勇敢的人;勇士。这里指荆轲，战国卫人，刺客。<br>发冲冠：形容人极端愤怒，因而头发直立，把帽子都冲水起来了。<br>冠：帽子。<br>送昔时：往日;从前。<br>没：死，即“殁”字。<br>犹：仍然。","translation":"在这个地方荆轲告别燕太子丹，壮士悲歌壮气，怒发冲冠。那时的人已经都不在了，今天的易水还是那样的寒冷。","number":30,"title_py":"yì shuǐ sòng bié","author_py":"luò bīn wáng","dynasty_py":"Táng"},{"title":"自菩提步月归广化寺","dynasty":"宋","author":"欧阳修","text":"<ruby>春<rt>chūn</rt></ruby><ruby>岩<rt>yán</rt></ruby><ruby>瀑<rt>pù</rt></ruby><ruby>泉<rt>quán</rt></ruby><ruby>响<rt>xiǎng</rt></ruby>，<br><ruby>夜<rt>yè</rt></ruby><ruby>久<rt>jiǔ</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>寂<rt>jì</rt></ruby>。<br><ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>净<rt>jìng</rt></ruby><ruby>松<rt>sōng</rt></ruby><ruby>林<rt>lín</rt></ruby>，<br><ruby>千<rt>qiān</rt></ruby><ruby>峰<rt>fēng</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>色<rt>sè</rt></ruby>。","notes":"春岩：春天的岩石。<br>响：拟声词，哗哗地响。<br>自夜久：夜深。<br>菩寂：寂寥。<br>净：显得干净。","translation":"春天的岩石上，瀑布哗哗再响，夜已经深了，动物都已休息。山峰归于寂寥，明月照在夜晚的松林上，在月光的照耀下，静谧松林显得那么干净。夜色笼罩在巍峨的群山上，远远的看去，就好像一个颜色。","number":31,"title_py":"zì pú tí bù yuè guī guǎng huà sì","author_py":"ōu yáng xiū","dynasty_py":"Sòng"},{"title":"增广贤文","dynasty":"明","author":"佚名","text":"<ruby>当<rt>dāng</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>盐<rt>yán</rt></ruby><ruby>米<rt>mǐ</rt></ruby><ruby>贵<rt>guì</rt></ruby>，<br><ruby>养<rt>yǎng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>方<rt>fāng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>父<rt>fù</rt></ruby><ruby>母<rt>mǔ</rt></ruby><ruby>恩<rt>ēn</rt></ruby>。<br><ruby>常<rt>cháng</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>莫<rt>mò</rt></ruby><ruby>把<rt>bǎ</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>当<rt>dàng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>时<rt>shí</rt></ruby>。","notes":"","translation":"当家后才能体会钱财来之不易，有了儿女才能理解父母的养育之恩。生活好了要常想想以前贫困的时候，生活困顿时不要像以前富裕时那样铺张浪费。","number":32,"title_py":"zēng guǎng xián wén","author_py":"yì míng","dynasty_py":"Míng"},{"title":"春雪","dynasty":"唐","author":"韩愈","text":"<ruby>新<rt>xīn</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>都<rt>dōu</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>华<rt>huá</rt></ruby>，<br><ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>芽<rt>yá</rt></ruby>。<br><ruby>白<rt>bái</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>嫌<rt>xián</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>晚<rt>wǎn</rt></ruby>，<br><ruby>故<rt>gù</rt></ruby><ruby>穿<rt>chuān</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"34新年：指农历正月初一。<br>芳华：泛指芬芳的花朵。<br>初：刚刚。<br>惊：新奇，惊讶。<br>嫌：嫌怨；怨恨。<br>故：故意。","translation":"新年都已来到，但还看不到芬芳的鲜花，到二月，才惊喜地发现有小草冒出了新芽。白雪也嫌春色来得太晚了，所以有意化作花儿在庭院树间穿飞。","number":33,"title_py":"chūn xuě","author_py":"hán yù","dynasty_py":"Táng"},{"title":"题榴花","dynasty":"唐","author":"韩愈","text":"<ruby>五<rt>wǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>榴<rt>liú</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>眼<rt>yǎn</rt></ruby><ruby>明<rt>míng</rt></ruby>，<br><ruby>枝<rt>zhī</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>成<rt>chéng</rt></ruby>。<br><ruby>可<rt>kě</rt></ruby><ruby>怜<rt>lián</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>车<rt>chē</rt></ruby><ruby>马<rt>mǎ</rt></ruby>，<br><ruby>颠<rt>diān</rt></ruby><ruby>倒<rt>dào</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>苔<rt>tái</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>绛<rt>jiàng</rt></ruby><ruby>英<rt>yīng</rt></ruby>。","notes":"","translation":"五月盛开的榴花红似火，绿叶掩映着初结的小果。静冷角落没有车马经过，任那谢了的花开了又落。","number":34,"title_py":"tí liú huā","author_py":"hán yù","dynasty_py":"Táng"},{"title":"蜂","number":35,"dynasty":"唐","author":"罗隐","text":"<ruby>不<rt>bú</rt></ruby><ruby>论<rt>lùn</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>尖<rt>jiān</rt></ruby>，<br><ruby>无<rt>wú</rt></ruby><ruby>限<rt>xiàn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>被<rt>bèi</rt></ruby><ruby>占<rt>zhàn</rt></ruby>。<br><ruby>采<rt>cǎi</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>蜜<rt>mì</rt></ruby><ruby>后<rt>hòu</rt></ruby>，<br><ruby>为<rt>wéi</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>辛<rt>xīn</rt></ruby><ruby>苦<rt>kǔ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>甜<rt>tián</rt></ruby>？","notes":"","translation":"","title_py":"fēng","author_py":"luó yǐn","dynasty_py":"Táng"},{"title":"早梅","dynasty":"明","author":"道源","text":"<ruby>万<rt>wàn</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>色<rt>sè</rt></ruby>，<br><ruby>南<rt>nán</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>花<rt>huā</rt></ruby>。<br><ruby>香<rt>xiāng</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>影<rt>yǐng</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>野<rt>yě</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>家<rt>jiā</rt></ruby>。","notes":"无色：没有颜色。<br>独有：只有。","translation":"雪花落下，给植物披上了银装，一点颜色都没有；在南边的树枝上有一些花，没有叶子。在小溪旁我都闻到了香味，抬头一看，只见梅花的影子映在农家的墙壁上。","number":36,"title_py":"zǎo méi","author_py":"dào yuán","dynasty_py":"Míng"},{"title":"寻胡隐君","dynasty":"明","author":"高启","text":"<ruby>渡<rt>dù</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>渡<rt>dù</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>看<rt>kàn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>还<rt>hái</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>花<rt>huā</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>家<rt>jiā</rt></ruby>。","notes":"38寻：访问。<br>胡隐君：一位姓胡的隐士(封建社会，称不做官而隐居在山林里的人为隐士)。<br>君：指姓胡的隐士。","translation":"一路上渡过了一道水又一道水，河边路旁长满了看也看不尽的鲜花。因为一路上春光明媚、风景幽美，我不知不觉就来到您的家了。","number":37,"title_py":"xún hú yǐn jūn","author_py":"gāo qǐ","dynasty_py":"Míng"},{"title":"赐萧瑀","dynasty":"唐","author":"李世民","text":"<ruby>疾<rt>jí</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>劲<rt>jìng</rt></ruby><ruby>草<rt>cǎo</rt></ruby>，<br><ruby>板<rt>bǎn</rt></ruby><ruby>荡<rt>dàng</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>诚<rt>chéng</rt></ruby><ruby>臣<rt>chén</rt></ruby>。<br><ruby>勇<rt>yǒng</rt></ruby><ruby>夫<rt>fū</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>义<rt>yì</rt></ruby>，<br><ruby>智<rt>zhì</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>必<rt>bì</rt></ruby><ruby>怀<rt>huái</rt></ruby><ruby>仁<rt>rén</rt></ruby>。","notes":"萧瑀：字时文，隋朝将领，被李世民俘后归唐，封宋国公。<br>疾风：大而急的风。<br>劲草：强劲有力的草。<br>板荡：动乱之世。<br>勇夫：有胆量的人。<br>萧智者：有见识的人。","translation":"在猛烈狂疾的大风中才能看得出是不是强健挺拔的草，在激烈动荡的年代里才能识别出是不是忠贞不二的臣。一勇之夫怎么懂得为公为国为民为社稷的正义的道理，而智勇兼具的人内心里必然怀有忠君为民的仁爱之情。","number":38,"title_py":"cì xiāo yǔ","author_py":"lǐ shì mín","dynasty_py":"Táng"},{"title":"夜立阶下","dynasty":"清","author":"袁枚","text":"<ruby>半<rt>bàn</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>昧<rt>mèi</rt></ruby><ruby>星<rt>xīng</rt></ruby>，<br><ruby>三<rt>sān</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>两<rt>liǎng</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>。<br><ruby>梧<rt>wú</rt></ruby><ruby>桐<rt>tóng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>来<rt>lái</rt></ruby>，<br><ruby>叶<rt>yè</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>语<rt>yǔ</rt></ruby>。","notes":"40半明半昧: 形容有时明亮，有时昏暗。昧：昏暗；<br>明：明亮。<br>半：时而。","translation":"天上闪烁着半明半暗的星光，空中飘落三点两点小雨。梧桐树儿已经感受到了秋意，叶叶间有说不完的话语。","number":39,"title_py":"yè lì jiē xià","author_py":"yuán méi","dynasty_py":"Qīng"},{"title":"惜阴","dynasty":"晋","author":"陶渊明","text":"<ruby>盛<rt>shèng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>来<rt>lái</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>再<rt>zài</rt></ruby><ruby>晨<rt>chén</rt></ruby>。<br><ruby>及<rt>jí</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>勉<rt>miǎn</rt></ruby><ruby>励<rt>lì</rt></ruby>，<br><ruby>岁<rt>suì</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"惜阴:珍惜光阴；爱惜时间。","translation":"风华正茂的大好年华不会重来,犹如一天里不会有第二个早晨。年纪正轻的时候，要勉励自己及时努力，否则，岁月一去不回，它是不会停下来等人的。","number":40,"title_py":"xī yīn","author_py":"táo yuān míng","dynasty_py":"jìn"},{"title":"井","number":41,"dynasty":"","author":"毛泽东","text":"<ruby>天<rt>tiān</rt></ruby><ruby>井<rt>jǐng</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>方<rt>fāng</rt></ruby>，<br><ruby>周<rt>zhōu</rt></ruby><ruby>围<rt>wéi</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>墙<rt>qiáng</rt></ruby>。<br><ruby>清<rt>qīng</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>卵<rt>luǎn</rt></ruby><ruby>石<rt>shí</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>囿<rt>yòu</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>央<rt>yāng</rt></ruby>。<br><ruby>只<rt>zhǐ</rt></ruby><ruby>喝<rt>hē</rt></ruby><ruby>井<rt>jǐng</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>永<rt>yǒng</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>养<rt>yǎng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>长<rt>cháng</rt></ruby>。","notes":"天井：指江南地区房子与房子之间的宅院。<br>囿：局限，拘泥。<br>小鱼：喻指的是尚处在成长时期的孩子们，他们被困在狭窄的\"天井\"里，只能\"喝井里水\"，营养有限，得不到适当的锻炼，那样永远也不能真正长大的。","translation":"四四方方的一个天井，周围全是高墙。水清澈可见卵石，小鱼儿被困在中央。如只喝井中水，就会永远长不长。","title_py":"jǐng","author_py":"máo zé dōng","dynasty_py":""},{"title":"溪居即事","dynasty":"唐","author":"崔道融","text":"<ruby>篱<rt>lí</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>系<rt>xì</rt></ruby><ruby>船<rt>chuán</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>钓<rt>diào</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>湾<rt>wān</rt></ruby>。<br><ruby>小<rt>xiǎo</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>疑<rt>yí</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>村<rt>cūn</rt></ruby><ruby>客<rt>kè</rt></ruby>，<br><ruby>急<rt>jí</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>柴<rt>chái</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>关<rt>guān</rt></ruby>。","notes":"溪居：溪边村舍。<br>即事：对眼前的事物、情景有所感触而创作。<br>系：栓，捆绑。<br>却关：打开门闩。","translation":"篱笆外面不知是谁家没有系好船只。春潮上涨小船被吹事进了钓鱼湾。有一位小孩正玩得高兴，突然发现有船进湾来了，以为是村里来了客人，急急忙忙地跑回去，去把柴门打开。","number":42,"title_py":"xī jū jí shì","author_py":"cuī dào róng","dynasty_py":"Táng"},{"title":"秋月","dynasty":"宋","author":"朱熹","text":"<ruby>清<rt>qīng</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>头<rt>tóu</rt></ruby>，<br><ruby>空<rt>kōng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>澄<rt>chéng</rt></ruby><ruby>鲜<rt>xiān</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>秋<rt>qiū</rt></ruby>。<br><ruby>隔<rt>gé</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>尘<rt>chén</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>两<rt>liǎng</rt></ruby><ruby>悠<rt>yōu</rt></ruby><ruby>悠<rt>yōu</rt></ruby>。","notes":"44空水：指夜空和溪中的流水。<br>澄鲜：明净、清新的样子。红尘，佛教徒把人间称为红尘。此泛指人世间。<br>秋悠悠：悠闲自在的样子。<br>黄叶：落叶。一作“红叶”。","translation":"清澈的溪水流过碧绿的山头，悬空一泻而下，澄清的水与蓝天在月色的映照下构成了一副空明澄澈的秋景画卷。这色把人世间隔在三十里之外，空中是悠闲自在的白云，山上是悠闲自在的红叶。幽静的秋色是多么令人陶醉啊！","number":43,"title_py":"qiū yuè","author_py":"zhū xī","dynasty_py":"Sòng"},{"title":"不第后赋菊","dynasty":"唐","author":"黄巢","text":"<ruby>待<rt>dài</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>九<rt>jiǔ</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>八<rt>bā</rt></ruby>，<br><ruby>我<rt>wǒ</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>后<rt>hòu</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>杀<rt>shā</rt></ruby>。<br><ruby>冲<rt>chōng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>阵<rt>zhèn</rt></ruby><ruby>透<rt>tòu</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>安<rt>ān</rt></ruby>，<br><ruby>满<rt>mǎn</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>带<rt>dài</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>甲<rt>jiǎ</rt></ruby>。","notes":"九月八：九月九日为重阳节，有登高赏菊的风俗，说“九月八”是为了押韵。<br>杀：草木枯萎。《吕氏春秋•应同》：“及禹之时，天先见草木秋冬不杀。”<br>不黄金甲：指金黄色铠甲般的菊花。第","translation":"等到秋天九月重阳节来临的时候，菊花盛开以后别的花就凋零了。盛开的菊花璀璨夺目，阵阵香气弥漫长安，满城均沐浴在芳香的菊意中，遍地都是金黄如铠甲般的菊花。","number":44,"title_py":"bú dì hòu fù jú","author_py":"huáng cháo","dynasty_py":"Táng"},{"title":"增广贤文","dynasty":"明","author":"佚名","text":"<ruby>戏<rt>xì</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>油<rt>yóu</rt></ruby><ruby>炒<rt>chǎo</rt></ruby><ruby>菜<rt>cài</rt></ruby>，<br><ruby>留<rt>liú</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>孙<rt>sūn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>读<rt>dú</rt></ruby><ruby>书<rt>shū</rt></ruby>。<br><ruby>书<rt>shū</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>钟<rt>zhōng</rt></ruby><ruby>粟<rt>sù</rt></ruby>，<br><ruby>书<rt>shū</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>颜<rt>yán</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>玉<rt>yù</rt></ruby>。","notes":"","translation":"奉劝家长们不要用大量的油炒菜，还是留给儿孙们夜间读书点灯之用吧。读书可以让人获得千钟粟米，读书可以让人得到如玉般美貌的妻子。","number":45,"title_py":"zēng guǎng xián wén","author_py":"yì míng","dynasty_py":"Míng"},{"title":"城东早春","dynasty":"唐","author":"杨巨源","text":"<ruby>诗<rt>shī</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>春<rt>chūn</rt></ruby>，<br><ruby>绿<rt>lǜ</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>匀<rt>yún</rt></ruby>。<br><ruby>若<rt>ruò</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>锦<rt>jǐn</rt></ruby>，<br><ruby>出<rt>chū</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>俱<rt>jù</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"城：指唐代京城长安。<br>诗家：诗人的统称，并不仅指作者自己。<br>清景：清秀美丽的景色。<br>清：一作“新”。<br>新春：即早春。<br>才黄：刚刚露出嫩黄的柳眼。<br>匀：均匀，匀称。<br>上林：上林苑，故址在今陕西西安市西，建于秦代，汉武帝时加以扩充，为汉宫苑。诗中用来代指唐朝京城长安。<br>锦：五色织成的绸绫。<br>俱：全，都。","translation":"的清新景色，正是诗人的最爱。绿柳枝头嫩叶初萌，鹅黄之色尚未均匀。若是到了京城花开之际，那将满城便是赏花之人。","number":46,"title_py":"chéng dōng zǎo chūn","author_py":"yáng jù yuán","dynasty_py":"Táng"},{"title":"三衢道中","dynasty":"宋","author":"曾几","text":"<ruby>梅<rt>méi</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>晴<rt>qíng</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>泛<rt>fàn</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>行<rt>xíng</rt></ruby>。<br><ruby>绿<rt>lǜ</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>减<rt>jiǎn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>添<rt>tiān</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>鹂<rt>lí</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>声<rt>shēng</rt></ruby>。","notes":"48三衢道中：在去三衢州的道路上。三衢即衢州，今浙江省常山县，因境内有三衢山而得名。<br>梅子黄时：指五月，梅子成熟的季节。<br>小溪泛尽：乘小船走到小溪的尽头。小溪，小河沟。泛，衢乘船。尽，尽头。<br>道却山行：再走山间小路。却，再的意思。<br>绿阴：苍绿的树阴。阴，树阴。<br>不减：并没有少多少，差不多。","translation":"梅子黄透了的时候，天天都是晴朗的好天气，乘小舟沿着小溪而行，走到了小溪的尽头，再改走山路继续前行。山路上苍翠的树，与来的时候一样浓密，深林丛中传来几声黄鹂的欢鸣声，比来时更增添了些幽趣。","number":47,"title_py":"sān qú dào zhōng","author_py":"Zēng jǐ","dynasty_py":"Sòng"},{"title":"采莲曲","dynasty":"唐","author":"王昌龄","text":"<ruby>荷<rt>hé</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>裙<rt>qún</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>裁<rt>cái</rt></ruby>，<br><ruby>芙<rt>fú</rt></ruby><ruby>蓉<rt>róng</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>脸<rt>liǎn</rt></ruby><ruby>两<rt>liǎng</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>开<rt>kāi</rt></ruby>。<br><ruby>乱<rt>luàn</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>闻<rt>wén</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"罗裙：用细软而有疏孔的丝织品制成的裙子。<br>一色裁：像是用同一颜色的衣料剪裁的。<br>芙蓉：指荷花。<br>乱入：杂入、混入。<br>看不见：指分不清哪是芙蓉的绿叶红花，哪是少女的绿裙红颜。<br>闻歌：听到歌声。<br>始觉：才知道。","translation":"少女的绿罗裙融入到田田荷叶中，仿佛一色，少女的脸庞掩映在盛开的荷花间，相互映照。混入莲池中不见了踪影，听到歌声四起才觉察到有人前来。","number":48,"title_py":"cǎi lián qū","author_py":"wáng chāng líng","dynasty_py":"Táng"},{"title":"题都城南庄","dynasty":"唐","author":"崔护","text":"<ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>中<rt>zhōng</rt></ruby>，<br><ruby>人<rt>rén</rt></ruby><ruby>面<rt>miàn</rt></ruby><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>映<rt>yìng</rt></ruby><ruby>红<rt>hóng</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>面<rt>miàn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby>。","notes":"50人面：指姑娘的脸。第三句中“人面”指代姑娘。<br>不知：一作“秖（zhǐ）今”。<br>去：一作“在”。<br>笑：形容桃花盛开的样子。","translation":"去年冬天，就在这扇门里，姑娘脸庞，相映鲜艳桃花。今日再来此地，姑娘不知去向何处，只有桃花依旧，含笑怒放春风之中。","number":49,"title_py":"tí dū chéng nán zhuāng","author_py":"cuī hù","dynasty_py":"Táng"},{"title":"食荔枝","dynasty":"宋","author":"苏轼","text":"<ruby>罗<rt>luó</rt></ruby><ruby>浮<rt>fú</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>春<rt>chūn</rt></ruby>，<br><ruby>卢<rt>lú</rt></ruby><ruby>橘<rt>jú</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>次<rt>cì</rt></ruby><ruby>第<rt>dì</rt></ruby><ruby>新<rt>xīn</rt></ruby>。<br><ruby>日<rt>rì</rt></ruby><ruby>啖<rt>dàn</rt></ruby><ruby>荔<rt>lì</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>颗<rt>kē</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>辞<rt>cí</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>岭<rt>lǐng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"罗浮山：在广东博罗、增城、龙门三县交界处，长达百余公里，峰峦四百多，风景秀丽，为岭南名山。<br>卢橘：橘的一种，因其色黑，故名(<br>卢：黑色)。但在东坡诗中指枇杷。<br>岭南：古代被称为南蛮之地，中原人士闻之生畏，不愿荔到广东来。","translation":"罗浮山下四季都是春天，枇杷和黄梅天天都有新鲜的。如果每天吃三百颗荔枝，我愿意永远都做岭南的人。","number":50,"title_py":"shí lì zhī","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"凭栏人·暮春即事","dynasty":"元","author":"张可久","text":"<ruby>小<rt>xiǎo</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>栏<rt>lán</rt></ruby><ruby>杆<rt>gān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>掐<rt>qiā</rt></ruby>，<br><ruby>嫩<rt>nèn</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>塘<rt>táng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>乌<rt>wū</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>芳<rt>fāng</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>丫<rt>yā</rt></ruby>，<br><ruby>燕<rt>yàn</rt></ruby><ruby>衔<rt>xián</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"52月半掐：形容农历月初或月尾的一弯眉月，<br>掐：用拇指与别的指尖对握为一掐。","translation":"人小玉栏杆上挂着半掐宽一弯眉月，暮春时节池塘边绿树掩映几家茅舍，乌鸦在芳树上啼叫，燕子衔着黄柳花欢飞。","number":51,"title_py":"píng lán rén · mù chūn jí shì","author_py":"zhāng kě jiǔ","dynasty_py":"Yuán"},{"title":"生查子·元夕","dynasty":"宋","author":"欧阳修","text":"<ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>元<rt>yuán</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>花<rt>huā</rt></ruby><ruby>市<rt>shì</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>昼<rt>zhòu</rt></ruby>。<br><ruby>月<rt>yuè</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>梢<rt>shāo</rt></ruby><ruby>头<rt>tóu</rt></ruby>，<br><ruby>人<rt>rén</rt></ruby><ruby>约<rt>yuē</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>昏<rt>hūn</rt></ruby><ruby>后<rt>hòu</rt></ruby>。<br><ruby>今<rt>jīn</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>元<rt>yuán</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>月<rt>yuè</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>依<rt>yī</rt></ruby><ruby>旧<rt>jiù</rt></ruby>。<br><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>泪<rt>lèi</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>衫<rt>shān</rt></ruby><ruby>袖<rt>xiù</rt></ruby>。","notes":"月上：一作“月到”。<br>见：看见。<br>泪湿：一作“泪满”。<br>春衫：年少时穿的衣服，也指代年轻时的自己。·","translation":"去年正月十五元宵节，花市灯光像白天一样雪亮。月儿升起在柳树梢头，他约我黄昏以后同叙衷肠。今年正月十五元宵节，月光与灯光同去年一样。再也看不到去年的人，泪珠儿不觉湿透衣裳。","number":52,"title_py":"shēng chá zǐ · yuán xī","author_py":"ōu yáng xiū","dynasty_py":"Sòng"},{"title":"题秋江独钓图","dynasty":"清","author":"王士祯","text":"<ruby>一<rt>yì</rt></ruby><ruby>蓑<rt>suō</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>笠<rt>lì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>扁<rt>biǎn</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>丈<rt>zhàng</rt></ruby><ruby>丝<rt>sī</rt></ruby><ruby>纶<rt>lún</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>寸<rt>cùn</rt></ruby><ruby>钩<rt>gōu</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>曲<rt>qǔ</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>樽<rt>zūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>钓<rt>diào</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>秋<rt>qiū</rt></ruby>。","notes":"54蓑笠：蓑衣、笠帽。用草编织成的古时渔家、农民的防雨草衣；<br>笠：用竹篾或芦秆篾片编织的帽子，也是渔家、农民防日晒、防雨淋的帽子。<br>扁舟：小船。<br>秋丝纶：即丝织编成的钓鱼的绳子。<br>江樽：酒杯。<br>扁舟：小船。","translation":"戴着一顶斗笠披着一件蓑衣坐在一只小船上，一丈长的渔线一寸长的鱼钩；高声唱一首渔歌喝一樽酒，一个人在这天的江上独自垂钓。","number":53,"title_py":"tí qiū jiāng dú diào tú","author_py":"wáng shì zhēn","dynasty_py":"Qīng"},{"title":"衢州江上别李秀才","dynasty":"唐","author":"韦庄","text":"<ruby>千<rt>qiān</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>云<rt>yún</rt></ruby>，<br><ruby>把<rt>bǎ</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>曛<rt>xūn</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>曲<rt>qǔ</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>两<rt>liǎng</rt></ruby><ruby>行<rt>háng</rt></ruby><ruby>泪<rt>lèi</rt></ruby>，<br><ruby>更<rt>gèng</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>再<rt>zài</rt></ruby><ruby>逢<rt>féng</rt></ruby><ruby>君<rt>jūn</rt></ruby>。","notes":"","translation":"《衢州江上别李秀才》是唐代韦庄创作的诗词。诗中描绘了作者在衢州江面之上送别李秀才的情景。","number":54,"title_py":"qú zhōu jiāng shàng bié lǐ xiù cái","author_py":"wéi zhuāng","dynasty_py":"Táng"},{"title":"为女民兵题照","dynasty":"现代","author":"毛泽东","text":"<ruby>飒<rt>sà</rt></ruby><ruby>爽<rt>shuǎng</rt></ruby><ruby>英<rt>yīng</rt></ruby><ruby>姿<rt>zī</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>尺<rt>chǐ</rt></ruby><ruby>枪<rt>qiāng</rt></ruby>，<br><ruby>曙<rt>shǔ</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>演<rt>yǎn</rt></ruby><ruby>兵<rt>bīng</rt></ruby><ruby>场<rt>chǎng</rt></ruby>。<br><ruby>中<rt>zhōng</rt></ruby><ruby>华<rt>huá</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>女<rt>nǚ</rt></ruby><ruby>多<rt>duō</rt></ruby><ruby>奇<rt>qí</rt></ruby><ruby>志<rt>zhì</rt></ruby>，<br><ruby>不<rt>bú</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>装<rt>zhuāng</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>武<rt>wǔ</rt></ruby><ruby>装<rt>zhuāng</rt></ruby>。","notes":"56飒爽：矫健威风。<br>奇志：大志。<br>红装：女子美丽鲜艳的衣着打扮。<br>武装：战士的装束。","translation":"此诗既是一首题照诗，也是一首即景诗。作者用雅洁爽朗的语言，通过对女民兵军事训练的勾画，描绘了中国妇女前所未有的飒爽英姿，赞美了她们“巾帼不让须眉”的英雄气概，颂扬了新中国妇女崭新的时代精神风貌和随时准备保卫祖国的不平凡志气，同时通过艺术形象的塑造表达了“兵是胜利之本”的思想。","number":55,"title_py":"wèi nǚ mín bīng tí zhào","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"锦瑟","dynasty":"唐","author":"李商隐","text":"<ruby>锦<rt>jǐn</rt></ruby><ruby>瑟<rt>sè</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>端<rt>duān</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>弦<rt>xián</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>弦<rt>xián</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>柱<rt>zhù</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>华<rt>huá</rt></ruby><ruby>年<rt>nián</rt></ruby>。<br><ruby>庄<rt>zhuāng</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>晓<rt>xiǎo</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>迷<rt>mí</rt></ruby><ruby>蝴<rt>hú</rt></ruby><ruby>蝶<rt>dié</rt></ruby>，<br><ruby>望<rt>wàng</rt></ruby><ruby>帝<rt>dì</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>托<rt>tuō</rt></ruby><ruby>杜<rt>dù</rt></ruby><ruby>鹃<rt>juān</rt></ruby>。<br><ruby>沧<rt>cāng</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>珠<rt>zhū</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>泪<rt>lèi</rt></ruby>，<br><ruby>蓝<rt>lán</rt></ruby><ruby>田<rt>tián</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>追<rt>zhuī</rt></ruby><ruby>忆<rt>yì</rt></ruby>，<br><ruby>只<rt>zhǐ</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>惘<rt>wǎng</rt></ruby><ruby>然<rt>rán</rt></ruby>。","notes":"锦瑟：装饰华美的瑟。<br>瑟：拨弦乐器，通常二十五弦。","translation":"呀，你为何竟有五十条弦？每弦每节，都令人怀思黄金华年。我心如庄子，为蝴蝶晓梦而迷惘；又如望帝化杜鹃，寄托春心哀怨。沧海明月高照，鲛人泣泪皆成珠。蓝田红日和暖，可看到良玉生烟。悲欢离合之情，岂待今日来追忆，只是当年却漫不经心，早已惘然。读者尽管难以明了《锦》诗的思想内容，但那可供神游的诗境，却很容易在脑子里浮现。","number":56,"title_py":"jǐn sè","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"劝学诗","dynasty":"宋","author":"朱熹","text":"<ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>成<rt>chéng</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>寸<rt>cùn</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>轻<rt>qīng</rt></ruby>。<br><ruby>未<rt>wèi</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>塘<rt>táng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>梦<rt>mèng</rt></ruby>，<br><ruby>阶<rt>jiē</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>梧<rt>wú</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>声<rt>shēng</rt></ruby>。","notes":"“池塘生春草，园柳变鸣禽”是谢灵运《登池上楼》中58的诗句，后被赞誉为写春意的千古名句，此处活用其典，意谓美好的青春年华将很快消逝，如同一场春梦。秋声：秋时西风作，草木凋零，多肃杀之声。","translation":"青春的日子十分容易逝去，学问却很难获得成功，所以每一寸光阴都要珍惜，不能轻易放过。没等池塘生春草的美梦醒来，台阶前的梧桐树叶就已经在秋风里沙沙作响了。","number":57,"title_py":"quàn xué shī","author_py":"zhū xī","dynasty_py":"Sòng"},{"title":"读书","dynasty":"宋","author":"陆游","text":"<ruby>归<rt>guī</rt></ruby><ruby>志<rt>zhì</rt></ruby><ruby>宁<rt>níng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>亩<rt>mǔ</rt></ruby><ruby>园<rt>yuán</rt></ruby>，<br><ruby>读<rt>dú</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>本<rt>běn</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>元<rt>yuán</rt></ruby><ruby>元<rt>yuán</rt></ruby>。<br><ruby>灯<rt>dēng</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>目<rt>mù</rt></ruby><ruby>力<rt>lì</rt></ruby><ruby>虽<rt>suī</rt></ruby><ruby>非<rt>fēi</rt></ruby><ruby>昔<rt>xī</rt></ruby>，<br><ruby>犹<rt>yóu</rt></ruby><ruby>课<rt>kè</rt></ruby><ruby>蝇<rt>yíng</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>二<rt>èr</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>言<rt>yán</rt></ruby>。","notes":"宁无：难道没有。<br>元元：指人民。<br>课：这里作阅读解。<br>蝇头：比喻字小的和苍蝇头一样。","translation":"离任回家难道还没有五亩田地可以维持生活吗？我读的目的原来是为了人民的。在微弱的油灯下看书，眼睛已大不如从前了。但我每天仍然要阅读二万多如蝇头一样字的籍。","number":58,"title_py":"dú shū","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"喜见外弟又言别","dynasty":"唐","author":"李益","text":"<ruby>十<rt>shí</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>乱<rt>luàn</rt></ruby><ruby>后<rt>hòu</rt></ruby>，<br><ruby>长<rt>zhǎng</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>逢<rt>féng</rt></ruby>。<br><ruby>问<rt>wèn</rt></ruby><ruby>姓<rt>xìng</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>见<rt>jiàn</rt></ruby>，<br><ruby>称<rt>chēng</rt></ruby><ruby>名<rt>míng</rt></ruby><ruby>忆<rt>yì</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>容<rt>róng</rt></ruby>。<br><ruby>别<rt>bié</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>沧<rt>cāng</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>事<rt>shì</rt></ruby>，<br><ruby>语<rt>yǔ</rt></ruby><ruby>罢<rt>bà</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>钟<rt>zhōng</rt></ruby>。<br><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>巴<rt>bā</rt></ruby><ruby>陵<rt>líng</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>秋<rt>qiū</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>重<rt>chóng</rt></ruby>。","notes":"外弟：表弟。<br>言别：话别。<br>言十年离乱：在社会大动乱中离别了十年。<br>别别来：指分别十年以来。<br>沧海事：比喻世事的巨大变化，有如沧海变桑田，桑田变沧海那样。<br>语罢：谈话停止。<br>暮天钟：黄昏寺院的鸣钟。<br>巴陵：即岳州（治今湖南省岳阳市），即诗中外弟将去的地方。","translation":"经过了近十年的战乱流离，长大成人后竟然意外相逢。初见不相识还惊问名和姓，称名后才想起旧时的面容。说不完别离后世事的变化，一直畅谈到黄昏寺院鸣钟。明日你又要登上巴陵古道，秋山添忧愁不知又隔几重？","number":59,"title_py":"xǐ jiàn wài dì yòu yán bié","author_py":"lǐ yì","dynasty_py":"Táng"},{"title":"月夜忆舍弟","dynasty":"唐","author":"杜甫","text":"<ruby>戍<rt>shù</rt></ruby><ruby>鼓<rt>gǔ</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>行<rt>xíng</rt></ruby>，<br><ruby>边<rt>biān</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>雁<rt>yàn</rt></ruby><ruby>声<rt>shēng</rt></ruby>。<br><ruby>露<rt>lù</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>白<rt>bái</rt></ruby>，<br><ruby>月<rt>yuè</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>有<rt>yǒu</rt></ruby><ruby>弟<rt>dì</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>分<rt>fēn</rt></ruby><ruby>散<rt>sàn</rt></ruby>，<br><ruby>无<rt>wú</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>死<rt>sǐ</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>寄<rt>jì</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>达<rt>dá</rt></ruby>，<br><ruby>况<rt>kuàng</rt></ruby><ruby>乃<rt>nǎi</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>休<rt>xiū</rt></ruby><ruby>兵<rt>bīng</rt></ruby>。","notes":"舍弟：谦称自己的弟弟。<br>戍鼓：戍楼上的更鼓。戍，驻防。<br>断人行：指鼓声响起后，就开始宵禁。<br>露从今夜白：指在气节“白露”的一个夜晚。","translation":"戍楼上的更鼓声隔断了人们的来往，边塞的秋天里，一只孤雁正在鸣叫。从今夜就进入了白露节气，月亮还是故乡的最明亮。有兄弟却都分散了，没有家无法探问生死。寄往洛阳城的家书常常不能送到，何况战乱频繁没有停止。","number":60,"title_py":"yuè yè yì shě dì","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"嫦娥","dynasty":"唐","author":"李商隐","text":"<ruby>云<rt>yún</rt></ruby><ruby>母<rt>mǔ</rt></ruby><ruby>屏<rt>píng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>烛<rt>zhú</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>深<rt>shēn</rt></ruby>，<br><ruby>长<rt>cháng</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>渐<rt>jiàn</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>晓<rt>xiǎo</rt></ruby><ruby>星<rt>xīng</rt></ruby><ruby>沉<rt>chén</rt></ruby>。<br><ruby>嫦<rt>cháng</rt></ruby><ruby>娥<rt>é</rt></ruby><ruby>应<rt>yīng</rt></ruby><ruby>悔<rt>huǐ</rt></ruby><ruby>偷<rt>tōu</rt></ruby><ruby>灵<rt>líng</rt></ruby><ruby>药<rt>yào</rt></ruby>，<br><ruby>碧<rt>bì</rt></ruby><ruby>海<rt>hǎi</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>心<rt>xīn</rt></ruby>。","notes":"嫦娥：古代神话中的月中仙女，江苏人。《淮南子·览冥训》：“羿请不死之药于西王母，恒娥窃以奔月。”恒又作姮。<br>云母屏风：嵌着云母石的屏风。此言嫦娥在月宫居室中独处，夜晚，唯烛影和屏风相伴。<br>嫦长河句：银河逐渐向西倾斜，晓星也将隐没，又一个孤独的夜过去了。<br>碧海：《十洲记》：“扶桑在东海之东岸，岸直，陆行登岸一万里，东复有碧海，海阔狭浩汗，与东海等，水既不咸苦，正作碧色。”","translation":"云母屏风染上一层浓浓的烛影，银河逐渐斜落启明星也已下沉。想必悔恨当初偷吃下灵药，如今独处碧海青天而夜夜寒心。","number":61,"title_py":"cháng é","author_py":"lǐ shāng yǐn","dynasty_py":"Táng"},{"title":"落叶","dynasty":"唐","author":"孔绍安","text":"<ruby>早<rt>zǎo</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>惊<rt>jīng</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>叶<rt>yè</rt></ruby>，<br><ruby>飘<rt>piāo</rt></ruby><ruby>零<rt>líng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>心<rt>xīn</rt></ruby>。<br><ruby>翻<rt>fān</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>肯<rt>kěn</rt></ruby><ruby>下<rt>xià</rt></ruby>，<br><ruby>犹<rt>yóu</rt></ruby><ruby>言<rt>yán</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>林<rt>lín</rt></ruby>。","notes":"64零：凋零。","translation":"秋气早来，树叶飘落，令人心惊；凋零之情就如同这远客的遭遇。树叶翻飞仿佛不愿落地；还在诉说着不忍离开这片森林。","number":62,"title_py":"luò yè","author_py":"kǒng shào ān","dynasty_py":"Táng"},{"title":"听弹琴","dynasty":"唐","author":"刘长卿","text":"<ruby>泠<rt>líng</rt></ruby><ruby>泠<rt>líng</rt></ruby><ruby>七<rt>qī</rt></ruby><ruby>弦<rt>xián</rt></ruby><ruby>上<rt>shàng</rt></ruby>，<br><ruby>静<rt>jìng</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>松<rt>sōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>寒<rt>hán</rt></ruby>。<br><ruby>古<rt>gǔ</rt></ruby><ruby>调<rt>diào</rt></ruby><ruby>虽<rt>suī</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>爱<rt>ài</rt></ruby>，<br><ruby>今<rt>jīn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>多<rt>duō</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>弹<rt>dàn</rt></ruby>。","notes":"泠泠：形容清凉、清淡，也形容声音清越。<br>丝：一作“弦”。<br>松风：以风入松林暗示琴声凄凉。琴曲中有《风入松》的调名。<br>古调：古时的曲调。听","translation":"七弦琴奏出清凉的曲调悠扬起伏，细细倾听就像那滚滚的松涛声。我虽然很喜爱这首古时的曲调，但在今天人们大多已不去弹奏了。","number":63,"title_py":"tīng tán qín","author_py":"liú zhǎng qīng","dynasty_py":"Táng"},{"title":"山中杂诗","dynasty":"南朝","author":"吴均","text":"<ruby>山<rt>shān</rt></ruby><ruby>际<rt>jì</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>烟<rt>yān</rt></ruby>，<br><ruby>竹<rt>zhú</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>窥<rt>kuī</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>日<rt>rì</rt></ruby>。<br><ruby>鸟<rt>niǎo</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>檐<rt>yán</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>飞<rt>fēi</rt></ruby>，<br><ruby>云<rt>yún</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>出<rt>chū</rt></ruby>。","notes":"山际：山与天相接的地方。<br>烟：此指云雾。<br>窥：从缝隙中看。<br>檐：房檐。","translation":"与天相接的地方上缭绕着阵阵的岚气云烟，竹林的缝隙里洒落下夕阳的余晖。鸟儿欢快地在房檐上飞来飞去，白白的云儿竟然从窗户里飘了出来。","number":64,"title_py":"shān zhōng zá shī","author_py":"wú jūn","dynasty_py":"Nán Cháo"},{"title":"有约","dynasty":"宋","author":"赵师秀","text":"<ruby>黄<rt>huáng</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>，<br><ruby>青<rt>qīng</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>塘<rt>táng</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>蛙<rt>wā</rt></ruby>。<br><ruby>有<rt>yǒu</rt></ruby><ruby>约<rt>yuē</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>半<rt>bàn</rt></ruby>，<br><ruby>闲<rt>xián</rt></ruby><ruby>敲<rt>qiāo</rt></ruby><ruby>棋<rt>qí</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"黄梅时节：五月，江南梅子熟了，大都是阴雨绵绵的时候，称为“梅雨季节”，所以称江南雨季为“黄梅时节”。意思就是夏初江南梅子黄熟的时节。<br>家家雨：家家户户都赶上下雨。形容处处都在下雨。<br>有处处蛙：到处是蛙声。<br>有约：即为邀约友人。<br>落灯花：旧时以油灯照明，灯心烧残，落下来时好像一朵闪亮的小花。落，使……掉落。灯花，灯芯燃尽结成的花状物。","translation":"黄梅时节一个梅雨绵绵的夜晚，乡村的青草池塘中传来阵阵蛙鸣。这时已经是半夜了，朋友却没有如约到来，无聊地敲着棋子，灯灰震落在棋盘上。","number":65,"title_py":"yǒu yuē","author_py":"zhào shī xiù","dynasty_py":"Sòng"},{"title":"对酒","dynasty":"近代","author":"秋瑾","text":"<ruby>不<rt>bù</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>买<rt>mǎi</rt></ruby><ruby>宝<rt>bǎo</rt></ruby><ruby>刀<rt>dāo</rt></ruby>，<br><ruby>貂<rt>diāo</rt></ruby><ruby>裘<rt>qiú</rt></ruby><ruby>换<rt>huàn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>也<rt>yě</rt></ruby><ruby>堪<rt>kān</rt></ruby><ruby>豪<rt>háo</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>腔<rt>qiāng</rt></ruby><ruby>热<rt>rè</rt></ruby><ruby>血<rt>xuè</rt></ruby><ruby>勤<rt>qín</rt></ruby><ruby>珍<rt>zhēn</rt></ruby><ruby>重<rt>zhòng</rt></ruby>，<br><ruby>洒<rt>sǎ</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>化<rt>huà</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>涛<rt>tāo</rt></ruby>。","notes":"","translation":"不吝惜花费千金去买一把好刀，用貂皮大衣去换美酒也算得上豪迈。应该多珍惜这一腔革命的热血，将来献出它时，定能化成碧绿的波涛。","number":66,"title_py":"duì jiǔ","author_py":"qiū jǐn","dynasty_py":"Jìn dài"},{"title":"山亭夏日","dynasty":"唐","author":"高骈","text":"<ruby>绿<rt>lǜ</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>浓<rt>nóng</rt></ruby><ruby>夏<rt>xià</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>长<rt>cháng</rt></ruby>，<br><ruby>楼<rt>lóu</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>倒<rt>dào</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>塘<rt>táng</rt></ruby>。<br><ruby>水<rt>shuǐ</rt></ruby><ruby>晶<rt>jīng</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>动<rt>dòng</rt></ruby><ruby>微<rt>wēi</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>起<rt>qǐ</rt></ruby>，<br><ruby>满<rt>mǎn</rt></ruby><ruby>架<rt>jià</rt></ruby><ruby>蔷<rt>qiáng</rt></ruby><ruby>薇<rt>wēi</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>院<rt>yuàn</rt></ruby><ruby>香<rt>xiāng</rt></ruby>。","notes":"浓：指树丛的阴影很浓稠。<br>水晶帘：又名水精帘，是一种质地精细而色泽莹澈的帘。山比喻晶莹华美的帘子。<br>蔷薇：植物名。亦指这种植物的花。","translation":"绿树葱郁浓阴夏日漫长，楼台的倒影映入了池塘。水精帘在抖动微风拂起，满架蔷薇惹得一院芳香。","number":67,"title_py":"shān tíng xià rì","author_py":"gāo pián","dynasty_py":"Táng"},{"title":"鹿柴","dynasty":"唐","author":"王维","text":"<ruby>空<rt>kōng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>但<rt>dàn</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>响<rt>xiǎng</rt></ruby>。<br><ruby>返<rt>fǎn</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>林<rt>lín</rt></ruby>，<br><ruby>复<rt>fù</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>苔<rt>tái</rt></ruby><ruby>上<rt>shàng</rt></ruby>。","notes":"鹿柴：以木栅为栏，谓之柴，鹿柴乃鹿居住的地方。<br>鹿返影：指日落时分，阳光返射到东方的景象。","translation":"山中空空荡荡不见人影，只听得喧哗的人语声响。夕阳的金光射入深林中，青苔上映着昏黄的微光。","number":68,"title_py":"lù chái","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"赠别二首·其一","dynasty":"唐","author":"杜牧","text":"<ruby>娉<rt>pīng</rt></ruby><ruby>娉<rt>pīng</rt></ruby><ruby>袅<rt>niǎo</rt></ruby><ruby>袅<rt>niǎo</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>余<rt>yú</rt></ruby>，<br><ruby>豆<rt>dòu</rt></ruby><ruby>蔻<rt>kòu</rt></ruby><ruby>梢<rt>shāo</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>初<rt>chū</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>扬<rt>yáng</rt></ruby><ruby>州<rt>zhōu</rt></ruby><ruby>路<rt>lù</rt></ruby>，<br><ruby>卷<rt>juǎn</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>珠<rt>zhū</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>总<rt>zǒng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>如<rt>rú</rt></ruby>。","notes":"娉娉袅袅：形容女子体态轻盈美好。<br>十三余：言其年龄。","translation":"十三四岁的少女姿态袅娜，举止轻盈美好，就像二月里含苞待放，初现梢头的豆蔻花。十里扬州路的春风骀荡，珠帘翠幕中的佳人姝丽没有比得上她。","number":69,"title_py":"zèng bié èr shǒu · qí yī","author_py":"dù mù","dynasty_py":"Táng"},{"title":"赠别二首·其二","dynasty":"唐","author":"杜牧","text":"<ruby>多<rt>duō</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>总<rt>zǒng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>情<rt>qíng</rt></ruby>，<br><ruby>唯<rt>wéi</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>樽<rt>zūn</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>成<rt>chéng</rt></ruby>。<br><ruby>蜡<rt>là</rt></ruby><ruby>烛<rt>zhú</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>还<rt>hái</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>别<rt>bié</rt></ruby>，<br><ruby>替<rt>tì</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>垂<rt>chuí</rt></ruby><ruby>泪<rt>lèi</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>明<rt>míng</rt></ruby>。","notes":"樽：古代盛酒的器具。","translation":"多情的人却像是无情人儿一样冰冷，在离别的酒宴上只觉笑不出声。蜡烛仿佛还有惜别的心意，替离别的人流泪到天明。","number":70,"title_py":"zèng bié èr shǒu · qí èr","author_py":"dù mù","dynasty_py":"Táng"},{"title":"金陵酒肆留别","dynasty":"唐","author":"李白","text":"<ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>店<rt>diàn</rt></ruby><ruby>香<rt>xiāng</rt></ruby>，<br><ruby>吴<rt>wú</rt></ruby><ruby>姬<rt>jī</rt></ruby><ruby>压<rt>yā</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>劝<rt>quàn</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>尝<rt>cháng</rt></ruby>。<br><ruby>金<rt>jīn</rt></ruby><ruby>陵<rt>líng</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>弟<rt>dì</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>送<rt>sòng</rt></ruby>，<br><ruby>欲<rt>yù</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>各<rt>gè</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>觞<rt>shāng</rt></ruby>。<br><ruby>请<rt>qǐng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>试<rt>shì</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>别<rt>bié</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>短<rt>duǎn</rt></ruby><ruby>长<rt>cháng</rt></ruby>。","notes":"金陵：今江苏省南京市。<br>酒肆：酒店。<br>吴姬：吴地的青年女子，这里指酒店中的侍女。<br>酒子弟：指李白的朋友。<br>欲行：将要走的人，指诗人自己。<br>不行：不走的人，即送行的人，指金陵子弟。<br>尽觞：喝尽杯中的酒。觞，酒杯。","translation":"春风吹起柳絮酒店满屋飘香，侍女捧出美酒，劝我细细品尝。金陵年轻朋友纷纷赶来相送。欲走还留之间，各自畅饮悲欢。请你问问东流江水，离情别意与它比谁短谁长？","number":71,"title_py":"jīn líng jiǔ sì liú bié","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"送灵澈上人","dynasty":"唐","author":"刘长卿","text":"<ruby>苍<rt>cāng</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>寺<rt>sì</rt></ruby>，<br><ruby>杳<rt>yǎo</rt></ruby><ruby>杳<rt>yǎo</rt></ruby><ruby>钟<rt>zhōng</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>晚<rt>wǎn</rt></ruby>。<br><ruby>荷<rt>hè</rt></ruby><ruby>笠<rt>lì</rt></ruby><ruby>带<rt>dài</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>阳<rt>yáng</rt></ruby>，<br><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>远<rt>yuǎn</rt></ruby>。","notes":"灵澈上人：唐代著名僧人。上人，对僧人的敬称。<br>苍苍：深青色。<br>竹林寺：在现在江苏丹徒南。<br>杳杳：深远的样子。<br>荷笠：背着斗笠。<br>荷：背着。","translation":"遥望苍苍山林中的竹林寺，远远传来报时的钟响声。他带着斗笠身披斜阳余晖，独自向青山走去，渐行渐远。","number":72,"title_py":"sòng líng chè shàng rén","author_py":"liú zhǎng qīng","dynasty_py":"Táng"},{"title":"杂诗","dynasty":"唐","author":"无名氏","text":"<ruby>近<rt>jìn</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>萋<rt>qī</rt></ruby><ruby>萋<rt>qī</rt></ruby>，<br><ruby>著<rt>zhuó</rt></ruby><ruby>麦<rt>mài</rt></ruby><ruby>苗<rt>miáo</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>映<rt>yìng</rt></ruby><ruby>堤<rt>dī</rt></ruby>。<br><ruby>等<rt>děng</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>得<rt>dé</rt></ruby>，<br><ruby>杜<rt>dù</rt></ruby><ruby>鹃<rt>juān</rt></ruby><ruby>休<rt>xiū</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>耳<rt>ěr</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>啼<rt>tí</rt></ruby>。","notes":"著：吹入。<br>等是：为何。<br>杜鹃：鸟名，即子规。","translation":"时令将近寒食，春雨绵绵春草萋萋；春风过处苗麦摇摆，堤上杨柳依依。这是为什么啊，我却有家归去不得？杜鹃呵，不要在我耳边不停地悲啼。","number":73,"title_py":"zá shī","author_py":"wú míng shì","dynasty_py":"Táng"},{"title":"思吴江歌","dynasty":"魏晋","author":"张翰","text":"<ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>飞<rt>fēi</rt></ruby>，<br><ruby>吴<rt>wú</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>鲈<rt>lú</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>肥<rt>féi</rt></ruby>。<br><ruby>三<rt>sān</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>归<rt>guī</rt></ruby>，<br><ruby>恨<rt>hèn</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>禁<rt>jìn</rt></ruby><ruby>兮<rt>xī</rt></ruby><ruby>仰<rt>yǎng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>悲<rt>bēi</rt></ruby>。","notes":"木叶：树叶。<br>鲈鱼：即桂花鱼。","translation":"秋风乍起，落叶飘飞，吴江的鲈鱼新鲜又肥美。离家千里想回又不能回，心中的愁思怎么也压抑不住，只能向天悲叹！","number":74,"title_py":"sī wú jiāng gē","author_py":"zhāng hàn","dynasty_py":"Wèi Jìn"},{"title":"边城思","dynasty":"南北朝","author":"何逊","text":"<ruby>柳<rt>liǔ</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>吐<rt>tǔ</rt></ruby><ruby>叶<rt>yè</rt></ruby>，<br><ruby>水<rt>shuǐ</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>含<rt>hán</rt></ruby><ruby>苔<rt>tái</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>动<rt>dòng</rt></ruby>，<br><ruby>客<rt>kè</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"“柳黄未吐叶，水绿半含苔”，写的正是早春景象。柳色黄而已，尚未吐出细叶；水色绿而已，苔衣尚未长成。这正是冬尽春来的一、二月之际，春意萌动，春色逗露之时。而当边城春色动的时候，客居边城的游子也就格外思乡念家了。","translation":"","number":75,"title_py":"biān chéng sī","author_py":"hé xùn","dynasty_py":"Nán Běi Cháo"},{"title":"一毛不拔","dynasty":"三国","author":"《笑林》","text":"<ruby>一<rt>yì</rt></ruby><ruby>猴<rt>hóu</rt></ruby><ruby>死<rt>sǐ</rt></ruby>，<ruby>见<rt>jiàn</rt></ruby><ruby>冥<rt>míng</rt></ruby><ruby>王<rt>wáng</rt></ruby>，<ruby>求<rt>qiú</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>身<rt>shēn</rt></ruby>。<br><ruby>王<rt>wáng</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>既<rt>jì</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>做<rt>zuò</rt></ruby><ruby>人<rt>rén</rt></ruby>，<ruby>须<rt>xū</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>毛<rt>máo</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>拔<rt>bá</rt></ruby><ruby>去<rt>qù</rt></ruby>。<br>\"<ruby>即<rt>jí</rt></ruby><ruby>唤<rt>huàn</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>叉<rt>chā</rt></ruby><ruby>拔<rt>bá</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>方<rt>fāng</rt></ruby><ruby>拔<rt>bá</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>根<rt>gēn</rt></ruby>，<ruby>猴<rt>hóu</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>痛<rt>tòng</rt></ruby><ruby>叫<rt>jiào</rt></ruby>。<br><ruby>王<rt>wáng</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>看<rt>kàn</rt></ruby><ruby>你<rt>nǐ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>毛<rt>máo</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>拔<rt>bá</rt></ruby>，<ruby>如<rt>rú</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>做<rt>zuò</rt></ruby><ruby>人<rt>rén</rt></ruby>？<br>\"","notes":"一毛不拔：猴子想转世为人，但不能忍受拔出一根毫毛的痛苦。借此讽刺极其吝啬自私的人。","translation":"","number":76,"title_py":"yī máo bù bá","author_py":"《 xiào lín 》","dynasty_py":"Sān Guó"},{"title":"狐假虎威","dynasty":"汉","author":"刘向","text":"<ruby>虎<rt>hǔ</rt></ruby><ruby>求<rt>qiú</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>兽<rt>shòu</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<ruby>得<rt>dé</rt></ruby><ruby>狐<rt>hú</rt></ruby>。<br><ruby>狐<rt>hú</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>子<rt>zǐ</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>也<rt>yě</rt></ruby>！<br><ruby>天<rt>tiān</rt></ruby><ruby>帝<rt>dì</rt></ruby><ruby>使<rt>shǐ</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>长<rt>zhǎng</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>兽<rt>shòu</rt></ruby>，<ruby>今<rt>jīn</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>我<rt>wǒ</rt></ruby>，<ruby>是<rt>shì</rt></ruby><ruby>逆<rt>nì</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>帝<rt>dì</rt></ruby><ruby>命<rt>mìng</rt></ruby><ruby>也<rt>yě</rt></ruby>。<br><ruby>子<rt>zǐ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>信<rt>xìn</rt></ruby>，<ruby>吾<rt>wú</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>先<rt>xiān</rt></ruby><ruby>行<rt>xíng</rt></ruby>，<ruby>子<rt>zǐ</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>后<rt>hòu</rt></ruby>，<ruby>观<rt>guān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>兽<rt>shòu</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>敢<rt>gǎn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>走<rt>zǒu</rt></ruby><ruby>乎<rt>hū</rt></ruby>？<br>\"<ruby>虎<rt>hǔ</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>然<rt>rán</rt></ruby>，<ruby>故<rt>gù</rt></ruby><ruby>遂<rt>suì</rt></ruby><rub
