><ruby>徘<rt>pái</rt></ruby><ruby>徊<rt>huái</rt></ruby>。<br><ruby>问<rt>wèn</rt></ruby><ruby>渠<rt>qú</rt></ruby><ruby>哪<rt>nǎ</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>许<rt>xǔ</rt></ruby>，<br><ruby>为<rt>wèi</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>源<rt>yuán</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>活<rt>huó</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"①鉴：镜子。<br>②徘徊：此处指来回闪动。<br>③渠：它指方塘。","translation":"半亩大的池塘像明镜一样，映照着来回闪动的天光云影。要问这池塘怎么这样清澈？原来有活水不断从源头流来啊！诗的寓意很深，以源头活水比喻学习，要不断吸取新知识，才能有日新月异的进步。","number":2,"title_py":"guān shū yǒu gǎn （ qí yī ）","author_py":"zhū xī","dynasty_py":"Sòng"},{"title":"咏柳","dynasty":"唐","author":"贺知章","text":"<ruby>碧<rt>bì</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>妆<rt>zhuāng</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>高<rt>gāo</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>条<rt>tiáo</rt></ruby><ruby>垂<rt>chuí</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>丝<rt>sī</rt></ruby><ruby>绦<rt>tāo</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>裁<rt>cái</rt></ruby><ruby>出<rt>chū</rt></ruby>，<br><ruby>二<rt>èr</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>剪<rt>jiǎn</rt></ruby><ruby>刀<rt>dāo</rt></ruby>。","notes":"①碧玉：碧绿色的玉。这里用以比喻春天嫩绿的柳叶。<br>②一树：满树。<br>一：满，全。在中国古典诗词和文章中，数量词在使用中并不一定表示确切的数量。下一句的“万”，就是表示很多的意思。③绦（tāo）：用丝编成的绳带。这里指像丝带一样的柳条。","translation":"高高的柳树长满了翠绿的新叶，轻柔的柳枝垂下来，就像万条轻轻飘动的绿色丝带。这细细的嫩叶是谁的巧手裁剪出来的呢？原来是那二月里温暖的春风，它就像一把灵巧的剪刀。","number":3,"title_py":"yǒng liǔ","author_py":"hè zhī zhāng","dynasty_py":"Táng"},{"title":"凉州词","dynasty":"唐","author":"王翰","text":"<ruby>葡<rt>pú</rt></ruby><ruby>萄<rt>táo</rt></ruby><ruby>美<rt>měi</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>杯<rt>bēi</rt></ruby>，<br><ruby>欲<rt>yù</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>琵<rt>pí</rt></ruby><ruby>琶<rt>pá</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>催<rt>cuī</rt></ruby>。<br><ruby>醉<rt>zuì</rt></ruby><ruby>卧<rt>wò</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>场<rt>chǎng</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>笑<rt>xiào</rt></ruby>，<br><ruby>古<rt>gǔ</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>征<rt>zhēng</rt></ruby><ruby>战<rt>zhàn</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>回<rt>huí</rt></ruby>？","notes":"①凉州词：唐乐府名，盛唐时流行的一种曲调名。<br>②葡萄美酒：指西域盛产葡萄，可酿制美酒。","translation":"甘醇的葡萄酒装满了夜光杯，刚准备喝时马上传来琵琶的促催声。我醉倒在沙场上你不要见笑，自古以来出征打仗的有几个人还能回。","number":4,"title_py":"liáng zhōu cí","author_py":"wáng hàn","dynasty_py":"Táng"},{"title":"早发白帝城","dynasty":"唐","author":"李白","text":"<ruby>朝<rt>zhāo</rt></ruby><ruby>辞<rt>cí</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>帝<rt>dì</rt></ruby><ruby>彩<rt>cǎi</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>间<rt>jiān</rt></ruby>，<br><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>陵<rt>líng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>还<rt>huán</rt></ruby>。<br><ruby>两<rt>liǎng</rt></ruby><ruby>岸<rt>àn</rt></ruby><ruby>猿<rt>yuán</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>住<rt>zhù</rt></ruby>，<br><ruby>轻<rt>qīng</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>山<rt>shān</rt></ruby>。","notes":"①朝：早晨。<br>②辞：告别。","translation":"晨告别彩云间的白帝城，到江陵的千里路一日即可回早返。两岸的猿声还在耳边不停地回响，一叶小舟已驶过万重山峦。","number":5,"title_py":"zǎo fā bái dì chéng","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"黄鹤楼送孟浩然之广陵","dynasty":"唐","author":"李白","text":"<ruby>故<rt>gù</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>辞<rt>cí</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>鹤<rt>hè</rt></ruby><ruby>楼<rt>lóu</rt></ruby>，<br><ruby>烟<rt>yān</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>扬<rt>yáng</rt></ruby><ruby>州<rt>zhōu</rt></ruby>。<br><ruby>孤<rt>gū</rt></ruby><ruby>帆<rt>fān</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>尽<rt>jìn</rt></ruby>，<br><ruby>唯<rt>wéi</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>际<rt>jì</rt></ruby><ruby>流<rt>liú</rt></ruby>。","notes":"①下：沿江顺流而下。<br>②唯：只。<br>③天际：天边。","translation":"老朋友离开西边黄鹤楼，在明媚的春天里去往扬州。孤帆远去在水天尽头，只见长江向天边奔流。","number":6,"title_py":"huáng hè lóu sòng mèng hào rán zhī guǎng líng","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"忆江南","dynasty":"唐","author":"白居易","text":"<ruby>江<rt>jiāng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>好<rt>hǎo</rt></ruby>，<br><ruby>风<rt>fēng</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>曾<rt>céng</rt></ruby><ruby>谙<rt>ān</rt></ruby>①。<br><ruby>日<rt>rì</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>花<rt>huā</rt></ruby>②<ruby>红<rt>hóng</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>火<rt>huǒ</rt></ruby>，<br><ruby>春<rt>chūn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>蓝<rt>lán</rt></ruby>③。<br><ruby>能<rt>néng</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>忆<rt>yì</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>南<rt>nán</rt></ruby>？","notes":"①谙（ān）：熟悉。②江花：江边的花朵。一说指江中的浪花。<br>③蓝：蓝草，叶子青绿色的可以用来制作染料。","translation":"是个好地方，那里的风景我熟悉。日出时，江边红南花比火还红艳，春天里，一江绿水仿佛被蓝草浸染。怎能让人不常常思念美好的江南？","number":7,"title_py":"yì jiāng nán","author_py":"bái jū yì","dynasty_py":"Táng"},{"title":"九月九日忆山东兄弟","dynasty":"唐","author":"王维","text":"<ruby>独<rt>dú</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>异<rt>yì</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>异<rt>yì</rt></ruby><ruby>客<rt>kè</rt></ruby>，<br><ruby>每<rt>měi</rt></ruby><ruby>逢<rt>féng</rt></ruby><ruby>佳<rt>jiā</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>倍<rt>bèi</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>亲<rt>qīn</rt></ruby>。<br><ruby>遥<rt>yáo</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>兄<rt>xiōng</rt></ruby><ruby>弟<rt>dì</rt></ruby><ruby>登<rt>dēng</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>遍<rt>biàn</rt></ruby><ruby>插<rt>chā</rt></ruby><ruby>茱<rt>zhū</rt></ruby><ruby>萸<rt>yú</rt></ruby><ruby>少<rt>shǎo</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"①异乡：他乡。<br>②倍：加倍，更加。<br>③遥知：远远推想。","translation":"独居他乡是外来的客，每逢佳节更加怀念家乡和亲人。遥想弟兄们在登高的地方，都插上茱萸只少了我一个人。","number":8,"title_py":"jiǔ yuè jiǔ rì yì shān dōng xiōng dì","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"题西林壁","dynasty":"宋","author":"苏轼","text":"<ruby>横<rt>héng</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>岭<rt>lǐng</rt></ruby><ruby>侧<rt>cè</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>峰<rt>fēng</rt></ruby>，<br><ruby>远<rt>yuǎn</rt></ruby><ruby>近<rt>jìn</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>低<rt>dī</rt></ruby><ruby>各<rt>gè</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>同<rt>tóng</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>识<rt>shí</rt></ruby><ruby>庐<rt>lú</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>真<rt>zhēn</rt></ruby><ruby>面<rt>miàn</rt></ruby><ruby>目<rt>mù</rt></ruby>，<br><ruby>只<rt>zhǐ</rt></ruby><ruby>缘<rt>yuán</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。","notes":"①横看：从正面看。<br>②识：知道。<br>③缘：由于，因为。","translation":"横看是蜿蜒山岭侧看是险峻高峰，远近高低看过去千姿百态不相同。之所以不能认识庐山的真实面目，只因为身处在这层峦叠嶂深山中。林","number":9,"title_py":"tí xī lín bì","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"小池","dynasty":"宋","author":"杨万里","text":"<ruby>泉<rt>quán</rt></ruby><ruby>眼<rt>yǎn</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>流<rt>liú</rt></ruby>，<br><ruby>树<rt>shù</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>柔<rt>róu</rt></ruby>。<br><ruby>小<rt>xiǎo</rt></ruby><ruby>荷<rt>hé</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>尖<rt>jiān</rt></ruby><ruby>尖<rt>jiān</rt></ruby><ruby>角<rt>jiǎo</rt></ruby>，<br><ruby>早<rt>zǎo</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>蜻<rt>qīng</rt></ruby><ruby>蜓<rt>tíng</rt></ruby><ruby>立<rt>lì</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>头<rt>tóu</rt></ruby>。","notes":"①泉眼：泉水的出口。<br>②惜：吝啬。<br>③细流：细小的流水。","translation":"泉眼悄无声息是因舍不得细细的水流，树阴映水面是它喜欢晴日的温柔。小小的嫩荷刚露出紧裹的叶尖，早飞来可爱的蜻蜓站立在上头。","number":10,"title_py":"xiǎo chí","author_py":"yáng wàn lǐ","dynasty_py":"Sòng"},{"title":"泊船瓜洲","dynasty":"宋","author":"王安石","text":"<ruby>京<rt>jīng</rt></ruby><ruby>口<rt>kǒu</rt></ruby><ruby>瓜<rt>guā</rt></ruby><ruby>洲<rt>zhōu</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>间<rt>jiān</rt></ruby>，<br><ruby>钟<rt>zhōng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>隔<rt>gé</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>山<rt>shān</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>岸<rt>àn</rt></ruby>，<br><ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>还<rt>huán</rt></ruby>？","notes":"①京口：古城名，今江苏省镇江市，与瓜洲隔江相对。<br>②绿：吹绿。","translation":"京口与瓜洲分别在长江两岸，回头望钟山家门只隔几重泊山。春风又吹绿了江南千里岸边，问明月何时能照我再返家园？","number":11,"title_py":"pō chuán guā zhōu","author_py":"wáng ān shí","dynasty_py":"Sòng"},{"title":"赤壁","dynasty":"唐","author":"杜牧","text":"<ruby>折<rt>zhé</rt></ruby><ruby>戟<rt>jǐ</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>铁<rt>tiě</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>销<rt>xiāo</rt></ruby>，<br><ruby>自<rt>zì</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>磨<rt>mó</rt></ruby><ruby>洗<rt>xǐ</rt></ruby><ruby>认<rt>rèn</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>朝<rt>cháo</rt></ruby>。<br><ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>周<rt>zhōu</rt></ruby><ruby>郎<rt>láng</rt></ruby><ruby>便<rt>biàn</rt></ruby>，<br><ruby>铜<rt>tóng</rt></ruby><ruby>雀<rt>què</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>锁<rt>suǒ</rt></ruby><ruby>二<rt>èr</rt></ruby><ruby>乔<rt>qiáo</rt></ruby>。","notes":"①前朝：以前的时代。<br>②周郎：吴国的年轻将领周瑜。","translation":"一只深埋在泥沙里的断戟，虽然历时久远，但并未完全锈蚀。我把它捡起来磨洗干净，还能认出是三国赤壁之战的遗物。如果不是东风帮助周瑜获得火烧曹军的胜利，恐怕吴国的国色大乔、小乔就要被幽禁在曹操的铜雀台上了。","number":12,"title_py":"chì bì","author_py":"dù mù","dynasty_py":"Táng"},{"title":"遣怀","dynasty":"唐","author":"杜牧","text":"<ruby>落<rt>luò</rt></ruby><ruby>魄<rt>pò</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>湖<rt>hú</rt></ruby><ruby>载<rt>zài</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>行<rt>xíng</rt></ruby>，<br><ruby>楚<rt>chǔ</rt></ruby><ruby>腰<rt>yāo</rt></ruby><ruby>纤<rt>xiān</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>掌<rt>zhǎng</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>轻<rt>qīng</rt></ruby>。<br><ruby>十<rt>shí</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>扬<rt>yáng</rt></ruby><ruby>州<rt>zhōu</rt></ruby><ruby>梦<rt>mèng</rt></ruby>，<br><ruby>赢<rt>yíng</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>薄<rt>bó</rt></ruby><ruby>幸<rt>xìng</rt></ruby><ruby>名<rt>míng</rt></ruby>。","notes":"①遣怀：抒发内心的郁积。<br>②载酒：把酒坛装在船上。<br>③楚腰：细腰。指吴地美女。","translation":"回首往事，我放荡不羁，在江湖寻欢作乐，无论到哪里都载着美酒，还有美女相伴。在扬州的十年好象做梦一样！梦醒沉思，岁月蹉跎，只留得别人对自己薄情负心的责难和自己对往事的深深悔恨。","number":13,"title_py":"qiǎn huái","author_py":"dù mù","dynasty_py":"Táng"},{"title":"山中问答","dynasty":"唐","author":"李白","text":"<ruby>问<rt>wèn</rt></ruby><ruby>余<rt>yú</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>栖<rt>qī</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>山<rt>shān</rt></ruby>，<br><ruby>笑<rt>xiào</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>答<rt>dá</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>闲<rt>xián</rt></ruby>。<br><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>窅<rt>yǎo</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>别<rt>bié</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>非<rt>fēi</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby>。","notes":"①余：我。<br>②栖：隐居。③窅（yǎo）<br>然：深远的样子。","translation":"有人问我为什么要居住在碧山，我笑而不答，心里悠闲自得。鲜艳的桃花瓣儿，随着清澈的河水流到遥远地方。这里环境异常幽美，景色格外秀丽，好像仙境，不是人间。","number":14,"title_py":"shān zhōng wèn dá","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"春夜洛城闻笛","dynasty":"唐","author":"李白","text":"<ruby>谁<rt>shuí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>笛<rt>dí</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>声<rt>shēng</rt></ruby>，<br><ruby>散<rt>sàn</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>洛<rt>luò</rt></ruby><ruby>城<rt>chéng</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>曲<rt>qū</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>折<rt>zhé</rt></ruby><ruby>柳<rt>liǔ</rt></ruby>，<br><ruby>何<rt>hé</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>园<rt>yuán</rt></ruby><ruby>情<rt>qíng</rt></ruby>。","notes":"①玉笛：装饰漂亮的笛子。<br>②暗：暗自。<br>③故园情：思念故乡的心情。","translation":"不知从哪一家暗暗地飘出优美感人的玉笛声，随着和煦的春风吹遍了整个洛阳城，这充满离情别绪的《折杨柳》，哪一个听了能不勾起思念故乡之情！洛","number":15,"title_py":"chūn yè luò chéng wén dí","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"饮中八仙歌（节选）","dynasty":"唐","author":"杜甫","text":"<ruby>李<rt>lǐ</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>斗<rt>dǒu</rt></ruby><ruby>诗<rt>shī</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>篇<rt>piān</rt></ruby>，<br><ruby>长<rt>cháng</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>市<rt>shì</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>眠<rt>mián</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>呼<rt>hū</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>船<rt>chuán</rt></ruby>，<br><ruby>自<rt>zì</rt></ruby><ruby>称<rt>chēng</rt></ruby><ruby>臣<rt>chén</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>仙<rt>xiān</rt></ruby>。","notes":"第一行还有一说：李白斗酒诗百篇。","translation":"李白不仅饮酒海量，而且文思敏捷，才气横溢，才饮一斗酒，就能写出一百篇诗。他也乐于过普通百姓的生活，喝了酒就醉卧在长安市上的酒铺里。天子派船来接，他也不上船，说自己是酒中仙。","number":16,"title_py":"yǐn zhōng bā xiān gē （ jié xuǎn ）","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"田园乐（其六）","dynasty":"唐","author":"王维","text":"<ruby>桃<rt>táo</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>含<rt>hán</rt></ruby><ruby>宿<rt>sù</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>，<br><ruby>柳<rt>liǔ</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>带<rt>dài</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>烟<rt>yān</rt></ruby>。<br><ruby>花<rt>huā</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>扫<rt>sǎo</rt></ruby>，<br><ruby>莺<rt>yīng</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>犹<rt>yóu</rt></ruby><ruby>眠<rt>mián</rt></ruby>。","notes":"①宿（sù）雨：昨夜下的雨。<br>②山客：隐居山庄的人，这里指作者自己。<br>③犹眠：还在睡觉。","translation":"桃花的花瓣上还含着昨夜的雨珠，雨后的柳树碧绿一片，笼罩在早晨的烟雾之中。被雨打落的花瓣洒满庭院，家童还未起床打扫，黄莺啼鸣，山客还在酣眠。乐","number":17,"title_py":"tián yuán lè （ qí liù ）","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"六月二十七日望湖楼醉书","dynasty":"宋","author":"苏轼","text":"<ruby>黑<rt>hēi</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>翻<rt>fān</rt></ruby><ruby>墨<rt>mò</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>遮<rt>zhē</rt></ruby><ruby>山<rt>shān</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>跳<rt>tiào</rt></ruby><ruby>珠<rt>zhū</rt></ruby><ruby>乱<rt>luàn</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>船<rt>chuán</rt></ruby>。<br><ruby>卷<rt>juǎn</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>忽<rt>hū</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>散<rt>sàn</rt></ruby>，<br><ruby>望<rt>wàng</rt></ruby><ruby>湖<rt>hú</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>天<rt>tiān</rt></ruby>。","notes":"①望湖楼：在杭州西湖边。<br>②翻墨：打翻的黑墨水，形容云层很黑。<br>③遮：遮盖，掩盖。","translation":"墨汁一般的浓云黑压压汹涌翻腾而来，还没来得及遮住边的山峦，就在湖上落下白花花的大雨，雨脚敲打着湖面，水花飞溅，宛如无数颗晶莹的珍珠，乱纷纷跳进游入的船舱。猛然间，狂风席卷大地，吹得湖面上刹时雨散云飞。雨过天晴，风平浪息，舍船登楼，凭栏而望，只见湖面上无入水，水映天，水色和天光一样的明净，一色的蔚蓝。","number":18,"title_py":"liù yuè èr shí qī rì wàng hú lóu zuì shū","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"送元二使安西","dynasty":"唐","author":"王维","text":"<ruby>渭<rt>wèi</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>浥<rt>yì</rt></ruby><ruby>轻<rt>qīng</rt></ruby><ruby>尘<rt>chén</rt></ruby>，<br><ruby>客<rt>kè</rt></ruby><ruby>舍<rt>shě</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>新<rt>xīn</rt></ruby>。<br><ruby>劝<rt>quàn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>杯<rt>bēi</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<br><ruby>西<rt>xī</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>关<rt>guān</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"①使：出使。<br>②朝雨：早晨下的雨。③浥（yì）：湿。<br>④客舍：旅店。","translation":"渭城早晨的细雨，湿润了路上轻微的浮尘，客舍旁边一片青翠，嫩柳色绿清新。劝您再喝完一杯酒，向西出了阳关，二再也没有老朋友了。","number":19,"title_py":"sòng yuán èr shǐ ān xī","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"石灰吟","dynasty":"明","author":"于谦","text":"<ruby>千<rt>qiān</rt></ruby><ruby>锤<rt>chuí</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>凿<rt>záo</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>山<rt>shān</rt></ruby>，<br><ruby>烈<rt>liè</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>焚<rt>fén</rt></ruby><ruby>烧<rt>shāo</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>等<rt>děng</rt></ruby><ruby>闲<rt>xián</rt></ruby>。<br><ruby>粉<rt>fěn</rt></ruby><ruby>骨<rt>gǔ</rt></ruby><ruby>碎<rt>suì</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>浑<rt>hún</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>怕<rt>pà</rt></ruby>，<br><ruby>要<rt>yào</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby>。","notes":"①若等闲：好像很平常的事情。<br>②清白：“青白”的谐音。指石灰洁白的本色，又比喻高尚的节操。","translation":"经受了千锤万击才出了深山，面对烧身的烈火好像很平常。纵然是粉身碎骨也毫不惧怕，只要能清清白白地留在人间。","number":20,"title_py":"shí huī yín","author_py":"yú qiān","dynasty_py":"Míng"},{"title":"金缕衣","dynasty":"唐","author":"杜秋娘","text":"<ruby>劝<rt>quàn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>莫<rt>mò</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>缕<rt>lǚ</rt></ruby><ruby>衣<rt>yī</rt></ruby>，<br><ruby>劝<rt>quàn</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>惜<rt>xī</rt></ruby><ruby>取<rt>qǔ</rt></ruby><ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>时<rt>shí</rt></ruby>。<br><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>堪<rt>kān</rt></ruby><ruby>折<rt>zhé</rt></ruby><ruby>直<rt>zhí</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>折<rt>zhé</rt></ruby>，<br><ruby>莫<rt>mò</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>折<rt>zhé</rt></ruby><ruby>枝<rt>zhī</rt></ruby>。","notes":"①金缕衣：古代曲调名。<br>②待：等待。","translation":"我劝你不要顾惜华贵的金缕衣，我劝你一定要珍惜青春少年时。花开宜折的时候就要抓紧去折，不要等到花谢时只折了个空枝。","number":21,"title_py":"jīn lǚ yī","author_py":"dù qiū niáng","dynasty_py":"Táng"},{"title":"枫桥夜泊","dynasty":"唐","author":"张继","text":"<ruby>月<rt>yuè</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>乌<rt>wū</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>霜<rt>shuāng</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>天<rt>tiān</rt></ruby>，<br><ruby>江<rt>jiāng</rt></ruby><ruby>枫<rt>fēng</rt></ruby><ruby>渔<rt>yú</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>眠<rt>mián</rt></ruby>。<br><ruby>姑<rt>gū</rt></ruby><ruby>苏<rt>sū</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>寺<rt>sì</rt></ruby>，<br><ruby>夜<rt>yè</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>钟<rt>zhōng</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>船<rt>chuán</rt></ruby>。","notes":"①夜泊：夜间把船停靠在岸边。<br>②江枫：江边的枫树。<br>③渔火：渔船上的灯火。<br>④愁眠：船上的旅人怀着旅愁，难以入睡。","translation":"月往西落，乌鸦啼叫，满天飞霜，面对江边枫树、江中渔舟灯火，旅客伴着忧愁睡眠。姑苏城外寒山寺的钟声，半传到了旅客坐的船。","number":22,"title_py":"fēng qiáo yè bó","author_py":"zhāng jì","dynasty_py":"Táng"},{"title":"墨梅","dynasty":"元","author":"王冕","text":"<ruby>吾<rt>wú</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>洗<rt>xǐ</rt></ruby><ruby>砚<rt>yàn</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>树<rt>shù</rt></ruby>，<br><ruby>朵<rt>duǒ</rt></ruby><ruby>朵<rt>duǒ</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>淡<rt>dàn</rt></ruby><ruby>墨<rt>mò</rt></ruby><ruby>痕<rt>hén</rt></ruby>。<br><ruby>不<rt>bú</rt></ruby><ruby>要<rt>yào</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>夸<rt>kuā</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>颜<rt>yán</rt></ruby><ruby>色<rt>sè</rt></ruby>，<br><ruby>只<rt>zhǐ</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>气<rt>qì</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>乾<rt>qián</rt></ruby><ruby>坤<rt>kūn</rt></ruby>。","notes":"①梅：水墨画的梅花。<br>②洗砚池：写字、画画后洗笔洗砚的池子。","translation":"我家洗砚池边这棵梅树，开的花上都有淡淡的墨痕。不要别人夸它颜色鲜艳，只求清香永远充满在乾坤。","number":23,"title_py":"mò méi","author_py":"wáng miǎn","dynasty_py":"Yuán"},{"title":"望天门山","dynasty":"唐","author":"李白","text":"<ruby>天<rt>tiān</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>楚<rt>chǔ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>开<rt>kāi</rt></ruby>，<br><ruby>碧<rt>bì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>至<rt>zhì</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>回<rt>huí</rt></ruby>。<br><ruby>两<rt>liǎng</rt></ruby><ruby>岸<rt>àn</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>出<rt>chū</rt></ruby>，<br><ruby>孤<rt>gū</rt></ruby><ruby>帆<rt>fān</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>来<rt>lái</rt></ruby>。","notes":"①楚江：即长江。古代长江中游地带属楚国，所以叫“楚江”。<br>②至此回：长江东流至天门山附近向北流去。","translation":"从中间断开，长江畅通奔流，碧绿的江水向东流到这里回旋。东西两岸的东梁山和西梁山夹江对峙耸出来，有一只挂着帆的小船从太阳那边驶来。","number":24,"title_py":"wàng tiān mén shān","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"江南春","dynasty":"唐","author":"杜牧","text":"<ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>莺<rt>yīng</rt></ruby><ruby>啼<rt>tí</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>映<rt>yìng</rt></ruby><ruby>红<rt>hóng</rt></ruby>，<br><ruby>水<rt>shuǐ</rt></ruby><ruby>村<rt>cūn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>郭<rt>guō</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>旗<rt>qí</rt></ruby><ruby>风<rt>fēng</rt></ruby>。<br><ruby>南<rt>nán</rt></ruby><ruby>朝<rt>cháo</rt></ruby><ruby>四<rt>sì</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>八<rt>bā</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>寺<rt>sì</rt></ruby>，<br><ruby>多<rt>duō</rt></ruby><ruby>少<rt>shǎo</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。","notes":"①啼：叫。<br>②山郭：靠山的城墙。<br>③酒旗：酒店门前高挂的布招牌。","translation":"在红花绿叶中间，到处是黄莺的啼叫声；在水乡山城里面，酒店的旗子卷着春风。当年南朝建起的许许多多寺庙，如今依然矗立在轻烟细雨之中。","number":25,"title_py":"jiāng nán chūn","author_py":"dù mù","dynasty_py":"Táng"},{"title":"渔歌子","dynasty":"唐","author":"张志和","text":"<ruby>西<rt>xī</rt></ruby><ruby>塞<rt>sài</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>鹭<rt>lù</rt></ruby><ruby>飞<rt>fēi</rt></ruby>，<br><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>鳜<rt>guì</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>肥<rt>féi</rt></ruby>。<br><ruby>青<rt>qīng</rt></ruby><ruby>箬<rt>ruò</rt></ruby><ruby>笠<rt>lì</rt></ruby>，<br><ruby>绿<rt>lǜ</rt></ruby><ruby>蓑<rt>suō</rt></ruby><ruby>衣<rt>yī</rt></ruby>，<br><ruby>斜<rt>xié</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>归<rt>guī</rt></ruby>。","notes":"①西塞山：浙江省湖州市。<br>②白鹭：一种水鸟。","translation":"青翠的西塞山前，一只只白鹭自在地飞翔，桃花盛开的季节，正是河中鳜鱼肥美的时候。渔父戴上青箬笠，穿着绿蓑衣，在微风细雨中，悠闲地钓着鱼，哪里还用得着回家呢。","number":26,"title_py":"yú gē zǐ","author_py":"zhāng zhì hé","dynasty_py":"Táng"},{"title":"终南望余雪","dynasty":"唐","author":"祖咏","text":"<ruby>终<rt>zhōng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>岭<rt>lǐng</rt></ruby><ruby>秀<rt>xiù</rt></ruby>，<br><ruby>积<rt>jī</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>浮<rt>fú</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>端<rt>duān</rt></ruby>。<br><ruby>林<rt>lín</rt></ruby><ruby>表<rt>biǎo</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>霁<rt>jì</rt></ruby><ruby>色<rt>sè</rt></ruby>，<br><ruby>城<rt>chéng</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>增<rt>zēng</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>寒<rt>hán</rt></ruby>。","notes":"①终南：山名，在唐京城长安（今陕西西安）南面六十里处。<br>②余雪：指未融化之雪。《全唐诗》<br>此诗题下有小字注：27“有司试此题，咏赋四句即纳，或诘之，曰‘意尽’。”<br>③阴岭：北面的山岭，背向太阳，故曰阴。<br>④林表：林外，林梢。霁（jì）：雨、雪后天气转晴。终","translation":"山的北面山色秀美，山上的皑皑白雪好似与天上的浮云相连。雪后初晴，林梢之间闪烁着夕阳余晖，傍晚时分，城中又添了几分积寒。","number":27,"title_py":"zhōng nán wàng yú xuě","author_py":"zǔ yǒng","dynasty_py":"Táng"},{"title":"终南别业","dynasty":"唐","author":"王维","text":"<ruby>中<rt>zhōng</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>颇<rt>pǒ</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>道<rt>dào</rt></ruby>，<br><ruby>晚<rt>wǎn</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>陲<rt>chuí</rt></ruby>。<br><ruby>兴<rt>xìng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>每<rt>měi</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>往<rt>wǎng</rt></ruby>，<br><ruby>胜<rt>shèng</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>知<rt>zhī</rt></ruby>。<br><ruby>行<rt>xíng</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>穷<rt>qióng</rt></ruby><ruby>处<rt>chù</rt></ruby>，<br><ruby>坐<rt>zuò</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>时<rt>shí</rt></ruby>。<br><ruby>偶<rt>ǒu</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>值<rt>zhí</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>叟<rt>sǒu</rt></ruby>，<br><ruby>谈<rt>tán</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>还<rt>huán</rt></ruby><ruby>期<rt>qī</rt></ruby>。","notes":"①中岁：中年。<br>②好：喜好。<br>③道：这里指佛教。<br>④家：安家。⑤南山陲，指辋川别墅所在地，意思是终南山脚下。<br>终⑥胜事：美好的事。<br>⑦无还期：没有回还的准确时间。","translation":"中年以后存有较浓的好道之心，直到晚年才安家于终南山边陲。兴趣浓时常常独来独往去游玩，有快乐的事自我欣赏自我陶醉。间或走到水的尽头去寻求源流，间或坐看上升的云雾千变万化。偶然在林间遇见个把乡村父老，偶与他谈笑聊天每每忘了还家。","number":28,"title_py":"zhōng nán bié yè","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"国风•周南•桃夭","dynasty":"先秦","author":"《诗经》","text":"<ruby>桃<rt>táo</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>夭<rt>yāo</rt></ruby><ruby>夭<rt>yāo</rt></ruby>，<br><ruby>灼<rt>zhuó</rt></ruby><ruby>灼<rt>zhuó</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>华<rt>huá</rt></ruby>。<br><ruby>之<rt>zhī</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>归<rt>guī</rt></ruby>，<br><ruby>宜<rt>yí</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>室<rt>shì</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>桃<rt>táo</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>夭<rt>yāo</rt></ruby><ruby>夭<rt>yāo</rt></ruby>，<br><ruby>有<rt>yǒu</rt></ruby><ruby>蕡<rt>fén</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>实<rt>shí</rt></ruby>。<br><ruby>之<rt>zhī</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>归<rt>guī</rt></ruby>，<br><ruby>宜<rt>yí</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>室<rt>shì</rt></ruby>。<br><ruby>桃<rt>táo</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>夭<rt>yāo</rt></ruby><ruby>夭<rt>yāo</rt></ruby>，<br><ruby>其<rt>qí</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>蓁<rt>zhēn</rt></ruby><ruby>蓁<rt>zhēn</rt></ruby>。<br><ruby>之<rt>zhī</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>归<rt>guī</rt></ruby>，<br><ruby>宜<rt>yí</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>人<rt>rén</rt></ruby>。","notes":"①夭夭：桃树含苞欲放的样子。<br>②灼灼：花开鲜明的样子。<br>华：花。<br>③之子：指出嫁的姑娘。<br>归：女子出嫁。•<br>④宜：和顺，和善。<br>室家：指夫妇。⑤蕡（fén）：果实很多的样子。⑥蓁蓁:树叶茂盛的样子。•","translation":"桃树含苞满枝头，花开灿烂如红霞。姑娘就要出嫁了，夫妻和睦是一家。桃树含苞满枝头，果实累累坠树丫。姑娘就要出嫁了，夫妻和睦是一家。桃树含苞满枝头，桃叶茂密色葱绿。姑娘就要出嫁了，夫妻和睦是一家。","number":29,"title_py":"guó fēng • zhōu nán • táo yāo","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"国风•周南•樛木","dynasty":"先秦","author":"《诗经》","text":"<ruby>南<rt>nán</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>樛<rt>jiū</rt></ruby><ruby>木<rt>mù</rt></ruby>，<br><ruby>葛<rt>gé</rt></ruby><ruby>藟<rt>lěi</rt></ruby><ruby>累<rt>lèi</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>乐<rt>lè</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<br><ruby>福<rt>fú</rt></ruby><ruby>履<rt>lǚ</rt></ruby><ruby>绥<rt>suí</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>南<rt>nán</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>樛<rt>jiū</rt></ruby><ruby>木<rt>mù</rt></ruby>，<br><ruby>葛<rt>gé</rt></ruby><ruby>藟<rt>lěi</rt></ruby><ruby>荒<rt>huāng</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>乐<rt>lè</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<br><ruby>福<rt>fú</rt></ruby><ruby>履<rt>lǚ</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>南<rt>nán</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>樛<rt>jiū</rt></ruby><ruby>木<rt>mù</rt></ruby>，<br><ruby>葛<rt>gé</rt></ruby><ruby>藟<rt>lěi</rt></ruby><ruby>萦<rt>yíng</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>乐<rt>lè</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>子<rt>zǐ</rt></ruby>，<br><ruby>福<rt>fú</rt></ruby><ruby>履<rt>lǚ</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>之<rt>zhī</rt></ruby>。","notes":"①樛(jiū)：下曲而高的树。②葛藟(lěi 蕾)：葛和藟两种蔓生植物;或以为葛藟即藟，野葡萄之类。③只：语气助词。•<br>④福履：福禄也。绥(suí)：安也。<br>⑤荒：掩;盖;覆。南⑥萦(yíng)：缠绕。•","translation":"南边弯弯树，葛藤缠着它;快乐的人儿，幸福降临他。南边弯弯树，葛藤荫盖它;快乐的人儿，幸福佑护他。南边弯弯树，葛藤围绕它;快乐的人儿，幸福陪伴他。","number":30,"title_py":"guó fēng • zhōu nán • jiū mù","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"苏幕遮①·怀旧","dynasty":"宋","author":"范仲淹","text":"<ruby>碧<rt>bì</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>天<rt>tiān</rt></ruby>，<ruby>黄<rt>huáng</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>地<rt>dì</rt></ruby>②，<ruby>秋<rt>qiū</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>连<rt>lián</rt></ruby><ruby>波<rt>bō</rt></ruby>，<ruby>波<rt>bō</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>翠<rt>cuì</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>映<rt>yìng</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>接<rt>jiē</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>。<br><ruby>芳<rt>fāng</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>情<rt>qíng</rt></ruby>，<ruby>更<rt>gèng</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>外<rt>wài</rt></ruby>。<br><ruby>黯<rt>àn</rt></ruby><ruby>乡<rt>xiāng</rt></ruby><ruby>魂<rt>hún</rt></ruby>③，<ruby>追<rt>zhuī</rt></ruby><ruby>旅<rt>lǚ</rt></ruby><ruby>思<rt>sī</rt></ruby>。<br><ruby>夜<rt>yè</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>除<rt>chú</rt></ruby><ruby>非<rt>fēi</rt></ruby>，<ruby>好<rt>hǎo</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>睡<rt>shuì</rt></ruby>④。<br><ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>休<rt>xiū</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>倚<rt>yǐ</rt></ruby>。<br><ruby>酒<rt>jiǔ</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>肠<rt>cháng</rt></ruby>，<ruby>化<rt>huà</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>泪<rt>lèi</rt></ruby>。","notes":"①苏幕遮:词牌名②碧云天，黄叶地：大意是蓝天白云映衬下的金秋大地，苏一片金黄。黄叶，落叶。遮•<br>③黯乡魂：心神因怀念故乡而悲伤。④夜夜除非，<br>好梦留人睡：每天夜里，只有做返回故乡怀的好梦才得以安睡。夜夜除非，即“除非夜夜”的倒装。按旧本文意应作“除非夜夜好梦留人睡”。","translation":"白云满天，黄叶遍地。秋天的景色映进江上的碧波，水波上笼罩着寒烟一片苍翠。远山沐浴着夕阳天空连接江水。岸边的芳草似是无情，又在西斜的太阳之外。黯然感伤的他乡之魂，追逐旅居异地的愁思，每天夜里除非是美梦才能留人入睡。当明月照射高楼时不要独自依倚。端起酒来洗涤愁肠，可是都化作相思的眼泪。","number":31,"title_py":"sū mù zhē ① · huái jiù","author_py":"fàn zhòng yān","dynasty_py":"Sòng"},{"title":"长相思·五之二","dynasty":"宋","author":"陆游","text":"<ruby>桥<rt>qiáo</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>虹<rt>hóng</rt></ruby>，<br><ruby>水<rt>shuǐ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>空<rt>kōng</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>叶<rt>yè</rt></ruby>①<ruby>飘<rt>piāo</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>教<rt>jiào</rt></ruby><ruby>称<rt>chēng</rt></ruby><ruby>放<rt>fàng</rt></ruby><ruby>翁<rt>wēng</rt></ruby>。<br><ruby>侧<rt>cè</rt></ruby><ruby>船<rt>chuán</rt></ruby><ruby>篷<rt>péng</rt></ruby>，<br><ruby>使<rt>shǐ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>蟹<rt>xiè</rt></ruby><ruby>舍<rt>shě</rt></ruby>②<ruby>参<rt>cān</rt></ruby><ruby>差<rt>chà</rt></ruby><ruby>渔<rt>yú</rt></ruby><ruby>市<rt>shì</rt></ruby><ruby>东<rt>dōng</rt></ruby>。<br><ruby>到<rt>dào</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>钟<rt>zhōng</rt></ruby>。","notes":"①一叶：一只小船。<br>②蟹舍：形容狭小的渔舍。<br>③参差：大小、高低不齐。","translation":"水乡的桥就像雨后的彩虹，水面开阔就像晴朗的天空，一只小船在烟雨中自由地出没。是“天”让我称“放翁”，放纵于山水之中。侧着船篷，随着江风自在地行驶，不知不觉已到了渔市东边，看到渔民的渔舍高低倒错落，心情格外放松，直到天色暗下来。这时听到悠悠的钟声从远处传来。","number":32,"title_py":"cháng xiāng sī · wǔ zhī èr","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"诉衷情①","dynasty":"宋","author":"陆游","text":"<ruby>当<rt>dāng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>觅<rt>mì</rt></ruby><ruby>封<rt>fēng</rt></ruby><ruby>侯<rt>hóu</rt></ruby>②，<ruby>匹<rt>pǐ</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>戍<rt>shù</rt></ruby>③<ruby>梁<rt>liáng</rt></ruby><ruby>州<rt>zhōu</rt></ruby>。<br><ruby>关<rt>guān</rt></ruby><ruby>河<rt>hé</rt></ruby>④<ruby>梦<rt>mèng</rt></ruby><ruby>断<rt>duàn</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby>？<br><ruby>尘<rt>chén</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>貂<rt>diāo</rt></ruby><ruby>裘<rt>qiú</rt></ruby>⑤。<br><ruby>胡<rt>hú</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>灭<rt>miè</rt></ruby>，<ruby>鬓<rt>bìn</rt></ruby><ruby>先<rt>xiān</rt></ruby><ruby>秋<rt>qiū</rt></ruby>⑥，<ruby>泪<rt>lèi</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>谁<rt>shuí</rt></ruby><ruby>料<rt>liào</rt></ruby>，<ruby>心<rt>xīn</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>山<rt>shān</rt></ruby>⑦，<ruby>身<rt>shēn</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>沧<rt>cāng</rt></ruby><ruby>洲<rt>zhōu</rt></ruby>⑧。","notes":"①诉衷情：词牌名。<br>②万里觅封侯：奔赴万里外的疆场，寻找建功立业的会。<br>③戍：守边。<br>④关河：关塞、河流。<br>⑤尘暗旧貂裘：貂皮裘上落满灰尘，颜色为之暗淡。<br>⑥鬓：鬓发。<br>秋：秋霜，比喻年老鬓白。<br>诉⑦天山：在中国西北部，是汉唐时的边疆。这里代指南宋与金国相持的西北前线。<br>⑧沧洲：靠近水的地方，古时常用来泛指隐士居住之地。谢朓《之宣城郡出新林浦向板桥》诗有“既欢怀禄情，复协沧州趣”句。这里是指作者位于镜湖之滨的家乡。","translation":"回忆当年鹏程万里为了寻找建功立业的机会，单枪匹马奔赴边境保卫梁州。如今防守边疆要塞的从军生活只能在梦中出现，梦一醒不知身在何处？灰尘已经盖满了旧时出征的貂裘。胡人还未消灭，鬓边已呈秋霜，感伤的眼泪白白地淌流。这一生谁能预料，原想一心一意抗敌在天山，如今却一辈子老死于沧洲！","number":33,"title_py":"sù zhōng qíng ①","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"虞美人①·听雨","dynasty":"宋","author":"蒋捷","text":"<ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>上<rt>shàng</rt></ruby>。<br><ruby>红<rt>hóng</rt></ruby><ruby>烛<rt>zhú</rt></ruby><ruby>昏<rt>hūn</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>帐<rt>zhàng</rt></ruby>②。<br><ruby>壮<rt>zhuàng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。<br><ruby>江<rt>jiāng</rt></ruby><ruby>阔<rt>kuò</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>低<rt>dī</rt></ruby>、<ruby>断<rt>duàn</rt></ruby><ruby>雁<rt>yàn</rt></ruby>③<ruby>叫<rt>jiào</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>风<rt>fēng</rt></ruby>。<br><ruby>而<rt>ér</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>僧<rt>sēng</rt></ruby><ruby>庐<rt>lú</rt></ruby>④<ruby>下<rt>xià</rt></ruby>。<br><ruby>鬓<rt>bìn</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>星<rt>xīng</rt></ruby><ruby>星<rt>xīng</rt></ruby>⑤<ruby>也<rt>yě</rt></ruby>。<br><ruby>悲<rt>bēi</rt></ruby><ruby>欢<rt>huān</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>合<rt>hé</rt></ruby><ruby>总<rt>zǒng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>情<rt>qíng</rt></ruby>⑥。<br><ruby>一<rt>yí</rt></ruby><ruby>任<rt>rèn</rt></ruby>⑦<ruby>阶<rt>jiē</rt></ruby><ruby>前<rt>qián</rt></ruby>、<ruby>点<rt>diǎn</rt></ruby><ruby>滴<rt>dī</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>明<rt>míng</rt></ruby>。","notes":"①虞美人：著名词牌之一。唐教坊曲。兹取两格，一为五十六字，上下片各两仄韵，两平韵。一为五十八字，上下美片各两仄韵，三平韵。<br>②昏：昏暗，<br>罗帐：古代床上的纱幔。•<br>③断雁：<br>失群孤雁④僧庐：僧寺，僧舍。<br>⑤星星：白发点点如星，形容白发很多。左思《白发赋》：听“星星白发，生于鬓垂。”<br>⑥无情：无动于衷。<br>⑦一任：听凭。","translation":"年少的时候，歌楼上听雨，红烛盏盏，昏暗的灯光下罗帐轻盈。人到中年，在异国他乡的小船上，看蒙蒙细雨，茫茫江面，水天一线，西风中，一只失群的孤雁阵阵哀鸣。而今，人已暮年，两鬓已是白发苍苍，独自一人在僧庐下，听细雨点点。人生的悲欢离合的经历是无情的，还是让台阶前一滴滴的小雨下到天亮吧。","number":34,"title_py":"yú měi rén ① · tīng yǔ","author_py":"jiǎng jié","dynasty_py":"Sòng"},{"title":"雨霖铃","dynasty":"宋","author":"柳永","text":"<ruby>寒<rt>hán</rt></ruby><ruby>蝉<rt>chán</rt></ruby><ruby>凄<rt>qī</rt></ruby><ruby>切<rt>qiè</rt></ruby>。<br><ruby>对<rt>duì</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>亭<rt>tíng</rt></ruby>①<ruby>晚<rt>wǎn</rt></ruby>，<ruby>骤<rt>zhòu</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>歇<rt>xiē</rt></ruby>。<br><ruby>都<rt>dōu</rt></ruby><ruby>门<rt>mén</rt></ruby>②<ruby>帐<rt>zhàng</rt></ruby><ruby>饮<rt>yǐn</rt></ruby>③<ruby>无<rt>wú</rt></ruby><ruby>绪<rt>xù</rt></ruby>，<ruby>留<rt>liú</rt></ruby><ruby>恋<rt>liàn</rt></ruby><ruby>处<rt>chù</rt></ruby>，<ruby>兰<rt>lán</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>④<ruby>催<rt>cuī</rt></ruby><ruby>发<rt>fā</rt></ruby>。<br><ruby>执<rt>zhí</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>泪<rt>lèi</rt></ruby><ruby>眼<rt>yǎn</rt></ruby>，<ruby>竟<rt>jìng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>凝<rt>níng</rt></ruby><ruby>噎<rt>yē</rt></ruby>。<br><ruby>念<rt>niàn</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>去<rt>qù</rt></ruby>⑤，<ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>波<rt>bō</rt></ruby>，<ruby>暮<rt>mù</rt></ruby><ruby>霭<rt>ǎi</rt></ruby>⑥<ruby>沉<rt>chén</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>楚<rt>chǔ</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>阔<rt>kuò</rt></ruby>。<br><ruby>多<rt>duō</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>伤<rt>shāng</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>别<rt>bié</rt></ruby>，<ruby>更<rt>gèng</rt></ruby><ruby>那<rt>nà</rt></ruby><ruby>堪<rt>kān</rt></ruby>，<ruby>冷<rt>lěng</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>节<rt>jié</rt></ruby>！<br><ruby>今<rt>jīn</rt></ruby><ruby>宵<rt>xiāo</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>醒<rt>xǐng</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby>？<br><ruby>杨<rt>yáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>岸<rt>àn</rt></ruby>、<ruby>晓<rt>xiǎo</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>残<rt>cán</rt></ruby><ruby>月<rt>yuè</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>经<rt>jīng</rt></ruby><ruby>年<rt>nián</rt></ruby>⑦，<ruby>应<rt>yīng</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>良<rt>liáng</rt></ruby><ruby>辰<rt>chén</rt></ruby><ruby>好<rt>hǎo</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>虚<rt>xū</rt></ruby><ruby>设<rt>shè</rt></ruby>。<br><ruby>便<rt>biàn</rt></ruby><ruby>纵<rt>zòng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>种<rt>zhǒng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>情<rt>qíng</rt></ruby>，<ruby>更<rt>gèng</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>说<rt>shuō</rt></ruby>？","notes":"①长亭：古代在交通要道边每隔十里修建一座长亭供行人休息，又称“十里长亭”。靠近城市的长亭往往是古人送别的地方。<br>②都门：国都之门。这里代指北宋的首都汴京（今河南开封）。<br>③帐饮：在郊外设帐饯行。<br>④兰舟：古代传说鲁班曾刻木兰树为舟（南朝梁任昉《述异记》。这里用做对船的美称。<br>⑤去去：重复“去”字，表示行程遥远。","translation":"","number":35,"title_py":"yǔ lín líng","author_py":"liǔ yǒng","dynasty_py":"Sòng"},{"title":"观猎","dynasty":"唐","author":"王维","text":"<ruby>风<rt>fēng</rt></ruby><ruby>劲<rt>jìng</rt></ruby>①<ruby>角<rt>jiǎo</rt></ruby><ruby>弓<rt>gōng</rt></ruby>②<ruby>鸣<rt>míng</rt></ruby>，<br><ruby>将<rt>jiāng</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>猎<rt>liè</rt></ruby><ruby>渭<rt>wèi</rt></ruby><ruby>城<rt>chéng</rt></ruby>③。<br><ruby>草<rt>cǎo</rt></ruby><ruby>枯<rt>kū</rt></ruby><ruby>鹰<rt>yīng</rt></ruby>④<ruby>眼<rt>yǎn</rt></ruby><ruby>疾<rt>jí</rt></ruby>，<br><ruby>雪<rt>xuě</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>蹄<rt>tí</rt></ruby><ruby>轻<rt>qīng</rt></ruby>。<br><ruby>忽<rt>hū</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>丰<rt>fēng</rt></ruby><ruby>市<rt>shì</rt></ruby>，<br><ruby>还<rt>huán</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>营<rt>yíng</rt></ruby>。<br><ruby>回<rt>huí</rt></ruby><ruby>看<rt>kàn</rt></ruby><ruby>射<rt>shè</rt></ruby><ruby>雕<rt>diāo</rt></ruby><ruby>处<rt>chù</rt></ruby>⑥，<br><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>平<rt>píng</rt></ruby>⑦。","notes":"①劲：强劲。<br>②角弓：用兽角装饰的硬弓，使用动物的角、筋等材料制作的传统复合弓。<br>③渭城：秦时咸阳城，汉改称渭城，在今西安市西北，渭水北岸。<br>④鹰：指猎鹰。<br>⑤眼疾：目光敏锐。<br>⑥射雕处：借射雕处表达对将军的赞美。<br>射雕：北齐斛律光精通武艺，曾射中一雕，人称“射雕都督”，此引用其猎事以赞美将军。<br>⑦暮云平：傍晚的云层与大地连成一片。","translation":"劲风吹过，绷紧的弓弦发出尖锐的颤声，只见将军正在渭城郊外狩猎。秋草枯黄，鹰眼更加锐利；积雪融化，飞驰的马蹄更像风追叶飘。转眼已经路过新丰市，不久之后又骑着马回到那细柳营。回首观望方才纵横驰骋之处，傍晚的云层已与大地连成一片。","number":36,"title_py":"guān liè","author_py":"wáng wéi","dynasty_py":"Táng"},{"title":"定风波①","dynasty":"宋","author":"苏轼","text":"<ruby>三<rt>sān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>七<rt>qī</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>湖<rt>hú</rt></ruby>②<ruby>道<rt>dào</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>遇<rt>yù</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>。<br><ruby>雨<rt>yǔ</rt></ruby><ruby>具<rt>jù</rt></ruby><ruby>先<rt>xiān</rt></ruby><ruby>去<rt>qù</rt></ruby>，<ruby>同<rt>tóng</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>狼<rt>láng</rt></ruby><ruby>狈<rt>bèi</rt></ruby>，<ruby>余<rt>yú</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>觉<rt>jué</rt></ruby>。<br><ruby>已<rt>yǐ</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>遂<rt>suì</rt></ruby><ruby>晴<rt>qíng</rt></ruby>，<ruby>故<rt>gù</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>此<rt>cǐ</rt></ruby><ruby>词<rt>cí</rt></ruby>。<br><ruby>莫<rt>mò</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>穿<rt>chuān</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>打<rt>dǎ</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>声<rt>shēng</rt></ruby>，<ruby>何<rt>hé</rt></ruby><ruby>妨<rt>fáng</rt></ruby><ruby>吟<rt>yín</rt></ruby><ruby>啸<rt>xiào</rt></ruby><ruby>且<rt>qiě</rt></ruby><ruby>徐<rt>xú</rt></ruby><ruby>行<rt>xíng</rt></ruby>。<br><ruby>竹<rt>zhú</rt></ruby><ruby>杖<rt>zhàng</rt></ruby><ruby>芒<rt>máng</rt></ruby><ruby>鞋<rt>xié</rt></ruby><ruby>轻<rt>qīng</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>马<rt>mǎ</rt></ruby>，<ruby>谁<rt>shuí</rt></ruby><ruby>怕<rt>pà</rt></ruby>？<br><ruby>一<rt>yì</rt></ruby><ruby>蓑<rt>suō</rt></ruby>③<ruby>烟<rt>yān</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>任<rt>rèn</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>料<rt>liào</rt></ruby><ruby>峭<rt>qiào</rt></ruby>④<ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>醒<rt>xǐng</rt></ruby>，<ruby>微<rt>wēi</rt></ruby><ruby>冷<rt>lěng</rt></ruby>，<ruby>山<rt>shān</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>迎<rt>yíng</rt></ruby>。<br><ruby>回<rt>huí</rt></ruby><ruby>首<rt>shǒu</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>瑟<rt>sè</rt></ruby>⑤<ruby>处<rt>chù</rt></ruby>，<ruby>归<rt>guī</rt></ruby><ruby>去<rt>qù</rt></ruby>，<ruby>也<rt>yě</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>也<rt>yě</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>晴<rt>qíng</rt></ruby>。","notes":"①定风波：词牌名。<br>②沙湖：在今湖北黄冈东南三十里，又名螺丝店。<br>波③一蓑：蓑衣，用棕制成的雨披。<br>④料峭：微寒的样子。<br>⑤向来：方才。<br>萧瑟：风雨吹打树叶声。","translation":"三月七日，在沙湖道上赶上了下雨，拿着雨具的仆人先前离开了，同行的人都觉得很狼狈，只有我不这么觉得。过了一会儿天晴了，就做了这首词。不用注意那穿林打叶的雨声，不妨一边吟咏长啸着，一边悠然地行走。竹杖和草鞋轻捷得胜过骑马，有什么可怕的？一身蓑衣任凭风吹雨打，照样过我的一生。春风微凉，将我的酒意吹醒，寒意初上，山头初晴的斜阳却应时相迎。回头望一眼走过来遇到风雨的地方，回去吧，对我来说，既无所谓风雨，也无所谓天晴。","number":37,"title_py":"dìng fēng bō ①","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"鹊桥仙•纤云弄巧","dynasty":"宋","author":"秦观","text":"<ruby>纤<rt>xiān</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>弄<rt>nòng</rt></ruby><ruby>巧<rt>qiǎo</rt></ruby>①，<br><ruby>飞<rt>fēi</rt></ruby><ruby>星<rt>xīng</rt></ruby>②<ruby>传<rt>chuán</rt></ruby><ruby>恨<rt>hèn</rt></ruby>，<br><ruby>银<rt>yín</rt></ruby><ruby>汉<rt>hàn</rt></ruby><ruby>迢<rt>tiáo</rt></ruby><ruby>迢<rt>tiáo</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>度<rt>dù</rt></ruby>③。<br><ruby>金<rt>jīn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>露<rt>lù</rt></ruby>④<ruby>一<rt>yì</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>逢<rt>féng</rt></ruby>，<br><ruby>便<rt>biàn</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>数<rt>shù</rt></ruby>。<br><ruby>柔<rt>róu</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>佳<rt>jiā</rt></ruby><ruby>期<rt>qī</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>梦<rt>mèng</rt></ruby>，<br><ruby>忍<rt>rěn</rt></ruby><ruby>顾<rt>gù</rt></ruby>⑤<ruby>鹊<rt>què</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>路<rt>lù</rt></ruby>。<br><ruby>两<rt>liǎng</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>久<rt>jiǔ</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>又<rt>yòu</rt></ruby><ruby>岂<rt>qǐ</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>朝<rt>zhāo</rt></ruby><ruby>暮<rt>mù</rt></ruby><ruby>暮<rt>mù</rt></ruby>。","notes":"①纤云：轻盈的云彩。<br>弄巧：指云彩在空中幻化成各种巧妙的花样。<br>鹊②飞星：流星。一说指牵牛、织女二星。<br>③银汉：银河。<br>迢迢：遥远的样子。<br>暗度：度通渡，悄悄渡过。•<br>④金风玉露：指秋风白露。李商隐《辛未七夕》：“由来碧落银河畔，可要金风玉露时”。<br>纤⑤忍顾：怎忍回视。","translation":"薄的云彩在天空中变幻多端，天上的流星传递着相思的愁怨，遥远无垠的银河今夜我悄悄渡过。在秋风白露的七巧夕相会，就胜过尘世间那些长相厮守却貌合神离的夫妻。共诉相思，柔情似水，短暂的相会如梦如幻，分别之时不忍去看那鹊桥路。只要两情至死不渝，又何必贪求卿卿我我的朝欢暮乐呢？","number":38,"title_py":"què qiáo xiān • xiān yún nòng qiǎo","author_py":"qín guān","dynasty_py":"Sòng"},{"title":"菩萨蛮•黄鹤楼①","dynasty":"现代","author":"毛泽东","text":"<ruby>茫<rt>máng</rt></ruby><ruby>茫<rt>máng</rt></ruby>②<ruby>九<rt>jiǔ</rt></ruby><ruby>派<rt>pài</rt></ruby>③<ruby>流<rt>liú</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>国<rt>guó</rt></ruby>，<br><ruby>沉<rt>chén</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>线<rt>xiàn</rt></ruby>④<ruby>穿<rt>chuān</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>北<rt>běi</rt></ruby>。<br><ruby>烟<rt>yān</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>莽<rt>mǎng</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>苍<rt>cāng</rt></ruby>，<br><ruby>龟<rt>guī</rt></ruby><ruby>蛇<rt>shé</rt></ruby>⑤<ruby>锁<rt>suǒ</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>江<rt>jiāng</rt></ruby>。<br><ruby>黄<rt>huáng</rt></ruby><ruby>鹤<rt>hè</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>去<rt>qù</rt></ruby>⑥？<br><ruby>剩<rt>shèng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>处<rt>chù</rt></ruby>。<br><ruby>把<rt>bǎ</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>酹<rt>lèi</rt></ruby>⑦<ruby>滔<rt>tāo</rt></ruby><ruby>滔<rt>tāo</rt></ruby>，<br><ruby>心<rt>xīn</rt></ruby><ruby>潮<rt>cháo</rt></ruby><ruby>逐<rt>zhú</rt></ruby><ruby>浪<rt>làng</rt></ruby><ruby>高<rt>gāo</rt></ruby>！","notes":"①黄鹤楼：故址在长江南岸武昌蛇山上，因武汉长江大桥建桥需要，于一九五六年拆除。八一年在原址南面五百米处重建，于八五年竣工。《寰宇记》，“昔费祎登仙，每乘黄鹤于此憩驾，故号为黄鹤楼。”<br>鹤②茫茫：辽阔的样子。<br>③九派：九条支流。<br>④一线：指京汉和粤汉铁路，即今之京广线。<br>⑤龟蛇：指龟山和蛇山。龟山在汉阳，形如龟；蛇山在武昌，形如蛇。两山隔江对峙。<br>⑥黄鹤知何去：唐崔颢有七律《黄鹤楼》，“昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。晴川历历汉阳树，芳草萋萋鹦鹉洲。日暮乡关何处是？烟波江上使人愁。”<br>⑦酹：祭奠，浇酒于地。苏轼《念奴娇》，“一樽还酹江月”。","translation":"","number":39,"title_py":"pú sà mán • huáng hè lóu ①","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"西江月•井冈山①","dynasty":"现代","author":"毛泽东","text":"<ruby>山<rt>shān</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>旌<rt>jīng</rt></ruby><ruby>旗<rt>qí</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>望<rt>wàng</rt></ruby>，<br><ruby>山<rt>shān</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>鼓<rt>gǔ</rt></ruby><ruby>角<rt>jiǎo</rt></ruby>②<ruby>相<rt>xiāng</rt></ruby><ruby>闻<rt>wén</rt></ruby>。<br><ruby>敌<rt>dí</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>围<rt>wéi</rt></ruby><ruby>困<rt>kùn</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>重<rt>chóng</rt></ruby>，<br><ruby>我<rt>wǒ</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>岿<rt>kuī</rt></ruby><ruby>然<rt>rán</rt></ruby>③<ruby>不<rt>bú</rt></ruby><ruby>动<rt>dòng</rt></ruby>。<br><ruby>早<rt>zǎo</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>森<rt>sēn</rt></ruby><ruby>严<rt>yán</rt></ruby><ruby>壁<rt>bì</rt></ruby><ruby>垒<rt>lěi</rt></ruby>，<br><ruby>更<rt>gèng</rt></ruby><ruby>加<rt>jiā</rt></ruby><ruby>众<rt>zhòng</rt></ruby><ruby>志<rt>zhì</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>城<rt>chéng</rt></ruby>。<br><ruby>黄<rt>huáng</rt></ruby><ruby>洋<rt>yáng</rt></ruby><ruby>界<rt>jiè</rt></ruby>④<ruby>上<rt>shàng</rt></ruby><ruby>炮<rt>pào</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>隆<rt>lóng</rt></ruby>，<br><ruby>报<rt>bào</rt></ruby><ruby>道<rt>dào</rt></ruby><ruby>敌<rt>dí</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>宵<rt>xiāo</rt></ruby><ruby>遁<rt>dùn</rt></ruby>。","notes":"①井冈山：在江西西部及湖南东部，方圆五百里。<br>②鼓角：本指古代军中所用的战鼓号角，此处借指军号。<br>江③岿然：高峻独立。<br>④黄洋界：井冈山五大哨口之一，另四个是八面山、双•马石、朱沙冲、桐木岭。","translation":"一九二八年八月，湖南省委特派员杜修经命令红二十八冈团和二十九团下井冈山开赴湘南。赣军乘虚进攻井冈山。八三十日，四个团的敌军攻打黄洋界。当时山上只有红三十一团一营的两个连。打到下午，红军子弹所剩无几，靠石块御敌。在此关键时刻，红军扛来一门坏的追击炮和仅有的三发炮弹。前二发都是哑炮，第三发不但响了，而且恰巧落在敌军指挥部，上山之敌慌忙撤退。红军在哨口守了一夜，第二天发现山下空无人影，原来敌军以为红军主力二十八团（只有南昌起义的正规军改编的二十八团有炮）已经回到井冈山，因此连夜撤走了。","number":40,"title_py":"xī jiāng yuè • jǐng gāng shān ①","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"采桑子•重阳","dynasty":"现代","author":"毛泽东","text":"<ruby>人<rt>rén</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>老<rt>lǎo</rt></ruby>，<br><ruby>岁<rt>suì</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>阳<rt>yáng</rt></ruby>①。<br><ruby>今<rt>jīn</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>阳<rt>yáng</rt></ruby>②，<br><ruby>战<rt>zhàn</rt></ruby><ruby>地<rt>dì</rt></ruby>③<ruby>黄<rt>huáng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>分<rt>fēn</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>香<rt>xiāng</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>度<rt>dù</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>劲<rt>jìng</rt></ruby>，<br><ruby>不<rt>bú</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>光<rt>guāng</rt></ruby>。<br><ruby>胜<rt>shèng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>光<rt>guāng</rt></ruby>④，<br><ruby>寥<rt>liáo</rt></ruby><ruby>廓<rt>kuò</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>天<rt>tiān</rt></ruby>⑤<ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>霜<rt>shuāng</rt></ruby>。","notes":"桑①阳：重阳节,农历九月九日，为传统的重阳节，又称“老人节”。•<br>②今又重阳：此重阳是指诗人在战地重逢的重阳，1929年的重阳。<br>③地：这里指闽西农村根据地，当时这里外有敌人包围，阳内有地主民团的扰乱。<br>④胜似春光：是说秋风比春光更美，是主观感受。<br>⑤江天：指汀江流域的天空。","translation":"人的一生容易衰老而苍天却不老，重阳节年年都会来到。今天又逢重阳，战场上的菊花是那样的芬芳。一年又一年秋风刚劲地吹送，这景色不如春天的光景那样明媚。却比春天的光景更为壮美，如宇宙般广阔的江面天空泛着白霜。","number":41,"title_py":"cǎi sāng zǐ • chóng yáng","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"七绝•观潮","dynasty":"现代","author":"毛泽东","text":"<ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>波<rt>bō</rt></ruby><ruby>涛<rt>tāo</rt></ruby><ruby>滚<rt>gǔn</rt></ruby><ruby>滚<rt>gǔn</rt></ruby><ruby>来<rt>lái</rt></ruby>，<br><ruby>雪<rt>xuě</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>向<rt>xiàng</rt></ruby><ruby>钓<rt>diào</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>台<rt>tái</rt></ruby>。<br><ruby>人<rt>rén</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>纷<rt>fēn</rt></ruby><ruby>赞<rt>zàn</rt></ruby><ruby>阵<rt>zhèn</rt></ruby><ruby>容<rt>róng</rt></ruby><ruby>阔<rt>kuò</rt></ruby>，<br><ruby>铁<rt>tiě</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>容<rt>róng</rt></ruby><ruby>杀<rt>shā</rt></ruby><ruby>敌<rt>dí</rt></ruby><ruby>回<rt>huí</rt></ruby>。","notes":"此诗上半阕写潮景，下半阕赞美。全诗28 个字，把钱塘江潮的汹涌澎湃、翻江倒海、潮声震天动地之势，淋漓尽致地显现出来。","translation":"千里钱塘的波涛滚滚而来，雪浪飞花的潮水涌向钓鱼台。人山人海大赞江潮阵容壮阔，犹如铁甲战马从容杀敌后凯旋回归。","number":42,"title_py":"qī jué • guān cháo","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"诗经·秦风·蒹葭","dynasty":"先秦","author":"《诗经》","text":"<ruby>蒹<rt>jiān</rt></ruby><ruby>葭<rt>jiā</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>苍<rt>cāng</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>霜<rt>shuāng</rt></ruby>。<br><ruby>所<rt>suǒ</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>伊<rt>yī</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>方<rt>fāng</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>洄<rt>huí</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>道<rt>dào</rt></ruby><ruby>阻<rt>zǔ</rt></ruby><ruby>且<rt>qiě</rt></ruby><ruby>长<rt>zhǎng</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>宛<rt>wǎn</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>央<rt>yāng</rt></ruby>。<br><ruby>蒹<rt>jiān</rt></ruby><ruby>葭<rt>jiā</rt></ruby><ruby>凄<rt>qī</rt></ruby><ruby>凄<rt>qī</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>晞<rt>xī</rt></ruby>。<br><ruby>所<rt>suǒ</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>伊<rt>yī</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>湄<rt>méi</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>洄<rt>huí</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>道<rt>dào</rt></ruby><ruby>阻<rt>zǔ</rt></ruby><ruby>且<rt>qiě</rt></ruby><ruby>跻<rt>jī</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>宛<rt>wǎn</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>坻<rt>chí</rt></ruby>。<br><ruby>蒹<rt>jiān</rt></ruby><ruby>葭<rt>jiā</rt></ruby><ruby>采<rt>cǎi</rt></ruby><ruby>采<rt>cǎi</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>已<rt>yǐ</rt></ruby>。<br><ruby>所<rt>suǒ</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>伊<rt>yī</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>涘<rt>sì</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>洄<rt>huí</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>道<rt>dào</rt></ruby><ruby>阻<rt>zǔ</rt></ruby><ruby>且<rt>qiě</rt></ruby><ruby>右<rt>yòu</rt></ruby>。<br><ruby>溯<rt>sù</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<br><ruby>宛<rt>wǎn</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>沚<rt>zhǐ</rt></ruby>。","notes":"①蒹：草本植物，芦苇一类的草，又名荻。<br>葭：初生的芦苇。•②坻（chí）：露出水面的小沙洲。蒹③沚（zhǐ）：水中小块沙洲。","translation":"芦苇初生青青，白色露水凝结为霜。所恋的那个心上人，在水的那一边。逆着弯曲的河道寻找她，路途艰难又漫长。逆流寻找她，仿佛走到水中间。芦苇初生茂盛，白色露水还没干。所恋的那个心上人，在水的那岸。逆着弯曲的河道寻找她，路途艰难又坡陡。逆流寻找她，仿佛走到水中的小沙洲。芦苇初生鲜艳，白色露水还没完。所恋的那个心上人，在水的那头。逆着弯曲的河道寻找她，道路艰难又曲折。逆流寻找她，仿佛走到水中的沙洲。","number":43,"title_py":"shī jīng · qín fēng · jiān jiā","author_py":"《 shī jīng 》","dynasty_py":"Xiān Qín"},{"title":"〔越调①〕天净沙·春","dynasty":"元","author":"白朴","text":"<ruby>春<rt>chūn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>和<rt>hé</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>阑<rt>lán</rt></ruby><ruby>干<rt>gān</rt></ruby><ruby>楼<rt>lóu</rt></ruby><ruby>阁<rt>gé</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>栊<rt>lóng</rt></ruby>，<br><ruby>杨<rt>yáng</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>院<rt>yuàn</rt></ruby><ruby>中<rt>zhōng</rt></ruby>。<br><ruby>啼<rt>tí</rt></ruby><ruby>莺<rt>yīng</rt></ruby><ruby>舞<rt>wǔ</rt></ruby><ruby>燕<rt>yàn</rt></ruby>，<br><ruby>小<rt>xiǎo</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>红<rt>hóng</rt></ruby>。","notes":"①越调：十二宫调之一，天净沙是它的曲牌之一。<br>②帘栊：窗户上的帘子。李煜《捣练子》：“无奈夜长人不寐，数声和月到帘栊。”<br>③飞红：落花。","translation":"山绿了，阳光暖了，吹起和煦的春风。楼阁上少女凭栏眺望，高卷起帘栊。院子里杨柳依依，秋千轻轻摇动，院外有飞舞的春燕，啼喈的黄莺，小桥之下流水潺潺，落花飞红。•","number":44,"title_py":"〔 yuè diào ① 〕 tiān jìng shā · chūn","author_py":"bái pǔ","dynasty_py":"Yuán"},{"title":"〔越调〕天净沙·夏","dynasty":"元","author":"白朴","text":"<ruby>云<rt>yún</rt></ruby><ruby>收<rt>shōu</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>波<rt>bō</rt></ruby><ruby>添<rt>tiān</rt></ruby>，<br><ruby>楼<rt>lóu</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>冷<rt>lěng</rt></ruby><ruby>瓜<rt>guā</rt></ruby><ruby>甜<rt>tián</rt></ruby>，<br><ruby>绿<rt>lǜ</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>垂<rt>chuí</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>檐<rt>yán</rt></ruby>。<br><ruby>纱<rt>shā</rt></ruby><ruby>厨<rt>chú</rt></ruby><ruby>藤<rt>téng</rt></ruby><ruby>簟<rt>diàn</rt></ruby>，<br><ruby>玉<rt>yù</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>扇<rt>shàn</rt></ruby><ruby>轻<rt>qīng</rt></ruby><ruby>缣<rt>jiān</rt></ruby>。","notes":"①藤簟（diàn）：藤编的席子。②罗扇轻缣（jiān)：轻薄的丝绸做成的扇子。","translation":"云收雨霁，流水波添，雨过天晴，楼也显得比平时高，水散发着凉爽的气息，雨后的瓜也似乎显得比平时甜了，绿树的树阴一直垂到画檐。纱帐中的藤席上，一个身着轻绢夏衣，手执罗扇的芳龄女孩，静静地享受着宜人的时光。•","number":45,"title_py":"〔 yuè diào 〕 tiān jìng shā · xià","author_py":"bái pǔ","dynasty_py":"Yuán"},{"title":"〔越调〕天净沙·秋","dynasty":"元","author":"白朴","text":"<ruby>孤<rt>gū</rt></ruby><ruby>村<rt>cūn</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>残<rt>cán</rt></ruby><ruby>霞<rt>xiá</rt></ruby>，<br><ruby>轻<rt>qīng</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>鸦<rt>yā</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>鸿<rt>hóng</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>下<rt>xià</rt></ruby>。<br><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>花<rt>huā</rt></ruby>。","notes":"①一点飞鸿影下：秋雁从天空飞过，影子投在了地上。","translation":"遥看天际那一抹红霞,一座村庄孤独的坐落在夕阳下。那轻淡的烟雾下,只见几只受冻的乌鸦。想起白天飞行着的鸿雁。飞翔着,飞翔在这青山绿水,白草红叶黄花之中。•","number":46,"title_py":"〔 yuè diào 〕 tiān jìng shā · qiū","author_py":"bái pǔ","dynasty_py":"Yuán"},{"title":"〔越调〕天净沙·冬","dynasty":"元","author":"白朴","text":"<ruby>一<rt>yì</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>角<rt>jiǎo</rt></ruby><ruby>谯<rt>qiáo</rt></ruby><ruby>门<rt>mén</rt></ruby>，<br><ruby>半<rt>bàn</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>昏<rt>hūn</rt></ruby>，<br><ruby>雪<rt>xuě</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>滨<rt>bīn</rt></ruby>。<br><ruby>竹<rt>zhú</rt></ruby><ruby>篱<rt>lí</rt></ruby><ruby>茅<rt>máo</rt></ruby><ruby>舍<rt>shě</rt></ruby>，<br><ruby>淡<rt>dàn</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>衰<rt>shuāi</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>孤<rt>gū</rt></ruby><ruby>村<rt>cūn</rt></ruby>。","notes":"①画角：古代军中用以昏晓报警的号角。<br>谯门：建有望楼的城门，古代为了防盗和御敌，京城和州郡皆在城门建有望楼。<br>②水滨：靠近水的场所。","translation":"在一个冬天的黄昏，城门一声轻响，一轮新月挂在半空，带着雪的山前水流缓缓。竹子做的篱笆和篱笆内的茅舍，在孤村之中一片安详的和谐。•","number":47,"title_py":"〔 yuè diào 〕 tiān jìng shā · dōng","author_py":"bái pǔ","dynasty_py":"Yuán"},{"title":"后庭花破子","dynasty":"金末元初","author":"元好问","text":"<ruby>玉<rt>yù</rt></ruby><ruby>树<rt>shù</rt></ruby>①<ruby>后<rt>hòu</rt></ruby><ruby>庭<rt>tíng</rt></ruby>②<ruby>前<rt>qián</rt></ruby>，<br><ruby>瑶<rt>yáo</rt></ruby><ruby>华<rt>huá</rt></ruby>③<ruby>妆<rt>zhuāng</rt></ruby><ruby>镜<rt>jìng</rt></ruby><ruby>边<rt>biān</rt></ruby>。<br><ruby>去<rt>qù</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>老<rt>lǎo</rt></ruby>，<br><ruby>今<rt>jīn</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>圆<rt>yuán</rt></ruby>。<br><ruby>莫<rt>mò</rt></ruby><ruby>教<rt>jiào</rt></ruby><ruby>偏<rt>piān</rt></ruby>④，<br><ruby>和<rt>hé</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>和<rt>hé</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>大<rt>dà</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>长<rt>zhǎng</rt></ruby><ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby>。","notes":"①玉树：传说中的一种仙树，这里指长得挺拔优美的树。<br>②后庭：女子住的内院或者后宫。<br>③瑶华：传说中的一种仙花，洁白的花，这里指的是铜镜边镶嵌的美丽花纹。<br>④偏：这里指的是月缺，花凋。","translation":"在长着挺拔的玉树的后院里，在镶花的华丽铜镜的旁边。儿千万不要凋零，月儿千万不要残缺，美好的花，美好的月，大家都能够一直停留在少年时，永远年轻，永远美好,花永远花好月圆。","number":48,"title_py":"hòu tíng huā pò zǐ","author_py":"yuán hǎo wèn","dynasty_py":"jīn mò yuán chū"},{"title":"铁杵成针","dynasty":"宋","author":"祝穆","text":"<ruby>李<rt>lǐ</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>少<rt>shǎo</rt></ruby><ruby>读<rt>dú</rt></ruby><ruby>书<rt>shū</rt></ruby>，<br><ruby>未<rt>wèi</rt></ruby><ruby>成<rt>chéng</rt></ruby>，<br><ruby>弃<rt>qì</rt></ruby><ruby>去<rt>qù</rt></ruby>。<br><ruby>道<rt>dào</rt></ruby><ruby>逢<rt>féng</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>妪<rt>yù</rt></ruby><ruby>磨<rt>mó</rt></ruby><ruby>杵<rt>chǔ</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>故<rt>gù</rt></ruby>，<br><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>欲<rt>yù</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>针<rt>zhēn</rt></ruby>。\"<ruby>白<rt>bái</rt></ruby><ruby>感<rt>gǎn</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>言<rt>yán</rt></ruby>，<br><ruby>遂<rt>suì</rt></ruby><ruby>卒<rt>zú</rt></ruby><ruby>业<rt>yè</rt></ruby>。","notes":"①少：少年。<br>②老妪：老年妇女。<br>③遂：于是。<br>④卒业：完成学业。","translation":"李白少年读书时，还没有学完功课，就扔下书本走开了。路上遇到一位老妇人正在起劲地磨铁棒。李白问她为什么要磨铁棒。老妇人回答说：“想作针。”李白听了，很受感动。从此，他发愤读书，刻苦钻研，圆满地完成了学业。","number":49,"title_py":"tiě chǔ chéng zhēn","author_py":"zhù mù","dynasty_py":"Sòng"},{"title":"夸父追日","dynasty":"先秦","author":"《山海经》","text":"<ruby>夸<rt>kuā</rt></ruby><ruby>父<rt>fù</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>逐<rt>zhú</rt></ruby><ruby>走<rt>zǒu</rt></ruby>，<ruby>入<rt>rù</rt></ruby><ruby>日<rt>rì</rt></ruby>。<br><ruby>渴<rt>kě</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>饮<rt>yǐn</rt></ruby>，<ruby>饮<rt>yǐn</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>河<rt>hé</rt></ruby>、<ruby>渭<rt>wèi</rt></ruby>。<br><ruby>河<rt>hé</rt></ruby>、<ruby>渭<rt>wèi</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>足<rt>zú</rt></ruby>，<ruby>北<rt>běi</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>泽<rt>zé</rt></ruby>。<br><ruby>未<rt>wèi</rt></ruby><ruby>至<rt>zhì</rt></ruby>，<ruby>道<rt>dào</rt></ruby><ruby>渴<rt>kě</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>死<rt>sǐ</rt></ruby>。<br><ruby>弃<rt>qì</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>杖<rt>zhàng</rt></ruby>，<ruby>化<rt>huà</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>邓<rt>dèng</rt></ruby><ruby>林<rt>lín</rt></ruby>。","notes":"①夸父：人名，一个神人。<br>②逐走：赛跑。③河、<br>渭：指黄河和渭水。<br>④大泽：大湖。<br>⑤邓：桃，邓林即桃林。","translation":"夸父去追太阳，离太阳很近了，非常口渴，想要喝水。于是就跑到黄河边，渭河边去喝水。黄河、渭河的水不够，就向北边的大湖去喝水，没有到达，就在路上渴死了。临死前，他把手杖向前一掷，后来，那手杖变成了好大好大的一片桃林，结出了又甜又解渴的大桃子。","number":50,"title_py":"kuā fù zhuī rì","author_py":"《 shān hǎi jīng 》","dynasty_py":"Xiān Qín"},{"title":"滥竽充数","dynasty":"先秦","author":"《韩非子》","text":"<ruby>齐<rt>qí</rt></ruby><ruby>宣<rt>xuān</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>使<rt>shǐ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>竽<rt>yú</rt></ruby>，<ruby>必<rt>bì</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>人<rt>rén</rt></ruby>。<br><ruby>南<rt>nán</rt></ruby><ruby>郭<rt>guō</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>请<rt>qǐng</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>竽<rt>yú</rt></ruby>，<ruby>宣<rt>xuān</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>说<rt>shuō</rt></ruby><ruby>之<rt>zhī</rt></ruby>，<ruby>廪<rt>lǐn</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>人<rt>rén</rt></ruby>。<br><ruby>宣<rt>xuān</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>死<rt>sǐ</rt></ruby>，<ruby>湣<rt>mǐn</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>立<rt>lì</rt></ruby>，<ruby>好<rt>hǎo</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>听<rt>tīng</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>处<rt>chù</rt></ruby><ruby>士<rt>shì</rt></ruby><ruby>逃<rt>táo</rt></ruby>。","notes":"①处士：没有做过官的读书人。<br>②廪食：官府发给的粮食，即薪俸。<br>③好：喜欢。","translation":"齐宣王喜欢让人吹竽，每次必要三百人一起吹。南郭先竽生见有机可乘，请求为宣王吹竽，宣王很高兴，给了他和其他数百个吹竽的人同样优厚的待遇。宣王死了，湣王继位，他喜欢听一个一个地演奏，南郭先生赶快逃跑了。","number":51,"title_py":"làn yú chōng shù","author_py":"《 hán fēi zǐ 》","dynasty_py":"Xiān Qín"},{"title":"潇湘夜雨","dynasty":"元","author":"马致远","text":"<ruby>渔<rt>yú</rt></ruby><ruby>灯<rt>dēng</rt></ruby><ruby>暗<rt>àn</rt></ruby>，<br><ruby>客<rt>kè</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>回<rt>huí</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>滴<rt>dī</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>碎<rt>suì</rt></ruby>。<br><ruby>孤<rt>gū</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>更<rt>gēng</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby>，<br><ruby>是<rt>shì</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>泪<rt>lèi</rt></ruby>。","notes":"","translation":"江中的渔火若明若暗，我从梦中醒来，是声声夜雨滴得人心碎难眠。深夜，在这孤零零的小舟中离家万里，仿佛那不是雨滴，是远离故乡的人思乡的清泪涟涟。","number":52,"title_py":"xiāo xiāng yè yǔ","author_py":"mǎ zhì yuǎn","dynasty_py":"Yuán"},{"title":"好事近","dynasty":"宋","author":"杨万里","text":"<ruby>月<rt>yuè</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>诚<rt>chéng</rt></ruby><ruby>斋<rt>zhāi</rt></ruby>①，<br><ruby>先<rt>xiān</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>川<rt>chuān</rt></ruby><ruby>谷<rt>gǔ</rt></ruby>②。<br><ruby>不<rt>bú</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>诚<rt>chéng</rt></ruby><ruby>斋<rt>zhāi</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<br><ruby>隔<rt>gé</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>修<rt>xiū</rt></ruby><ruby>竹<rt>zhú</rt></ruby>③。<br><ruby>如<rt>rú</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>才<rt>cái</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>夜<rt>yè</rt></ruby>，<br><ruby>月<rt>yuè</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>玉<rt>yù</rt></ruby>。<br><ruby>未<rt>wèi</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>光<rt>guāng</rt></ruby>④<ruby>奇<rt>qí</rt></ruby><ruby>绝<rt>jué</rt></ruby>，<br><ruby>看<rt>kàn</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>五<rt>wǔ</rt></ruby><ruby>十<rt>shí</rt></ruby><ruby>六<rt>liù</rt></ruby>。","notes":"①诚斋：作者的书斋名。<br>②万花川谷：作者的花园名。<br>③修竹：长长的竹子。<br>④秋光：秋天的风景。","translation":"月光还没有照到我的书房里来，先照到了我的花园中。并不是我的书房没有月光，而是隔着一片挺拔的竹林。如今才是阴历十三的夜，月色就已经像玉盘那样莹洁、美妙了。这还不是秋色最好的时候，如果到了十五、十六月亮圆了的时候，夜色将会是什么样子呢?","number":53,"title_py":"hǎo shì jìn","author_py":"yáng wàn lǐ","dynasty_py":"Sòng"},{"title":"落梅风•人初静","dynasty":"元","author":"马致远","text":"<ruby>人<rt>rén</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>静<rt>jìng</rt></ruby>，<br><ruby>月<rt>yuè</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>纱<rt>shā</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>梅<rt>méi</rt></ruby>①<ruby>斜<rt>xié</rt></ruby><ruby>映<rt>yìng</rt></ruby>。<br><ruby>梅<rt>méi</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>偏<rt>piān</rt></ruby><ruby>弄<rt>nòng</rt></ruby><ruby>影<rt>yǐng</rt></ruby>②，<br><ruby>月<rt>yuè</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>般<rt>bān</rt></ruby><ruby>孤<rt>gū</rt></ruby><ruby>零<rt>líng</rt></ruby>。","notes":"①玉梅：白梅。<br>②弄影：化用宋•张先《天仙子》词句“云破月来花弄影”","translation":"刚刚静下来，月色正是明亮的时候。白梅花枝斑驳地斜映在纱窗上。梅花偏偏弄影戏笑人，夜深了月亮沉落，庭院里一样凄凉孤零的景象。","number":54,"title_py":"luò méi fēng • rén chū jìng","author_py":"mǎ zhì yuǎn","dynasty_py":"Yuán"},{"title":"沉醉东风·闲居（节选）","dynasty":"元","author":"卢挚","text":"<ruby>恰<rt>qià</rt></ruby>①<ruby>离<rt>lí</rt></ruby><ruby>了<rt>le</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>那<rt>nà</rt></ruby><ruby>答<rt>dá</rt></ruby>②,<ruby>早<rt>zǎo</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>到<rt>dào</rt></ruby><ruby>竹<rt>zhú</rt></ruby><ruby>篱<rt>lí</rt></ruby><ruby>茅<rt>máo</rt></ruby><ruby>舍<rt>shě</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>野<rt>yě</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>路<rt>lù</rt></ruby><ruby>畔<rt>pàn</rt></ruby><ruby>开<rt>kāi</rt></ruby>，<ruby>村<rt>cūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>槽<rt>cáo</rt></ruby>③<ruby>头<rt>tóu</rt></ruby><ruby>榨<rt>zhà</rt></ruby>，<ruby>直<rt>zhí</rt></ruby><ruby>吃<rt>chī</rt></ruby><ruby>的<rt>de</rt></ruby><ruby>欠<rt>qiàn</rt></ruby><ruby>欠<rt>qiàn</rt></ruby><ruby>答<rt>dá</rt></ruby><ruby>答<rt>dá</rt></ruby>。<br><ruby>醉<rt>zuì</rt></ruby><ruby>了<rt>le</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>童<rt>tóng</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>劝<rt>quàn</rt></ruby><ruby>咱<rt>zán</rt></ruby>，<ruby>白<rt>bái</rt></ruby><ruby>发<rt>fà</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>乱<rt>luàn</rt></ruby><ruby>插<rt>chā</rt></ruby>。","notes":"①恰：刚才。<br>②那答：元时俗语，那儿。<br>③槽：酿酒器。风•<br>④欠欠答答：元时俗语，糊里糊涂。","translation":"刚刚离开那绿水青山的地方，又来到山间竹篱茅舍人家。路边开着野花，村边的酒槽头正在榨酒，直喝得我糊里糊涂。喝醉了山村的儿童也不劝我，反而把那菊花往我的白发上乱插。","number":55,"title_py":"chén zuì dōng fēng · xián jū （ jié xuǎn ）","author_py":"lú zhì","dynasty_py":"Yuán"},{"title":"塞鸿秋•浔阳即景","dynasty":"元","author":"周德清","text":"<ruby>长<rt>cháng</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>练<rt>liàn</rt></ruby>①，<br><ruby>淮<rt>huái</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>数<rt>shù</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>淀<rt>diàn</rt></ruby>②。<br><ruby>江<rt>jiāng</rt></ruby><ruby>帆<rt>fān</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>疾<rt>jí</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>箭<rt>jiàn</rt></ruby>，<br><ruby>山<rt>shān</rt></ruby><ruby>泉<rt>quán</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>尺<rt>chǐ</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>电<rt>diàn</rt></ruby>。<br><ruby>晚<rt>wǎn</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>都<rt>dōu</rt></ruby><ruby>变<rt>biàn</rt></ruby><ruby>露<rt>lù</rt></ruby>，<br><ruby>新<rt>xīn</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>初<rt>chū</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>扇<rt>shàn</rt></ruby>③，<br><ruby>塞<rt>sài</rt></ruby><ruby>鸿<rt>hóng</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>字<rt>zì</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>线<rt>xiàn</rt></ruby>。","notes":"①长江万里白云练：练，白色绸带。此句化用谢眺《晚登三山还望京邑》<br>诗句：“余霞散成绮，澄江静如练。”<br>②淀：可作染料的蓝汁。<br>③新月初学扇：新月像扇子那样呈半圆形。","translation":"长江万里有如一条白色缎带铺向远方，淮南的远山点点苍茫青翠；江上的片片船帆急行如离弦之箭，山上的瀑布从数千尺高空落下来快如闪电。晚云弥漫凝成晶莹的露珠，新月半圆犹如扇面，塞外的归鸿排成一字在高天上渺如一线。浔","number":56,"title_py":"sài hóng qiū • xún yáng jí jǐng","author_py":"zhōu dé qīng","dynasty_py":"Yuán"},{"title":"题画菜","dynasty":"明","author":"于谦","text":"<ruby>青<rt>qīng</rt></ruby><ruby>紫<rt>zǐ</rt></ruby><ruby>均<rt>jūn</rt></ruby><ruby>沾<rt>zhān</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>露<rt>lù</rt></ruby><ruby>恩<rt>ēn</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>团<rt>tuán</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>淡<rt>dàn</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>存<rt>cún</rt></ruby>。<br><ruby>食<rt>shí</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>方<rt>fāng</rt></ruby><ruby>丈<rt>zhàng</rt></ruby><ruby>倘<rt>tǎng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>物<rt>wù</rt></ruby>，<br><ruby>大<rt>dà</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>还<rt>hái</rt></ruby><ruby>须<rt>xū</rt></ruby><ruby>咬<rt>yǎo</rt></ruby><ruby>菜<rt>cài</rt></ruby><ruby>根<rt>gēn</rt></ruby>。","notes":"①青紫：指各色蔬菜。<br>②生意：指蔬菜的自然本色。<br>③方丈：餐桌。在诗中指丰盛的菜肴。<br>④倘来物：意外得到的东西。在诗中指过分的享受。<br>⑤大节：大操。<br>题⑥咬菜根：比喻艰苦朴素的生活。","translation":"各色的蔬菜离不开阳光丽露的滋润，而它的自然本色在淡泊中保存。餐桌上摆满丰盛的菜肴，贪图过分的享受是不可取的，要保持崇高的节操，还得过艰营朴素的生活。","number":57,"title_py":"tí huà cài","author_py":"yú qiān","dynasty_py":"Míng"},{"title":"桃花溪","dynasty":"唐","author":"张旭","text":"<ruby>隐<rt>yǐn</rt></ruby><ruby>隐<rt>yǐn</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>隔<rt>gé</rt></ruby><ruby>野<rt>yě</rt></ruby><ruby>烟<rt>yān</rt></ruby>，<br><ruby>石<rt>shí</rt></ruby><ruby>矶<rt>jī</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>畔<rt>pàn</rt></ruby><ruby>问<rt>wèn</rt></ruby><ruby>渔<rt>yú</rt></ruby><ruby>船<rt>chuán</rt></ruby>。<br><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>洞<rt>dòng</rt></ruby><ruby>在<rt>zài</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>边<rt>biān</rt></ruby>？","notes":"①桃花溪：水名，在湖南省桃源县桃源山下。<br>②飞桥：高桥。<br>③石矶：水中积石或水边突出的岩石、石堆。<br>④尽日：整天，整日。<br>⑤洞：指《桃花源记》中武陵渔人找到的洞口。","translation":"一座高桥隔着云烟出现，在岩石的西畔询问渔船。整天随着流水流淌，源洞口在清溪的哪边？","number":58,"title_py":"táo huā xī","author_py":"zhāng xù","dynasty_py":"Táng"},{"title":"稻田","dynasty":"唐","author":"韦庄","text":"<ruby>绿<rt>lǜ</rt></ruby><ruby>波<rt>bō</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>浪<rt>làng</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>陂<rt>bēi</rt></ruby>，<br><ruby>极<rt>jí</rt></ruby><ruby>目<rt>mù</rt></ruby><ruby>连<rt>lián</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>罢<rt>bà</rt></ruby><ruby>亚<rt>yà</rt></ruby><ruby>肥<rt>féi</rt></ruby>。<br><ruby>更<rt>gèng</rt></ruby><ruby>被<rt>bèi</rt></ruby><ruby>鹭<rt>lù</rt></ruby><ruby>鹚<rt>cí</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>雪<rt>xuě</rt></ruby>，<br><ruby>破<rt>pò</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>画<rt>huà</rt></ruby><ruby>屏<rt>píng</rt></ruby><ruby>飞<rt>fēi</rt></ruby>。","notes":"①陂：池塘。<br>②罢亚：指稻子摇摆的样子。","translation":"村前池塘里的春水泛着绿波白浪，一望无际的稻禾在茁壮成长，千百只雪白的鹭鹭飞到田野上空，像片片雪花飞人美丽的画卷中。","number":59,"title_py":"dào tián","author_py":"wéi zhuāng","dynasty_py":"Táng"},{"title":"早梅","dynasty":"唐","author":"张谓","text":"<ruby>一<rt>yí</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>梅<rt>méi</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>玉<rt>yù</rt></ruby><ruby>条<rt>tiáo</rt></ruby>，<br><ruby>迥<rt>jiǒng</rt></ruby><ruby>临<rt>lín</rt></ruby><ruby>村<rt>cūn</rt></ruby><ruby>路<rt>lù</rt></ruby><ruby>傍<rt>bàng</rt></ruby><ruby>溪<rt>xī</rt></ruby><ruby>桥<rt>qiáo</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>近<rt>jìn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>先<rt>xiān</rt></ruby><ruby>发<rt>fā</rt></ruby>，<br><ruby>疑<rt>yí</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>经<rt>jīng</rt></ruby><ruby>冬<rt>dōng</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>销<rt>xiāo</rt></ruby>。","notes":"迥：<br>远远地傍：靠近；临近。<br>经冬：过了一冬。<br>消：指冰雪融化。","translation":"一根梅花树长在村外的小路边，靠近河上的小桥，它的枝条上开满了像玉一样洁白的梅花。不知道长在水边的梅花最先开放，还以为是冬天里留下的雪还没融化呢。","number":60,"title_py":"zǎo méi","author_py":"zhāng wèi","dynasty_py":"Táng"},{"title":"五律·喜闻捷报","number":61,"dynasty":"现代","author":"毛泽东","text":"<ruby>秋<rt>qiū</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>度<rt>dù</rt></ruby><ruby>河<rt>hé</rt></ruby><ruby>上<rt>shàng</rt></ruby>，<br><ruby>大<rt>dà</rt></ruby><ruby>野<rt>yě</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>穹<rt>qióng</rt></ruby>。<br><ruby>佳<rt>jiā</rt></ruby><ruby>令<rt>lìng</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>至<rt>zhì</rt></ruby>，<br><ruby>明<rt>míng</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>傍<rt>bàng</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>生<rt>shēng</rt></ruby>。<br><ruby>故<rt>gù</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>鸿<rt>hóng</rt></ruby><ruby>音<rt>yīn</rt></ruby><ruby>绝<rt>jué</rt></ruby>，<br><ruby>妻<rt>qī</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>信<rt>xìn</rt></ruby><ruby>未<rt>wèi</rt></ruby><ruby>通<rt>tōng</rt></ruby>。<br><ruby>满<rt>mǎn</rt></ruby><ruby>宇<rt>yǔ</rt></ruby><ruby>频<rt>pín</rt></ruby><ruby>翘<rt>qiào</rt></ruby><ruby>望<rt>wàng</rt></ruby>，<br><ruby>凯<rt>kǎi</rt></ruby><ruby>歌<rt>gē</rt></ruby><ruby>奏<rt>zòu</rt></ruby><ruby>边<rt>biān</rt></ruby><ruby>城<rt>chéng</rt></ruby>。","notes":"①步：步行。<br>②蟠龙：地名。延安城东北约35公里的一个古镇。<br>③度：通\"渡\"，渡过。<br>④苍穹：即天空。<br>⑤佳令：指中秋佳节。令，节令。<br>⑥鸿音：鸿，大雁。《汉书·苏武传》中记载有大雁传递书信的事。<br>⑦凯歌奏边城：1947年8月，西北野战军在陕北取得沙家店战役胜利；9月中旬，又收复青化砭、蟠龙等城镇。<br>凯歌：胜利的歌声。","translation":"这首诗先写景，后写事抒情，层次清晰易懂。首联\"秋风度河上，大野入苍穹\"，既点出时令，又写出近景、远景，具体而又广阔，具有真实感。颔联第一句\"佳令随人至\"，照应首句\"秋风\"，又作为下面两联的铺垫。\"佳令随人至\"，也更为关注时局的发展。\"明月傍云生\"，具体描写了这佳令的特点。明月傍着浮云悠然而现，这是中秋的皓月，不禁引人遐思。亲人情况怎么样呢？\"故里鸿音绝，妻儿信未通。\"已经签订了停战协定和政协协议，但国民党统治集团要通过战争来削弱直至消灭人民革命力量的基本意图没有变，终于在其完成战争准备后，立刻翻脸，撕毁了停战协定和政协协议，悍然向解放区发动全面进攻。这两句诗表达出这一严重的事件，致使人民受难，音讯不通。尾联第一句\"满宇频翘望\"，形象而充分地表达了作者渴望和平、盼望人民武装反击反动派胜利的心情。末句\"凯歌奏边城\"，既是真实的写照，也表达了作者在人民革命战争取得胜利时的喜悦心情！","title_py":"wǔ lǜ · xǐ wén jié bào","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"夜上受降城闻笛","dynasty":"唐","author":"李益","text":"<ruby>回<rt>huí</rt></ruby><ruby>乐<rt>lè</rt></ruby><ruby>烽<rt>fēng</rt></ruby><ruby>前<rt>qián</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>雪<rt>xuě</rt></ruby>，<br><ruby>受<rt>shòu</rt></ruby><ruby>降<rt>xiáng</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>霜<rt>shuāng</rt></ruby>。<br><ruby>不<rt>bù</rt></ruby><ruby>知<rt>zhī</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>芦<rt>lú</rt></ruby><ruby>管<rt>guǎn</rt></ruby>，<br><
