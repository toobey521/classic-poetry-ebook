ruby><ruby>南<rt>nán</rt></ruby><ruby>舍<rt>shě</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>但<rt>dàn</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>群<rt>qún</rt></ruby><ruby>鸥<rt>ōu</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>来<rt>lái</rt></ruby>。<br><ruby>花<rt>huā</rt></ruby><ruby>径<rt>jìng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>曾<rt>céng</rt></ruby><ruby>缘<rt>yuán</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>扫<rt>sǎo</rt></ruby>，<br><ruby>蓬<rt>péng</rt></ruby><ruby>门<rt>mén</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>君<rt>jūn</rt></ruby><ruby>开<rt>kāi</rt></ruby>。<br><ruby>盘<rt>pán</rt></ruby><ruby>飧<rt>sūn</rt></ruby><ruby>市<rt>shì</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>兼<rt>jiān</rt></ruby><ruby>味<rt>wèi</rt></ruby>，<br><ruby>樽<rt>zūn</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>贫<rt>pín</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>醅<rt>pēi</rt></ruby>。<br><ruby>肯<rt>kěn</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>邻<rt>lín</rt></ruby><ruby>翁<rt>wēng</rt></ruby><ruby>相<rt>xiāng</rt></ruby><ruby>对<rt>duì</rt></ruby><ruby>饮<rt>yǐn</rt></ruby>，<br><ruby>隔<rt>gé</rt></ruby><ruby>篱<rt>lí</rt></ruby><ruby>呼<rt>hū</rt></ruby><ruby>取<rt>qǔ</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>余<rt>yú</rt></ruby><ruby>杯<rt>bēi</rt></ruby>。","notes":"客至：客指崔明府，<br>杜甫在题后自注：“喜崔明府相过”，明府，县令的美称。<br>舍：指家。<br>但见：只见。此句意为平时交游很少，只有鸥鸟不嫌弃能与之相亲。<br>蓬门：用蓬草编成的门户，以示房子的简陋。<br>客市远：离市集远。<br>兼味：多种美味佳肴。无兼味，谦言菜少。<br>樽：酒器。<br>旧醅：隔年的陈酒。<br>樽酒句：古人好饮新酒，杜甫以家贫无新酒感到歉意。<br>肯：能否允许，这是向客人征询。<br>余杯：余下来的酒。<br>花径：长满花草的小路。<br>呼取：叫，招呼。","translation":"草堂的南北涨满了春水，只见鸥群日日结队飞来。老夫不曾为客扫过花径，今天才为您扫，这柴门不曾为客开过，今天为您打开。离市太远盘中没好菜肴，家底太薄只有陈酒招待。若肯邀请隔壁的老翁一同对饮，隔着篱笆唤来喝尽余杯！","number":50,"title_py":"kè zhì","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"卧薪尝胆（节选）","dynasty":"汉","author":"司马迁","text":"<ruby>吴<rt>wú</rt></ruby><ruby>既<rt>jì</rt></ruby><ruby>赦<rt>shè</rt></ruby><ruby>越<rt>yuè</rt></ruby>，<ruby>越<rt>yuè</rt></ruby><ruby>王<rt>wáng</rt></ruby><ruby>勾<rt>gōu</rt></ruby><ruby>践<rt>jiàn</rt></ruby><ruby>反<rt>fǎn</rt></ruby><ruby>国<rt>guó</rt></ruby>，<br><ruby>乃<rt>nǎi</rt></ruby><ruby>苦<rt>kǔ</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>焦<rt>jiāo</rt></ruby><ruby>思<rt>sī</rt></ruby>，<ruby>置<rt>zhì</rt></ruby><ruby>胆<rt>dǎn</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>坐<rt>zuò</rt></ruby>，<br><ruby>坐<rt>zuò</rt></ruby><ruby>卧<rt>wò</rt></ruby><ruby>即<rt>jí</rt></ruby><ruby>仰<rt>yǎng</rt></ruby><ruby>胆<rt>dǎn</rt></ruby>，<br><ruby>饮<rt>yǐn</rt></ruby><ruby>食<rt>shí</rt></ruby><ruby>亦<rt>yì</rt></ruby><ruby>尝<rt>cháng</rt></ruby><ruby>胆<rt>dǎn</rt></ruby><ruby>也<rt>yě</rt></ruby>。<br><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>女<rt>rǔ</rt></ruby><ruby>忘<rt>wàng</rt></ruby><ruby>会<rt>kuài</rt></ruby><ruby>稽<rt>jī</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>耻<rt>chǐ</rt></ruby><ruby>邪<rt>yé</rt></ruby>？\"<br><ruby>身<rt>shēn</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>耕<rt>gēng</rt></ruby><ruby>作<rt>zuò</rt></ruby>，<ruby>夫<rt>fū</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>织<rt>zhī</rt></ruby>，<br><ruby>食<rt>shí</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>加<rt>jiā</rt></ruby><ruby>肉<rt>ròu</rt></ruby>，<ruby>衣<rt>yī</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>重<rt>chóng</rt></ruby><ruby>采<rt>cǎi</rt></ruby>，<br><ruby>折<rt>zhé</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>下<rt>xià</rt></ruby><ruby>贤<rt>xián</rt></ruby><ruby>人<rt>rén</rt></ruby>，<br><ruby>厚<rt>hòu</rt></ruby><ruby>遇<rt>yù</rt></ruby><ruby>宾<rt>bīn</rt></ruby><ruby>客<rt>kè</rt></ruby>，<br><ruby>振<rt>zhèn</rt></ruby><ruby>贫<rt>pín</rt></ruby><ruby>吊<rt>diào</rt></ruby><ruby>死<rt>sǐ</rt></ruby>，<br><ruby>与<rt>yǔ</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>姓<rt>xìng</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>劳<rt>láo</rt></ruby>。","notes":"【故事链接】春秋时期，越王勾践的父亲被吴国杀害，勾践与吴王夫差多次交战，最后被围困在会稽山，无奈之下只好屈膝求和。勾践成为吴王夫差的奴仆，在取得了夫差的信任后，被释放回越国。勾践立志要报仇雪恨。为了不忘国耻，他就睡在柴草上，在住处悬挂着苦胆，经常尝胆的苦味，以激励自己。经过十年的准备，越国由弱变强，最终打败了吴国，吴王羞愧自杀。这就是历史上著名的\"卧薪尝胆\"的故事。","translation":"吴王夫差赦免了越王勾践，勾践回到越国后，发愤图强，把苦胆挂在座位前，坐着和躺下的时候都能一仰头尝到苦胆的滋味，他吃饭的时候也不忘尝尝苦胆。还对自己说：“难道你忘记会稽的耻辱了吗？”他还亲自到农田耕作，他的夫人亲手织布，吃饭时也不吃肉菜。也不穿两层华丽的衣服，礼贤下士，对待贤良的人谦虚有礼，热情地招待宾客，并救济贫苦的老百姓，哀悼死者，与平民百姓一起辛苦劳作。【故事链接】春秋时期，越王勾践的父亲被吴国杀害，勾践与吴王夫差多次交战，最后被围困在`会稽山，无奈之下只好屈膝求和。勾践成为吴王夫差的奴仆，在取得了夫差的信任后，被释放回越国。勾践立志要报仇雪恨。为了不忘国耻，他晚上就睡在柴草上，在住处悬挂着苦胆，经常尝胆的苦味，以激励自己。经过十年的准备，越国由弱变强，最终打败了吴国，吴王羞愧自杀。这就是历史上著名的“卧薪尝胆”的故事。","number":51,"title_py":"wò xīn cháng dǎn （ jié xuǎn ）","author_py":"sī mǎ qiān","dynasty_py":"Hàn"},{"title":"刻舟求剑","number":52,"dynasty":"战国","author":"《吕氏春秋》","text":"<ruby>楚<rt>chǔ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>涉<rt>shè</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>者<rt>zhě</rt></ruby>，<ruby>其<rt>qí</rt></ruby><ruby>剑<rt>jiàn</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>坠<rt>zhuì</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<ruby>遽<rt>jù</rt></ruby><ruby>契<rt>qì</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>，<ruby>曰<rt>yuē</rt></ruby>：\"<ruby>是<rt>shì</rt></ruby><ruby>吾<rt>wú</rt></ruby><ruby>剑<rt>jiàn</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>从<rt>cóng</rt></ruby><ruby>坠<rt>zhuì</rt></ruby>。<br>\"<ruby>舟<rt>zhōu</rt></ruby><ruby>止<rt>zhǐ</rt></ruby>，<ruby>从<rt>cóng</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>所<rt>suǒ</rt></ruby><ruby>契<rt>qì</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>求<rt>qiú</rt></ruby><ruby>之<rt>zhī</rt></ruby>。<br><ruby>舟<rt>zhōu</rt></ruby><ruby>已<rt>yǐ</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>矣<rt>yǐ</rt></ruby>，<ruby>而<rt>ér</rt></ruby><ruby>剑<rt>jiàn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>行<rt>xíng</rt></ruby>，<ruby>求<rt>qiú</rt></ruby><ruby>剑<rt>jiàn</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>此<rt>cǐ</rt></ruby>，<ruby>不<rt>bú</rt></ruby><ruby>亦<rt>yì</rt></ruby><ruby>惑<rt>huò</rt></ruby><ruby>乎<rt>hū</rt></ruby>？","notes":"涉：过，渡。<br>者：……的人。<br>遽：急忙，立刻。<br>契：用刀刻（记号）<br>是吾剑之所从坠：<br>这是我的剑掉下去的地方矣：了。<br>若：像。<br>此：这样。<br>不亦惑乎：不是很糊涂吗？刻舟求剑","translation":"","title_py":"kè zhōu qiú jiàn","author_py":"《 lǚ shì chūn qiū 》","dynasty_py":"Zhàn Guó"},{"title":"陆绩怀橘","number":53,"dynasty":"晋","author":"陈寿","text":"<ruby>绩<rt>jì</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>六<rt>liù</rt></ruby><ruby>岁<rt>suì</rt></ruby>，<ruby>于<rt>yú</rt></ruby><ruby>九<rt>jiǔ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>袁<rt>yuán</rt></ruby><ruby>术<rt>shù</rt></ruby>。<br><ruby>术<rt>shù</rt></ruby><ruby>出<rt>chū</rt></ruby><ruby>橘<rt>jú</rt></ruby>，<ruby>绩<rt>jì</rt></ruby><ruby>怀<rt>huái</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>枚<rt>méi</rt></ruby>，<ruby>去<rt>qù</rt></ruby>，<ruby>拜<rt>bài</rt></ruby><ruby>辞<rt>cí</rt></ruby><ruby>堕<rt>duò</rt></ruby><ruby>地<rt>dì</rt></ruby>。<br><ruby>术<rt>shù</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>陆<rt>lù</rt></ruby><ruby>郎<rt>láng</rt></ruby><ruby>作<rt>zuò</rt></ruby><ruby>宾<rt>bīn</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>怀<rt>huái</rt></ruby><ruby>橘<rt>jú</rt></ruby><ruby>乎<rt>hū</rt></ruby>？<br>\"<ruby>绩<rt>jì</rt></ruby><ruby>跪<rt>guì</rt></ruby><ruby>答<rt>dá</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>欲<rt>yù</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>遗<rt>wèi</rt></ruby><ruby>母<rt>mǔ</rt></ruby>。<br>\"<ruby>术<rt>shù</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>奇<rt>qí</rt></ruby><ruby>之<rt>zhī</rt></ruby>。","notes":"","translation":"","title_py":"lù jì huái jú","author_py":"chén shòu","dynasty_py":"jìn"},{"title":"踏莎①行·小径红稀","dynasty":"宋","author":"晏殊","text":"<ruby>小<rt>xiǎo</rt></ruby><ruby>径<rt>jìng</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>稀<rt>xī</rt></ruby>②，<br><ruby>芳<rt>fāng</rt></ruby><ruby>郊<rt>jiāo</rt></ruby><ruby>绿<rt>lǜ</rt></ruby><ruby>遍<rt>biàn</rt></ruby>。<br><ruby>高<rt>gāo</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>见<rt>jiàn</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>解<rt>jiě</rt></ruby>③<ruby>禁<rt>jìn</rt></ruby><ruby>杨<rt>yáng</rt></ruby><ruby>花<rt>huā</rt></ruby>，<br><ruby>濛<rt>méng</rt></ruby><ruby>濛<rt>méng</rt></ruby><ruby>乱<rt>luàn</rt></ruby><ruby>扑<rt>pū</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>面<rt>miàn</rt></ruby>。<br><ruby>翠<rt>cuì</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>藏<rt>cáng</rt></ruby><ruby>莺<rt>yīng</rt></ruby>④，<br><ruby>朱<rt>zhū</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>隔<rt>gé</rt></ruby><ruby>燕<rt>yàn</rt></ruby>。<br><ruby>炉<rt>lú</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>静<rt>jìng</rt></ruby><ruby>逐<rt>zhú</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>丝<rt>sī</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby>⑤。<br><ruby>一<rt>yì</rt></ruby><ruby>场<rt>chǎng</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>醒<rt>xǐng</rt></ruby><ruby>时<rt>shí</rt></ruby>，<br><ruby>斜<rt>xié</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>照<rt>zhào</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>院<rt>yuàn</rt></ruby>。","notes":"①踏莎（suō）行：词牌名。<br>②红稀：花儿稀少、凋谢。意思是到了晚春时节。<br>③不解：不懂得。·行④翠叶藏莺，<br>珠帘隔燕：意谓莺燕都深藏不见。这里的莺燕暗喻“伊人”。<br>⑤游丝转：烟雾旋转上升，像游动的青丝一般。","translation":"路边的红花日渐稀少，郊野却被萋萋芳草占遍，绿树成荫高楼台榭若隐若现。春风不懂得去管束杨花柳絮，让它们迷迷蒙蒙乱扑人面。翠绿的树叶里藏着黄莺，红色窗帘把燕子隔在外面，静静的炉香像游丝般袅袅升腾。醉酒后一场愁梦醒来时，夕阳正斜照着深深的庭院。","number":54,"title_py":"tà shā ① xíng · xiǎo jìng hóng xī","author_py":"yàn shū","dynasty_py":"Sòng"},{"title":"青玉案①·元夕②","dynasty":"宋","author":"辛弃疾","text":"<ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>放<rt>fàng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>树<rt>shù</rt></ruby>。<br><ruby>更<rt>gèng</rt></ruby><ruby>吹<rt>chuī</rt></ruby><ruby>落<rt>luò</rt></ruby>、<ruby>星<rt>xīng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>。<br><ruby>宝<rt>bǎo</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>雕<rt>diāo</rt></ruby><ruby>车<rt>chē</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>路<rt>lù</rt></ruby>。<br><ruby>凤<rt>fèng</rt></ruby><ruby>箫<rt>xiāo</rt></ruby><ruby>声<rt>shēng</rt></ruby> <ruby>动<rt>dòng</rt></ruby>，<br><ruby>玉<rt>yù</rt></ruby><ruby>壶<rt>hú</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby>，<br><ruby>一<rt>yí</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>龙<rt>lóng</rt></ruby><ruby>舞<rt>wǔ</rt></ruby>。<br><ruby>蛾<rt>é</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>金<rt>jīn</rt></ruby><ruby>缕<rt>lǚ</rt></ruby>。<br><ruby>笑<rt>xiào</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>盈<rt>yíng</rt></ruby><ruby>盈<rt>yíng</rt></ruby><ruby>暗<rt>àn</rt></ruby><ruby>香<rt>xiāng</rt></ruby><ruby>去<rt>qù</rt></ruby>。<br><ruby>众<rt>zhòng</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>他<rt>tā</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>度<rt>dù</rt></ruby>。<br><ruby>蓦<rt>mò</rt></ruby><ruby>然<rt>rán</rt></ruby><ruby>回<rt>huí</rt></ruby><ruby>首<rt>shǒu</rt></ruby>，<br><ruby>那<rt>nà</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>却<rt>què</rt></ruby><ruby>在<rt>zài</rt></ruby>，<br><ruby>灯<rt>dēng</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>阑<rt>lán</rt></ruby><ruby>珊<rt>shān</rt></ruby><ruby>处<rt>chù</rt></ruby>。","notes":"①青玉案：词牌名。“案”读wǎn，与“碗”同音。<br>②元夕：夏历正月十五日为上元节，元宵节，此夜称元夕或元夜。案·③“东风”<br>句：形容元宵夜花灯繁多。<br>④星如雨：指焰火纷纷，乱落如雨。<br>⑤宝马雕车：豪华的马车。<br>⑥玉壶：比喻明月，亦可解释为指灯。","translation":"像东风吹散千树繁花一样，又吹得烟火纷纷，乱落如雨。豪华的马车满路芳香。悠扬的凤箫声四处回荡，玉壶般的明月渐渐西斜，一夜鱼龙灯飞舞笑语喧哗。美人头上都戴着亮丽的饰物，笑语盈盈地随人群走过，身上香气飘洒。我在人群中寻找她千百回，猛然一回头，不经意间却在灯火零落之处发现了她。","number":55,"title_py":"qīng yù àn ① · yuán xī ②","author_py":"xīn qì jí","dynasty_py":"Sòng"},{"title":"江城子·密州出猎","dynasty":"宋","author":"苏轼","text":"<ruby>老<rt>lǎo</rt></ruby><ruby>夫<rt>fū</rt></ruby><ruby>聊<rt>liáo</rt></ruby><ruby>发<rt>fā</rt></ruby><ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>狂<rt>kuáng</rt></ruby>，<ruby>左<rt>zuǒ</rt></ruby><ruby>牵<rt>qiān</rt></ruby><ruby>黄<rt>huáng</rt></ruby>，<br><ruby>右<rt>yòu</rt></ruby><ruby>擎<rt>qíng</rt></ruby><ruby>苍<rt>cāng</rt></ruby>，<ruby>锦<rt>jǐn</rt></ruby><ruby>帽<rt>mào</rt></ruby><ruby>貂<rt>diāo</rt></ruby><ruby>裘<rt>qiú</rt></ruby>，<ruby>千<rt>qiān</rt></ruby><ruby>骑<rt>qí</rt></ruby><ruby>卷<rt>juǎn</rt></ruby><ruby>平<rt>píng</rt></ruby><ruby>冈<rt>gāng</rt></ruby>。<br><ruby>为<rt>wéi</rt></ruby><ruby>报<rt>bào</rt></ruby><ruby>倾<rt>qīng</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>随<rt>suí</rt></ruby><ruby>太<rt>tài</rt></ruby><ruby>守<rt>shǒu</rt></ruby>，<ruby>亲<rt>qīn</rt></ruby><ruby>射<rt>shè</rt></ruby><ruby>虎<rt>hǔ</rt></ruby>，<ruby>看<rt>kàn</rt></ruby><ruby>孙<rt>sūn</rt></ruby><ruby>郎<rt>láng</rt></ruby>。<br><ruby>酒<rt>jiǔ</rt></ruby><ruby>酣<rt>hān</rt></ruby><ruby>胸<rt>xiōng</rt></ruby><ruby>胆<rt>dǎn</rt></ruby><ruby>尚<rt>shàng</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>张<rt>zhāng</rt></ruby>，<ruby>鬓<rt>bìn</rt></ruby><ruby>微<rt>wēi</rt></ruby><ruby>霜<rt>shuāng</rt></ruby>，<ruby>又<rt>yòu</rt></ruby><ruby>何<rt>hé</rt></ruby><ruby>妨<rt>fáng</rt></ruby>！<br><ruby>持<rt>chí</rt></ruby><ruby>节<rt>jié</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>中<rt>zhōng</rt></ruby>，<ruby>何<rt>hé</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>遣<rt>qiǎn</rt></ruby><ruby>冯<rt>féng</rt></ruby><ruby>唐<rt>táng</rt></ruby>？<br><ruby>会<rt>huì</rt></ruby><ruby>挽<rt>wǎn</rt></ruby><ruby>雕<rt>diāo</rt></ruby><ruby>弓<rt>gōng</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>满<rt>mǎn</rt></ruby><ruby>月<rt>yuè</rt></ruby>，<ruby>西<rt>xī</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>望<rt>wàng</rt></ruby>，<ruby>射<rt>shè</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>狼<rt>láng</rt></ruby>。","notes":"","translation":"我姑且抒发一下少年的豪情壮志，左手牵着黄犬，右臂擎着苍鹰，戴着华美鲜艳的帽子，穿着貂皮做的衣服，带着子上千骑的随从疾风般席卷平坦的山冈。为了报答满城的人跟随我出猎的盛情厚意，我要像孙权一样，亲自射杀猛虎。我痛饮美酒，心胸开阔，胆气更为豪壮，（虽然）两鬓微微发白，（但）这又有何妨？什么时候皇帝会派人下来，就像汉文帝派遣冯唐去云中赦免魏尚的罪（一样信任我）呢？我将使尽力气拉满雕弓就像满月一样，朝着西北瞄望，射向西夏军队。","number":56,"title_py":"jiāng chéng zǐ · mì zhōu chū liè","author_py":"sū shì","dynasty_py":"Sòng"},{"title":"阳春曲·春景","dynasty":"元","author":"胡祗遹","text":"<ruby>几<rt>jǐ</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>墙<rt>qiáng</rt></ruby><ruby>头<rt>tóu</rt></ruby><ruby>杏<rt>xìng</rt></ruby>，<ruby>数<rt>shù</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>屋<rt>wū</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>屏<rt>píng</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>得<rt>dé</rt></ruby><ruby>几<rt>jǐ</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>明<rt>míng</rt></ruby>。<br><ruby>三<rt>sān</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>景<rt>jǐng</rt></ruby>，<ruby>宜<rt>yí</rt></ruby><ruby>醉<rt>zuì</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>宜<rt>yí</rt></ruby><ruby>醒<rt>xǐng</rt></ruby>。<br><ruby>残<rt>cán</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>酝<rt>yùn</rt></ruby><ruby>酿<rt>niàng</rt></ruby><ruby>蜂<rt>fēng</rt></ruby><ruby>儿<rt>ér</rt></ruby><ruby>蜜<rt>mì</rt></ruby>，<ruby>细<rt>xì</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>调<rt>diào</rt></ruby><ruby>和<rt>hé</rt></ruby><ruby>燕<rt>yàn</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>泥<rt>ní</rt></ruby>。<br><ruby>绿<rt>lǜ</rt></ruby><ruby>窗<rt>chuāng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>睡<rt>shuì</rt></ruby><ruby>觉<rt>jué</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>迟<rt>chí</rt></ruby>。<br><ruby>谁<rt>shuí</rt></ruby><ruby>唤<rt>huàn</rt></ruby><ruby>起<rt>qǐ</rt></ruby>，<ruby>窗<rt>chuāng</rt></ruby><ruby>外<rt>wài</rt></ruby><ruby>晓<rt>xiǎo</rt></ruby><ruby>莺<rt>yīng</rt></ruby><ruby>啼<rt>tí</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>谢<rt>xiè</rt></ruby>，<ruby>十<rt>shí</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>清<rt>qīng</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>柳<rt>liǔ</rt></ruby><ruby>影<rt>yǐng</rt></ruby><ruby>斜<rt>xié</rt></ruby>。<br><ruby>洛<rt>luò</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>时<rt>shí</rt></ruby><ruby>别<rt>bié</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>也<rt>yě</rt></ruby>，<ruby>闲<rt>xián</rt></ruby><ruby>煞<rt>shā</rt></ruby><ruby>旧<rt>jiù</rt></ruby><ruby>蜂<rt>fēng</rt></ruby><ruby>蝶<rt>dié</rt></ruby>。","notes":"","translation":"几枝初开的杏花红雪般堆在土状，点点青山如画屏一样隐现在屋上。一个春季，能有几天这样明媚、晴朗？阳春三月的景致令人陶醉，只适合醉眼朦胧地而不适合清醒地去欣赏。花虽残了，蜂儿却把它酿成了蜜，雨虽来了，燕子却借它调好了筑窝的泥。绿荫窗下，浓睡的我醒来已经很晚了。是谁把我叫起？是那窗外早晨鸣叫的黄莺。","number":57,"title_py":"yáng chūn qū · chūn jǐng","author_py":"hú zhī yù","dynasty_py":"Yuán"},{"title":"殿前欢·楚怀王","dynasty":"元","author":"贯云石","text":"<ruby>楚<rt>chǔ</rt></ruby><ruby>怀<rt>huái</rt></ruby><ruby>王<rt>wáng</rt></ruby>①，<ruby>忠<rt>zhōng</rt></ruby><ruby>臣<rt>chén</rt></ruby><ruby>跳<rt>tiào</rt></ruby><ruby>入<rt>rù</rt></ruby><ruby>汨<rt>mì</rt></ruby><ruby>罗<rt>luó</rt></ruby><ruby>江<rt>jiāng</rt></ruby>②。<br>《<ruby>离<rt>lí</rt></ruby><ruby>骚<rt>sāo</rt></ruby>》<ruby>读<rt>dú</rt></ruby><ruby>罢<rt>bà</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>惆<rt>chóu</rt></ruby><ruby>怅<rt>chàng</rt></ruby>，<ruby>日<rt>rì</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>光<rt>guāng</rt></ruby>。<br><ruby>伤<rt>shāng</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>笑<rt>xiào</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>场<rt>chǎng</rt></ruby>，<ruby>笑<rt>xiào</rt></ruby><ruby>你<rt>nǐ</rt></ruby><ruby>个<rt>gè</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>闾<rt>lǘ</rt></ruby>③<ruby>强<rt>qiáng</rt></ruby>，<ruby>为<rt>wéi</rt></ruby><ruby>甚<rt>shèn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>身<rt>shēn</rt></ruby><ruby>心<rt>xīn</rt></ruby><ruby>放<rt>fàng</rt></ruby>？<br><ruby>沧<rt>cāng</rt></ruby><ruby>浪<rt>làng</rt></ruby><ruby>污<rt>wū</rt></ruby><ruby>你<rt>nǐ</rt></ruby>，<ruby>你<rt>nǐ</rt></ruby><ruby>污<rt>wū</rt></ruby><ruby>沧<rt>cāng</rt></ruby><ruby>浪<rt>làng</rt></ruby>。","notes":"①楚怀王：战国时楚国的国君。公元前328－前299 年在位。<br>②忠臣跳入汨罗江：指屈原因楚怀王听信谗言，被放逐殿沅湘间，自沉汨罗江而死。汨罗江，湘江支流，在湖南省东前北部。·<br>欢③三闾：指屈原，他曾任三闾大夫。","translation":"不辨忠良，把忠心耿耿的屈原逼得投了汨罗江。读罢《离骚》我空自惆怅。屈子的精神品格可与日月争光。伤心之余只有苦笑一场。笑你这个三闾大夫心性太强，为什么不旷达超脱心胸开放？与其说是江水玷污了你，不如说是你玷污了汨罗江。","number":58,"title_py":"diàn qián huān · chǔ huái wáng","author_py":"guàn yún shí","dynasty_py":"Yuán"},{"title":"折桂令·九日","dynasty":"元","author":"张可久","text":"<ruby>对<rt>duì</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>强<rt>qiáng</rt></ruby><ruby>整<rt>zhěng</rt></ruby><ruby>乌<rt>wū</rt></ruby><ruby>纱<rt>shā</rt></ruby>。<br><ruby>归<rt>guī</rt></ruby><ruby>雁<rt>yàn</rt></ruby><ruby>横<rt>héng</rt></ruby><ruby>秋<rt>qiū</rt></ruby>②，<br><ruby>倦<rt>juàn</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>思<rt>sī</rt></ruby><ruby>家<rt>jiā</rt></ruby>。<br><ruby>翠<rt>cuì</rt></ruby><ruby>袖<rt>xiù</rt></ruby>①<ruby>殷<rt>yīn</rt></ruby><ruby>勤<rt>qín</rt></ruby>，<br><ruby>金<rt>jīn</rt></ruby><ruby>杯<rt>bēi</rt></ruby><ruby>错<rt>cuò</rt></ruby><ruby>落<rt>luò</rt></ruby>，<br><ruby>玉<rt>yù</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>琵<rt>pí</rt></ruby><ruby>琶<rt>pá</rt></ruby>③。<br><ruby>人<rt>rén</rt></ruby><ruby>老<rt>lǎo</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>西<rt>xī</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>发<rt>fà</rt></ruby>，<br><ruby>蝶<rt>dié</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>花<rt>huā</rt></ruby>。<br><ruby>回<rt>huí</rt></ruby><ruby>首<rt>shǒu</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>涯<rt>yá</rt></ruby>，<br><ruby>一<rt>yì</rt></ruby><ruby>抹<rt>mǒ</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>阳<rt>yáng</rt></ruby>，<br><ruby>数<rt>shù</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>鸦<rt>yā</rt></ruby>。","notes":"①翠袖：绿色衫袖。代指女子。<br>②归雁横秋：南归的大雁在秋天的空中横排飞行。<br>③玉手琵琶：谓歌女弹奏琵琶助兴。·令","translation":"面对着青山勉强整理头上的乌纱，归雁横越秋空，困倦游子思念故家。忆翠袖殷勤劝酒，金杯错落频举，玉手弹奏琵琶。西风萧萧人已衰老满头白发，玉蝶愁飞明日黄花，回头看茫茫天涯，只见一抹斜阳，几只远飞的寒鸦。","number":59,"title_py":"zhé guì lìng · jiǔ rì","author_py":"zhāng kě jiǔ","dynasty_py":"Yuán"},{"title":"折桂令·次酸斋韵","dynasty":"元","author":"张可久","text":"<ruby>倚<rt>yǐ</rt></ruby><ruby>栏<rt>lán</rt></ruby><ruby>杆<rt>gān</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>兴<rt>xīng</rt></ruby><ruby>亡<rt>wáng</rt></ruby>①。<br><ruby>数<rt>shù</rt></ruby><ruby>九<rt>jiǔ</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>齐<rt>qí</rt></ruby><ruby>州<rt>zhōu</rt></ruby>②，<br><ruby>八<rt>bā</rt></ruby><ruby>景<rt>jǐng</rt></ruby><ruby>湘<rt>xiāng</rt></ruby><ruby>江<rt>jiāng</rt></ruby>③，<br><ruby>吊<rt>diào</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>词<rt>cí</rt></ruby><ruby>香<rt>xiāng</rt></ruby>④，<br><ruby>招<rt>zhāo</rt></ruby><ruby>仙<rt>xiān</rt></ruby><ruby>笛<rt>dí</rt></ruby><ruby>响<rt>xiǎng</rt></ruby>，<br><ruby>引<rt>yǐn</rt></ruby><ruby>兴<rt>xìng</rt></ruby><ruby>杯<rt>bēi</rt></ruby><ruby>长<rt>zhǎng</rt></ruby>⑤。<br><ruby>远<rt>yuǎn</rt></ruby><ruby>树<rt>shù</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>渺<rt>miǎo</rt></ruby><ruby>茫<rt>máng</rt></ruby>，<br><ruby>空<rt>kōng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>雪<rt>xuě</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>凉<rt>liáng</rt></ruby>。<br><ruby>白<rt>bái</rt></ruby><ruby>鹤<rt>hè</rt></ruby><ruby>双<rt>shuāng</rt></ruby><ruby>双<rt>shuāng</rt></ruby>，<br><ruby>剑<rt>jiàn</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>昂<rt>áng</rt></ruby><ruby>昂<rt>áng</rt></ruby>，<br><ruby>锦<rt>jǐn</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>琅<rt>láng</rt></ruby><ruby>琅<rt>láng</rt></ruby>。","notes":"①不尽兴亡：指对历代兴亡变迁的感慨绵绵不尽。<br>②九点齐州：齐州，即中国。古时中国分为冀、豫、雍、扬、兖、徐、梁、青、荆九州。<br>③八景湘江：即潇湘八景。<br>④吊古词香：指凭吊古迹抒怀赋诗。<br>⑤引兴杯长：谓兴致佳饮酒多。化用白居易《初授秘监·令并赐金紫闲吟小酌偶写所怀》<br>诗句：“酒引眼前兴，诗留身后名。”","translation":"倚栏干看不尽千古兴亡，数神州见九点小小烟尘，看湘江八景渺茫。凭吊古迹诗词飘香，招引仙人竹笛鸣响，激情奔放举杯痛饮杜康。远处的树丛笼罩云雾青烟迷离朦胧，空山上明月辉映白雪落寞苍凉。看云天白鹤一双双自在飞翔，大道上剑客游侠意气昂扬，锦绣闺房里笑语琅琅。","number":60,"title_py":"zhé guì lìng · cì suān zhāi yùn","author_py":"zhāng kě jiǔ","dynasty_py":"Yuán"},{"title":"送友人","dynasty":"唐","author":"李白","text":"<ruby>青<rt>qīng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>横<rt>héng</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>郭<rt>guō</rt></ruby>，<br><ruby>白<rt>bái</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>绕<rt>rào</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>城<rt>chéng</rt></ruby>。<br><ruby>此<rt>cǐ</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>别<rt>bié</rt></ruby>，<br><ruby>孤<rt>gū</rt></ruby><ruby>蓬<rt>péng</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>征<rt>zhēng</rt></ruby>。<br><ruby>浮<rt>fú</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>游<rt>yóu</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>意<rt>yì</rt></ruby>，<br><ruby>落<rt>luò</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>故<rt>gù</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>情<rt>qíng</rt></ruby>。<br><ruby>挥<rt>huī</rt></ruby><ruby>手<rt>shǒu</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>兹<rt>zī</rt></ruby><ruby>去<rt>qù</rt></ruby>，<br><ruby>萧<rt>xiāo</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>班<rt>bān</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>鸣<rt>míng</rt></ruby>。","notes":"郭：古代在城外修筑的一种外墙。<br>白水：清澈的水。<br>一：助词，加强语气。名做状。<br>别：告别。<br>蓬：古书上说的一种植物，干枯后根株断开，遇风飞旋，也称“飞蓬”。人用“孤蓬”喻指远行的朋友。<br>征：远行。<br>浮云游子意：曹丕《杂诗》：“西北有浮云，亭亭如车盖。惜哉时不遇，适与飘风会。吹我东南人行，行行至吴会。”后世用为典实，以浮云飘飞无定喻游子四方漂游。浮云，飘动的云。游子，离家远游的人。<br>兹：声音词。此。<br>萧萧：马的呻吟嘶叫声。<br>班马：离群的马，这里指载人远离的马。班，分别；离别，一作“斑”。","translation":"青翠的山峦横卧在城墙的北面，波光粼粼的流水围绕着城的东边。在此地我们相互道别，你就像孤蓬那样随风飘荡，到万里之外远行去了。浮云像游子一样行踪不定，夕阳徐徐下山，似乎有所留恋。挥挥手从此分离，友人骑的那匹将要载他远行的马萧萧长鸣，似乎不忍离去。","number":61,"title_py":"sòng yǒu rén","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"山中留客","dynasty":"唐","author":"张旭","text":"<ruby>山<rt>shān</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>物<rt>wù</rt></ruby><ruby>态<rt>tài</rt></ruby><ruby>弄<rt>nòng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>晖<rt>huī</rt></ruby>，<br><ruby>莫<rt>mò</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>轻<rt>qīng</rt></ruby><ruby>阴<rt>yīn</rt></ruby><ruby>便<rt>biàn</rt></ruby><ruby>拟<rt>nǐ</rt></ruby><ruby>归<rt>guī</rt></ruby>。<br><ruby>纵<rt>zòng</rt></ruby><ruby>使<rt>shǐ</rt></ruby><ruby>晴<rt>qíng</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>色<rt>sè</rt></ruby>，<br><ruby>入<rt>rù</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>深<rt>shēn</rt></ruby><ruby>处<rt>chù</rt></ruby><ruby>亦<rt>yì</rt></ruby><ruby>沾<rt>zhān</rt></ruby><ruby>衣<rt>yī</rt></ruby>。","notes":"山光：山的容光。<br>物态：景物的样子，（山中的）景色。<br>晖：阳光。<br>莫：不要。<br>轻阴：<br>阴云便拟归：就打算回去。<br>中纵使：纵然，即使。<br>留云：指雾气、烟霭。","translation":"春光明媚，万物都呈现着自己的佳妙之处，所以请不要因为天色微阴便要回归。即便是晴明的天气里毫无雨意，走进云雾深处，水汽也会沾湿你的衣服。","number":62,"title_py":"shān zhōng liú kè","author_py":"zhāng xù","dynasty_py":"Táng"},{"title":"过山农家","dynasty":"唐","author":"顾况","text":"<ruby>板<rt>bǎn</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>渡<rt>dù</rt></ruby><ruby>泉<rt>quán</rt></ruby><ruby>声<rt>shēng</rt></ruby>，<br><ruby>茅<rt>máo</rt></ruby><ruby>檐<rt>yán</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>午<rt>wǔ</rt></ruby><ruby>鸡<rt>jī</rt></ruby><ruby>鸣<rt>míng</rt></ruby>。<br><ruby>莫<rt>mò</rt></ruby><ruby>嗔<rt>chēn</rt></ruby><ruby>焙<rt>bèi</rt></ruby><ruby>茶<rt>chá</rt></ruby><ruby>烟<rt>yān</rt></ruby><ruby>暗<rt>àn</rt></ruby>，<br><ruby>却<rt>què</rt></ruby><ruby>喜<rt>xǐ</rt></ruby><ruby>晒<rt>shài</rt></ruby><ruby>谷<rt>gǔ</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>晴<rt>qíng</rt></ruby>。","notes":"过：拜访，访问。<br>嗔：嫌怨。<br>焙茶：用微火烘烤茶叶，使返潮的茶叶去掉水分。<br>焙：用微火烘","translation":"走上板桥，只听桥下泉水叮咚。日过正午，茅草房前公鸡啼鸣，不要责怪烘茶冒出青烟，应当庆幸晒谷正逢晴天。","number":63,"title_py":"guò shān nóng jiā","author_py":"gù kuàng","dynasty_py":"Táng"},{"title":"登岳阳楼","dynasty":"唐","author":"杜甫","text":"<ruby>昔<rt>xī</rt></ruby><ruby>闻<rt>wén</rt></ruby><ruby>洞<rt>dòng</rt></ruby><ruby>庭<rt>tíng</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<br><ruby>今<rt>jīn</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>岳<rt>yuè</rt></ruby><ruby>阳<rt>yáng</rt></ruby><ruby>楼<rt>lóu</rt></ruby>。<br><ruby>吴<rt>wú</rt></ruby><ruby>楚<rt>chǔ</rt></ruby><ruby>东<rt>dōng</rt></ruby><ruby>南<rt>nán</rt></ruby><ruby>坼<rt>chè</rt></ruby>，<br><ruby>乾<rt>qián</rt></ruby><ruby>坤<rt>kūn</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>夜<rt>yè</rt></ruby><ruby>浮<rt>fú</rt></ruby>。<br><ruby>亲<rt>qīn</rt></ruby><ruby>朋<rt>péng</rt></ruby><ruby>无<rt>wú</rt></ruby><ruby>一<rt>yí</rt></ruby><ruby>字<rt>zì</rt></ruby>，<br><ruby>老<rt>lǎo</rt></ruby><ruby>病<rt>bìng</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>孤<rt>gū</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>。<br><ruby>戎<rt>róng</rt></ruby><ruby>马<rt>mǎ</rt></ruby><ruby>关<rt>guān</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>北<rt>běi</rt></ruby>，<br><ruby>凭<rt>píng</rt></ruby><ruby>轩<rt>xuān</rt></ruby><ruby>涕<rt>tì</rt></ruby><ruby>泗<rt>sì</rt></ruby><ruby>流<rt>liú</rt></ruby>。","notes":"岳阳楼：即岳阳城西门楼，在湖南省岳阳市，下临洞庭湖，为游览胜地。<br>洞庭水：即洞庭湖，在今湖南北部，长江南岸，是中国第二淡水湖。<br>吴楚句：吴楚两地在我国东南。坼（chè）：分裂。<br>乾坤：指日、月。<br>浮：日月星辰和大地昼夜都飘浮在洞庭湖上。<br>无一字：音讯全无。<br>字：这里指书信。<br>老病：杜甫时年五十七岁，身患肺病，风痹，右耳已聋。<br>有孤舟：唯有孤舟一叶飘零无定。<br>戎马：指战争。<br>关山北：北方边境。<br>凭轩：靠着窗户或廊上的栏杆。涕泗（sì）<br>流：眼泪禁不住地流淌。","translation":"很早就就听说洞庭湖波澜壮阔，今日终于登上岳阳楼。浩瀚的湖水把吴楚两地撕裂，似乎日月星辰都漂浮在水中。亲朋好友们音信全无，我年老多病，乘孤舟四处漂流。北方边关战事又起，我倚着栏杆远望泪流满面。","number":64,"title_py":"dēng yuè yáng lóu","author_py":"dù fǔ","dynasty_py":"Táng"},{"title":"与诸子登岘山","dynasty":"唐","author":"孟浩然","text":"<ruby>人<rt>rén</rt></ruby><ruby>事<rt>shì</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>代<rt>dài</rt></ruby><ruby>谢<rt>xiè</rt></ruby>，<br><ruby>往<rt>wǎng</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>今<rt>jīn</rt></ruby>。<br><ruby>江<rt>jiāng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>留<rt>liú</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>迹<rt>jì</rt></ruby>，<br><ruby>我<rt>wǒ</rt></ruby><ruby>辈<rt>bèi</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>登<rt>dēng</rt></ruby><ruby>临<rt>lín</rt></ruby>。<br><ruby>水<rt>shuǐ</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>鱼<rt>yú</rt></ruby><ruby>梁<rt>liáng</rt></ruby><ruby>浅<rt>qiǎn</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>梦<rt>mèng</rt></ruby><ruby>泽<rt>zé</rt></ruby><ruby>深<rt>shēn</rt></ruby>。<br><ruby>羊<rt>yáng</rt></ruby><ruby>公<rt>gōng</rt></ruby><ruby>碑<rt>bēi</rt></ruby><ruby>尚<rt>shàng</rt></ruby><ruby>在<rt>zài</rt></ruby>，<br><ruby>读<rt>dú</rt></ruby><ruby>罢<rt>bà</rt></ruby><ruby>泪<rt>lèi</rt></ruby><ruby>沾<rt>zhān</rt></ruby><ruby>襟<rt>jīn</rt></ruby>。","notes":"岘（xiàn）山：一名岘首山，在今湖北襄阳以南。<br>诸子：指诗人的几个朋友。<br>代谢：交替变化。<br>往来：旧的去，新的来。<br>复登临：对羊祜曾登岘山而言。羊祜镇守襄阳时，常与友人到岘山饮酒诗赋，有过江山依旧人事短暂的感伤。<br>登临：登山观看。<br>诸鱼梁：沙洲名，在襄阳鹿门山的沔水中。<br>梦泽：云梦泽，古大泽，即今江汉平原。<br>登尚：一作“字”。<br>羊公碑：后人为纪念西晋名将羊祜而建。","translation":"人间的事情都有更替变化，来来往往的时日形成古今。江山各处保留的名胜古迹，而今我们又可以登攀亲临。鱼梁洲因水落而露出江面，云梦泽由天寒而迷濛幽深。羊祜碑如今依然巍峨矗立，读罢碑文泪水沾湿了衣襟。","number":65,"title_py":"yǔ zhū zǐ dēng xiàn shān","author_py":"mèng hào rán","dynasty_py":"Táng"},{"title":"登金陵凤凰台","dynasty":"唐","author":"李白","text":"<ruby>凤<rt>fèng</rt></ruby><ruby>凰<rt>huáng</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>凤<rt>fèng</rt></ruby><ruby>凰<rt>huáng</rt></ruby><ruby>游<rt>yóu</rt></ruby>，<br><ruby>凤<rt>fèng</rt></ruby><ruby>去<rt>qù</rt></ruby><ruby>台<rt>tái</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>吴<rt>wú</rt></ruby><ruby>宫<rt>gōng</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>埋<rt>mái</rt></ruby><ruby>幽<rt>yōu</rt></ruby><ruby>径<rt>jìng</rt></ruby>，<br><ruby>晋<rt>jìn</rt></ruby><ruby>代<rt>dài</rt></ruby><ruby>衣<rt>yī</rt></ruby><ruby>冠<rt>guān</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>古<rt>gǔ</rt></ruby><ruby>丘<rt>qiū</rt></ruby>。<br><ruby>三<rt>sān</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>半<rt>bàn</rt></ruby><ruby>落<rt>luò</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>外<rt>wài</rt></ruby>，<br><ruby>二<rt>èr</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>分<rt>fēn</rt></ruby><ruby>白<rt>bái</rt></ruby><ruby>鹭<rt>lù</rt></ruby><ruby>洲<rt>zhōu</rt></ruby>。<br><ruby>总<rt>zǒng</rt></ruby><ruby>为<rt>wéi</rt></ruby><ruby>浮<rt>fú</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>能<rt>néng</rt></ruby><ruby>蔽<rt>bì</rt></ruby><ruby>日<rt>rì</rt></ruby>，<br><ruby>长<rt>cháng</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>见<rt>jiàn</rt></ruby><ruby>使<rt>shǐ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>愁<rt>chóu</rt></ruby>。","notes":"凤凰台：故址在今南京凤凰山。<br>吴宫：三国时吴国的宫殿。<br>三山：在今江宁县西南，江滨有三峰并峙。<br>二水：指因白鹭洲而分开的江水。<br>登白鹭洲：在南京市西南江中，即今江心洲。","translation":"凤凰台上曾经有凤凰鸟来这里游憩，而今凤凰鸟已经飞走了，只留下这座空台伴着江水仍径自东流不息。当年华丽的吴王宫殿及其中的千花百草，如今都已埋没在荒凉幽僻的小径中，晋代的达官显贵们，就算曾经有过辉煌的功业，如今也长眠于古坟里了，早已化为一抔黄土。我站在台上，看着远处的三山，依然耸立在青天之外，白鹭洲把秦淮河隔成两条水道。天上的浮云随风飘荡，有时把太阳遮住，使我看不见长安城，而不禁感到非常忧愁。","number":66,"title_py":"dēng jīn líng fèng huáng tái","author_py":"lǐ bái","dynasty_py":"Táng"},{"title":"茅屋为秋风所破歌","dynasty":"唐","author":"杜甫","text":"<ruby>八<rt>bā</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>高<rt>gāo</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>怒<rt>nù</rt></ruby><ruby>号<rt>hào</rt></ruby>，<ruby>卷<rt>juǎn</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>屋<rt>wū</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>重<rt>zhòng</rt></ruby><ruby>茅<rt>máo</rt></ruby>。<br><ruby>茅<rt>máo</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>渡<rt>dù</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>洒<rt>sǎ</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>郊<rt>jiāo</rt></ruby>，<ruby>高<rt>gāo</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>挂<rt>guà</rt></ruby><ruby>罥<rt>juàn</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>梢<rt>shāo</rt></ruby>，<ruby>下<rt>xià</rt></ruby><ruby>者<rt>zhě</rt></ruby><ruby>飘<rt>piāo</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby><ruby>沉<rt>chén</rt></ru /ruby><ruby>湛<rt>zhàn</rt></ruby>。<br><ruby>我<rt>wǒ</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>旨<rt>zhǐ</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<ruby>以<rt>yǐ</rt></ruby><ruby>燕<rt>yàn</rt></ruby><ruby>乐<rt>lè</rt></ruby><ruby>嘉<rt>jiā</rt></ruby><ruby>宾<rt>bīn</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>心<rt>xīn</rt></ruby>。","notes":"","translation":"一群鹿儿呦呦叫，在那原野吃艾蒿。我有一批好宾客,弹琴吹笙奏乐调。一吹笙管振簧片，捧筐献礼礼周到。人们待我真友善，指示大道乐遵照。一群鹿儿呦呦叫，在那原野吃蒿草。我有一批好宾客，品德高尚又显耀。示人榜样不轻浮，君子贤人纷纷来仿效。我有美酒香而醇，宴请嘉宾嬉娱任逍遥。一群鹿儿呦呦叫，在那原野吃芩草。我有一批好宾客，弹瑟弹琴奏乐调。弹瑟弹琴奏乐调，快活尽兴同欢笑。我有美酒香而醇，宴请嘉宾心中乐陶陶。","number":72,"title_py":"shī jīng · xiǎo yǎ · lù míng","author_py":"yì míng","dynasty_py":"Xiān Qín"},{"title":"诗经·小雅·谷风","dynasty":"先秦","author":"佚名","text":"<ruby>习<rt>xí</rt></ruby><ruby>习<rt>xí</rt></ruby><ruby>谷<rt>gǔ</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>维<rt>wéi</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>及<rt>jí</rt></ruby><ruby>雨<rt>yǔ</rt></ruby>。<br><ruby>将<rt>jiāng</rt></ruby><ruby>恐<rt>kǒng</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>惧<rt>jù</rt></ruby>，<br><ruby>维<rt>wéi</rt></ruby><ruby>予<rt>yǔ</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>女<rt>nǚ</rt></ruby>。<br><ruby>将<rt>jiāng</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>乐<rt>lè</rt></ruby>，<br><ruby>女<rt>nǚ</rt></ruby><ruby>转<rt>zhuǎn</rt></ruby><ruby>弃<rt>qì</rt></ruby><ruby>予<rt>yǔ</rt></ruby>。<br><ruby>习<rt>xí</rt></ruby><ruby>习<rt>xí</rt></ruby><ruby>谷<rt>gǔ</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>维<rt>wéi</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>及<rt>jí</rt></ruby><ruby>颓<rt>tuí</rt></ruby>。<br><ruby>将<rt>jiāng</rt></ruby><ruby>恐<rt>kǒng</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>惧<rt>jù</rt></ruby>，<br><ruby>置<rt>zhì</rt></ruby><ruby>予<rt>yǔ</rt></ruby><ruby>于<rt>yú</rt></ruby><ruby>怀<rt>huái</rt></ruby>。<br><ruby>将<rt>jiāng</rt></ruby><ruby>安<rt>ān</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>乐<rt>lè</rt></ruby>，<br><ruby>弃<rt>qì</rt></ruby><ruby>予<rt>yǔ</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>遗<rt>yí</rt></ruby>。<br><ruby>习<rt>xí</rt></ruby><ruby>习<rt>xí</rt></ruby><ruby>谷<rt>gǔ</rt></ruby><ruby>风<rt>fēng</rt></ruby>，<br><ruby>维<rt>wéi</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>崔<rt>cuī</rt></ruby><ruby>嵬<rt>wéi</rt></ruby>。<br><ruby>无<rt>wú</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>死<rt>sǐ</rt></ruby>，<br><ruby>无<rt>wú</rt></ruby><ruby>木<rt>mù</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>萎<rt>wēi</rt></ruby>。<br><ruby>忘<rt>wàng</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>德<rt>dé</rt></ruby>，<br><ruby>思<rt>sī</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>怨<rt>yuàn</rt></ruby>。","notes":"","translation":"口呼呼刮大风，大风夹带阵阵雨。当年担惊受怕时，唯我帮你分忧虑。如今富裕又安乐，你却弃我掉头去。口呼呼刮大风，大风旋转不停息。当年担惊受怕时，你搂我在怀抱里。如今富裕又安乐，将我抛开全忘记。口呼呼风不停，刮过巍巍高山岭。刮得百草全枯死，刮得树木都凋零。我的好处你全忘。专门记我小毛病。","number":73,"title_py":"shī jīng · xiǎo yǎ · gǔ fēng","author_py":"yì míng","dynasty_py":"Xiān Qín"},{"title":"钗头凤·红酥手","dynasty":"宋","author":"陆游","text":"<ruby>红<rt>hóng</rt></ruby><ruby>酥<rt>sū</rt></ruby><ruby>手<rt>shǒu</rt></ruby>，<ruby>黄<rt>huáng</rt></ruby><ruby>縢<rt>téng</rt></ruby>①<ruby>酒<rt>jiǔ</rt></ruby>，<ruby>满<rt>mǎn</rt></ruby><ruby>城<rt>chéng</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>色<rt>sè</rt></ruby><ruby>宫<rt>gōng</rt></ruby><ruby>墙<rt>qiáng</rt></ruby>②<ruby>柳<rt>liǔ</rt></ruby>。<br><ruby>东<rt>dōng</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>恶<rt>è</rt></ruby>，<ruby>欢<rt>huān</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>薄<rt>bó</rt></ruby>。<br><ruby>一<rt>yì</rt></ruby><ruby>怀<rt>huái</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>绪<rt>xù</rt></ruby>，<ruby>几<rt>jǐ</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>离<rt>lí</rt></ruby><ruby>索<rt>suǒ</rt></ruby>③。<br><ruby>错<rt>cuò</rt></ruby>、<ruby>错<rt>cuò</rt></ruby>、<ruby>错<rt>cuò</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>如<rt>rú</rt></ruby><ruby>旧<rt>jiù</rt></ruby>，<ruby>人<rt>rén</rt></ruby><ruby>空<rt>kōng</rt></ruby><ruby>瘦<rt>shòu</rt></ruby>，<ruby>泪<rt>lèi</rt></ruby><ruby>痕<rt>hén</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>浥<rt>yì</rt></ruby>④<ruby>鲛<rt>jiāo</rt></ruby><ruby>绡<rt>xiāo</rt></ruby>⑤<ruby>透<rt>tòu</rt></ruby>。<br><ruby>桃<rt>táo</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>落<rt>luò</rt></ruby>，<ruby>闲<rt>xián</rt></ruby><ruby>池<rt>chí</rt></ruby><ruby>阁<rt>gé</rt></ruby>。<br><ruby>山<rt>shān</rt></ruby><ruby>盟<rt>méng</rt></ruby><ruby>虽<rt>suī</rt></ruby><ruby>在<rt>zài</rt></ruby>，<ruby>锦<rt>jǐn</rt></ruby><ruby>书<rt>shū</rt></ruby><ruby>难<rt>nán</rt></ruby><ruby>托<rt>tuō</rt></ruby>。<br><ruby>莫<rt>mò</rt></ruby>、<ruby>莫<rt>mò</rt></ruby>、<ruby>莫<rt>mò</rt></ruby>！","notes":"①黄縢（téng）：酒名，或作“黄藤”。②宫墙：南宋以绍兴为陪都，因此有宫墙。<br>钗③离索：离群索居的简括。头④浥（yì）：湿润。·凤⑤鲛绡（jiāo xiāo）：神话传说鲛人所织的绡，极薄，这里指手帕。绡，生丝，生丝织物。","translation":"你红润酥腻的手里，捧着盛上黄縢酒的杯子。满城荡漾着春天的景色，你却早已像宫墙中的绿柳那般遥不可及。春风多么可恶，欢情被吹得那样稀薄。满杯酒像是一杯忧愁的情绪，离别几年来的生活十分萧索。遥想当初，只能感叹：错，错，错！美丽的春景依然如旧，只是人却白白相思地消瘦。泪水洗尽脸上的胭脂红，又把薄绸的手帕全都湿透。满春的桃花凋落在寂静空旷的池塘楼阁上。永远相爱的誓言还在，可是锦文书信再也难以交付。遥想当初，只能感叹：莫，莫，莫！","number":74,"title_py":"chāi tóu fèng · hóng sū shǒu","author_py":"lù yóu","dynasty_py":"Sòng"},{"title":"钗头凤·世情薄","dynasty":"宋","author":"唐婉","text":"<ruby>世<rt>shì</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>薄<rt>bó</rt></ruby>，<ruby>人<rt>rén</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>恶<rt>è</rt></ruby>，<ruby>雨<rt>yǔ</rt></ruby><ruby>送<rt>sòng</rt></ruby><ruby>黄<rt>huáng</rt></ruby><ruby>昏<rt>hūn</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>落<rt>luò</rt></ruby>。<br><ruby>晓<rt>xiǎo</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>干<rt>gān</rt></ruby>，<ruby>泪<rt>lèi</rt></ruby><ruby>痕<rt>hén</rt></ruby><ruby>残<rt>cán</rt></ruby>。<br><ruby>欲<rt>yù</rt></ruby><ruby>笺<rt>jiān</rt></ruby>①<ruby>心<rt>xīn</rt></ruby><ruby>事<rt>shì</rt></ruby>，<ruby>独<rt>dú</rt></ruby><ruby>语<rt>yǔ</rt></ruby><ruby>斜<rt>xié</rt></ruby><ruby>阑<rt>lán</rt></ruby>②。<br><ruby>难<rt>nán</rt></ruby>，<ruby>难<rt>nán</rt></ruby>，<ruby>难<rt>nán</rt></ruby>！<br><ruby>人<rt>rén</rt></ruby><ruby>成<rt>chéng</rt></ruby><ruby>各<rt>gè</rt></ruby>，<ruby>今<rt>jīn</rt></ruby><ruby>非<rt>fēi</rt></ruby><ruby>昨<rt>zuó</rt></ruby>，<ruby>病<rt>bìng</rt></ruby><ruby>魂<rt>hún</rt></ruby><ruby>常<rt>cháng</rt></ruby><ruby>似<rt>sì</rt></ruby><ruby>秋<rt>qiū</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>索<rt>suǒ</rt></ruby>③。<br><ruby>角<rt>jiǎo</rt></ruby><ruby>声<rt>shēng</rt></ruby><ruby>寒<rt>hán</rt></ruby>，<ruby>夜<rt>yè</rt></ruby><ruby>阑<rt>lán</rt></ruby><ruby>珊<rt>shān</rt></ruby>④。<br><ruby>怕<rt>pà</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>寻<rt>xún</rt></ruby><ruby>问<rt>wèn</rt></ruby>，<ruby>咽<rt>yàn</rt></ruby><ruby>泪<rt>lèi</rt></ruby><ruby>装<rt>zhuāng</rt></ruby><ruby>欢<rt>huān</rt></ruby>。<br><ruby>瞒<rt>mán</rt></ruby>，<ruby>瞒<rt>mán</rt></ruby>，<ruby>瞒<rt>mán</rt></ruby>！","notes":"①笺：写出。<br>②斜阑：指栏杆。<br>③病魂一句：描写精神忧惚，似飘荡不定的秋千索。·<br>凤④阑珊：衰残，将尽。","translation":"事炎凉，黄昏中下着雨，打落片片桃花，这凄凉的情景中人的心也不禁忧伤。晨风吹干了昨晚的泪痕，当我想把心事写下来的时候，却不能够办到，只能倚着斜栏，心底里向着远方的你呼唤；和自己低声轻轻地说话，希望你也能够听到。难、难、难。今时不同往日，咫尺天涯，我身染重病，就像秋千索。夜风刺骨，彻体生寒，听着远方的角声，心中再生一层寒意，夜尽了，我也很快就像这夜一样了吧? 怕人询问，我忍住泪水，在别人面前强颜欢笑。瞒、瞒、瞒。","number":75,"title_py":"chāi tóu fèng · shì qíng báo","author_py":"táng wǎn","dynasty_py":"Sòng"},{"title":"一剪梅·舟过吴江","dynasty":"宋","author":"蒋捷","text":"<ruby>一<rt>yí</rt></ruby><ruby>片<rt>piàn</rt></ruby><ruby>春<rt>chūn</rt></ruby><ruby>愁<rt>chóu</rt></ruby><ruby>待<rt>dài</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby><ruby>浇<rt>jiāo</rt></ruby>①。<br><ruby>江<rt>jiāng</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>舟<rt>zhōu</rt></ruby><ruby>摇<rt>yáo</rt></ruby>，<br><ruby>楼<rt>lóu</rt></ruby><ruby>上<rt>shàng</rt></ruby><ruby>帘<rt>lián</rt></ruby><ruby>招<rt>zhāo</rt></ruby>②。<br><ruby>秋<rt>qiū</rt></ruby><ruby>娘<rt>niáng</rt></ruby><ruby>渡<rt>dù</rt></ruby>③<ruby>与<rt>yǔ</rt></ruby><ruby>泰<rt>tài</rt></ruby><ruby>娘<rt>niáng</rt></ruby><ruby>桥<rt>qiáo</rt></ruby>，<br><ruby>风<rt>fēng</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>飘<rt>piāo</rt></ruby><ruby>飘<rt>piāo</rt></ruby>，<br><ruby>雨<rt>yǔ</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>萧<rt>xiāo</rt></ruby><ruby>萧<rt>xiāo</rt></ruby>。<br><ruby>何<rt>hé</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>归<rt>guī</rt></ruby><ruby>家<rt>jiā</rt></ruby><ruby>洗<rt>xǐ</rt></ruby><ruby>客<rt>kè</rt></ruby><ruby>袍<rt>páo</rt></ruby>？<br><ruby>银<rt>yín</rt></ruby><ruby>字<rt>zì</rt></ruby><ruby>笙<rt>shēng</rt></ruby>④<ruby>调<rt>diào</rt></ruby>，<br><ruby>心<rt>xīn</rt></ruby><ruby>字<rt>zì</rt></ruby><ruby>香<rt>xiāng</rt></ruby>⑤<ruby>烧<rt>shāo</rt></ruby>。<br><ruby>流<rt>liú</rt></ruby><ruby>光<rt>guāng</rt></ruby><ruby>容<rt>róng</rt></ruby><ruby>易<rt>yì</rt></ruby><ruby>把<rt>bǎ</rt></ruby><ruby>人<rt>rén</rt></ruby><ruby>抛<rt>pāo</rt></ruby>，<br><ruby>红<rt>hóng</rt></ruby><ruby>了<rt>le</rt></ruby><ruby>樱<rt>yīng</rt></ruby><ruby>桃<rt>táo</rt></ruby>，<br><ruby>绿<rt>lǜ</rt></ruby><ruby>了<rt>le</rt></ruby><ruby>芭<rt>bā</rt></ruby><ruby>蕉<rt>jiāo</rt></ruby>。","notes":"一①浇：浸灌，消除。<br>剪②帘招：指酒旗。·<br>梅③秋娘渡：指吴江渡。<br>舟④银字笙：管乐器的一种。调笙，调弄有银字的笙。<br>过⑤心字香：点熏炉里心字形的香。","translation":"船在吴江上飘摇，我满怀羁旅的春愁，看到岸上酒帘子在飘摇，招揽客人，便产生了借酒消愁的愿望。船只经过令文人骚客遐想不尽的胜景秋娘渡与泰娘桥，也没有好心情欣赏，眼前是“风又飘飘，雨又潇潇”，实在令人烦恼。哪一天能回家洗客袍，结束客游劳顿的生活呢？哪一天能和家人团聚在一起，调弄镶有银字的笙，点燃熏炉里心字形的盘香？春光容易流逝，使人追赶不上，樱桃才红熟，芭蕉又绿了，春去夏又到。","number":76,"title_py":"yī jiǎn méi · zhōu guò wú jiāng","author_py":"jiǎng jié","dynasty_py":"Sòng"},{"title":"咏指甲花","dynasty":"现代","author":"毛泽东","text":"<ruby>百<rt>bǎi</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>皆<rt>jiē</rt></ruby><ruby>竞<rt>jìng</rt></ruby><ruby>春<rt>chūn</rt></ruby>，<br><ruby>指<rt>zhǐ</rt></ruby><ruby>甲<rt>jiǎ</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>静<rt>jìng</rt></ruby><ruby>眠<rt>mián</rt></ruby>。<br><ruby>春<rt>chūn</rt></ruby><ruby>季<rt>jì</rt></ruby><ruby>叶<rt>yè</rt></ruby><ruby>始<rt>shǐ</rt></ruby><ruby>生<rt>shēng</rt></ruby>，<br><ruby>炎<rt>yán</rt></ruby><ruby>夏<rt>xià</rt></ruby><ruby>花<rt>huā</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>鲜<rt>xiān</rt></ruby>。<br><ruby>叶<rt>yè</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>枝<rt>zhī</rt></ruby><ruby>又<rt>yòu</rt></ruby><ruby>弱<rt>ruò</rt></ruby>，<br><ruby>种<rt>zhǒng</rt></ruby><ruby>类<rt>lèi</rt></ruby><ruby>多<rt>duō</rt></ruby><ruby>且<rt>qiě</rt></ruby><ruby>妍<rt>yán</rt></ruby>。<br><ruby>万<rt>wàn</rt></ruby><ruby>草<rt>cǎo</rt></ruby><ruby>被<rt>pī</rt></ruby><ruby>日<rt>rì</rt></ruby><ruby>出<rt>chū</rt></ruby>，<br><ruby>惟<rt>wéi</rt></ruby><ruby>婢<rt>bì</rt></ruby><ruby>傲<rt>ào</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>天<rt>tiān</rt></ruby>。<br><ruby>渊<rt>yuān</rt></ruby><ruby>明<rt>míng</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>菊<rt>jú</rt></ruby>，<br><ruby>敦<rt>dūn</rt></ruby><ruby>颐<rt>yí</rt></ruby><ruby>好<rt>hào</rt></ruby><ruby>青<rt>qīng</rt></ruby><ruby>莲<rt>lián</rt></ruby>。<br><ruby>我<rt>wǒ</rt></ruby><ruby>独<rt>dú</rt></ruby><ruby>爱<rt>ài</rt></ruby><ruby>指<rt>zhǐ</rt></ruby><ruby>甲<rt>jiǎ</rt></ruby>，<br><ruby>取<rt>qǔ</rt></ruby><ruby>其<rt>qí</rt></ruby><ruby>志<rt>zhì</rt></ruby><ruby>更<rt>gèng</rt></ruby><ruby>坚<rt>jiān</rt></ruby>。","notes":"【写作背景】那是一个夏天，毛泽东到外婆家附近的保安寺玩耍。他看到寺院四周盛开着色彩斑斓的凤仙花。这是一种不择土壤、随处生长的小花，因花瓣可用来染指甲，故俗称指甲花。望着顽强生长、傲暑盛开的指甲花，少年毛泽东不禁萌生写诗欲望，并联想起古人各得其趣的咏花诗文：陶渊明归隐田园，独爱菊花；周敦颐生性清高，独爱莲花。此时的毛泽东却偏爱枝叶弱小、意志坚强的指甲花。从保安寺归来，毛泽东吟成了一首五言诗《咏指甲花》。","translation":"","number":77,"title_py":"yǒng zhǐ jiǎ huā","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"沁园春·长沙","dynasty":"现代","author":"毛泽东","text":"<ruby>独<rt>dú</rt></ruby><ruby>立<rt>lì</rt></ruby><ruby>寒<rt>hán</rt></ruby><ruby>秋<rt>qiū</rt></ruby>，<ruby>湘<rt>xiāng</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>北<rt>běi</rt></ruby><ruby>去<rt>qù</rt></ruby>，<ruby>橘<rt>jú</rt></ruby><ruby>子<rt>zǐ</rt></ruby><ruby>洲<rt>zhōu</rt></ruby><ruby>头<rt>tóu</rt></ruby>。<br><ruby>看<rt>kàn</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>红<rt>hóng</rt></ruby><ruby>遍<rt>biàn</rt></ruby>，<ruby>层<rt>céng</rt></ruby><ruby>林<rt>lín</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>染<rt>rǎn</rt></ruby>；<ruby>漫<rt>màn</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>碧<rt>bì</rt></ruby><ruby>透<rt>tòu</rt></ruby>，<ruby>百<rt>bǎi</rt></ruby><ruby>舸<rt>gě</rt></ruby><ruby>争<rt>zhēng</rt></ruby><ruby>流<rt>liú</rt></ruby>。<br><ruby>鹰<rt>yīng</rt></ruby><ruby>击<rt>jī</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>空<rt>kōng</rt></ruby>，<ruby>鱼<rt>yú</rt></ruby><ruby>翔<rt>xiáng</rt></ruby><ruby>浅<rt>qiǎn</rt></ruby><ruby>底<rt>dǐ</rt></ruby>，<ruby>万<rt>wàn</rt></ruby><ruby>类<rt>lèi</rt></ruby><ruby>霜<rt>shuāng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>竞<rt>jìng</rt></ruby><ruby>自<rt>zì</rt></ruby><ruby>由<rt>yóu</rt></ruby>。<br><ruby>怅<rt>chàng</rt></ruby><ruby>寥<rt>liáo</rt></ruby><ruby>廓<rt>kuò</rt></ruby>，<ruby>问<rt>wèn</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>茫<rt>máng</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>地<rt>dì</rt></ruby>，<ruby>谁<rt>shuí</rt></ruby><ruby>主<rt>zhǔ</rt></ruby><ruby>沉<rt>chén</rt></ruby><ruby>浮<rt>fú</rt></ruby>？<br><ruby>携<rt>xié</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>百<rt>bǎi</rt></ruby><ruby>侣<rt>lǚ</rt></ruby><ruby>曾<rt>céng</rt></ruby><ruby>游<rt>yóu</rt></ruby>，<ruby>忆<rt>yì</rt></ruby><ruby>往<rt>wǎng</rt></ruby><ruby>昔<rt>xī</rt></ruby><ruby>峥<rt>zhēng</rt></ruby><ruby>嵘<rt>róng</rt></ruby><ruby>岁<rt>suì</rt></ruby><ruby>月<rt>yuè</rt></ruby><ruby>稠<rt>chóu</rt></ruby>。<br><ruby>恰<rt>qià</rt></ruby><ruby>同<rt>tóng</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>少<rt>shào</rt></ruby><ruby>年<rt>nián</rt></ruby>，<ruby>风<rt>fēng</rt></ruby><ruby>华<rt>huá</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>茂<rt>mào</rt></ruby>；<ruby>书<rt>shū</rt></ruby><ruby>生<rt>shēng</rt></ruby><ruby>意<rt>yì</rt></ruby><ruby>气<rt>qì</rt></ruby>，<ruby>挥<rt>huī</rt></ruby><ruby>斥<rt>chì</rt></ruby><ruby>方<rt>fāng</rt></ruby><ruby>遒<rt>qiú</rt></ruby>。<br><ruby>指<rt>zhǐ</rt></ruby><ruby>点<rt>diǎn</rt></ruby><ruby>江<rt>jiāng</rt></ruby><ruby>山<rt>shān</rt></ruby>，<ruby>激<rt>jī</rt></ruby><ruby>扬<rt>yáng</rt></ruby><ruby>文<rt>wén</rt></ruby><ruby>字<rt>zì</rt></ruby>，<ruby>粪<rt>fèn</rt></ruby><ruby>土<rt>tǔ</rt></ruby><ruby>当<rt>dāng</rt></ruby><ruby>年<rt>nián</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>户<rt>hù</rt></ruby><ruby>侯<rt>hóu</rt></ruby>。<br><ruby>曾<rt>céng</rt></ruby><ruby>记<rt>jì</rt></ruby><ruby>否<rt>fǒu</rt></ruby>，<ruby>到<rt>dào</rt></ruby><ruby>中<rt>zhōng</rt></ruby><ruby>流<rt>liú</rt></ruby><ruby>击<rt>jī</rt></ruby><ruby>水<rt>shuǐ</rt></ruby>，<ruby>浪<rt>làng</rt></ruby><ruby>遏<rt>è</rt></ruby><ruby>飞<rt>fēi</rt></ruby><ruby>舟<rt>zhōu</rt></ruby>？","notes":"","translation":"在深秋一个秋高气爽的日子里，我独自伫立在橘子洲头，眺望着湘江碧水缓缓北流。看万千山峰全都变成了红色，一层层树林好像染过颜色一样，江水清澈澄碧，一艘艘大船乘风破浪，争先恐后。广阔的天空里鹰在矫健有力地飞，鱼在清澈的水里轻快地游着，万物都在秋光中争着过自由自在的生活。面对着无边无际的宇宙，（千万种思绪一齐涌上心头）我要问：这苍茫大地的盛衰兴废，由谁决定主宰呢？回想过去，我和我的同学，经常携手结伴来到这里游玩。在一起商讨国家大事，那无数不平凡的岁月至今还萦绕在我的心头。同学们正值青春年少，风华正茂；大家踌躇满志，意气奔放，正强劲有力。评论国家大事，写出这些激浊扬清的文章，把当时那些军阀官僚看得如同粪土。可曾记得，当年我们在那浪花大得可以阻止飞奔而来的船舟的激流中一起游泳？","number":78,"title_py":"qìn yuán chūn · cháng shā","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"七律·长征","dynasty":"现代","author":"毛泽东","text":"<ruby>红<rt>hóng</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>怕<rt>pà</rt></ruby><ruby>远<rt>yuǎn</rt></ruby><ruby>征<rt>zhēng</rt></ruby><ruby>难<rt>nán</rt></ruby>，<br><ruby>万<rt>wàn</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>只<rt>zhǐ</rt></ruby><ruby>等<rt>děng</rt></ruby><ruby>闲<rt>xián</rt></ruby>。<br><ruby>五<rt>wǔ</rt></ruby><ruby>岭<rt>lǐng</rt></ruby><ruby>逶<rt>wēi</rt></ruby><ruby>迤<rt>yí</rt></ruby><ruby>腾<rt>téng</rt></ruby><ruby>细<rt>xì</rt></ruby><ruby>浪<rt>làng</rt></ruby>，<br><ruby>乌<rt>wū</rt></ruby><ruby>蒙<rt>méng</rt></ruby><ruby>磅<rt>bàng</rt></ruby><ruby>礴<rt>bó</rt></ruby><ruby>走<rt>zǒu</rt></ruby><ruby>泥<rt>ní</rt></ruby><ruby>丸<rt>wán</rt></ruby>。<br><ruby>金<rt>jīn</rt></ruby><ruby>沙<rt>shā</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>拍<rt>pāi</rt></ruby><ruby>云<rt>yún</rt></ruby><ruby>崖<rt>yá</rt></ruby><ruby>暖<rt>nuǎn</rt></ruby>，<br><ruby>大<rt>dà</rt></ruby><ruby>渡<rt>dù</rt></ruby><ruby>桥<rt>qiáo</rt></ruby><ruby>横<rt>héng</rt></ruby><ruby>铁<rt>tiě</rt></ruby><ruby>索<rt>suǒ</rt></ruby><ruby>寒<rt>hán</rt></ruby>。<br><ruby>更<rt>gèng</rt></ruby><ruby>喜<rt>xǐ</rt></ruby><ruby>岷<rt>mín</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>千<rt>qiān</rt></ruby><ruby>里<rt>lǐ</rt></ruby><ruby>雪<rt>xuě</rt></ruby>，<br><ruby>三<rt>sān</rt></ruby><ruby>军<rt>jūn</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>后<rt>hòu</rt></ruby><ruby>尽<rt>jìn</rt></ruby><ruby>开<rt>kāi</rt></ruby><ruby>颜<rt>yán</rt></ruby>。","notes":"征等闲：不怕困难，不可阻止。<br>逶迤：形容道路、山脉、河流等弯弯曲曲，连绵不断的样子。","translation":"红军不怕万里长征路上的一切艰难困苦，把千山万水都看得极为平常。绵延不断的五岭，在红军看来只不过是微波细浪在起伏，而气势雄伟的乌蒙山，在红军眼里也不过是一颗泥丸。金沙江浊浪滔天，拍击着高耸入云的峭壁悬崖，热气腾腾。大渡河险桥横架，晃动着凌空高悬的根根铁索，寒意阵阵。更加令人喜悦的是踏上千里积雪的岷山，红军翻越过去以后个个笑逐颜开。","number":79,"title_py":"qī lǜ · cháng zhēng","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"七律·人民解放军占领南京","dynasty":"现代","author":"毛泽东","text":"<ruby>钟<rt>zhōng</rt></ruby><ruby>山<rt>shān</rt></ruby><ruby>风<rt>fēng</rt></ruby><ruby>雨<rt>yǔ</rt></ruby><ruby>起<rt>qǐ</rt></ruby><ruby>苍<rt>cāng</rt></ruby><ruby>黄<rt>huáng</rt></ruby>，<br><ruby>百<rt>bǎi</rt></ruby><ruby>万<rt>wàn</rt></ruby><ruby>雄<rt>xióng</rt></ruby><ruby>师<rt>shī</rt></ruby><ruby>过<rt>guò</rt></ruby><ruby>大<rt>dà</rt></ruby><ruby>江<rt>jiāng</rt></ruby>。<br><ruby>虎<rt>hǔ</rt></ruby><ruby>踞<rt>jù</rt></ruby><ruby>龙<rt>lóng</rt></ruby><ruby>盘<rt>pán</rt></ruby><ruby>今<rt>jīn</rt></ruby><ruby>胜<rt>shèng</rt></ruby><ruby>昔<rt>xī</rt></ruby>，<br><ruby>天<rt>tiān</rt></ruby><ruby>翻<rt>fān</rt></ruby><ruby>地<rt>dì</rt></ruby><ruby>覆<rt>fù</rt></ruby><ruby>慨<rt>kǎi</rt></ruby><ruby>而<rt>ér</rt></ruby><ruby>慷<rt>kāng</rt></ruby>。<br><ruby>宜<rt>yí</rt></ruby><ruby>将<rt>jiāng</rt></ruby><ruby>剩<rt>shèng</rt></ruby><ruby>勇<rt>yǒng</rt></ruby><ruby>追<rt>zhuī</rt></ruby><ruby>穷<rt>qióng</rt></ruby><ruby>寇<rt>kòu</rt></ruby>，<br><ruby>不<rt>bù</rt></ruby><ruby>可<rt>kě</rt></ruby><ruby>沽<rt>gū</rt></ruby><ruby>名<rt>míng</rt></ruby><ruby>学<rt>xué</rt></ruby><ruby>霸<rt>bà</rt></ruby><ruby>王<rt>wáng</rt></ruby>。<br><ruby>天<rt>tiān</rt></ruby><ruby>若<rt>ruò</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>情<rt>qíng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>亦<rt>yì</rt></ruby><ruby>老<rt>lǎo</rt></ruby>，<br><ruby>人<rt>rén</rt></ruby><ruby>间<rt>jiān</rt></ruby><ruby>正<rt>zhèng</rt></ruby><ruby>道<rt>dào</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>沧<rt>cāng</rt></ruby><ruby>桑<rt>sāng</rt></ruby>。","notes":"①钟山：此处用作南京的代语。<br>②苍黄：此苍黄就是仓皇，即突然的意思。③虎踞（jù）<br>龙盘：形容地势优异。","translation":"革命的暴风雨震荡着蒋家王朝都城南京，解放军以百万雄师突破长江天险，以雄奇险峻而著称的古都南京城回到了手中。这天翻地覆的巨大变化，是足以令人慷慨高歌和欢欣鼓舞的。应该趁现在这敌衰我盛的大好时机，痛追残敌，全中国。不可学那割据长江南岸，建立割据势力的霸王项羽。不断地变异、不断地发展、不断地前进，这是人类社会发展的必然规律。","number":80,"title_py":"qī lǜ · rén mín jiě fàng jūn zhàn lǐng nán jīng","author_py":"máo zé dōng","dynasty_py":"Xiàn Dài"},{"title":"论语","dynasty":"春秋","author":"孔子及弟子","text":"<ruby>子<rt>zǐ</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>不<rt>bú</rt></ruby><ruby>愤<rt>fèn</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>启<rt>qǐ</rt></ruby>，<ruby>不<rt>bù</rt></ruby><ruby>悱<rt>fěi</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>发<rt>fā</rt></ruby>，<ruby>举<rt>jǔ</rt></ruby><ruby>一<rt>yì</rt></ruby><ruby>隅<rt>yú</rt></ruby><ruby>不<rt>bù</rt></ruby><ruby>以<rt>yǐ</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>隅<rt>yú</rt></ruby><ruby>反<rt>fǎn</rt></ruby>，<ruby>则<rt>zé</rt></ruby><ruby>不<rt>bú</rt></ruby><ruby>复<rt>fù</rt></ruby><ruby>也<rt>yě</rt></ruby>。\"<br><ruby>子<rt>zǐ</rt></ruby><ruby>谓<rt>wèi</rt></ruby><ruby>颜<rt>yán</rt></ruby><ruby>渊<rt>yuān</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>用<rt>yòng</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>则<rt>zé</rt></ruby><ruby>行<rt>xíng</rt></ruby>，<ruby>舍<rt>shě</rt></ruby><ruby>之<rt>zhī</rt></ruby><ruby>则<rt>zé</rt></ruby><ruby>藏<rt>cáng</rt></ruby>，<ruby>惟<rt>wéi</rt></ruby><ruby>我<rt>wǒ</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>尔<rt>ěr</rt></ruby><ruby>有<rt>yǒu</rt></ruby><ruby>是<rt>shì</rt></ruby><ruby>夫<rt>fū</rt></ruby>！\"<ruby>子<rt>zǐ</rt></ruby><ruby>路<rt>lù</rt></ruby><ruby>曰<rt>yuē</rt></ruby>：\"<ruby>子<rt>zǐ</rt></ruby><ruby>行<rt>xíng</rt></ruby><ruby>三<rt>sān</rt></ruby><ruby>军<rt>jūn</rt></ruby>，<ruby>则<rt>zé</rt></ruby><r function ruby(t,p){







  if(!p)return t;







  var c=t.split(''),s=p.split(' ');







  var h='';







  for(var i=0;i<c.length;i++){







    if(c[i].match(/[\u4e00-\u9fff]/)){







      h+='<ruby>'+c[i]+'<rt>'+(s[i]||'')+'</rt></ruby>';







    }else{







      h+=c[i];







    }







  }







  return h;







}

  playNote(freq, startTime, duration, gainVal){







    if(!this.ctx)return;







    const osc = this.ctx.createOscillator();







    const g = this.ctx.createGain();







    osc.type = 'sine';







    osc.frequency.value = freq;







    g.gain.setValueAtTime(gainVal*0.3, startTime);







    g.gain.exponentialRampToValueAtTime(0.001, startTime+duration);







    osc.connect(g); g.connect(this.gain);







    osc.start(startTime); osc.stop(startTime+duration);







    this.nodes.push(osc);







  },







  start(){







    if(!this.ctx)return; this.playing = true;







    const now = this.ctx.currentTime;







    const chords = [[261.63,329.63,392.00],[293.66,392.00,440.00],[220.00,261.63,329.63],[261.63,329.63,440.00]];







    const beat = 2.8;







    for(let r=0;r<3;r++) chords.forEach((ch,ci)=>{







      const t = now+(r*chords.length+ci)*beat;







      ch.forEach((f,fi)=>this.playNote(f,t+fi*0.3,beat*1.6,0.7));







    });







    const mel = [523.25,440.00,587.33,659.25,523.25,587.33,440.00,392.00];







    mel.forEach((f,i)=>this.playNote(f,now+i*beat*0.75,beat*0.7,0.35));







    this._timer = setTimeout(()=>{this.playing=false;this.start();},36000);







  },







  stop(){







    this.playing=false; if(this._timer)clearTimeout(this._timer);







    this.nodes.forEach(n=>{try{n.stop()}catch(e){}}); this.nodes=[];







  },







  toggle(){







    if(this.playing){this.stop();return false}







    if(!this.ctx)this.init();







    if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();







    this.start(); return true;







  }







};







let musicOn = false;







function toggleMusic(){







  musicOn = MusicEngine.toggle();







  const btn = document.getElementById('musicBtn');







  btn.textContent = musicOn?'🔊':'🔇';







  btn.classList.toggle('on',musicOn);







  if(musicOn) localStorage.setItem('poetryMusic','on');







  else localStorage.removeItem('poetryMusic');







}







function _startMusic(){







  if(MusicEngine.playing) return;







  MusicEngine.init();







  if(MusicEngine.ctx){







    MusicEngine.ctx.resume().then(()=>{







      if(!MusicEngine.playing){







        MusicEngine.start(); musicOn = true;







        const btn = document.getElementById('musicBtn');







        btn.textContent='🔊'; btn.classList.add('on');







      }







    }).catch(()=>{});







  }







}







// Auto-start if user had it on before







_startMusic();







let _rc=0, _rt=setInterval(()=>{_rc++;_startMusic();if(MusicEngine.playing||_rc>15)clearInterval(_rt);},300);







document.addEventListener('click',function _r(){







  if(MusicEngine.ctx&&MusicEngine.ctx.state==='suspended'){







    MusicEngine.ctx.resume().then(()=>{if(!MusicEngine.playing)MusicEngine.start();});







  }







},{once:true,passive:true});
